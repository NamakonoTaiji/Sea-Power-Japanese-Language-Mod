Name_en=RAID ON OKINAWA
MissionSequenceName_en=MISSION 1
MapShortName_en=01
Description_en=Naha, Okinawa, Japan
MissionImage_en=campaigns/pacific-strike-task-force/art/pacific_strike_01_sheet.png
MissionIntro_en=Hostilities commenced this morning in Europe and the Pacific, and Allied intelligence has discovered the Soviets are attempting a daring commando raid on Okinawa. Embarked aboard a Japanese-flagged car carrier, the commando unit is in sight of the islands. They are supported by a PLAN strike force of surface ships approaching from the northwest. Get underway and destroy the enemy attack before they reach Okinawa.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.

Name_ru=РЕЙД НА ОКИНАВУ
MissionSequenceName_ru=МИССИЯ 1
MapShortName_ru=01
Description_ru=Наха, Окинава, Япония
#MissionImage_ru=campaigns/pacific-strike-task-force/art/pacific_strike_01_sheet.png
MissionIntro_ru=Сегодня утром в Европе и на Тихом океане начались боевые действия, и разведка союзников обнаружила, что Советский Союз предпринимает дерзкую попытку провести рейд на Окинаве. Подразделения спецназа на борту ролкера, идущего под японским флагом, уже находятся в пределах видимости островов. Их прикрывают надвигающиеся с северо-запада силы ВМФ НОАК. Выдвигайтесь на перехват и отразите атаку, прежде чем силы противника достигнут Окинавы.
MissionResupplyRules_en=

Name_de=ANGRIFF AUF OKINAWA
MissionSequenceName_de=MISSION 1
MapShortName_de=01
Description_de=Naha, Okinawa, Japan
MissionImage_de=campaigns/pacific-strike-task-force/art/pacific_strike_01_sheet.png
MissionIntro_de=Heute Morgen haben die Kampfhandlungen in Europa und im Pazifik begonnen und die alliierte Aufklärung hat festgestellt, dass die Sowjets einen waghalsigen Angriff auf Okinawa durchführen werden. Eine sowjetische Kommandoeinheit befindet sich an Bord eines Autotransporters unter japanischer Flagge und ist bereits in Sichtweite der Inseln. Unterstützt wird sie von einem PLAN-Angriffsverband, der sich aus Nordwesten nähert. Laufen Sie aus und zerschlagen Sie den feindlichen Angriff, bevor die feindlichen Truppen Okinawa erreichen.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.

Name_ja=沖縄強襲
MissionSequenceName_ja=MISSION 1
MapShortName_ja=01
Description_ja=那覇、沖縄、日本
MissionImage_ja=campaigns/pacific-strike-task-force/art/pacific_strike_01_sheet.png
MissionIntro_ja=敵対行動は今朝、欧州および太平洋で開始された。同盟軍情報部は、ソ連軍が沖縄への大胆な工作部隊による強襲を企図していることを察知した。日本船籍の自動車運搬船に乗り込んだ工作部隊は、すでに島影を視界に捉えている。彼らは北西から接近する中国海軍（PLAN）の水上打撃部隊による支援を受けている。直ちに出撃し、敵の攻撃部隊が沖縄に到達する前にこれを撃滅せよ。
MissionResupplyRules_ja=本ミッションの終了後、任務部隊の兵装は完全に再補給され、修理施設および増援が利用可能となる。


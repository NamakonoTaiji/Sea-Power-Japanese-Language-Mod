MissionSequenceName_ru=ДОП. МИССИЯ
Description_ru=Бали, Индонезия
#MissionImage_ru=campaigns/pacific-strike-task-force/art/pacific_strike_03b_sheet.png
MissionIntro_ru=Интенсивные атаки противника на Индонезию и Малайзию привели к дезорганизации союзников, и американские войска пытаются перегруппироваться в Дарвине на севере Австралии. USS Пребл получил приказ удерживать Ломбокский пролив достаточно долго, чтобы критически важные транспортные корабли союзников смогли эвакуироваться на юг. Примечание: выполнение этой миссии разблокирует дополнительные боеприпасы и пополнение запасов в последующих миссиях кампании, а также повлияет на общее количество вражеских сил, доступных в будущих миссиях.
MissionResupplyRules_en=
MissionSpecialNote_en=

Name_de=DIE LOMBOKSTRASSE HALTEN
MissionSequenceName_de=NEBENMISSION
MapShortName_de=03B
Description_de=Bali, Indonesien (Optional)
MissionImage_de=campaigns/pacific-strike-task-force/art/pacific_strike_03b_sheet.png
MissionIntro_de=OPTIONAL: Schwere feindliche Angriffe gegen Indonesien und Malaysia haben die Alliierten schwer getroffen und US-Streitkräfte versuchen, sich in Darwin im Norden Australiens neu zu formieren. Kommandieren Sie eine Einheit Ihrer Task Force ab, um die Lombokstraße lange genug zu halten, damit wichtige alliierte Transporteinheiten nach Süden entkommen können. Hinweis: Der Abschluss dieser Mission schaltet für den Rest der Kampagne modernere Munition frei und wirkt sich auf die Anzahl der in künftigen Missionen verfügbaren feindlichen Kräfte aus.
MissionResupplyRules_en=Task Force will be operating away from resupply and repair facilities during this mission. Expend weapons wisely.
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_de=Hinweis: Diese Herausforderung ist optional. Wählen Sie ein einziges Schiff aus Ihrer Task Force aus, um diese Mission durchzuführen. Es gilt: Großes Risiko, große Belohnung. Keine weiteren Einheiten werden eingesetzt.

Name_ja=ロンボク海峡死守
MissionSequenceName_ja=SIDE MISSION
MapShortName_ja=03B
Description_ja=インドネシア、バリ島（任意）
MissionImage_ja=campaigns/pacific-strike-task-force/art/pacific_strike_03b_sheet.png
MissionIntro_ja=任意：インドネシアおよびマレーシアに対する敵の激しい攻撃により同盟軍は混乱に陥り、米軍はオーストラリア北部のダーウィンにて部隊の再編・集結を試みている。重要な同盟軍輸送部隊が南方へ脱出する時間を稼ぐため、貴任務部隊から艦艇1隻を分派し、ロンボク海峡を死守せよ。
MissionResupplyRules_ja=本ミッション中、任務部隊は補給、増援、および修理施設から離れて作戦行動を行うことになる。兵器の消費は計画的に行え。
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_ja=注記：本任務は任意のチャレンジミッションである。貴官の任務部隊から艦艇1隻を選択し、リスクは高いが見返りも大きいこの任務に就かせよ。他のユニットは出撃しない。本ミッションをクリアすることで、キャンペーンの残り期間において、より先進的な兵装がアンロックされる。



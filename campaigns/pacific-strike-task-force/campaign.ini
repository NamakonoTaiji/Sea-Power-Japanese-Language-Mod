Name_en=RUN SILENT, RUN DEEP
MissionSequenceName_en=SIDE MISSION
MapShortName_en=03A
Description_en=Spratly Islands, South China Sea (Optional)
MissionImage_en=campaigns/pacific-strike-task-force/art/pacific_strike_03a_sheet.png
MissionIntro_en=OPTIONAL: Allied intelligence has located a Don class submarine tender in the Spratly Islands which is resupplying a group of Soviet diesel submarines operating in the South China Sea. Infiltrate into the Spratlys, destroy this vessel, and then escape into the Palawan Passage.
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_en=Note: This is a detached submarine operation. You will command an assigned submarine for this mission only, and your task force will not deploy. Completing this mission will reduce enemy forces available in future missions.

Name_ru=ГЛУБОКО И ТИХО
MissionSequenceName_ru=ДОП. МИССИЯ
Description_ru=О-ва Спратли, Южно-Китайское море
#MissionImage_ru=campaigns/pacific-strike-task-force/art/pacific_strike_03a_sheet.png
MissionIntro_ru=Разведка союзников обнаружила в архипелаге Спратли плавбазу подводных лодок типа «Дон», поддерживающую группу советских дизельных подводных лодок, действующих в Южно-Китайском море. Достигните архипелага Спратли, найдите и уничтожьте плавбазу, а затем отходите Палаванским проливом. Примечание: выполнение этой миссии не обязательно, однако оно повлияет на присутствие вражеских сил в будущих миссиях.
MissionSpecialNote_ru=Note: This is a detached submarine operation. You will command an assigned submarine for this mission only, and your task force will not deploy.

Name_de=LEISE FAHREN, TIEF FAHREN
MissionSequenceName_de=NEBENMISSION
MapShortName_de=03A
Description_de=Spratly-Inseln, Südchinesisches Meer (Optional)
MissionImage_de=campaigns/pacific-strike-task-force/art/pacific_strike_03a_sheet.png
MissionIntro_de=OPTIONAL: Die alliierte Aufklärung hat in den Spratly-Inseln ein Versorgungsschiff der Don-Klasse lokalisiert, das eine Gruppe sowjetischer Diesel-U-Boote versorgt, die derzeit im Südchinesischen Meer operieren. Dringen Sie in die Gewässer der Spratlys ein, zerstören Sie dieses Schiff und entkommen Sie anschließend in die Palawan-Passage.. Hinweis: Der Abschluss dieser Mission wirkt sich auf die in künftigen Missionen verfügbaren feindlichen Kräfte aus.
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_de=Hinweis: Dies ist eine separate U-Boot-Operation. Sie führen nur für diese Mission ein zugewiesenes U-Boot. Ihre Task Force wird nicht eingesetzt.

Name_ja=深く静かに潜航せよ
MissionSequenceName_ja=SIDE MISSION
MapShortName_ja=03A
Description_ja=南シナ海、スプラトリー諸島（任意）
MissionImage_ja=campaigns/pacific-strike-task-force/art/pacific_strike_03a_sheet.png
MissionIntro_ja=任意：同盟軍情報部は、南シナ海で活動中のソ連通常型潜水艦部隊へ補給を行っているドン型潜水母艦をスプラトリー諸島（南沙諸島）にて捕捉した。スプラトリー諸島へ潜入して当該艦を撃滅し、パラワン海峡へと脱出せよ。
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_ja=注記：本任務は分派潜水艦作戦である。貴官は本ミッション限定で指定された潜水艦を指揮することになり、任務部隊は出撃しない。本任務を成功させることで、今後のミッションに登場する敵戦力を減少させることができる。



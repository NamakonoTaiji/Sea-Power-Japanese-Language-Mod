Name_de=ANGRIFF AUF LOMBOK
MissionSequenceName_de=MISSION 6
MapShortName_de=06
Description_de=Lombokstraße, Bali, Indonesien
MissionImage_de=campaigns/pacific-strike-task-force/art/pacific_strike_06_sheet.png
MissionIntro_de=Die alliierte Gegenoffensive im Pazifik hat begonnen. Ihre Task Force hat den Befehl erhalten, die Lombokstraße zu durchbrechen und alle im Einsatzraum operierenden feindlichen Kräfte zu zerstören. Ein Erfolg wird den Druck auf Indonesien verringern und den Weg für weitere Operationen nach Norden öffnen.
MissionResupplyRules_en=Task Force will be operating away from resupply and repair facilities during this mission. Expend weapons wisely.

Name_ja=ロンボク強襲
MissionSequenceName_ja=MISSION 6
MapShortName_ja=06
Description_ja=インドネシア、バリ島、ロンボク海峡
MissionImage_ja=campaigns/pacific-strike-task-force/art/pacific_strike_06_sheet.png
MissionIntro_ja=太平洋における同盟軍の反攻作戦が開始された。貴任務部隊はロンボク海峡を強行突破し、同海域で活動するすべての敵戦力を撃滅せよとの命令を受けた。作戦が成功すれば、インドネシアへの圧力が緩和され、さらなる北方での攻勢作戦への道が開かれることになる。
MissionResupplyRules_ja=本ミッション中、任務部隊は補給、増援、および修理施設から離れて作戦行動を行うことになる。兵器の消費は計画的に行え。


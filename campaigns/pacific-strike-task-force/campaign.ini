Name_en=DEFENSE OF NORTH BORNEO
MissionSequenceName_en=MISSION 8
MapShortName_en=08
Description_en=Sandakan, Malaysia
MissionImage_en=campaigns/pacific-strike-task-force/art/pacific_strike_08_sheet.png
MissionIntro_en=With Indonesia secured, Allied planning in the Pacific has shifted north towards the Philippines. Sandakan in north Borneo is operating as a forward staging base for the eventual assault on Palawan. Enemy forces are now attempting a spoling raid against Sandakan to destroy the Allied forces staging there. Take charge of the Allied units in the area to repel the enemy attack.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_en=Note: a maximum of three Task Force units may deploy for this mission. Select them on mission start, and other units will be held in reserve elsewhere.

Name_de=VERTEIDIGUNG NORDBORNEOS
MissionSequenceName_de=MISSION 8
MapShortName_de=08
Description_de=Sandakan, Malaysia
MissionImage_de=campaigns/pacific-strike-task-force/art/pacific_strike_08_sheet.png
MissionIntro_de=Nachdem Indonesien gesichert ist, richtet sich der Fokus der alliierten Operationsplanung im Pazifik nach Norden in Richtung der Philippinen. Sandakan in Nordborneo dient als vorgeschobener Bereitstellungsraum für den späteren Angriff auf Palawan. Feindkräfte versuchen nun einen Störangriff gegen Sandakan durchzuführen, um die dort bereitstehenden alliierten Kräfte zu vernichten. Übernehmen Sie das Kommando über die alliierten Einheiten im Einsatzraum und schlagen Sie den feindlichen Angriff zurück.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_de=Hinweis: In dieser Mission können maximal drei Einheiten der Task Force eingesetzt werden. Wählen Sie diese zu Missionsbeginn aus. Alle übrigen Einheiten verbleiben anderenorts in Reserve.

Name_ja=北ボルネオ防衛
MissionSequenceName_ja=MISSION 8
MapShortName_ja=08
Description_ja=マレーシア、サンダカン
MissionImage_ja=campaigns/pacific-strike-task-force/art/pacific_strike_08_sheet.png
MissionIntro_ja=インドネシアの安全が確保されたことで、太平洋における同盟軍の作戦計画はフィリピン奪還に向けて北上した。ボルネオ島北部のサンダカンは、最終的なパラワン島強襲に向けた前進出撃拠点として機能している。敵軍は現在、サンダカンに集結する同盟軍戦力を壊滅させるべく、攻勢妨害目的の急襲を企図している。当該海域の同盟軍部隊を指揮し、敵の攻撃を撃退せよ。
MissionResupplyRules_ja=本ミッションの終了後、任務部隊の兵装は完全に再補給され、修理施設および増援が利用可能となる。
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_ja=注記：本ミッションに出撃できる任務部隊のユニットは最大3個部隊までである。作戦開始時にこれらを選択せよ。他のユニットは別の場所で予備兵力として保持される。


MissionImage_en=campaigns/pacific-strike-task-force/art/pacific_strike_06_sheet.png
MissionIntro_en=The Allied counteroffensive in the Pacific is underway. Your Task Force has been ordered to force the Lombok Strait and destroy all enemy forces operating in the area. Success will relieve pressure on Indonesia and open the way for further operations to the north.

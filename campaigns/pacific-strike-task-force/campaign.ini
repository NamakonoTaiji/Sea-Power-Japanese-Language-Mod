Name_en=ACTION IN THE JAVA SEA
MissionSequenceName_en=MISSION 7
MapShortName_en=07
Description_en=Off Java, Indonesia
MissionImage_en=campaigns/pacific-strike-task-force/art/pacific_strike_07_sheet.png
MissionIntro_en=After breaking through Lombok Strait, your Task Force has received orders to proceed immediately into the Java Sea. A heavy Soviet surface force centered on the cruiser Admiral Senyavin is operating north of Jakarta and threatening the Indonesian government. Destroying this force will bring Indonesia back into the war on the Allied side.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.

Name_de=GEFECHT IN DER JAVASEE
MissionSequenceName_de=MISSION 7
MapShortName_de=07
Description_de=Vor Java, Indonesien
MissionImage_de=campaigns/pacific-strike-task-force/art/pacific_strike_07_sheet.png
MissionIntro_de=Nach dem Durchbruch durch die Lombokstraße hat Ihre Task Force den Befehl erhalten, unverzüglich in die Javasee vorzustoßen. Ein schwerer sowjetischer Kampfverband um den Kreuzer Admiral Senyavin operiert nördlich von Jakarta und bedroht die indonesische Hauptstadt. Die Vernichtung dieses Verbands wird Indonesien wieder auf Seiten der Alliierten in den Krieg eintreten lassen.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.

Name_ja=ジャワ海の戦闘
MissionSequenceName_ja=MISSION 7
MapShortName_ja=07
Description_ja=インドネシア、ジャワ島沖
MissionImage_ja=campaigns/pacific-strike-task-force/art/pacific_strike_07_sheet.png
MissionIntro_ja=ロンボク海峡を突破した任務部隊に対し、直ちにジャワ海へと進出せよとの命令が下った。巡洋艦アドミラル・セニャーヴィンを中心とする有力なソ連水上部隊がジャカルタ北方で活動しており、インドネシア政府を脅かしている。この部隊を撃滅すれば、インドネシアを同盟軍陣営として復帰させることができる。
MissionResupplyRules_ja=本ミッションの終了後、任務部隊の兵装は完全に再補給され、修理施設および増援が利用可能となる。



[Language_en]
Name=10 Vengeance at Luzon
Description=Enemy forces have deployed the carrier Kiev to cover a reinforcement convoy bound for Palawan. Our troops ashore are already locked in heavy fighting, and fresh enemy forces could decide the battle. Proceed north from Palawan, locate the Kiev, and destroy the carrier and convoy before they can reach Palawan.
Taskforce1LandUnit3NameOverride=Clark Air Base
Taskforce1LandUnit3ShortNameOverride=Clark Air Base
Taskforce2LandUnit1NameOverride=Sanya Air Base
Taskforce2LandUnit1ShortNameOverride=Sanya Air Base
Taskforce2LandUnit2NameOverride=Cam Ranh Air Base
Taskforce2LandUnit2ShortNameOverride=Cam Ranh Air Base
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Part 10</size>\nVENGEANCE AT LUZON\n<size=24>October 8th, 1985</size>\nBody=Enemy forces are conducting a maximum effort push in the South China Sea to relieve their forces on Palawan. The Kiev strike group moved southeast from Hong Kong yesterday covering a reinforcement convoy from Cam Ranh. Destroy both the convoy and the Kiev strike group before the reinforcements reach Palawan.\nButtonText=Start mission\nPopupStyle=Intro
StartForecast=FLEET WEATHER FORECAST FOR SOUTH CHINA SEA AREA\nVALID: 082000Z-090200Z OCT 85\nA tropical storm cell over western Luzon and the northern Sulu Sea is producing overcast skies, thunderstorms, rain, fog, and rough seas at Sea State 4. Visibility will be poor during the opening phase, with flight operations from Clark Field restricted until the storm begins to lift. Conditions are forecast to improve by 2300Z as rain and fog clear, thunderstorms move east, and seas subside toward Sea State 3.
Taskforce1FlagshipmustsurviveMessage=Title=DEFEAT\nBody=Defeat! {FlagshipName} has been sunk!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=CINCPACFLT\nTo={TaskForceName}\nInfo=JCS WASHINGTON DC\nCOMUSJAPAN YOKOTA AB JA\nCOMUSPHIL MANILA PI\nSubj=KILL ASSESSMENT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=PERSONAL FOR COMMANDER\n\n1. (S) National technical means and Clark reporting confirm KIEV strike group destroyed. Reinforcement convoy from Cam Ranh has been stopped short of Palawan.\n\n2. (S) Enemy attempt to relieve forces on Palawan has failed. Landing force commanders assess no organized seaborne reinforcement can reach Quezon in time to affect current battle.\n\n3. (S) This action removes the principal Soviet carrier threat in the South China Sea and buys Operation CHALLENGER critical time.\n\n4. (S) Outstanding work, Commander. Recover survivors where practicable, then retire to Subic for replenishment when directed. CINCPACFLT sends.\nButtonText=Return to mission\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce130minweatherchangeMessage=From=CTF 77\nTo={TaskForceName}\nInfo=\nSubj=WARNING-RADIO INTERCEPTS\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) WARNING: Russian VHF voice radio is being intercepted from NW. Evaluate as ship-to-aircraft coordination net. Enemy surface forces likely communicating with long-range MPRA from Cam Ranh or Hainan.\n\n2. (S) Recommend Air Warning RED - if enemy aircraft locate {TaskForceName}, immediate missile strike should be expected. Good luck out there. CTF 77 sends.\nButtonText=Acknowledge & continue\nPopupStyle=NavalMessage
Taskforce1DetectSlavatoshowobjectiveMessage=From=JCS WASHINGTON DC\nTo={TaskForceName}\nInfo=CTF 77 SUBIC BAY PI\nCINCPACFLT PEARL HARBOR HI\nSubj=CONTACT REPORT\nPrecedence=Flash\nClassification=Secret\nTemplate=USAJCS\nBody=1. (S) WARNING: Additional enemy heavy surface force centered on SLAVA class cruiser has been detected to the west of the reinforcement convoy in South China Sea.\n\n2. (S) This force was shadowed by Allied submarines earlier this month but successfully evaded prosecution.\n\n3. (S) Destruction of enemy reinforcement convoy and KIEV group remain the priority. If tactical situation permits, intecept and destroy SLAVA SAG in addition to remaining enemy units. Good luck and good hunting.\nButtonText=Acknowledge & continue\nPopupStyle=NavalMessage
Objective_DestroyKiev=Destroy the Kiev and reinforcement convoy
Objective_FlagshipMustSurvive={FlagshipName} must survive
Objective_DestroySlava=OPTIONAL: Destroy the Slava

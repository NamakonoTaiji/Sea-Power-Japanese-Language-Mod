Taskforce2LandUnit2ShortNameOverride=Cam Ranh Air Base
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Teil 10</size>\nVERGELTUNG VOR LUZON\n<size=24>8. Oktober 1985</size>\nBody=Feindliche Kräfte führen im Südchinesischen Meer einen Vorstoß mit größtmöglichem Kräfteeinsatz durch, um ihre Truppen auf Palawan zu entlasten. Die Kiev-Trägerkampfgruppe lief gestern von Hongkong nach Südosten und deckt einen Verstärkungskonvoi aus Cam Ranh. Zerstören Sie sowohl den Konvoi als auch die Kiev-Trägerkampfgruppe, bevor die Verstärkungen Palawan erreichen.\nButtonText=Mission starten\nPopupStyle=Intro
StartForecast=FLOTTENWETTERVORHERSAGE FÜR DAS SÜDCHINESISCHE MEER\nGÜLTIG: 082000Z-090200Z OKT 85\nEine tropische Gewitterzelle über dem westlichen Luzon und der nördlichen Sulusee verursacht geschlossene Bewölkung, Gewitter, Regen, Nebel und raue See bei Seegangs der Stärke 4. Während der Anfangsphase ist die Sicht schlecht und der Flugbetrieb von Clark Field bleibt eingeschränkt, bis das Unwetter nachzulassen beginnt. Ab 2300Z wird mit einer Wetterbesserung gerechnet, wenn Regen und Nebel abziehen, die Gewitter ostwärts wandern und der Seegang auf Stärke 3 zurückgeht.
Taskforce1FlagshipmustsurviveMessage=Title=NIEDERLAGE\nBody=Niederlage! {FlagshipName} wurde versenkt!\nButtonText=Zur Mission zurückkehren\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=CINCPACFLT\nTo={TaskForceName}\nInfo=JCS WASHINGTON DC\nCOMUSJAPAN YOKOTA AB JA\nCOMUSPHIL MANILA PI\nSubj=ABSCHUSSBEWERTUNG-MISSION ERFÜLLT\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=PERSÖNLICH FÜR DEN KOMMANDANTEN\n\n1. (S) Die Aufklärung aus Clark bestätigt die Zerstörung der Kiev-Trägerkampfgruppe. Der Verstärkungskonvoi aus Cam Ranh wurde vor Palawan gestoppt.\n\n2. (S) Der feindliche Versuch, die Kräfte auf Palawan zu entlasten, ist gescheitert. Die Befehlshaber der Landungskräfte gehen davon aus, dass keine organisierten Verstärkungen Quezon auf dem Seeweg rechtzeitig erreichen können, um den Verlauf der gegenwärtigen Schlacht zu beeinflussen.\n\n3. (S) Durch diesen Erfolg wurde die bedeutendste sowjetische Trägerbedrohung im Südchinesischen Meer ausgeschaltet und für Operation CHALLENGER entscheidende Zeit gewonnen.\n\n4. (S) Hervorragende Arbeit, Kommandant. Bergen Sie Überlebende, soweit dies möglich ist und verlegen Sie anschließend auf Befehl zur Versorgung zurück nach Subic. CINCPACFLT Ende.\nButtonText=Zur Mission zurückkehren\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce130minweatherchangeMessage=From=CTF 77\nTo={TaskForceName}\nInfo=\nSubj=WARNUNG-FUNKVERKEHR ABGEFANGEN\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) WARNUNG: Russischer VHF-Sprechfunk wird aus nordwestlicher Richtung aufgefangen. Einschätzung: Koordinierungsnetz zwischen Schiffen und Luftfahrzeugen. Feindliche Kräfte kommunizieren vermutlich mit weitreichenden Seefernaufklärern aus Cam Ranh oder von Hainan.\n\n2. (S) Luftwarnstufe ROT wird empfohlen. Falls feindliche Luftfahrzeuge {TaskForceName} orten, ist mit einem sofortigen Flugkörperangriff zu rechnen. Viel Glück da draußen. CTF 77 Ende.\nButtonText=Bestätigen und fortfahren\nPopupStyle=NavalMessage
Taskforce1DetectSlavatoshowobjectiveMessage=From=JCS WASHINGTON DC\nTo={TaskForceName}\nInfo=CTF 77 SUBIC BAY PI\nCINCPACFLT PEARL HARBOR HI\nSubj=KONTAKTMELDUNG\nPrecedence=Flash\nClassification=Secret\nTemplate=USAJCS\nBody=1. (S) WARNUNG: Westlich des Verstärkungskonvois wurde im Südchinesischen Meer ein weiterer schwerer feindlicher Verband um einen Kreuzer der SLAVA-Klasse entdeckt.\n\n2. (S) Dieser Verband wurde Anfang des Monats von alliierten U-Booten beschattet, konnte sich einer Bekämpfung jedoch erfolgreich entziehen.\n\n3. (S) Die Zerstörung des feindlichen Verstärkungskonvois und der Kiev-Trägerkampfgruppe hat weiterhin Vorrang. Sofern es die taktische Lage zulässt, fangen Sie zusätzlich zu den verbleibenden feindlichen Einheiten die SLAVA-SAG ab und zerstören Sie sie. Viel Glück und gute Jagd.\nButtonText=Bestätigen und fortfahren\nPopupStyle=NavalMessage

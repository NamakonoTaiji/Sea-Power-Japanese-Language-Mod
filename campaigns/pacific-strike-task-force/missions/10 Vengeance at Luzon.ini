[Language_ja]
Name=10 ルソン島の復讐
Description=敵軍はパラワン島へ向かう増援輸送船団を掩護するため、空母「キエフ」を展開させた。陸上部隊はすでに激しい戦闘に突入しており、敵の新手が到着すればバトルの勝敗が決しかねない。パラワン島から北上して「キエフ」を捕捉し、空母と船団がパラワン島に到達する前に撃滅せよ。
Taskforce1LandUnit3NameOverride=クラーク空軍基地
Taskforce1LandUnit3ShortNameOverride=クラーク空軍基地

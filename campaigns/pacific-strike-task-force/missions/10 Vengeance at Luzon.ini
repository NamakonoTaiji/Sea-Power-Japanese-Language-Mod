[Language_ru]
Name=10 Возмездие в Лусоне
Description=Наши войска на острове Палаван ведут тяжёлые бои. Противник оказывает ожесточённое сопротивление и исход битвы пока неясен. Для поддержки своих сил на острове, противник отправил конвой с мощным эскортом в состав которого входит авианесущий крейсер «Киев». Выдвигайтесь к западу от Миндоро, обнаружьте «Киев» и уничтожьте его и конвой, прежде чем они смогут достичь Палавана.
Taskforce1LandUnit3NameOverride=Авиабаза Кларк
Taskforce1LandUnit3ShortNameOverride=Авиабаза Кларк
Taskforce2LandUnit1NameOverride=Авиабаза Санья
Taskforce2LandUnit1ShortNameOverride=Авиабаза Санья
Taskforce2LandUnit2NameOverride=Авиабаза Камрань
Taskforce2LandUnit2ShortNameOverride=Авиабаза Камрань
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Part 10</size>\nВозмездие в Лусоне\n<size=24>Октябрь 8-е, 1985</size>\nBody=Силы противника проводят максимальное усилие в Южно-Китайское море, чтобы освободить свои силы на Палаван. Ударная группа «Киев» вчера переехала на юго-восток из Гонконга, прикрывая колонну подкрепления из Камрань. Уничтожьте конвой и ударную группу «Киев», прежде чем подкрепление достигнет Палаван.\nButtonText=Начать миссию\nPopupStyle=Intro
StartForecast=ПЛЕТНАЯ МЫШКА ФОРЕКАСТ ДЛЯ ЮЖНОГО КИТАЙСКОГО СОЕА\nVALID: 082000Z-090200Z OCT 85\nКлетка тропического шторма над западным Лусон и северным море Сулу производит пасмурное небо, грозы, дождь, туман и бурные моря в Sea State 4. На начальном этапе видимость будет плохой, а полеты из Кларк-Филд будут ограничены до тех пор, пока шторм не начнет подниматься. Прогнозируется, что к 2300Z условия улучшатся, поскольку дождь и туман прояснятся, грозы движутся на восток, а моря спадают в сторону морского государства 3.
Taskforce1FlagshipmustsurviveMessage=Title=Поражение\nBody=Поражение! {FlagshipName} был потоплен!\nButtonText=Возвращение к миссии\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=CINCPACFLT\nTo={TaskForceName}\nInfo=JCS WASHINGTON DC\nCOMUSJAPAN YOKOTA AB JA\nCOMUSPHIL MANILA PI\nSubj=KILL ASSESSMENT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=PERSONAL FOR COMMANDER\n\n1. (S) Национальные технические средства и отчет Кларка подтверждают уничтожение ударной группы КИЕВ. Конвой с подкреплением из Камрань был остановлен за пределами Палаван.\n\n2. (S) Попытка противника ослабить силы на Палаван провалилась. Командиры десанта оценивают, что никакое организованное морское подкрепление не может достичь Кесона вовремя, чтобы повлиять на текущее сражение.\n\n3. (S) Это действие устраняет главную угрозу советского авианосца в Южно-Китайское море и покупает критический момент операции CHALLENGER.\n\n4. (S) Выдающаяся работа, командир. Восстанавливайте выживших там, где это практически возможно, а затем отправляйтесь в Субик для пополнения. CINCPACFLT отправляет.\nButtonText=Вернуться к миссии\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce130minweatherchangeMessage=From=CTF 77\nTo={TaskForceName}\nInfo=\nSubj=WARNING-RADIO INTERCEPTS\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) ПРЕДУПРЕЖДЕНИЕ: Русская радиостанция VHF перехватывается с радиостанции NW. Оцените как координационную сеть между кораблями и самолетами. Поверхностные силы противника, вероятно, общаются с МПРА дальнего действия из Камрань или Хайнаня.\n\n2. (S) Рекомендовать Air Warning RED - если вражеские самолеты найдут {TaskForceName}, следует ожидать немедленного ракетного удара. Удачи тебе там. Отправляется КГ 77.\nButtonText=Подтвердить и продолжить\nPopupStyle=NavalMessage
Taskforce1DetectSlavatoshowobjectiveMessage=From=JCS WASHINGTON DC\nTo={TaskForceName}\nInfo=CTF 77 SUBIC BAY PI\nCINCPACFLT PEARL HARBOR HI\nSubj=CONTACT REPORT\nPrecedence=Flash\nClassification=Secret\nTemplate=USAJCS\nBody=1. (S) ПРЕДУПРЕЖДЕНИЕ: Дополнительные тяжелые надводные силы противника, сосредоточенные на крейсере класса SLAVA, были обнаружены к западу от колонны подкрепления в Южно-Китайское море.\n\n2. (S) В начале этого месяца эти силы были омрачены союзными подводными лодками, но успешно уклонились от судебного преследования.\n\n3. (S) Уничтожение колонны подкрепления противника и группы КИЕВ остается приоритетом. Если тактическая ситуация позволяет, непримет и уничтожит SLAVA SAG в дополнение к оставшимся вражеским подразделениям. Удачи и хорошей охоты.\nButtonText=Подтвердить и продолжить\nPopupStyle=NavalMessage
Objective_DestroyKiev=Уничтожить «Киев» и конвой подкрепления
Objective_FlagshipMustSurvive={FlagshipName} должен выжить
Objective_DestroySlava=ДОПОЛНИТЕЛЬНО: уничтожить «Слава»
[Language_de]
Name=10 Vergeltung vor Luzon
Description=Feindliche Kräfte haben den Träger Kiev eingesetzt, um einen Verstärkungskonvoi nach Palawan zu decken. Unsere Truppen an Land sind bereits in schwere Kämpfe verwickelt und frische feindliche Kräfte könnten die Schlacht entscheiden. Verlegen Sie von Mindoro nach Westen, spüren Sie die Kiev auf und zerstören Sie den Träger sowie den Konvoi, bevor sie Palawan erreichen können.

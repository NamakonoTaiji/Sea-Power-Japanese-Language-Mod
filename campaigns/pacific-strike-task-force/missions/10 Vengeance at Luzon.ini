Taskforce1StartMessage=Title=<size=24>パシフィック・ストライク ―― 第10章</size>\nルソン島の復讐\n<size=24>1985年10月8日</size>\nBody=敵軍はパラワン島の自軍を救援すべく、南シナ海において総力を挙げた攻勢を展開している。キエフ戦闘群は昨日香港から南東へ移動し、カムラン湾からの増援輸送船団の掩護を開始した。増援部隊がパラワン島に到達する前に、船団とキエフ戦闘群の双方を撃滅せよ。\nButtonText=ミッション開始\nPopupStyle=Intro
StartForecast=南シナ海海域艦隊気象予報\n有効期間：1985年10月8日2000Z～9日0200Z\nルソン島西部およびスールー海北部上空の熱帯低気圧により、全天曇天、雷雨、雨、霧、および海象状態4の荒れた海原となっている。作戦初期段階では視界が不良となり、嵐が回復し始めるまでクラーク飛行場からの航空作戦は制限される。2300Zまでには雨と霧が晴れ、雷雨は東へ移動し、海象は海象状態3へと穏やかになって条件が改善する見込みである。
Taskforce1FlagshipmustsurviveMessage=Title=敗北\nBody=敗北！ {FlagshipName} が撃沈された！\nButtonText=ミッションに戻る\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=太平洋艦隊総司令官（CINCPACFLT）\nTo={TaskForceName}\nInfo=統合参謀本部（ワシントンDC）\n在日米軍司令官（横田基地、日本）\n在フィリピン米軍司令官（マニラ、フィリピン）\nSubj=戦果評価――任務完了\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=指揮官へ私電\n\n1. (S) 国家テクニカル手段およびクラーク基地からの報告により、キエフ（KIEV）戦闘群の撃滅を確認。カムラン湾からの増援輸送船団はパラワン島手前で阻止された。\n\n2. (S) パラワン島の自軍を救援しようとする敵の試みは失敗に終わった。着上陸部隊指揮官らの分析では、現在の戦闘に影響を及ぼすような組織的海上増援が時間内にケソンへ到達する可能性はない。\n\n3. (S) 本作戦により南シナ海におけるソ連の主要な空母脅威が排除され、チャレンジャー作戦（Operation CHALLENGER）のための決定的な時間が稼がれた。\n\n4. (S) 素晴らしい成果である、指揮官。可能な限り生存者を救助し、その後指示に従って補給のためスービックへ帰投せよ。太平洋艦隊総司令官より。\nButtonText=ミッションに戻る\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce130minweatherchangeMessage=From=第77任務部隊指揮官（CTF 77）\nTo={TaskForceName}\nInfo=\nSubj=警告――無線傍受\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) 警告：北西方向からロシア軍のVHF音声無線が傍受されている。艦対空の調整用ネットワークであると分析される。敵水上部隊がカムラン湾または海南島から発進した長距離洋上哨戒機（MPRA）と通信している可能性が高い。\n\n2. (S) 対空警戒「赤（RED）」を推奨する。もし敵航空機に {TaskForceName} の位置を特定された場合、即座のミサイル攻撃が予想される。諸君の健闘を祈る。第77任務部隊指揮官より。\nButtonText=確認して継続\nPopupStyle=NavalMessage
Taskforce1DetectSlavatoshowobjectiveMessage=From=統合参謀本部（ワシントンDC）\nTo={TaskForceName}\nInfo=第77任務部隊（スービック湾、フィリピン）\n太平洋艦隊総司令官（ハワイ州パールハーバー）\nSubj=接触報告\nPrecedence=Flash\nClassification=Secret\nTemplate=USAJCS\nBody=1. (S) 警告：南シナ海の増援輸送船団の西方において、スラヴァ（SLAVA）級巡洋艦を中心とする別個の敵有力水上部隊が探知された。\n\n2. (S) この部隊は今月初め、同盟軍潜水艦によって追跡されていたが、その後の捕捉・攻撃を免れていたものである。\n\n3. (S) 敵の増援輸送船団およびキエフ戦闘群の撃滅が最優先事項であることに変わりはない。もし戦術的状況が許すならば、残存敵部隊に加えてスラヴァ水上戦闘群（SAG）を捕捉・撃滅せよ。諸君の健闘と武運を祈る。\nButtonText=確認して継続\nPopupStyle=NavalMessage
Objective_DestroyKiev=空母キエフおよび増援輸送船団の撃滅

[Language_ru]
Name=02 Бой в Тайваньском проливе
Description=В то время как в западной части Тихого океана продолжаются боевые действия, Китай, пользуясь предоставившейся возможностью, начинает нападение на Тайвань. Силы вторжения формируются в Гуанчжоу и готовятся. Выдвигайтесь к Тайваньскому проливу, вступите в бой и уничтожьте силы вторжения.
Taskforce2LandUnit4NameOverride=Аэродром Фучжоу
Taskforce2LandUnit4ShortNameOverride=ZSFZ
Taskforce1StartMessage=<size=24>Pacific Strike - Part 2</size>\nACTION IN THE\nTAIWAN STRAIT\n<size=24>June 30th, 1985</size>|The Chinese have seized the initiative and launched an assault against the Nationalist-held islands in the Taiwan Strait. {TaskForceName} has been tasked to strike the landing forces destined for Dongyin Island.\n\nE-3A "Darkstar" is on station over Taipei. Destroy both the PLAN invasion force and the PLAN surface strike force supporting it.\n\n{FlagshipName} must survive.|Start mission

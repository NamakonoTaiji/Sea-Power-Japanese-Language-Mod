
[Language_en]
Name=02 Action in the Taiwan Strait
Description=With hostilities underway across the Western Pacific, the Chinese have used this opportunity to launch an offensive operation against the Nationalist-held islands in the Taiwan Strait. {TaskForceName} has been tasked to strike a Chinese landing force approaching Dongyin Island. Proceed west from Okinawa, then engage and destroy this invasion force.
Taskforce2LandUnit4NameOverride=Fuzhou Airbase
Taskforce2LandUnit4ShortNameOverride=ZSFZ
Taskforce1StartMessage=<size=24>Pacific Strike - Part 2</size>\nACTION IN THE\nTAIWAN STRAIT\n<size=24>June 30th, 1985</size>|The Chinese have seized the initiative and launched an assault against the Nationalist-held islands in the Taiwan Strait. {TaskForceName} has been tasked to strike the landing forces destined for Dongyin Island.\n\nE-3A "Darkstar" is on station over Taipei. Destroy both the PLAN invasion force and the PLAN surface strike force supporting it.\n\n{FlagshipName} must survive.|Start mission
StartForecast=FLEET WEATHER FORECAST FOR TAIWAN STRAIT\nVALID: 301000Z-301600Z JUN 85\nStable conditions prevail across the Taiwan Strait from 0000Z to 0600Z, with a weak pressure gradient maintaining steady northwesterly winds and moderate seas. Broken cloud cover persists with good visibility and no precipitation or fog expected. Little change is anticipated through the remainder of the day, with conditions remaining favorable for air and surface operations.
Taskforce1FlagshipmustsurviveMessage=MISSION FAILED|Defeat! {FlagshipName} has been sunk!|Exit mission
Taskforce1Landingforcedestroyed-playervictoryMessage=MISSION ACCOMPLISHED|FM CTF 77\nTO {TaskForceName}\n\n1. (S) Nationalist monitoring station passes confirmation all enemy forces have been confirmed destroyed.\n\n2. (S) Enemy forces marshaling for second wave are turning back.\n\n3. (S) Excellent performance by all hands. Retire east at best speed to Okinawa for rearm and refuel. CTF 77 sends.\n\n<size=15>Before the next mission, your task force will be fully rearmed and repairs will be available.</size>|Exit mission
Taskforce1InvasionforcereachesDongyin-playerdefeatMessage=MISSION FAILED|FM CINCPACFLT\nTO {TaskForceName}\n\n1. (S) Nationalist defenders ashore report PRC amphibs unloading PLA naval infantry assault force at Dongyin.\n\n2. (S) Intel assesses that Nationalist forces will be overwhelmed by July 2.\n\n3. (S) Retire immediately at best speed to Okinawa. At Naha, board first available military flight to Hickam for debriefing.|Exit mission
Taskforce1LudaSAGwarningMessage=FLASH MESSAGE|FM CTF 77\nTO {TaskForceName}\n\n1. (S) WARNING: Inbound group of PLAN warships to your southwest is identified as 2 x LUDA class destroyers.\n\n2. (S) LUDA class DD carries 6 x HY-1A missile with 43nm range.\n\n3. (S) Prioritize destruction of these ships before they enter missile range. Good luck and good hunting.|Acknowledge & continue
Taskforce1LudaSAGwarningIntel=WARNING: Inbound group of PLAN warships to your southwest is identified as 2 x LUDA class destroyers. LUDA class DD carries 6 x HY-1A missile with 43nm range.
Objective_DestroyInvasionForce=Destroy PLA landing force
Objective_FlagshipMustSurvive={FlagshipName} must survive

[Language_ja]
Name=02 台湾海峡の戦闘
Description=西部太平洋全域で敵対行動が開始される中、中国軍はこの機に乗じて台湾海峡の国民党支配下の諸島に対する攻勢作戦を発動した。{TaskForceName}は、東引島へ接近しつつある中国軍揚陸部隊への打撃任務を命じられた。沖縄から西進し、この侵攻部隊を捕捉・撃滅せよ。
Taskforce2LandUnit4NameOverride=福州飛行場
Taskforce2LandUnit4ShortNameOverride=ZSFZ
Taskforce1StartMessage=<size=24>パシフィック・ストライク――第2部</size>\n台湾海峡の戦闘\n<size=24>1985年6月30日</size>|主導権を掌握した中国軍は、台湾海峡の国民党支配下の諸島に対する強襲を開始した。{TaskForceName}は、東引島へ向かう揚陸部隊を叩く任務を託された。\n\nE-3A「ダークスター」が台北上空の定位置に展開中。中国海軍（PLAN）の侵攻部隊と、それを支援する水上打撃部隊の両方を撃滅せよ。\n\n{FlagshipName}の生存が絶対条件である。|作戦開始
StartForecast=台湾海峡艦隊気象予報\n予報期間：85年6月30日1000Z～30日1600Z\n0000Zから0600Zにかけて台湾海峡は安定した気象条件に恵まれ、弱い気圧傾度により北西の風が安定して吹き、波浪は穏やかである。断続的な雲が残るものの視程は良好で、降水や霧の予想はない。本日後半にかけて大きな天候の変化はない見込みで、航空および水上作戦にとって好条件が維持される予想である。
Taskforce1FlagshipmustsurviveMessage=作戦失敗|敗北！{FlagshipName}が撃沈された！|作戦終了
Taskforce1Landingforcedestroyed-playervictoryMessage=作戦成功|発：第77任務部隊指揮官（CTF 77）\n宛：{TaskForceName}\n\n1. (S) 国民党の監視所より、すべての敵戦力の撃滅を確認したとの通報あり。\n\n2. (S) 第二波のために集結中であった敵部隊は反転退避しつつある。\n\n3. (S) 全員、見事な奮戦であった。最高速で沖縄へ東進帰投し、弾薬および燃料の補給を行え。第77任務部隊指揮官より。\n\n<size=15>次のミッションの前に、貴任務部隊の兵装は完全に再補給され、修理が利用可能となる。</size>|作戦終了
Taskforce1InvasionforcereachesDongyin-playerdefeatMessage=作戦失敗|発：太平洋艦隊司令長官（CINCPACFLT）\n宛：{TaskForceName}\n\n1. (S) 沿岸の国民党防衛部隊より、中国軍の揚陸艦が東引島にPLA海軍陸戦隊の強襲部隊を揚陸中であるとの報告あり。\n\n2. (S) 情報部は、国民党軍が7月2日までには圧倒され、持ちこたえられなくなると判断する。\n\n3. (S) 直ちに最高速で沖縄へ後退せよ。那覇に到着後、速やかに利用可能な最初の軍用便でヒッカム基地へ移動し、状況説明（デブリーフィング）を受けよ。|作戦終了
Taskforce1LudaSAGwarningMessage=最優先電文（FLASH MESSAGE）|発：第77任務部隊指揮官（CTF 77）\n宛：{TaskForceName}\n\n1. (S) 警告：貴部隊の南西から接近中の中国海軍（PLAN）艦艇群は、旅大（LUDA）級駆逐艦2隻と識別された。\n\n2. (S) 旅大級駆逐艦は、射程43マイルのHY-1A対艦ミサイルを6発搭載している。\n\n3. (S) 敵のミサイル射程圏に進入される前に、これらの艦艇の撃滅を優先せよ。諸君の幸運と健闘を祈る。|了解して続行
Taskforce1LudaSAGwarningIntel=警告：貴部隊の南西から接近中の中国海軍（PLAN）艦艇群は、旅大（LUDA）級駆逐艦2隻と識別された。旅大級駆逐艦は射程43マイルのHY-1A対艦ミサイルを6発搭載している。
Objective_DestroyInvasionForce=中国軍（PLA）揚陸部隊の撃滅
Objective_FlagshipMustSurvive={FlagshipName}の生存

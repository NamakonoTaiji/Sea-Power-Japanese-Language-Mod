[Language_de]
Name=02 Gefecht in der Taiwanstraße
Description=Während im gesamten westlichen Pazifik Kampfhandlungen im Gange sind, haben die Chinesen die Gelegenheit genutzt, eine Offensive gegen die von den Nationalisten gehaltenen Inseln in der Taiwanstraße zu starten. {TaskForceName} hat den Auftrag erhalten, chinesische Landungstruppen anzugreifen, die sich der Insel Dongyin nähert. Verlegen Sie von Okinawa aus nach Westen und bekämpfen Sie alle gegnerischen Kräfte.
Taskforce2LandUnit4NameOverride=Fuzhou Airbase
Taskforce2LandUnit4ShortNameOverride=ZSFZ
Taskforce1StartMessage=<size=24>Pacific Strike - Teil 2</size>\nGEFECHT IN DER\nTAIWANSTRASSE\n<size=24>30. Juni 1985</size>|Die Chinesen haben die Initiative ergriffen und einen Angriff auf die von den Nationalisten gehaltenen Inseln in der Taiwanstraße begonnen. {TaskForceName} hat den Auftrag erhalten, die sich der Insel Dongyin nähernden Landungstruppen zu bekämpfen.\n\nE-3A „Darkstar“ befindet sich über Taipeh auf Station. Zerstören Sie sowohl die Invasionskräfte der PLAN als auch die sie unterstützenden Seestreitkräfte.\n\n{FlagshipName} muss überleben.|Mission starten
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR DIE TAIWANSTRASSE\nGÜLTIG: 301000Z-301600Z JUN 85\nÜber der Taiwanstraße herrschen von 0000Z bis 0600Z stabile Bedingungen. Der abfallende Luftdruck sorgt für stetige Winde aus Nordwesten und mäßige See. Aufgelockerte bis starke Bewölkung bleibt bestehen, bei guter Sicht und ohne erwarteten Niederschlag oder Nebel. Für den weiteren Tagesverlauf wird nur geringe Veränderung erwartet; die Bedingungen bleiben für Luft- und Seeoperationen günstig.
Taskforce1FlagshipmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! {FlagshipName} wurde versenkt!|Mission beenden
Taskforce1Landingforcedestroyed-playervictoryMessage=MISSION ERFOLGREICH|VON CTF 77\nAN {TaskForceName}\n\n1. (S) Die nationalistische Überwachungsstation bestätigt, dass alle feindlichen Kräfte als zerstört wurden.\n\n2. (S) Feindkräfte, die sich für eine zweite Welle sammelten, drehen ab.\n\n3. (S) Ausgezeichnete Leistung aller Besatzungen. Ziehen Sie sich mit höchstmöglicher Geschwindigkeit nach Osten Richtung Okinawa zurück. CTF 77 Ende.\n\n<size=15>Vor der nächsten Mission wird Ihre Task Force vollständig wiederbewaffnet. Außerdem sind Reparaturen verfügbar.</size>|Mission beenden
Taskforce1InvasionforcereachesDongyin-playerdefeatMessage=MISSION FEHLGESCHLAGEN|VON CINCPACFLT\nAN {TaskForceName}\n\n1. (S) Die Nationalisten an Land melden, dass amphibische Einheiten der VR China auf Dongyin anlanden.\n\n2. (S) Der Nachrichtendienst geht davon aus, dass die nationalistischen Kräfte bis zum 2. Juli besiegt sein werden.\n\n3. (S) Ziehen Sie sich unverzüglich mit höchstmöglicher Geschwindigkeit nach Okinawa zurück. Begeben Sie sich in Naha mit dem ersten verfügbaren Militärflug nach Hickam zur Nachbesprechung.|Mission beenden
Taskforce1LudaSAGwarningMessage=BLITZNACHRICHT|VON CTF 77\nAN {TaskForceName}\n\n1. (S) WARNUNG: Der sich nähernde PLAN-Kampfverband südwestlich Ihrer Position wurde identifiziert: Es handelt sich um 2 x Zerstörer der LUDA-Klasse.\n\n2. (S) Zerstörer der LUDA-Klasse führen 6 x HY-1A-Flugkörper mit einer Reichweite von 43 sm mit.\n\n3. (S) Priorisieren Sie die Zerstörung dieser Schiffe, bevor sie in Flugkörperreichweite gelangen. Viel Glück und gute Jagd.|Bestätigen und fortfahren
Taskforce1LudaSAGwarningIntel=WARNUNG: Der sich nähernde PLAN-Kampfverband südwestlich Ihrer Position wurde identifiziert: Es handelt sich um 2 x Zerstörer der LUDA-Klasse. Zerstörer der LUDA-Klasse führen 6 x HY-1A-Flugkörper mit einer Reichweite von 43 sm mit.
Objective_DestroyInvasionForce=Zerstören Sie die Landungstruppen der VBA
Objective_FlagshipMustSurvive={FlagshipName} muss überleben

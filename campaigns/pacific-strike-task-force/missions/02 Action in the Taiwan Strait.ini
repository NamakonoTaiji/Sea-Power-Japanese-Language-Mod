Taskforce1FlagshipmustsurviveMessage=МИССИЯ ПРОВАЛЕНА|Поражение! {FlagshipName} был потоплен!|Покинуть миссию
Taskforce1Landingforcedestroyed-playervictoryMessage==MISSION ACCOMPLISHED|Victory! Intel assesses that your swift action has prevented the Nationalist defenders at Dongyin from being immediately overrun. You have bought our allies critical time to regroup and organize before the next offensive. Excellent work, Commander.\n\n<size=15>Before the next mission, your task force will be fully resupplied and repairs will be available in Task Force Status.</size>|Exit mission

Name=03A Sub Challenge - Run Silent, Run Deep
[Language_ru]
Name=Глубоко и тихо
Description=Разведка союзников обнаружила в архипелаге Спратли плавбазу подводных лодок типа «Дон», поддерживающую группу советских дизельных подводных лодок, действующих в Южно-Китайском море. Достигните архипелага Спратли, найдите и уничтожьте плавбазу, а затем отходите Палаванским проливом.
Trigger3Condition_Condition1AreaLabel=Зона отхода
Trigger4Condition_Condition1AreaLabel=Минное поле на рифе Ирокез
Trigger5Condition_Condition1AreaLabel=Минное поле у острова Лоита
Trigger6Condition_Condition1AreaLabel=Атолл Джексон
Taskforce1StartmessageMessage=<size=24>Необязательная миссия:</size>\nГлубоко и тихо\n<size=24>Июль 8-е, 1985</size>|Allied intelligence has located a Don class submarine tender at Jackson Atoll in the Spratly Islands which is resupplying a group of Soviet diesel submarines operating in the South China Sea. Infiltrate into the Spratlys, destroy this vessel, and then escape into the Palawan Passage.\n\nNote: Vietnamese forces have laid two large minefields in the area. Their full extent is not known but expected danger area is marked on your map. These must be avoided to escape.\n\nUSS Houston must survive.|Start mission
Taskforce1HoustonmustsurviveMessage=МИССИЯ ПРОВАЛЕНА|Поражение! USS Хьюстон был потоплен!|Покинуть миссию
Taskforce1Houstonreachesareatoescape-playervictoryMessage=MISSION ACCOMPLISHED|Victory! You successfully destroyed the enemy tender and escaped the area, taking a dangerous enemy submarine group off the board. You can now join the Allied forces reconsolidating at Darwin for the counteroffensive.\n\n<size=15>A submarine has gained a proficiency level: \n\nUSS Houston (SSN-713): <color=Magenta>Ultra</color></size>|Exit mission
Taskforce1MinefieldSEMessage=МИССИЯ ПРОВАЛЕНА|Поражение! USS Хьюстон подорвался на мине и был потоплен!|Покинуть миссию

[Language_de]
Name=03A U-Boot-Herausforderung - Leise fahren, tief fahren
Description=Die alliierte Aufklärung hat in den Spratly-Inseln ein Versorgungsschiff der Don-Klasse lokalisiert, das eine Gruppe sowjetischer Diesel-U-Boote versorgt, die derzeit im Südchinesischen Meer operieren. Dringen Sie in die Gewässer der Spratlys ein, zerstören Sie dieses Schiff und entkommen Sie anschließend in die Palawan-Passage.
Trigger3Condition_Condition1AreaLabel=Erreichen Sie dieses Gebiet, um zu entkommen!
Trigger4Condition_Condition1AreaLabel=Minenfelder am Iroquois Reef
Trigger5Condition_Condition1AreaLabel=Minenfelder an der Loaita Bank
Trigger6Condition_Condition1AreaLabel=Jackson Atoll
Taskforce1StartmessageMessage=<size=24>Pacific Strike - U-Boot-Herausforderung 1</size>\nLEISE FAHREN, TIEF FAHREN\n<size=24>8. Juli 1985</size>|Die alliierte Aufklärung hat am Jackson Atoll in den Spratly-Inseln ein U-Boot-Versorgungsschiff der Don-Klasse lokalisiert, das eine Gruppe sowjetischer Diesel-U-Boote versorgt, die im Südchinesischen Meer operieren. Dringen Sie in die Spratlys ein, zerstören Sie dieses Schiff und entkommen Sie anschließend in die Palawan-Passage.\n\nHinweis: Vietnamesische Kräfte haben im Gebiet zwei große Minenfelder gelegt. Ihre volle Ausdehnung ist nicht bekannt, der erwartete Gefahrenbereich ist jedoch auf Ihrer Karte markiert. Diese Bereiche müssen umgangen werden, um zu entkommen.\n\nDie USS Houston muss überleben.|Mission starten
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR DEN RAUM SPRATLY-INSELN\nGÜLTIG: 081000Z-081600Z JUL 85\nEine ausgedehnte südöstliche Monsunströmung über den zentralen Spratly-Inseln sorgt für bedeckten Himmel, anhaltigen Dunst und vereinzelten Seenebel im Bereich der Riffe und Untiefen nahe dem Jackson Atoll. Die See läuft bei Seegangsstufe 4 mit mäßigem Seegang; in niedrigen Wolken und Nebelbänken ist mit eingeschränkter Sicht an der Oberfläche zu rechnen. Die Bedingungen bleiben voraussichtlich bis zum Nachmittag grenzwertig und begünstigen getauchte Operationen, erschweren jedoch die optische Suche und Identifizierung.
Taskforce1HoustonmustsurviveMessage=MISSION FAILED|Niederlage! Die USS Houston wurde versenkt!|Mission beenden
Taskforce1Houstonreachesareatoescape-playervictoryMessage=MISSION ACCOMPLISHED|VON COMSUBPAC\nAN USS HOUSTON\n\n1. (S) Eingang Ihrer Meldungen über die Zerstörung des feindlichen U-Boot-Versorgungsschiffs am Jackson Atoll und die erfolgreiche Flucht in die Palawan-Passage bestätigt.\n\n2. (S) Die alliierte Aufklärung bewertet die feindlichen Diesel-U-Boot-Operationen im Südchinesischen Meer als erheblich gestört. Mit verringerter sowjetischer U-Boot-Aktivität in diesem Sektor ist zu rechnen.\n\n3. (S) Hervorragende Arbeit. Laufen Sie zum zugewiesenen Treffpunkt und schließen Sie sich den alliierten Kräften an, die sich in Darwin neu formieren. COMSUBPAC Ende.\n\n<size=15>Aufgrund Ihrer erfolgreichen Aktionen in dieser Mission wurde die feindliche U-Boot-Bedrohung in künftigen Missionen verringert!</size>|Mission beenden
Taskforce1MinefieldSEMessage=MISSION FAILED|Niederlage! Sie sind in einem bekannten Minenfeld auf eine Mine gelaufen, und das Boot ist verloren!|Mission beenden
Taskforce1MinefieldSWMessage=MISSION FAILED|Niederlage! Sie sind in einem bekannten Minenfeld auf eine Mine gelaufen, und das Boot ist verloren!|Mission beenden
Taskforce1DestroyDon-activateescapeMessage=MISSION UPDATE|"Captain, das feindliche U-Boot-Versorgungsschiff wurde versenkt. Wir haben Freigabe, nach Süden zu entkommen."|Bestätigen und fortfahren
Objective_DestroyTender=Zerstören Sie das Versorgungsschiff der Don-Klasse
Objective_HoustonMustSurvive=Die USS Houston muss überleben

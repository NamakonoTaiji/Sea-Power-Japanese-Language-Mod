[Language_en]
Name=03A Sub Challenge - Run Silent, Run Deep
Description=Allied intelligence has located a Don class submarine tender in the Spratly Islands which is resupplying a group of Soviet diesel submarines operating in the South China Sea. Infiltrate into the Spratlys, destroy this vessel, and then escape into the Palawan Passage.
Trigger3Condition_Condition1AreaLabel=Reach this area to escape!
Trigger4Condition_Condition1AreaLabel=Iroquois Reef minefields
Trigger5Condition_Condition1AreaLabel=Loaita Bank minefields
Trigger6Condition_Condition1AreaLabel=Jackson Atoll
Taskforce1StartmessageMessage=<size=24>Pacific Strike - Sub Challenge 1</size>\nRUN SILENT, RUN DEEP\n<size=24>July 8th, 1985</size>|Allied intelligence has located a Don class submarine tender at Jackson Atoll in the Spratly Islands which is resupplying a group of Soviet diesel submarines operating in the South China Sea. Infiltrate into the Spratlys, destroy this vessel, and then escape into the Palawan Passage.\n\nNote: Vietnamese forces have laid two large minefields in the area. Their full extent is not known but expected danger area is marked on your map. These must be avoided to escape.\n\nUSS Houston must survive.|Start mission
StartForecast=FLEET WEATHER FORECAST FOR SPRATLY ISLANDS AREA\nVALID: 081000Z-081600Z JUL 85\nA broad southeast monsoonal flow across the central Spratlys is maintaining overcast skies, persistent haze, and patchy sea fog around the reefs and shoals near Jackson Atoll. Seas are running at Sea State 4, with moderate chop and reduced surface visibility expected in low cloud and fog banks. Conditions should remain marginal through the afternoon, favoring submerged operations but complicating visual search and identification.
Taskforce1HoustonmustsurviveMessage=MISSION FAILED|Defeat! USS Houston has been sunk!|Exit mission
Taskforce1Houstonreachesareatoescape-playervictoryMessage=MISSION ACCOMPLISHED|FM COMSUBPAC\nTO USS HOUSTON\n\n1. (S) Receipt confirmed of your message traffic reporting destruction of enemy submarine tender at Jackson Atoll and successful escape into the Palawan Passage.\n\n2. (S) Allied intelligence assesses enemy diesel submarine operations in the South China Sea have been materially disrupted. Follow-on Soviet submarine activity in this sector is expected to be reduced.\n\n3. (S) Outstanding work. Proceed to assigned rendezvous and rejoin Allied forces reconsolidating at Darwin. COMSUBPAC sends.\n\n<size=15>Due to your successful actions in this mission, enemy submarine threat in future missions has been reduced!</size>|Exit mission
Taskforce1MinefieldSEMessage=MISSION FAILED|Defeat! You have struck a mine in the known minefield and the boat is lost!|Exit mission
Taskforce1MinefieldSWMessage=MISSION FAILED|Defeat! You have struck a mine in the known minefield and the boat is lost!|Exit mission
Taskforce1DestroyDon-activateescapeMessage=MISSION UPDATE|"Captain, the enemy sub tender has been sunk. We are clear to escape to the south."|Acknowledge & continue
Objective_DestroyTender=Destroy the Don class tender
Objective_HoustonMustSurvive=USS Houston must survive

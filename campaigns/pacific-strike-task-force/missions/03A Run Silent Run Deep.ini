[Language_ja]
Name=03A 潜水艦チャレンジ――深く静かに潜航せよ
Description=同盟軍情報部は、南シナ海で活動中のソ連通常型潜水艦部隊へ補給を行っているドン型潜水母艦をスプラトリー諸島（南沙諸島）にて捕捉した。スプラトリー諸島へ潜入して当該艦を撃滅し、パラワン海峡へと脱出せよ。
Trigger3Condition_Condition1AreaLabel=脱出するためこの海域に到達せよ！
Trigger4Condition_Condition1AreaLabel=イロコイ礁機雷原
Trigger5Condition_Condition1AreaLabel=ロアイタ礁機雷原
Trigger6Condition_Condition1AreaLabel=ジャクソン礁
Taskforce1StartmessageMessage=<size=24>パシフィック・ストライク――潜水艦チャレンジ1</size>\n深く静かに潜航せよ\n<size=24>1985年7月8日</size>|同盟軍情報部は、南シナ海で活動中のソ連通常型潜水艦部隊へ再補給を行っているドン型潜水母艦の位置をスプラトリー諸島のジャクソン礁にて特定した。スプラトリー諸島へ潜入して当該艦を撃滅し、パラワン海峡へと脱出せよ。\n\n注記：ベトナム軍が同海域に2箇所の広大な機雷原を敷設した模様。その正確な範囲は不明だが、予想危険海域が地図上にマークされている。脱出の際、これらを回避しなければならない。\n\nUSSヒューストンの生存が絶対条件である。|作戦開始
StartForecast=スプラトリー諸島海域艦隊気象予報\n予報期間：85年7月8日1000Z～1600Z\nスプラトリー諸島中部全域に広がる南東の季節風の影響により、ジャクソン礁周辺の暗礁や浅瀬では全天が雲に覆われ、断続的な霧やもやが発生する見込み。波浪は海象状態4（シーステート4）で、やや波立つ状態が続く予想。低層の雲や海霧の発生区域では水上視程が低下する。本日午後を通じて天候は限界状況にとどまる見込みで、潜航作戦には有利であるものの、目視による捜索や識別は困難を伴う。
Taskforce1HoustonmustsurviveMessage=作戦失敗|敗北！USSヒューストンが撃沈された！|作戦終了
Taskforce1Houstonreachesareatoescape-playervictoryMessage=作戦成功|発：太平洋艦隊潜水艦部隊司令官（COMSUBPAC）\n宛：USSヒューストン\n\n1. (S) ジャクソン礁における敵潜水母艦の撃滅、およびパラワン海峡への脱出成功を伝える電文を受領した。\n\n2. (S) 同盟軍情報部は、南シナ海における敵通常型潜水艦の作戦行動が致命的な打撃を受けたと判断。同セクターにおける今後のソ連潜水艦の活動は減退するものと予想される。\n\n3. (S) 実に見事な戦果である。指定の会合海域へ進出し、ダーウィンにて再集結中の同盟軍部隊に合流せよ。太平洋艦隊潜水艦部隊司令官より。\n\n<size=15>本任務の成功により、今後のミッションにおける敵潜水艦の脅威が減少した！</size>|作戦終了
Taskforce1MinefieldSEMessage=作戦失敗|敗北！既知の機雷原において触雷。本艦は喪失した！|作戦終了
Taskforce1MinefieldSWMessage=作戦失敗|敗北！既知の機雷原において触雷。本艦は喪失した！|作戦終了
Taskforce1DestroyDon-activateescapeMessage=状況更新|「艦長、敵潜水母艦の撃沈を確認。これより南方への脱出が可能である」|了解して続行
Objective_DestroyTender=ドン型潜水母艦の撃滅
Objective_HoustonMustSurvive=USSヒューストンの生存


[Language_en]
Name=04 Sunda Strait
Description=Singapore and Indonesia have been heavily suppressed by enemy air and naval attacks, and US forces in the area have been ordered to retreat and reconsolidate. Run the Sunda Strait with {TaskForceName} to reach open ocean to live to fight another day.
Trigger1Condition_Condition1AreaLabel=Reach this area to escape!
Taskforce1Playershipsreacharea-playerwinsMessage=MISSION ACCOMPLISHED|FM CTF 77\n\nTO {TaskForceName}\n\n1. (S) Your final position report is received and acknowledged. Excellent work clearing the strait despite hostile action.\n\n2. (S) Allied forces in the region are under heavy pressure and preservation of forces is the priority. Clear the area to Darwin, then await further orders.\n\n3. (S) Well done, Commander. You brought your ships through a dangerous withdrawal and kept the task force in the fight. CTF 77 sends.<size=15>Upon reaching Darwin, your task force will be fully rearmed and repairs will be available.</size>|Exit mission
Taskforce1FlagshipmustsurviveMessage=MISSION FAILED|Defeat! {FlagshipName} has been sunk!|Exit mission
Taskforce1StartMessage=<size=24>Pacific Strike - Part 4</size>\nSUNDA STRAIT\n<size=24>July 15th, 1985</size>|Allied forces have been ordered to retreat to Australia. {TaskForceName} is attempting to escape the Java Sea after being nearly destroyed during the enemy offensive. Run the Sunda Strait and escape to open ocean to live to fight another day.\n\nIntel reports at least one enemy submarine in the vicinity of the strait. Expect heavy civilian traffic as well.\n\n{FlagshipName} and MV Sealift Caribbean Sea must survive.|Start mission
StartForecast=FLEET WEATHER FORECAST FOR SUNDA STRAIT\nVALID: 152300Z-160500Z JUL 85\nStable weather conditions will prevail in the Sunda Strait from 2300Z 15 July 1985 through 0500Z, with a light to moderate southwesterly flow maintaining slight to moderate seas at Sea State 3. Broken cloud cover will persist with good visibility, and no fog or precipitation is expected. No significant change in weather conditions is anticipated during the period.
Taskforce1SealiftCaribbeanSeamustsurviveMessage=MISSION FAILED|Defeat! The tanker has been sunk. You join the USS Houston and HMAS Perth at the bottom of the Sunda Strait!|Exit mission
Taskforce1KilopresencemessageMessage=FLASH MESSAGE|FM CTF 77\nTO {TaskForceName}\n\n1. (S) COMSUBPAC reports USS HOUSTON engaged and destroyed a significant enemy submarine wolfpack north of your position 08JUL. \n\n2. (S) Intel assesses these units were tasked with closing Sunda Strait. \n\n3. (S) We assess submarine threat to your force will be greatly diminished, but exercise caution while transiting the strait.\n\n3. (S) CTF 77 buys first round for crew of HOUSTON at Darwin. Good luck and we will see you there. CTF 77 sends.
Objective_ReachObjectiveArea=Run the Sunda Strait to escape
Objective_FlagshipMustSurvive={FlagshipName} must survive
Objective_SealiftCaribbeanSeaMustSurvive=M/V Sealift Caribbean Sea must survive
[Language_cn]
Name=04 Sunda Strait
[Language_ru]
Name=04 Зондский пролив
Description=Сингапур и Индонезия подверглись массированным атакам противника с воздуха и моря, и американским войскам в этом районе было приказано отступить и перегруппироваться. Пройдите Зондский пролив, чтобы выйти в открытый океан и получить шанс продолжить сражаться дальше.
Trigger1Condition_Condition1AreaLabel=Достигните этой зоны!
Taskforce1Playershipsreacharea-playerwinsMessage=MISSION ACCOMPLISHED|Victory! You successfully escaped through the strait and live to fight another day. {TaskForceName} will now transit to Darwin as the Allies reconsolidate their forces there.\n\n<size=15>Upon reaching Darwin, your task force will be fully resupplied and repairs will be available in Task Force Status.</size>|Exit mission
Taskforce1FlagshipmustsurviveMessage=МИССИЯ ПРОВАЛЕНА|Поражение! {FlagshipName} был потоплен!|Покинуть миссию
Taskforce1StartMessage=<size=24>Тихоокеанский Удар - Часть 4</size>\nЗондский пролив\n<size=24>Июль 15-е, 1985</size>|Allied forces have been ordered to retreat to Australia. {TaskForceName} is attempting to escape the Java Sea after being nearly destroyed during the enemy offensive. Run the Sunda Strait and escape to open ocean to live to fight another day.\n\nIntel reports at least one enemy submarine in the vicinity of the strait. Expect heavy civilian traffic as well.\n\n{FlagshipName} and MV Sealift Caribbean Sea must survive.|Start mission
Taskforce1SealiftCaribbeanSeamustsurviveMessage=МИССИЯ ПРОВАЛЕНА|Поражение! Ваш танкер был потоплен!|Покинуть миссию
Objective_ReachObjectiveArea=Прорвитесь через Зондский пролив.
Objective_FlagshipMustSurvive={FlagshipName} должен уцелеть
Objective_SealiftCaribbeanSeaMustSurvive=ТХ Силифт Кэрибеан должен уцелеть
[Language_de]
Name=04 Sundastraße
Description=Singapur und Indonesien wurden durch feindliche Luft- und Seeangriffe schwer unter Druck gesetzt und die US-Streitkräfte im Einsatzraum haben den Befehl erhalten, sich zurückzuziehen und neu zu formieren. Durchqueren Sie mit {TaskForceName} die Sundastraße und erreichen Sie die offene See, um den Kampf ein anderes Mal fortzuführen.
Trigger1Condition_Condition1AreaLabel=Erreichen Sie dieses Gebiet, um zu entkommen!
Taskforce1Playershipsreacharea-playerwinsMessage=MISSION ERFOLGREICH|VON CTF 77\n\nAN {TaskForceName}\n\n1. (S) Ihre abschließende Positionsmeldung wurde empfangen und bestätigt. Ausgezeichnete Arbeit beim Freikämpfen durch die Meerenge trotz feindlicher Einwirkung.\n\n2. (S) Die alliierten Kräfte in der Region stehen unter starkem Druck und der Erhalt eigener Kräfte hat Priorität. Verlassen Sie den Einsatzraum in Richtung Darwin und erwarten Sie weitere Befehle.\n\n3. (S) Gut gemacht, Kommandant. Sie haben Ihre Schiffe durch einen gefährlichen Rückzug geführt und die Task Force kampfbereit gehalten. CTF 77 Ende.<size=15>Nach Erreichen von Darwin wird Ihre Task Force vollständig wiederbewaffnet und Sie haben die Möglichkeit, vorhandene Schäden zu reparieren.</size>|Mission beenden
Taskforce1FlagshipmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! {FlagshipName} wurde versenkt!|Mission beenden
Taskforce1StartMessage=<size=24>Pacific Strike - Teil 4</size>\nSUNDASTRASSE\n<size=24>15. Juli 1985</size>|Alliierte Kräfte haben den Befehl erhalten, sich nach Australien zurückzuziehen. {TaskForceName} versucht, aus der Javasee zu entkommen, nachdem sie während der feindlichen Offensive beinahe vernichtet wurde. Durchqueren Sie die Sundastraße und entkommen Sie auf die offene See.\n\nDer Nachrichtendienst meldet mindestens ein feindliches U-Boot in der Nähe der Meerenge. Rechnen Sie außerdem mit starkem zivilen Schiffsverkehr.\n\n{FlagshipName} und die MV Sealift Caribbean Sea müssen überleben.|Mission starten
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR DIE SUNDASTRASSE\nGÜLTIG: 152300Z-160500Z JUL 85\nIn der Sundastraße herrschen vom 15. Juli 1985, 2300Z, bis 0500Z stabile Wetterbedingungen. Ein leichte bis mäßiger Südwestwind sorgt für leichte bis mäßige See bei einem Seegang der Stufe 3. Aufgelockerte bis starke Bewölkung bleibt bestehen, bei guter Sicht, Nebel oder Niederschlag werden nicht erwartet. Im Vorhersagezeitraum ist keine wesentliche Änderung der Wetterbedingungen zu erwarten.
Taskforce1SealiftCaribbeanSeamustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! Der Tanker wurde versenkt. Sie schließen sich der USS Houston und der HMAS Perth auf dem Grund der Sundastraße an!|Mission beenden
Taskforce1KilopresencemessageMessage=BLITZNACHRICHT|VON CTF 77\nAN {TaskForceName}\n\n1. (S) COMSUBPAC meldet, dass die USS HOUSTON am 08JUL nördlich Ihrer Position ein feindliches U-Boot-Wolfsrudel angegriffen und zerstört hat. \n\n2. (S) Der Nachrichtendienst geht davon aus, dass diese Einheiten mit der Abriegelung der Sundastraße beauftragt waren. \n\n3. (S) Wir bewerten die U-Boot-Bedrohung für Ihre Kräfte als deutlich verringert, dennoch ist während der Durchfahrt durch die Meerenge Vorsicht geboten.\n\n3. (S) CTF 77 spendiert der Besatzung der HOUSTON in Darwin die erste Runde. Viel Glück, wir sehen uns dort. CTF 77 Ende.
Objective_ReachObjectiveArea=Durchqueren Sie die Sundastraße, um zu entkommen
Objective_FlagshipMustSurvive={FlagshipName} muss überleben
Objective_SealiftCaribbeanSeaMustSurvive=M/V Sealift Caribbean Sea muss überleben

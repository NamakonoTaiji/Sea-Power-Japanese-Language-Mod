[Language_fr]
Name=04 Sunda Strait
[Language_ko]
Name=04 Sunda Strait
[Language_ja]
Name=04 スンダ海峡
Description=シンガポールとインドネシアは敵の激しい空海軍の攻撃により事実上制圧され、当海域の米軍には後退・再編命令が下った。{TaskForceName}を率いてスンダ海峡を突破し、再起を期して外洋への脱出を図れ。
Trigger1Condition_Condition1AreaLabel=脱出するためこの海域に到達せよ！
Taskforce1Playershipsreacharea-playerwinsMessage=作戦成功|発：第77任務部隊指揮官（CTF 77）\n\n宛：{TaskForceName}\n\n1. (S) 貴部隊からの最終位置報告を受領。敵の妨害行動にもかかわらず、海峡を突破した見事な手際を称える。\n\n2. (S) 当海域の同盟軍は深刻な圧力を受けており、戦力の温存が最優先事項である。ダーウィンへ向けて同海域を離脱し、その地で次命を待て。\n\n3. (S) 諸君、よくやった。危険な撤退戦の中で艦艇をよく導き、任務部隊の戦力を維持してくれた。第77任務部隊指揮官より。<size=15>ダーウィンに到達後、貴任務部隊の兵装は完全に再補給され、修理が利用可能となる。</size>|作戦終了
Taskforce1FlagshipmustsurviveMessage=作戦失敗|敗北！{FlagshipName}が撃沈された！|作戦終了
Taskforce1StartMessage=<size=24>パシフィック・ストライク――第4部</size>\nスンダ海峡\n<size=24>1985年7月15日</size>|同盟軍はオーストラリアへの後退を命じられた。{TaskForceName}は敵の攻勢により壊滅寸前となりながらも、ジャワ海からの離脱を試みている。スンダ海峡を突破して外洋へ脱出し、再起の機会をうかがえ。\n\n情報部によると、海峡周辺に少なくとも1隻の敵潜水艦が存在する模様。また、多数の民間船舶の往来が予想される。\n\n{FlagshipName}および「シーリフト・カリビアン・シー（M/V Sealift Caribbean Sea）」の生存が絶対条件である。|作戦開始
StartForecast=スンダ海峡海域艦隊気象予報\n予報期間：85年7月15日2300Z～16日0500Z\n1985年7月15日2300Zから16日0500Zにかけてスンダ海峡は安定した気象条件に恵まれ、弱～中程度の南西風により波浪は海象状態3（シーステート3）の比較的穏やかな状態を維持する。断続的な雲が残るものの視程は良好で、霧や降水の予想はない。予報期間を通じて気象条件に重大な変化はない見込み。
Taskforce1SealiftCaribbeanSeamustsurviveMessage=作戦失敗|敗北！補給艦が撃沈された。貴官の艦隊もスンダ海峡の底でUSSヒューストンやHMASパースの仲間入りをすることになる！|作戦終了
Taskforce1KilopresencemessageMessage=最優先電文（FLASH MESSAGE）|発：第77任務部隊指揮官（CTF 77）\n宛：{TaskForceName}\n\n1. (S) 太平洋艦隊潜水艦部隊司令官（COMSUBPAC）の報告によると、7月8日にUSSヒューストンが貴部隊の北方海域にて敵の有力な潜水艦狼群（ウルフパック）と交戦し、これを撃滅した。\n\n2. (S) 情報部では、これらの敵潜水艦部隊がスンダ海峡の封鎖を任務としていたと判断している。\n\n3. (S) これにより貴部隊に対する潜水艦の脅威は大幅に減少したとみられるが、海峡の通航時は引き続き警戒を怠るな。\n\n3. (S) ダーウィンに到着後、ヒューストンの乗組員への最初の一杯は私が奢る。諸君の健闘を祈る。現地で会おう。第77任務部隊指揮官より。
Objective_ReachObjectiveArea=脱出するためスンダ海峡を突破せよ
Objective_FlagshipMustSurvive={FlagshipName}の生存
Objective_SealiftCaribbeanSeaMustSurvive=M/Vシーリフト・カリビアン・シーの生存

CitationText_ja=1985年6月25日から1985年10月31日までの期間、太平洋作戦地域における空・海・陸の敵軍との戦闘において、並外れた英雄的行為を示した。戦闘における果敢かつ信頼に足る行動により、{TaskForceName}とその勇敢な士官および兵卒は、フィリピンの解放および太平洋における敵軍との戦闘継続の達成において、忠実な貢献を果たした。

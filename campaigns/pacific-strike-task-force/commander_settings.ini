CitationText_ja=1985年6月25日から1985年7月20日までの期間、西太平洋における敵軍との戦闘において英雄的行為を挙げた。敵の航空、水上、および潜水艦戦力による絶え間ない脅威にさらされる紛争の初期局面で任務に従事し、{TaskForceName}は優れた勇気、シーマンシップ、および戦闘効率を発揮した。その果敢な闘志、任務への不変の献身、および忠実な貢献により、その士官および兵卒はアメリカ海軍の最高たる伝統を維持するものである。
CitationTextJapan_ja=1985年6月25日から1985年7月20日までの期間、西太平洋における敵軍との戦闘において英雄的行為を挙げた。敵の航空、水上、および潜水艦戦力による絶え間ない脅威にさらされる紛争の初期局面で任務に従事し、{TaskForceName}は優れた勇気、シーマンシップ、および戦闘効率を発揮した。その果敢な闘志、任務への不変の献身、および忠実な貢献により、その士官および兵卒は海上自衛隊の最高たる伝統を維持するものである。
CitationTextAustralia_ja=1985年6月25日から1985年7月20日までの期間、西太平洋における敵軍との戦闘において英雄的行為を挙げた。敵の航空、水上、および潜水艦戦力による絶え間ない脅威にさらされる紛争の初期局面で任務に従事し、{TaskForceName}は優れた勇気、シーマンシップ、および戦闘効率を発揮した。その果敢な闘志、任務への不変の献身、および忠実な貢献により、その士官および兵卒はオーストラリア王立海軍の最高たる伝統を維持するものである。


[TaskForceRibbons]
; Task Force Mode ribbon definitions for Pacific Strike '85.
; Uses U.S. Navy-style awards as the default rack for all allied commanders attached to the U.S.-led task group.
; The highest U.S. award is intentionally excluded from this rack.
; U.S. references:
; - Navy Awards Precedence Chart: https://www.mynavyhr.navy.mil/References/US-Navy-Uniforms/Uniform-Regulations/Navy-Awards-Precedence/lang/en/
; - Navy Military Decorations: https://www.mynavyhr.navy.mil/References/US-Navy-Uniforms/Uniform-Regulations/Chapter-5/Military-Decorations/
; Australian/Japanese flavor references for future commander-specific racks:
; - Australian Distinguished Service Cross: https://www.defence.gov.au/adf-members-families/honours-awards/australian-awards/distinguished-service-cross
; - Australian Operational Service Medal - Indo-Pacific: https://www.defence.gov.au/adf-members-families/honours-awards/australian-awards/australian-operational-service-medal-indo-pacific
; - JMSDF Defense Memorial Cordon overview: https://www.mod.go.jp/msdf/hatinohe/fashion/classchapter/defensecommemoration.html
; - KMT/Nationalist Order of Yun Hui: https://english.president.gov.tw/Page/102

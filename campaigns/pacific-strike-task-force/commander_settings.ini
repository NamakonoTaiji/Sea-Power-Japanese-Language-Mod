CitationText_en=For exceptionally meritorious service to the Government of the United States in a duty of great responsibility while serving as Commander, {TaskForceName}, during operations in the Western Pacific. {CommanderRank} {CommanderLastName}'s steady judgment, tactical skill, and devotion to duty reflected great credit upon {Self} and upheld the highest traditions of naval service.
CitationTextJapan_en=For exceptionally meritorious service as an allied commander attached to {TaskForceName} during operations in the Western Pacific. {CommanderRank} {CommanderLastName}'s steady judgment, tactical skill, and devotion to duty reflected great credit upon the Japan Maritime Self-Defense Force and upheld the highest traditions of naval service.
CitationTextAustralia_en=For exceptionally meritorious service as an allied commander attached to {TaskForceName} during operations in the Western Pacific. {CommanderRank} {CommanderLastName}'s steady judgment, tactical skill, and devotion to duty reflected great credit upon the Royal Australian Navy and upheld the highest traditions of allied naval service.


CitationText_en=DISTINGUISHED SERVICE THROUGHOUT THE WESTERN PACIFIC CAMPAIGN FROM 25 JUNE 1985 TO 15 MARCH 1986. DURING SUSTAINED OPERATIONS AGAINST ENEMY FORCES ACROSS THE PACIFIC WAR AREA, {CommanderRank} {CommanderName} DISPLAYED EXCEPTIONAL LEADERSHIP, PROFESSIONAL SKILL, AND STEADFAST DEVOTION TO DUTY. THIS PERFORMANCE CONTRIBUTED MATERIALLY TO THE SUCCESS OF ALLIED NAVAL OPERATIONS AND REFLECTED GREAT CREDIT UPON THE COMMANDER AND THE ALLIED NAVAL FORCES OF THE PACIFIC.

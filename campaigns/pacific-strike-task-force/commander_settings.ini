CitationText_ja=1985年6月25日から1986年3月15日までの西太平洋キャンペーンを通じて顕著な功績を挙げた。太平洋作戦地域全域における敵軍との継続的な作戦において、{CommanderRank} {CommanderName}は卓越した統率力、専門的技量、および任務への不変の献身を発揮した。この優れた働きは同盟軍海軍の作戦成功に大きく貢献し、指揮官および太平洋の同盟海軍部隊に大いなる名誉をもたらした。

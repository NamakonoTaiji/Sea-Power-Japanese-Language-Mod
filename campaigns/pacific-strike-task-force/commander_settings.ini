CitationText_ja=フィリピン諸島パラワン島における敵軍に対する揚陸作戦に参加し、顕著な功績を挙げた。強襲およびその後の陸上作戦において、{CommanderRank}{CommanderName}は敵の航空、水上、および陸上からの攻撃の脅威にさらされながらも、卓越した統率力、確かな判断力、そして任務への不変 of の献身を発揮した。この優れた働きは同盟軍の上陸作戦成功に大きく貢献し、指揮官および太平洋の同盟海軍部隊に大いなる名誉をもたらした。
CitationTextJapan_ja=フィリピン諸島パラワン島における敵軍に対する揚陸作戦に参加し、顕著な功績を挙げた。強襲およびその後の陸上作戦において、{CommanderRank}{CommanderName}は敵の航空、水上、および陸上からの攻撃の脅威にさらされながらも、卓越した統率力、確かな判断力、精度、そして任務への不変の献身を発揮した。この優れた働きは同盟軍の上陸作戦成功に大きく貢献し、指揮官および太平洋の同盟海軍部隊に大いなる名誉をもたらした。

[Language_ja]
Name=05B 北の鉄槌（ソビエト）
Description=アッツ島での成功は司令部を勇気づけ、北方艦隊はNATOの補給線を脅かすため、最強の部隊を北大西洋に出撃させるよう命じられた。キーロフ打撃群を指揮し、ノルウェー海を脅かす米空母を撃破せよ。
Taskforce1StartmessageMessage=<size=20>紛争の方程式: パート 5 (ソ連)</size>\n北の鉄槌|我が重水上部隊は大西洋への突破を試みている。情報部によれば、米空母群が我々を迎撃するためアイスランド東方に位置しているとみられる。あらゆる手段を用いて米空母を発見し、撃破せよ。\n\nTu-16Kの支援を受けたTu-22M連隊がコラ半島から発進し、攻撃のため接近中である。衛星コスモス1932は0028Zに同海域上空を通過するが、司令部は、米軍がその位置を暴露される前に衛星を無力化しようと試みる可能性があると警告している。\n\nキーロフは生存せねばならない。|任務開始
Taskforce1PlayerVictoryMessage=勝利|発: キーロフ打撃群司令官\n宛: 赤旗北方艦隊司令部\n\n1. 同志諸君、我々は努力の末、米空母の撃破に成功した。\n\n2. 南西に進み残敵を掃討、その後大西洋へ進入する。勝利は我々のものだ！|ミッション終了
Taskforce1RORSATmessageMessage=海軍電文|発: 赤旗北方艦隊司令部\n宛: キーロフ打撃群司令官\n\n1. 同志からの報告によれば、衛星コスモス1932を撃墜しようとする米軍の試みは失敗した。\n\n2. コスモス1932は0028Zまでにノルウェー海上空を通過する。\n\n3. 司令部は0100Zまでに統合された目標データを貴官の部隊に伝達する。\n\n4. 受信後、米軍への攻撃を調整し、これを撃破せよ。健闘を祈る。|了解、任務続行
Taskforce1RORSATrevealEisenhowertoBlueMessage=海軍電文|発: 赤旗北方艦隊司令部\n宛: キーロフ打撃群司令官\n\n1. 衛星コスモス1932の偵察データを受信し、貴官の部隊に伝達した。\n\n2. 米空母群はフェロー諸島西方で作戦中であることが確実に識別された。\n\n3. 最大船速でミサイル射程内へ進出し、米軍を撃破せよ。健闘を祈る。|了解、任務続行
Taskforce1KirovmustsurviveMessage=敗北|発: 赤旗北方艦隊司令部\n宛: モスクワ、参謀本部\n\n1. キーロフとの連絡を喪失。最後の通信ではミサイルと航空機の接近が報告されており、我が部隊は壊滅したと評価する。\n\n2. 米軍を発見、撃破すべく潜水艦を同海域に派遣しているが、決定的な敗北を喫した恐れがある。|ミッション終了
Objective_DestroyEisenhower=USS ドワイト・D・アイゼンハワーを撃破
Objective_KirovMustSurvive=キーロフの生存
[Language_en]
Name=05B Northern Hammer (Soviet)
Description=Our success at Attu Island has emboldened command, and the Northern Fleet is ordered to sortie our most powerful units into the North Atlantic to threaten NATO supply lines. Command the Kirov Strike Group to destroy the American aircraft carrier threatening the Norwegian Sea.
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Part 5 (Soviet)</size>\nNORTHERN HAMMER|Our heavy surface forces are attempting to break into the Atlantic. Intel believes an American carrier group is positioned east of Iceland to intercept us. Locate and destroy the American carrier using all available means.\n\nTu-22M Regiment with Tu-16K support is off the deck from Kola and will be inbound to strike. Satellite Kosmos 1932 will overfly the area at 0028Z, but HQ warns the Americans may attempt to disable it before it can reveal their postion.\n\nKirov must survive.|Start mission
Taskforce1PlayerVictoryMessage=VICTORY|FM CMDR KIROV STRIKE GROUP\nTO HQ RED BANNER NORTHERN FLEET\n\n1. Comrades, we have succeeded in our efforts and destroyed the American aircraft carrier.\n\n2. We are proceeding southwest to mop up their remnants, then enter the Atlantic. Victory is ours!|Exit mission
Taskforce1RORSATmessageMessage=NAVAL MESSAGE|FM HQ RED BANNER NORTHERN FLEET\nTO CMDR KIROV STRIKE GROUP\n\n1. Our Comrades report that American attempt to shoot down Kosmos 1932 satellite was unsuccessful.\n\n2. Kosmos 1932 will overfly the Norwegian Sea by 0028Z.\n\n3. HQ will pass synthesized targeting data to your force by 0100Z.\n\n4. Upon receipt, coordinate your strike on the Americans and destroy them. Good luck.|Acknowledge & continue
Taskforce1RORSATrevealEisenhowertoBlueMessage=NAVAL MESSAGE|FM HQ RED BANNER NORTHERN FLEET\nTO CMDR KIROV STRIKE GROUP\n\n1. Kosmos 1932 reconnaissance data has been received and passed to your force.\n\n2. American carrier group is positively identified operating west of Faroe Islands.\n\n3. Proceed at best speed into missile range and then destroy the Americans. Good luck.|Acknowledge & continue
Taskforce1KirovmustsurviveMessage=DEFEAT|FM HQ RED BANNER NORTHERN FLEET\nTO GENERAL STAFF, MOSCOW\n\n1. We have lost contact with KIROV. Their last communication reported inbound missiles and aircraft, and we assess our forces have been destroyed.\n\n2. We are dispatching submarines to the area to attempt to locate and destroy the Americans, but fear that we have been decisively defeated.|Exit mission
Objective_DestroyEisenhower=Destroy the USS Dwight D. Eisenhower
Objective_KirovMustSurvive=Kirov must survive
[Language_cn]
Name=05B Northern Hammer (Soviet)
[Language_ru]
Name=05B Northern Hammer (Soviet)
[Language_de]
Name=05B Northern Hammer (Sowjet)
Description=Unser Erfolg auf der Insel Attu hat das Oberkommando bestärkt, und die Nordflotte hat somit den Befehl erhalten, ihre stärksten Einheiten in den Nordatlantik auslaufen zu lassen, um die Nachschublinien der NATO unter Druck zu setzen. Übernehmen Sie das Kommando über den Kirov-Kampfverband und vernichten Sie den amerikanischen Flugzeugträger, der sowohl die Nordsee als auch die Gewässer Norwegens bedroht.
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Teil 5 (Soviet)</size>\nNORTHERN HAMMER|Unsere Flotte versucht in den Atlantik vorzustoßen. Nachrichtendienstliche Einschätzungen gehen davon aus, dass sich eine amerikanische Trägerkampfgruppe östlich von Island positioniert hat, um unseren Durchbruch abzufangen. Lokalisieren und vernichten Sie den US-Flugzeugträger mit allen verfügbaren Mitteln.\n\nEin Tu-22M-Regiment mit Unterstützung durch Tu-16K ist bereits von der Kola-Halbinsel gestartet und befindet sich im Anflug auf das Zielgebiet. Der Satellit Kosmos 1932 wird das Gebiet um 0028Z überfliegen, das Hauptquartier warnt jedoch vor einem möglichen Versuch der Amerikaner, diesen außer Gefecht zu setzen, bevor er ihre Position aufdecken kann.\n\nDie Kirow muss überleben.|Mission Starten
Taskforce1PlayerVictoryMessage=SIEG|VON KDT KIROV STRIKE GROUP\nAN HQ ROTBANNER-NORDFLOTTE\n\n1. Genossen, wir haben unser Ziel erreicht und den amerikanischen Flugzeugträger zerstört.\n\n2. Wir verlegen nun in Richtung Südwesten, um die verbleibenden feindlichen Kräfte auszuschalten und anschließend in den Atlantik einzulaufen. Der Sieg ist unser!|Mission Beenden
Taskforce1RORSATmessageMessage=NACHRICHT DER MARINE|VON HQ ROTBANNER-NORDFLOTTE\nAN KDT KIROV STRIKE GROUP\n\n1. Unsere Genossen berichten, dass der amerikanische Versuch, den Satelliten Kosmos 1932 abzuschießen, gescheitert ist.\n\n2. Kosmos 1932 wird das Europäische Nordmeer um 0028Z überfliegen.\n\n3. Das Hauptquartier wird dem Einsatzverband bis 0100Z verlässliche Zielkoordinaten übermitteln.\n\n4. Nach Erhalt der Daten koordinieren Sie Ihren Angriff auf die Amerikaner und vernichten Sie sie. Viel Glück.|Bestätigen & Fortfahren
Taskforce1RORSATrevealEisenhowertoBlueMessage=NACHRICHT DER MARINE|VON HQ ROTBANNER-NORDFLOTTE\nAN KDT KIROV STRIKE GROUP\n\n1. KOSMOS 1932 – Aufklärungsdaten empfangen und an Ihre Einheit übermittelt.\n\n2. Die amerikanische Trägerkampfgruppe wurde eindeutig identifiziert – sie operiert westlich der Färöer-Inseln.\n\n3. Rücken Sie mit höchstmöglicher Geschwindigkeit vor, bis Sie sich in Reichweite für Ihre Raketen befinden, und vernichten Sie die Amerikaner. Viel Glück.|Bestätigen & Fortfahren
Taskforce1KirovmustsurviveMessage=NIEDERLAGE|VON HQ HQ ROTBANNER-NORDFLOTTE\nAN GENERALSTAB, MOSKAU\n\n1. Wir haben den Kontakt zur KIROW verloren. In ihrer letzten Meldung berichtete sie von anfliegenden Raketen und Flugzeugen. Wir gehen davon aus, dass unsere Streitkräfte vernichtet worden sind.\n\n2. Es werden U-Boote in das Einsatzgebiet entsandt, um zu versuchen, die Amerikaner aufzuspüren und zu zerstören – doch wir befürchten, dass wir eine entscheidende Niederlage erlitten haben.|Mission Beenden
Objective_DestroyEisenhower=Vernichten Sie die USS Dwight D. Eisenhower
Objective_KirovMustSurvive=Die Kirov muss überleben

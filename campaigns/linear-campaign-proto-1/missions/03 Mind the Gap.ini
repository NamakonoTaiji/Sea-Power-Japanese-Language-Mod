[Language_en]
Name=03 Mind the Gap (NATO)
Description=After the events of 09-10MAY, both NATO and the USSR are rapidly mobilizing their forces to set a war time posture. The USSR is deploying its submarine fleet and is attempting to break out SSBNs into the North Atlantic to hold NATO territory at risk. Task Group Greyhound, from the U.S. 2nd Fleet, has been directed to cover the Eastern approaches of the GIUK Gap and to stop USSR submarines at all costs. ROE is cleared to engage all unknown submarine contacts.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingText_en.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingMap_en.xml
NeutralAircraft1ShortNameOverride=Mad Fox
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Part 3</size>\nMIND THE GAP|USSR submarines are attempting to break through the GIUK Gap into the Atlantic. The US forces in the area have been tasked to locate and sink them.\n\nFour submarines are missing from latest imagery out of Polyarny and expected in the area. P-3C callsign "Mad Fox" is inbound from Thule AFB to assist search.\n\nAt least one of your ships must survive.|Start mission
Taskforce1B-515TangowarningmessageMessage=MISSION UPDATE|Commander, from J2, there are indications and warnings of a Tango class submarine preparing to attack U.S. forces in the area.|Acknowledged!
Taskforce1BackfirewarningmessageMessage=MISSION UPDATE|Commander, we have indications and warnings of a Backfire bomber strike package inbound from the northeast.|Acknowledged!
Taskforce1P-3CcheckinMessage=AIRCRAFT CHECK IN|Greyhound, this is Mad Fox, checking in from the West, nine souls on board, 4+30 playtime, eight bloodhounds, mixed bag of sonobuoys.\n\nReady for tasking, over.|Acknowledged!
Taskforce1DatumtriggerMessage=MISSION UPDATE|Commander, SOSUS reports unknown submarine contacts north of TG Greyhound at Datum B01.\n\nHQ assesses at least two submarines located, proceeding south-southwest. Datums A01 and B01 have been established.|Acknowledged!
Taskforce1K-503CharlieIIIwarningmessageMessage=MISSION UPDATE|Commander, J2 has updated intelligence assessment.\n\nUSSR Charlie-II is assessed operating in position of DATUM C01.\n\nCharlie-II carries SS-N-9 with range of 59nm.|Acknowledged!
Taskforce1PlayervictoryMessage=VICTORY|FM COMLANTFLT\nTO TG GREYHOUND\n\n1. Good work Commander, SOSUS is reporting four independent implosions. Assess all submarines operating in the area have been neutralized.\n\n2. TGG directed to Reykjavik for rest and refit.|Exit mission
Taskforce1PlayerdefeatMessage=DEFEAT|FM COMLANTFLT\nTO TG GREYHOUND\n\n1. SOSUS detects USSR ballistic missile submarines have broken through in to the North Atlantic.\n\n2. TGG is directed to fall back to the North Atlantic Ridge and prepare to regain contact.|Exit mission

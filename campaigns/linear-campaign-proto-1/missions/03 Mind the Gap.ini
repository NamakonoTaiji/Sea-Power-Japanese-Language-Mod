[Language_ja]
Name=03 ギャップを警戒せよ（NATO）
Description=5月9日から10日にかけての出来事の後、NATOとソ連は共に戦時体制を敷くため、急速に部隊を動員している。ソ連は潜水艦隊を展開し、弾道ミサイル原子力潜水艦（SSBN）を北大西洋に突破させ、NATO領土を危険に晒そうと試みている。米第2艦隊のグレイハウンド機動群は、GIUKギャップの東方進入路を防衛し、いかなる犠牲を払ってもソ連潜水艦を阻止するよう指示された。交戦規定（ROE）は、全ての未識別潜水艦との交戦を許可している。
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingText_ja.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingMap_ja.xml
NeutralAircraft1ShortNameOverride=Mad Fox
Taskforce1StartmessageMessage=<size=20>紛争の方程式: パート 3</size>\nギャップを警戒せよ|ソ連潜水艦がGIUKギャップを突破し、大西洋へ進出しようとしている。この地域の米軍は、これらを発見し撃沈する任務を負っている。\n\nポリャルヌイからの最新の画像では4隻の潜水艦が行方不明となっており、この海域に出現すると予想される。P-3C、コールサイン「マッドフォックス」が捜索支援のため、チューレ空軍基地より接近中。\n\n少なくとも1隻の自艦が生存せねばならない。|任務開始
Taskforce1B-515TangowarningmessageMessage=任務更新|司令官、J2より。同海域の米軍を攻撃準備中のタンゴ級潜水艦に関する兆候・警報あり。|了解！
Taskforce1BackfirewarningmessageMessage=任務更新|司令官、北東から接近中のバックファイア爆撃機編隊に関する兆候・警報あり。|了解！
Taskforce1P-3CcheckinMessage=入電: 航空機|グレイハウンド、こちらマッドフォックス。西よりチェックイン。搭乗員9名、滞空時間4時間30分、魚雷8本、ソノブイ各種を搭載。\n\n任務の準備よし、以上。|了解！
Taskforce1DatumtriggerMessage=任務更新|司令官、SOSUSがグレイハウンド機動群の北方、データムB01にて未識別潜水艦の接触を報告。\n\n司令部は少なくとも2隻の潜水艦が南南西に進んでいると評価。データムA01およびB01が設定された。|了解！
Taskforce1K-503CharlieIIIwarningmessageMessage=任務更新|司令官、J2が情報評価を更新。\n\nソ連のチャーリーII級がデータムC01の位置で作戦中と評価される。\n\nチャーリーII級は射程59海里のSS-N-9を搭載。|了解！
Taskforce1PlayervictoryMessage=勝利|発: 大西洋艦隊司令官\n宛: グレイハウンド機動群\n\n1. 見事である、司令官。SOSUSが4つの独立した圧壊音を報告。同海域で作戦中の全潜水艦は無力化されたと評価する。\n\n2. グレイハウンド機動群は休息と補給のため、レイキャビクへ向かえ。|ミッション終了
Taskforce1PlayerdefeatMessage=敗北|発: 大西洋艦隊司令官\n宛: グレイハウンド機動群\n\n1. SOSUSが、ソ連の弾道ミサイル潜水艦が北大西洋へ突破したことを探知。\n\n2. グレイハウンド機動群は北大西洋海嶺まで後退し、再接触に備えよ。|ミッション終了

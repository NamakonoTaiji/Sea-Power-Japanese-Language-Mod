
[Debug]
DisableEnemyAIPlayer=True
[Language_ja]
Name=01 シャドウ作戦
Description=緊張の全面的高まりを受け、バレンツ海におけるソ連海軍の活動が活発化している。同海域のノルウェー潜水艦を指揮し、ソ連海軍の活動を秘密裏に監視せよ。
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\01 Operation Shadow_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\01 Operation Shadow_Briefing\BriefingText_en.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\01 Operation Shadow_Briefing\BriefingMap_en.xml
Taskforce1StartmessageMessage=<size=20>紛争の方程式: ミッション 1</size>\nシャドウ作戦|NATO とソ連間の緊張が最近高まったことにより、ソ連軍はバレンツ海でより攻撃的な作戦を開始した。2 隻のノルウェー潜水艦が同海域の哨戒とソ連海軍の活動監視に割り当てられた。\n\n指定された哨戒区域内に留まり、水上および潜水艦の接触を監視し、さらなる命令を待て。\n\n少なくとも 1 隻の潜水艦が生存しなければならない。|任務開始
StartmessageAreaLabel=監視区域
Taskforce1TaskingchangeMessage=緊急電|発: NATO 統合軍司令部\n宛: ノルウェー海軍司令官\n\n司令官親展\n\n1. 艦長、現地時間 0930、同海域に展開中の米補助艦 USNS ケープ・ジラードーが、これを追跡していたソ連艦艇により臨検、拿捕された。クレムリン高官筋の情報によれば、乗組員は臨検を阻止しようと試み、銃撃戦の末に殺害されたという。合衆国は、この拿捕を敵対行為とみなし、北大西洋条約第 5 条を発動する戦争宣言に等しいと判断。貴官は直ちに対応するよう命じられた。全てのソ連水上部隊を排除せよ。USNS ケープ・ジラードーを損傷または破壊してはならない。特殊作戦部隊が奪還のため、現在向かっている。\n\n2. 任務:\n2.1 ソ連水上戦闘群 (SAG) およびケープ・ジラードーを発見せよ。\n2.2 全てのソ連艦艇を撃沈せよ。\n\n3. 実行:\n3.1 貴官の裁量で実行せよ。\n\n4. 敵戦闘序列 (OOB):\n4.1 変更なし。\n\n5. 友軍戦闘序列 (OOB):\n5.1 変更なし。\n\n6. 情報評価:\n6.1 米統合参謀本部情報部 (J2) は、この行動がソ連 SAG を指揮する独断的で攻撃的な司令官によって行われたものと評価している。\n6.2 情報部はさらに、現時点で支援のために出撃している追加のソ連部隊は存在しないと評価している。|了解、任務続行
Taskforce1TaskingchangeIntel=ソ連水上戦闘群 (SAG) と USNS ケープ・ジラードーを発見せよ。ソ連 SAG を排除するが、ケープ・ジラードーは破壊してはならない。
Taskforce1BLUFORVictoryMessage=勝利|発: NATO 統合軍司令部\n宛: ノルウェー海軍司令官\n\n1. 見事である、司令官。GIUK ギャップに向けて後退し、さらなる命令を待て。バレンツ海におけるソ連軍追跡任務は中止された。\n\n2. ワルシャワ条約機構との全面的な敵対行為に備え、乗組員と艦の準備を整えよ。|ミッション終了
Taskforce1Playersubsdestroyed-playerdefeatMessage=敗北|発: NATO 統合軍司令部\n宛: 全 NATO 軍\n\n1. 我々は、極北で活動中のノルウェー海軍潜水艦との連絡を絶った。司令部は、ソ連軍によって撃破された可能性が極めて高いと評価している。\n\n2. NATO 海上打撃部隊は、即時展開準備のため全部隊を動員中である。|ミッション終了
Taskforce1CapeGirardeaudestroyed-playerdefeatMessage=敗北|発: NATO 統合軍司令部\n宛: ノルウェー海軍司令官\n\n1. ケープ・ジラードーは浮揚させておくべきであった、司令官。同艦は機密性の高い機器を満載している。\n\n2. GIUK ギャップに向けて後退し、さらなる命令を待て。|ミッション終了
Objective_MonitorUSSRForces=当該区域に留まりソ連の活動を監視
Objective_OneSubMustSurvive=ノルウェー潜水艦の最低 1 隻生存
Objective_DestroyUSSRSAG=ソ連 SAG を撃破
Objective_CapeGirardeauMustSurvive=USNS ケープ・ジラードーの生存
[Language_en]
Name=01 Operation Shadow
Description=Soviet naval activity in the Barents Sea has increased following an overall escalation in tensions. Command the Norwegian submarines in the area to covertly monitor Soviet naval activity.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\01 Operation Shadow_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\01 Operation Shadow_Briefing\BriefingText_en.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\01 Operation Shadow_Briefing\BriefingMap_en.xml
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Mission 1</size>\nOPERATION SHADOW|With the recent rise in tensions between NATO and the USSR, Soviet forces have begun operating more aggressively in the Barents Sea. Two Norwegian submarines have been assigned to patrol the area and monitor Soviet naval activity.\n\nRemain inside the marked patrol area, monitor for surface and submarine contacts, and await further orders.\n\nAt least one of your submarines must survive.|Start mission
StartmessageAreaLabel=Monitoring Area
Taskforce1TaskingchangeMessage=FLASH MESSAGE|FM COMNATOHQ\nTO COMMANDER, KNM\n\nPERSONAL FOR COMMANDER\n\n1. Skipper, at time 0930 local, the USNS CAPE GIRARDEAU, a U.S. auxiliary in the area, was boarded and seized by USSR vessels shadowing her. According to high level sources in the Kremlin, the crew attempted to stop the boarding and were killed in an exchange of gunfire. The U.S. views this seizure as a hostile act and tantamount to a declaration of war invoking Article 5. You have been ordered to respond immediately - eliminate all USSR surface forces. Do not damage or destroy the USNS CAPE GIRARDEAU, Special Ops forces are en route to recapture her.\n\n2. Mission:\n2.1 Locate the USSR SAG and the CAPE GIRARDEAU.\n2.2 Sink all USSR vessels.\n\n3. Execution:\n3.1 Execute at your discretion.\n\n4. Enemy OOB:\n4.1 No change.\n\n5. Friendly OOB:\n5.1 No change.\n\n6. Intel Assessment:\n6.1 U.S. J2 assesses that this action was conducted by a rogue, aggressive commander in charge of the USSR SAG.\n6.2  Intel further assesses that there are no additional USSR forces sortieing in support at this time.|Acknowledge & continue
Taskforce1TaskingchangeIntel=Locate the USSR SAG and USNS Cape Girardeau. Eliminate the USSR SAG, but do not destroy the Cape Girardeau.
Taskforce1BLUFORVictoryMessage=VICTORY|FM COMNATOHQ\nTO COMMANDER, KNM\n\n1. Good work Commander, fall back towards the GIUK Gap and await further orders. Your mission to shadow the USSR forces in the Barents is scrubbed.\n\n2. Prepare your crew and boat for all out hostilities with the Warsaw Pact.|Exit mission
Taskforce1Playersubsdestroyed-playerdefeatMessage=DEFEAT|FM COMNATOHQ\nTO ALL NATO\n\n1. We have lost contact with KNM Submarines operating in the High North. HQ assesses they are most likely destroyed by USSR forces.\n\n2. NATO Striking Forces Maritime is mobilizing all forces preparing for immediate deployment.|Exit mission
Taskforce1CapeGirardeaudestroyed-playerdefeatMessage=DEFEAT|FM COMNATOHQ\nTO COMMANDER, KNM\n\n1. The CAPE GIRARDEAU was supposed to remain afloat Commander. This ship is full of highly sensitive equipment.  \n\n2. Fall back towards the GIUK Gap and await further orders.|Exit mission
Objective_MonitorUSSRForces=Loiter in the area and monitor USSR activity
Objective_OneSubMustSurvive=At least one Norwegian submarine must survive
Objective_DestroyUSSRSAG=Destroy the USSR SAG
Objective_CapeGirardeauMustSurvive=USNS Cape Girardeau must survive
[Language_cn]
Name=01 Operation Shadow
[Language_ru]
Name=01 Операция «Тень»
[Language_de]
Name=01 Operation Shadow
Description=Die sowjetische Marineaktivität in der Barentssee hat sich nach einer Eskalation der Spannungen verstärkt. Befehlige die norwegischen U-Boote in der Region und überwache unbemerkt die sowjetischen Marinebewegungen.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\01 Operation Shadow_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\01 Operation Shadow_Briefing\BriefingText_de.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\01 Operation Shadow_Briefing\BriefingMap_de.xml
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Teil 1</size>\nOPERATION SHADOW|Angesichts der jüngsten Eskalation der Spannungen zwischen der NATO und der UdSSR haben sowjetische Seestreitkräfte ihre Aktivitäten in der Barentssee deutlich intensiviert. Zwei norwegische U-Boote wurden zur verdeckten Aufklärung in das Einsatzgebiet entsandt, um feindliche Marinebewegungen zu überwachen.\n\nHalten Sie sich innerhalb des zugewiesenen Patrouillengebiets auf, erfassen Sie Oberflächen- und Unterwasserkontakte, und erwarten Sie weitere Einsatzbefehle.\n\nMindestens ein U-Boot muss den Einsatz überstehen.|Mission starten
StartmessageAreaLabel=Überwachungsgebiet
Taskforce1TaskingchangeMessage=BLITZ-MELDUNG|FM COMNATOHQ\nAN KOMMANDANT, KNM\n\nPERSÖNLICH/VERTRAULICH\n\n1. Kommandant, um 0930 Ortszeit wurde die USNS CAPE GIRARDEAU, ein US-amerikanisches Hilfsschiff in Ihrem Einsatzgebiet von sowjetischen Einheiten geentert und beschlagnahmt. Laut hochrangigen Quellen im Kreml versuchte die Besatzung, das Entern zu verhindern, und kam dabei bei einem Schusswechsel ums Leben. Die Vereinigten Staaten werten dieses Vorgehen als feindlichen Akt – gleichbedeutend mit einer Kriegserklärung – und berufen sich auf Artikel 5 des NATO-Vertrags. Ihnen wird befohlen, umgehend zu reagieren - sämtliche sowjetische Überwassereinheiten sind zu vernichten. Die USNS CAPE GIRARDEAU, darf nicht beschädigt oder zerstört werden. Spezialkräfte sind bereits unterwegs, um das Schiff zurückzuerobern.\n\n2. Auftrag:\n2.1 Lokalisieren Sie die sowjetische Überwasser-Kampfgruppe (SAG) sowie die CAPE GIRARDEAU.\n2.2 Versenken Sie sämtliche sowjetische Einheiten.\n\n3. Durchführung:\n3.1 Durchführung nach eigenem Ermessen.\n\n4. Feindlage (OOB):\n4.1 Keine Änderungen bekannt.\n\n5. Eigenlage OOB:\n5.1 Keine Änderungen bekannt.\n\n6. Nachrichtendienstliche Einschätzung:\n6.1 Die US-amerikanische Aufklärung (J2) geht davon aus, dass die Aktion von einem eigenmächtig handelnden, aggressiven sowjetischen Kommandeur durchgeführt wurde.\n6.2  Es wird derzeit nicht davon ausgegangen, dass weitere sowjetische Kräfte zur Unterstützung auslaufen.|Bestätigen & Fortfahren
Taskforce1TaskingchangeIntel=Lokalisieren Sie die sowjetische Überwasser-Kampfgruppe (SAG) sowie die USNS Cape Girardeau. Vernichten Sie die sowjetische SAG, ohne die Cape Girardeau zu zerstören.
Taskforce1BLUFORVictoryMessage=SIEG|FM COMNATOHQ\nAN KOMMANDANT, KNM\n\n1. Gute Arbeit, Kommandant. Ziehen Sie sich in Richtung GIUK-Lücke zurück und warten Sie auf weitere Befehle. Ihr Auftrag, die sowjetischen Kräfte in der Barentssee zu beschatten, ist hinfällig.\n\n2. Bereiten Sie Ihre Besatzung und Ihr Boot auf umfassende Kampfhandlungen mit dem Warschauer Pakt vor.|Mission Beenden
Taskforce1Playersubsdestroyed-playerdefeatMessage=NIEDERLAGE|FM COMNATOHQ\nAN GESAMTE NATO\n\n1. Wir haben den Kontakt zu den im Norden operierenden KNM-U-Booten verloren. Das Hauptquartier geht davon aus, dass sie höchstwahrscheinlich von sowjetischen Streitkräften zerstört wurden.\n\n2. Die NATO-Striking Forces Maritime mobilisiert alle verfügbaren Kräfte zur sofortigen Einsatzbereitschaft.|Mission Beenden
Taskforce1CapeGirardeaudestroyed-playerdefeatMessage=NIEDERLAGE|FM COMNATOHQ\nAN KOMMANDANT, KNM\n\n1. Die CAPE GIRARDEAU sollte unbeschadet bleiben. Das Schiff war mit hochsensibler Ausrüstung beladen.  \n\n2. Ziehen Sie sich in Richtung der GIUK-Lücke zurück und warten Sie auf weitere Befehle.|Mission Beenden
Objective_MonitorUSSRForces=Verbleiben Sie im Einsatzgebiet und überwachen Sie die Aktivitäten der UdSSR.
Objective_OneSubMustSurvive=Mindestens ein norwegisches U-Boot muss den Einsatz überleben.
Objective_DestroyUSSRSAG=Zerstören Sie die sowjetische Überwasser-Kampfgruppe (SAG)
Objective_CapeGirardeauMustSurvive=USNS Cape Girardeau muss überleben

[Language_ja]
Name=04B 交渉の切り札 (ソビエト)
Description=GIUKギャップ近海でソ連潜水艦が多数損傷・撃沈されて以来、ワルシャワ条約機構とNATO間の軍事行動は停滞している。欧州の地上戦もまた、双方が戦力差と戦争目的を再評価する中で不安定な膠着状態に陥った。交渉は継続中だが、決定的な交渉材料を欠く現状では、いずれの側も妥結に応じる構えを見せていない。
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing\BriefingText_ja.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing\BriefingMap_ja.xml
Taskforce1LandUnit1NameOverride=キャスコ・コーブ飛行場 (ATU)
Taskforce1LandUnit1ShortNameOverride=ATU
Taskforce1REDFORVictoryMessage=敗北|発：アッツ空軍基地指揮官\n宛：第7艦隊司令官\n\n1. 数時間以内にワルシャワ条約機構軍が到達すると推定。これを受け、現在すべての緊急破壊プロトコルを実施中である。友軍水上戦力は全滅、あるいは無力化された。|作戦終了
Taskforce2REDFORVictoryMessage=勝利|発：任務部隊「ヴォストーク」指揮官\n宛：太平洋艦隊司令官\n\n1. すべてのNATO戦力を排除したと判断する。揚陸部隊は現在、上陸準備に入っている。\n\n2. 同志諸君、勝利は我々のものだ。|作戦終了
Taskforce1BLUFORVictoryMessage=勝利|発：アッツ空軍基地指揮官\n宛：第7艦隊司令官\n\n1. すべてのワルシャワ条約機構軍を排除したと判断する。現在、残存部隊を捜索するため、すべての海洋哨戒機（MPRA）をスクランブルさせている。\n\n2. 12時間以内に詳細な報告を送付する。|作戦終了
Taskforce2BLUFORVictoryMessage=敗北|発：太平洋艦隊司令官\n宛：モスクワ司令部\n\n1. 任務部隊「ヴォストーク」および侵攻部隊との連絡が途絶した。アメリカ軍が我が軍の前進を阻止するのに十分な戦力を展開したと判断する。\n\n2. グアム攻撃のための新たな選択肢を策定中であり、12時間以内に準備が整う予定だ。|作戦終了
Taskforce2WelcomeAboardMessage=<size=20>衝突の数理：パート4 (ソビエト)</size>\n交渉の切り札|司令部は我々に対し、アッツ島へ侵攻し、アメリカの手から同地を奪取することを命じた。インテリジェンスによれば、島の東端にあるキャスコ・コーブ飛行場にアメリカの空母艦載機が展開しており、ハワイからは米水上部隊が北上している可能性が高い。\n\n遭遇した敵軍を撃破し、我が揚陸部隊を確実に上陸海域へと送り届けよ。|作戦開始
Taskforce2Tu-95CheckInMessage=航空機チェックイン|任務部隊「ヴォストーク」、こちら偵察機。西方より戦域に到達した、オーバー。|了解

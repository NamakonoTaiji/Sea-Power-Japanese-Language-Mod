[Language_de]
Name=04B Verhandlungsmasse (Sowjet)
Description=Die militärischen Aktionen auf See zwischen dem Warschauer Pakt und der NATO sind nahezu zum Erliegen gekommen, seit mehrere sowjetische U-Boote in der Nähe der GIUK-Lücke beschädigt oder versenkt wurden. Auch am Boden hat sich der Krieg in Europa zu einem angespannten Patt erstarrt – beide Seiten überdenken derzeit ihre jeweiligen Vorteile und Kriegsziele. Zwar laufen Verhandlungen, doch ohne Druck und ohne entscheidende Vorteile ist bislang keine Seite bereit, einem Kompromiss zuzustimmen.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing

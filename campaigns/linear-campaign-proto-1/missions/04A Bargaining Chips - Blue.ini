Taskforce1MadFoxCheckInMessage=AIRCRAFT CHECK IN|75.3, this is Mad Fox.\n\nChecking in from the east, 8 souls onboard, 4+30 playtime, 4 bruisers.\n\nReady for tasking, over.|Acknowledged!
Taskforce1REDFORVictoryMessage=DEFEAT|FM CMDR, ATTU AIRFORCE BASE\nTO COMSEVENTHFLT\n\n1. Assess that WP forces will be on scene within hours.  We are implementing all emergency destruction protocols at this time. Friendly surface forces have been eliminated or rendered ineffective.|Exit mission
Taskforce2REDFORVictoryMessage=VICTORY|FM CMDR, TF Vostok\nTO COMPACFLT\n\n1. Assess that all NATO forces have been eliminated. Amphibious forces are preparing to move ashore now.\n\n2. Victory is ours, Comrade General.|Exit mission
Taskforce1BLUFORVictoryActualMessage=VICTORY|FM CMDR, ATTU AIRBASE\nTO COMSEVENTHFLT\n\n1. We assess that all WP forces have been eliminated. We are scrambling all MPRA assets to search the area for remaining troops.\n\n2. Victory is ours, Admiral. Full report to come within 12 hours.|Exit mission
Taskforce2BLUFORVictoryActualMessage=DEFEAT|FM COMPACFLT\nTO MOSCOW HQ\n\n1. We have lost contact with TF Vostok and the Invasion Force. Assess that the Americans were able to deploy enough troops to halt our advance.\n\n2. New options for attacks on Guam are being developed and will be ready in 12 hours. The loss of our forces will not be in vain.|Exit mission
Trigger8Condition_Condition3AreaLabel=Invasion Force Launch Area
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Part 4 (NATO)</size>\nBARGAINING CHIPS|The Soviets are attempting to invade Attu Island in the Aleutians. Command the US forces in the area to fight off the attack.\n\nTF 75.3 has been surged north from Hawaii, and Carrier Air Wing 11 (CVW-11) aircraft are staging out of the Casco Cove airfield on Attu. P-3C callsign "Mad Fox" is off the deck and will check in with you shortly.\n\nDestroy all enemy forces attempting to invade the island.|Start mission
Objective_PreventLanding=Prevent USSR landing on Attu
Objective_DestroyUSSRForces=Destroy all USSR forces encountered

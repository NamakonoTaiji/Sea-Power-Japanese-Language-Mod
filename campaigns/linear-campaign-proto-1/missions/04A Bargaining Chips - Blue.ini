[Language_ja]
Name=04A 交渉の切り札（NATO）
Description=GIUKギャップ付近で数隻のソ連潜水艦が損傷または撃沈されて以来、ワルシャワ条約機構とNATO間の軍事行動は停滞している。他の地域では、ヨーロッパでの地上戦が不穏な膠着状態に陥り、双方がそれぞれの比較優位と戦争目標を再評価している。交渉は進行中だが、切り札がないため、どちらの側もまだ和解に応じる気はない。
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\04A Bargaining Chips - Blue_briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\04A Bargaining Chips - Blue_briefing\BriefingText_ja.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\04A Bargaining Chips - Blue_briefing\BriefingMap_ja.xml

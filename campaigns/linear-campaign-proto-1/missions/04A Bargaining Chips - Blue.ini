Taskforce1MadFoxCheckInMessage=FLUGZEUG MELDET SICH|75.3, hier Mad Fox.\n\nMelde mich aus östlicher Richtung. Acht Personen an Bord, Einsatzzeit 4 Stunden 30 Minuten, vier „Bruisers“ verfügbar.\n\nereit zur Einsatzaufnahme, Ende.|Bestätige!
Taskforce1REDFORVictoryMessage=NIEDERLAGE|VON KDT, LUFTWAFFENSTÜTZPUNKT ATTU\nAN COMSEVENTHFLT\n\n1. Es wird davon ausgegangen, dass Streitkräfte des Warschauer Pakts innerhalb weniger Stunden am Einsatzort eintreffen werden. Wir setzen derzeit sämtliche Notfall-Protokolle um. Eigene Seestreitkräfte wurden entweder ausgeschaltet oder sind kampfunfähig.|Mission Beenden
Taskforce2REDFORVictoryMessage=SIEG|VON KDT, TF Vostok\nAN COMPACFLT\n\n1. Es wird davon ausgegangen, dass alle NATO-Streitkräfte ausgeschaltet wurden. Die Landungseinheiten bereiten sich nun auf das Anlanden vor..\n\n2. Der Sieg gehört uns, Genosse General.|Mission Beenden
Taskforce1BLUFORVictoryActualMessage=SIEG|VON KDT, ATTU AIRBASE\nAN COMSEVENTHFLT\n\n1. Wir gehen davon aus, dass alle Streitkräfte des Warschauer Pakts ausgeschaltet wurden. Alle verfügbaren Seefernaufklärer (MPRA) werden gestartet, um das Gebiet nach verbliebenen Einheiten abzusuchen.\n\n2. Der Sieg gehört uns, Admiral. Ein vollständiger Bericht folgt innerhalb der nächsten 12 Stunden.|Mission Beenden
Taskforce2BLUFORVictoryActualMessage=NIEDERLAGE|VON COMPACFLT\nAN MOSKAU HQ\n\n1. Wir haben den Kontakt zu Task Force Wostok und den Invasionseinheiten verloren. Es wird davon ausgegangen, dass es den Amerikanern gelungen ist, ausreichend Truppen zu verlegen, um unseren Vormarsch zu stoppen.\n\n2. Neue Angriffsoptionen gegen Guam werden derzeit ausgearbeitet und stehen in 12 Stunden bereit. Der Verlust unserer Kräfte wird nicht umsonst gewesen sein.|Mission Beenden
Trigger8Condition_Condition3AreaLabel=Aufmarschgebiet der Invasionstruppen
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Teil 4 (NATO)</size>\nVERHANDLUNGSMASSE|Die Sowjets versuchen, die Insel Attu auf den Aleuten zu erobern. Übernehmen Sie das Kommando über die US-Streitkräfte in der Region und wehren Sie den feindlichen Angriff ab.\n\nDie Task Force 75.3 wurde aus Hawaii in den Norden verlegt und die Flugzeuge des Carrier Air Wing 11 (CVW-11) operieren vom Luftwaffenstützpunkt Casco Cove auf Attu aus. Eine P-3C mit dem Rufzeichen „Mad Fox“ ist bereits gestartet und wird sich in Kürze bei Ihnen melden.\n\nVernichten Sie alle feindlichen Kräfte, die versuchen, auf der Insel zu landen.|Mission Starten
Objective_PreventLanding=Verhindern Sie die Landung sowjetischer Truppen auf Attu.
Objective_DestroyUSSRForces=Vernichten Sie alle sowjetischen Streitkräfte, auf die Sie treffen.

NeutralAircraft1ShortNameOverride=Mad Fox
Taskforce1LandUnit1NameOverride=カスコ・コーブ飛行場 (ATU)
Taskforce1LandUnit1ShortNameOverride=ATU
Taskforce1MadFoxCheckInMessage=入電: 航空機|75.3、こちらマッドフォックス。\n\n東よりチェックイン。搭乗員8名、滞空時間4時間30分、対艦ミサイル4発。\n\n任務の準備よし、以上。|了解！
Taskforce1REDFORVictoryMessage=敗北|発: アッツ空軍基地司令官\n宛: 第七艦隊司令官\n\n1. ワルシャワ条約機構軍は数時間以内に現場に到着すると評価。現在、全ての緊急破壊プロトコルを実行中。友軍水上部隊は排除されたか、無力化された。|ミッション終了
Taskforce2REDFORVictoryMessage=勝利|発: ボストーク機動部隊司令官\n宛: 太平洋艦隊司令官\n\n1. 全てのNATO軍は排除されたと評価。水陸両用部隊は現在、上陸準備中。\n\n2. 勝利は我々のものだ、同志将軍。|ミッション終了
Taskforce1BLUFORVictoryActualMessage=勝利|発: アッツ空軍基地司令官\n宛: 第七艦隊司令官\n\n1. 全てのワルシャワ条約機構軍は排除されたと評価。残存部隊を捜索するため、全ての対潜哨戒機 (MPRA) をスクランブル発進させている。\n\n2. 勝利は我々のものだ。12時間以内に詳細な報告を行う。|ミッション終了
Taskforce2BLUFORVictoryActualMessage=敗北|発: 太平洋艦隊司令官\n宛: モスクワ司令部\n\n1. ボストーク機動部隊および侵攻部隊との連絡を喪失。米軍は我々の前進を阻止するに足る部隊を展開できたものと評価する。\n\n2. グアム攻撃の新たな選択肢を開発中であり、12時間以内に準備が整う。我が軍の損失は無駄にはならない。|ミッション終了
Trigger8Condition_Condition3AreaLabel=侵攻部隊 発進区域
Taskforce1StartmessageMessage=<size=20>紛争の方程式: パート 4 (NATO)</size>\n交渉の切り札|ソ連はアリューシャン列島のアッツ島に侵攻しようとしている。この地域の米軍を指揮し、攻撃を撃退せよ。\n\n第75.3任務部隊 (TF 75.3) はハワイから北方へ急派され、第11空母航空団 (CVW-11) の航空機がアッツ島のカスコ・コーブ飛行場から展開している。P-3C、コールサイン「マッドフォックス」が離陸し、まもなくチェックインする。\n\n島に侵攻しようとする全ての敵部隊を撃破せよ。|任務開始
Objective_PreventLanding=ソ連軍のアッツ島上陸を阻止
Objective_DestroyUSSRForces=遭遇した全てのソ連軍を撃破
[Language_en]
Name=04A Bargaining Chips (NATO)
Description=Military actions between the Warsaw Pact and NATO have stalled since several USSR submarines were damaged or sunk in vicinity of the GIUK Gap.  Elsewhere, land fighting has ground into an uneasy stalemate in Europe with both sides reevaluating their comparative advantages and war goals. Negotiations are ongoing, but with no leverage, neither side is willing to come to a settlement yet.

[Language_ja]
Name=紛争の方程式
Description=NATOとソ連の緊迫した対立を背景に、大西洋と北太平洋を舞台とした航空・海上戦が展開される。秘密裏の潜水艦による監視活動から、GIUKギャップ近海での大規模な水上戦闘まで、急速に悪化する地政学的危機の中、プレイヤーは事態のエスカレーションを管理する必要がある。

[Language_en]
Name=Calculus of Conflict
Description=Set during a tense standoff between NATO and the USSR, Calculus of Conflict explores the air-naval struggle across the Atlantic and North Pacific. From covert submarine surveillance to high-stakes surface action near the GIUK Gap, players must manage escalation in a rapidly deteriorating geopolitical crisis.

[Language_ru]
Name=Цена конфликта
Description=Масштабный конфликт между НАТО и СССР. В ряде последовательных миссий игроки смогут управлять различными боевыми единицами обеих сторон в Атлантике и Тихом океане.

[Language_de]
Name=Calculus of Conflict
Description="Calculus of Conflict" spielt während eines angespannten Patt-Zustands zwischen der NATO und der Sowjetunion und behandelt das luft- und seegestützte Kräftemessen im Atlantik und Nordpazifik. Von verdeckter U-Boot-Aufklärung bis zu Gefechten nahe der GIUK-Lücke ist die Aufgabe des Spielers, eine Eskalation in einer sich rasch zuspitzenden geopolitischen Lage zu vermeiden.

[Language_ko]
Name=분쟁의 미적분학
Description=분쟁의 미적분학 캠페인은 NATO와 소련의 긴박한 대치 상황을 배경으로 대서양과 북태평양의 공중-해상 갈등을 다룹니다. 기밀 잠수함 감시부터 GIUK 갭 인근의 고강도 해상 작전까지, 플레이어들은 급격히 악화되는 지정학적 위기 하에서 고조되는 갈등 상황을 관리해 확전을 막아야 합니다.


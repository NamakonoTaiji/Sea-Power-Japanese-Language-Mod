[ -------------------- Vehicles -------------------- ]
[pla_apc_type63]
Type=装甲兵員輸送車
Default=63式装甲兵員輸送車,Type 63 APC
DefaultDescription=アメリカのM113に相当する63式は、ソ連の技術支援なしで製造された最初の中国製装甲車両である。M113と同様に汎用性が高く、中国のほかベトナム、北朝鮮、バングラデシュ、イラクといった同盟諸国でも運用された。ベトナム戦争では北ベトナム軍に供給され、イラン・イラク戦争でも実戦投入された。中国軍では1990年代から89式装甲兵員輸送車（ZSD 89）への更新が進められた。
Variant1=63式装甲兵員輸送車,Type 63 APC

[pla_lt_type_63]
Type=軽戦車
Default=63式水陸両用軽戦車,Type 63 LT
DefaultDescription=ソ連のPT-76をベースに開発された63式は、1960年代半ばに就役した中国の水陸両用軽戦車である。PT-76とは異なり、4人の乗員構成、左側の操縦席、中央配置の砲塔など数多くの変更が加えられており、ウォータージェット推進に加えて履帯による水上走行も可能となっている。中国の同盟諸国へ輸出され、ベトナム戦争の終盤で初めて実戦に投入された。後に改良型の63A式に更新された。
Variant1=63式水陸両用軽戦車,Type 63 LT
Variant2=63式水陸両用軽戦車,Type 63 LT
Variant3=63式水陸両用軽戦車,Type 63 LT
Variant4=63式水陸両用軽戦車,Type 63 LT
Variant5=63式水陸両用軽戦車,Type 63 LT
Variant6=63式水陸両用軽戦車,Type 63 LT
Variant7=63式水陸両用軽戦車,Type 63 LT

[pla_spaag_type63]
Type=自走式対空砲
Default=63式自走対空機関砲,Type 63 SPAAG
DefaultDescription=T-34の車体に61式 37mm連装機関砲を搭載した砲塔を組み合わせて製造された。ベトナム戦争中、中国から北ベトナム軍に供給された（ただしその出自については諸説ある）。戦後は北ベトナム軍と中国人民解放軍の双方で運用され、1990年に退役した。

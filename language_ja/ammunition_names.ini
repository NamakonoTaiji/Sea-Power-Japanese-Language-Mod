[AmmunitionNames]
# ------------------ AAM ------------------
fr_super-530f=Super-530F,,AAM,シュペル 530Fは、フランス製の短・中距離セミアクティブ・レーダー誘導空対空ミサイル。AIM-7 スパローに概ね匹敵し、先行するR530ミサイルの改良型にあたる。
fr_r550=R550,Magic 1,AAM,R550 マジック1は、フランス製の短距離赤外線誘導空対空ミサイル。米国のAIM-9に匹敵する性能を持つ。後方（リア・アスペクト）攻撃専用。

pla_pl-2=PL-2A,,IR AAM,PL-2A（霹雳-2）は、中国製の赤外線誘導空対空ミサイル。ソ連のヴィンペル K-13のコピーであり、性能もほぼ同等。後方（リア・アスペクト）攻撃専用。
pla_pl-2b=PL-2B,,IR AAM,PL-2B（霹雳-2）は、中国製の赤外線誘導空対空ミサイル。PL-2Aと比較して、シーカーを収めるノーズコーンが延長されるなどの改良が施されているが、基本的には信頼性を向上させたマイナーチェンジモデルである。
pla_pl-5b=PL-5B,,IR AAM,PL-5B（霹雳-5）は、中国製の赤外線誘導空対空ミサイル。開発に失敗したレーダー誘導型のPL-5Aから派生したモデルである。PL-2B譲りの赤外線シーカーを使用しているが、機体設計が刷新されており、射程と旋回性能が向上している。後方（リア・アスペクト）攻撃専用。
pla_pl-5c=PL-5C,,IR AAM,PL-5C（霹雳-5）は、中国製の全方位（オールアスペクト）赤外線誘導空対空ミサイル。PL-2およびPL-5Bシリーズを大幅に改良したモデルであり、最先端のクロスドアレイ・シーカーを採用したことで、全方位からの射撃能力と高い対フレア抗堪性を獲得した。ロケットモーターの燃焼時間延長と旋回性能の向上も図られている。

usaf_aim-9e=AIM-9E,Sidewinder,AAM,AIM-9E サイドワインダーは、アメリカ製の赤外線誘導空対空ミサイル。E型（エコー）は初期型からあらゆる面で性能が向上しており、目標補足範囲と射程が拡大した。後方（リア・アスペクト）攻撃専用。
usaf_aim-9j=AIM-9J,Sidewinder,AAM,AIM-9J サイドワインダーは、アメリカ製の赤外線誘導空対空ミサイル。J型（ジュリエット）はE型から制御システムが大幅に変更され、電子回路が真空管から固体素子（ソリッドステート）化された。撃墜率は向上しているが、依然として後方（リア・アスペクト）攻撃専用である。
usaf_aim-9p=AIM-9P,Sidewinder,AAM,AIM-9P サイドワインダーは、アメリカ製の赤外線誘導空対空ミサイル。P型（パパ）はJ型の輸出モデルであり、新型の信管、モーター、改良型シーカーを採用している。信頼性が向上し、側面方向からの射撃も可能となった。

usn_aim-7d=AIM-7D,Sparrow,AAM,AIM-7D スパローは、アメリカ製のセミアクティブ・レーダー誘導空対空ミサイル。D型（デルタ）は初期のC型（チャーリー）と比較して、高速な接近目標への対応が最適化されている。低空の目標に対しては著しく性能が低下し、最小射程も大きい。
usn_aim-7e=AIM-7E,Sparrow,AAM,AIM-7E スパローは、アメリカ製のセミアクティブ・レーダー誘導空対空ミサイル。E型（エコー）は以前の型と比較して射程と性能が向上している。低空の目標に対しては著しく性能が低下し、最小射程も大きい。
usn_aim-7e2=AIM-7E-2,Sparrow,AAM,AIM-7E-2 "ドッグファイト" スパローは、米国製のセミアクティブ・レーダー誘導空対空ミサイル。ベトナム戦争において戦闘機相手の性能不足が露呈したことを受け、初期のEcho型の派生型として開発された。最短射程の短縮、低高度性能の僅かな向上、および加速フェーズにおける機動性の強化を特徴とする。
usn_aim-7e4=AIM-7E-4,Sparrow,AAM,AIM-7E-4スパローは、米国製のセミアクティブ・レーダー誘導空対空ミサイルである。エコー4は米国海軍の改良型モデルであり、旧来の戦闘機よりも大幅に強力なレーダーを活用するよう設計され、ジャミングや対抗手段に対するシーカー特性も僅かに向上している。
usn_aim-7e4=AIM-7E-4,Sparrow,AAM,AIM-7E-4 スパローは、アメリカ製のセミアクティブ・レーダー誘導空対空ミサイル。F-14 トムキャット専用モデルであり、F-14の強力なレーダーに対応するとともに、ジャミングや妨害手段に対するシーカー特性がわずかに向上している。
usn_aim-7f=AIM-7F,Sparrow,AAM,AIM-7F スパローは、アメリカ製のセミアクティブ・レーダー誘導空対空ミサイル。F型（フォックストロット）はスパローIIIの機体を再設計し、射程延長のための新型ブースト・サステイン・モーターを搭載。信管とシーカーも改良され、あらゆる面で性能が強化された。しかし、依然として低空性能やECCM能力は卓越したものとは言えず、シーカーもミサイルの長射程を完全には活かしきれていない。
usn_aim-7m=AIM-7M,Sparrow,AAM,AIM-7M スパローは、アメリカ製のセミアクティブ・レーダー誘導空対空ミサイル。M型（マイク）はF型の改良版であり、新型のモノパルス・シーカーを採用したことで、シースキミング目標に対する有効性が向上し、ECCM能力も大幅に強化された。また、シーカーの刷新により実効射程も増大している。
usn_aim-9b=AIM-9B,Sidewinder,AAM,AIM-9B サイドワインダーは、アメリカ製の赤外線誘導空対空ミサイル。B型（ブラボー）はサイドワインダー・シリーズ最初の実用型である。後のモデルと比較して発射条件が厳しく、太陽などの他の熱源に惑わされやすい。当然ながら、後方（リア・アスペクト）攻撃専用である。
usn_aim-9c=AIM-9C,Sidewinder,AAM,AIM-9Cサイドワインダーは、米国製のセミアクティブ・レーダー誘導空対空ミサイルである。C型（チャーリー）は実戦配備された唯一のレーダー誘導型サイドワインダーであり、セミアクティブ・レーダー・シーカーを除けばD型（デルタ）と同一の設計である。これにより、より長射程でのオールアスペクト（全方位）攻撃が可能となった。海軍のF-8専用であったことや、搭乗員の間で不評であったことから、運用開始からわずか数年で退役した。
usn_aim-9d=AIM-9D,Sidewinder,AAM,AIM-9D サイドワインダーは、アメリカ製の赤外線誘導空対空ミサイル。D型（デルタ）はB型の改良型であり、シーカー、弾頭、射程が強化されている。後方（リア・アスペクト）攻撃専用。
usn_aim-9g=AIM-9G,Sidewinder,AAM,AIM-9G サイドワインダーは、アメリカ製の赤外線誘導空対空ミサイル。G型（ゴルフ）はD型の改良型で、発射可能角（オフボアサイト能力）が拡大され、諸外国にも輸出された。後方（リア・アスペクト）攻撃専用。
usn_aim-9h=AIM-9H,Sidewinder,AAM,AIM-9H サイドワインダーは、アメリカ製の赤外線誘導空対空ミサイル。H型（ホテル）はG型の回路を固体素子化したモデル。シーカー感度が向上したことで側面からの射撃が可能になり、機動性と信頼性も向上した。
usn_aim-9l=AIM-9L,Sidewinder,AAM,AIM-9L サイドワインダーは、アメリカ製の赤外線誘導空対空ミサイル。L型（リマ）はシリーズで初めて完全な全方位攻撃能力を備えた。従来の型と比べて捕捉範囲が劇的に改善されており、ヘッドオン状態での交戦も可能。ただし、後方からの射撃の方が捕捉距離は長くなる。
usn_aim-9m=AIM-9M,Sidewinder,AAM,AIM-9M サイドワインダーは、アメリカ製の赤外線誘導空対空ミサイル。M型（マイク）は現在運用されている中で最も近代的なモデルの一つ。L型をベースに対フレア能力の強化とシーカー射程の延長が図られている。
usn_aim-54a=AIM-54A,Phoenix,AAM,AIM-54A フェニックスは、アメリカ製のアクティブ・レーダー誘導空対空ミサイル。米軍の在庫の中で最も射程が長く、F-14 トムキャット専用の装備である。先進的なAWG-9レーダーと統合されることで、最大6目標への同時攻撃能力をF-14に提供する。ミサイルは発射後、中継誘導アップデートを受けながらオートパイロットで飛行し、終末フェーズで自らの中間アクティブ・レーダーを起動して目標を捕捉する。

wp_aa-2a=AA-2B,Atoll B,IR AAM,AA-2A アトール（ヴィンペル R-3S）は、ソ連製の後方攻撃用赤外線誘導空対空ミサイル。アメリカのAIM-9Bをリバースエンジニアリングしたもので、構造や性能に細かな差異はあるものの、実質的な性能は同一である。後方（リア・アスペクト）攻撃専用。
wp_aa-2c=AA-2C,Atoll C,SARH AAM,AA-2C アトール（ヴィンペル K-13/R-3R）は、ソ連製のセミアクティブ・レーダー誘導空対空ミサイル。リバースエンジニアリングされたAIM-9Bの機体をベースに、全く異なるレーダーシーカーを搭載している。捕捉能力や発射条件の厳しさはベースとなったアメリカ製ミサイルから引き継いでしまっている。
wp_aa-2d=AA-2D,Advanced Atoll D,IR AAM,AA-2D アドバンスド・アトール（ヴィンペル K-13M）は、ソ連製の赤外線誘導空対空ミサイル。アトール・シリーズの派生型だが、新型モーターとシーカーの採用により性能が大幅に向上している。
wp_aa-2-2=AA-2D,Advanced Atoll 2,IR AAM,AA-2-2 アドバンスド・アトール（ヴィンペル K-13M1）は、ソ連製の赤外線誘導空対空ミサイル。アトール・シリーズの派生型だが、新型モーターとシーカーの採用により性能が大幅に向上している。

wp_aa-3e=AA-3E,Advanced Anab,SARH AAM,AA-3E アドバンスド・アナブE（カリーニングラード R-98MR）は、ソ連製のセミアクティブ・レーダー誘導空対空ミサイル。Su-15およびYak-28P向けに設計された。米軍のF-102やF-106で運用されたAIM-4 ファルコンと同様、撃墜率を高めるためにレーダー誘導型と赤外線誘導型をペアで発射する運用思想に基づいている。
wp_aa-3f=AA-3F,Advanced Anab,IR AAM,AA-3F アドバンスド・アナブF（カリーニングラード R-98MT）は、ソ連製の赤外線誘導空対空ミサイル。Su-15およびYak-28P向けに設計された。米軍のF-102やF-106で運用されたAIM-4 ファルコンと同様、撃墜率を高めるためにレーダー誘導型と赤外線誘導型をペアで発射する運用思想に基づいている。
wp_aa-6a=AA-6A,Acrid,AAM,AA-6A アクリッド（ヴィンペル R-40R）は、ソ連製の長距離セミアクティブ・レーダー誘導空対空ミサイル。米国のXB-70 ヴァルキリーを迎撃するためにMiG-25P専用として開発された。1発のレーダー誘導型と1発の赤外線誘導型を同時に放つ運用ドクトリンが採用されている。
wp_aa-6b=AA-6B,Acrid,IR AAM,AA-6B アクリッド（ヴィンペル R-40T）は、ソ連製の長距離赤外線誘導空対空ミサイル。米国のXB-70 ヴァルキリーを迎撃するためにMiG-25P専用として開発された。1発のレーダー誘導型と1発の赤外線誘導型を同時に放つ運用ドクトリンが採用されている。
wp_aa-6c=AA-6C,Acrid,AAM,改良型AA-6C アクリッド（ヴィンペル R-40RD）は、ソ連製の長距離セミアクティブ・レーダー誘導空対空ミサイル。新型のMiG-25PD向けに開発され、最大射程が60kmまで延伸された。ドクトリンに基づき、赤外線型とのペアで運用される。
wp_aa-6d=AA-6D,Acrid,AAM,改良型AA-6D アクリッド（ヴィンペル R-40TD）は、ソ連製の長距離赤外線誘導空対空ミサイル。新型のMiG-25PD向けに開発され、最大射程が60kmまで延伸された。ドクトリンに基づき、レーダー誘導型とのペアで運用される。
wp_aa-7c=AA-7C,Apex,SARH AAM,AA-7C エイペックス（ヴィンペル R-24R）は、ソ連製の中距離セミアクティブ・レーダー誘導空対空ミサイル。1970年代半ばにMiG-23を装備するために開発された。米国のAIM-7Eに相当する性能を持ち、モノパルス・シーカーの採用によりECM耐性と発射後ロックオン（LOAL）能力を獲得している。
wp_aa-7d=AA-7D,Apex,IR AAM,AA-7D エイペックス（ヴィンペル R-24T）は、ソ連製の中距離赤外線誘導空対空ミサイル。MiG-23向けに開発された改良型。撃墜率向上のため、レーダー誘導型と併用されるドクトリンが取られている。
wp_aa-8=AA-8,Aphid,AAM,AA-8 アフィッド（ヴィンペル R-60M）は、ソ連製の短距離赤外線誘導空対空ミサイル。非常に広く輸出されており、親ソ連諸国で頻繁に遭遇することになる。AIM-9L以上の機動性を誇るが、依然として後方（リア・アスペクト）攻撃専用であり、発射母機は標的の背後を取る必要がある。
wp_aa-11=AA-11,Archer,AAM,AA-11アーチャー（ヴィンペルR-73A）は、ソ連製の短距離赤外線誘導空対空ミサイル。ソ連軍の兵装において最高の性能を誇る短距離ミサイルであり、諸外国の同種兵器に対しても極めて高い競争力を維持している。全方位（オール・アスペクト）攻撃能力を備え、短距離圏内では極めて致命的な兵器である。

# ------------------ SAM ------------------
jsdf_sam1=Tan-SAM 1,,SAM,日本製の全方位赤外線誘導短距離地対空ミサイル。81式短距離地対空誘導弾システムの一部である。

plan_hq-61=HQ-61,,SAM,HQ-61は中国の地対空ミサイルであり、中国人民解放軍海軍(PLAN)向けに開発された最初の艦対空ミサイルである。1980年代に制式採用されたが、同時代の他国製ミサイルと比較して性能は著しく劣っており、米国のRIM-7Eシースパローとほぼ同等の性能にとどまっている。

raf_rapier=FSB Rapier,Rapier,SAM,イギリス製の光学誘導短距離・低空点防衛ミサイルシステム。指令照準線一致（CLOS）誘導方式を採用しており、高速機やミサイルに対する有効性は条件によって変動する。

rn_seaslug_mk2=GWS-2,Sea Slug Mk.2,SAM,GWS-2シースラグMk.2は、初期のMk.1ミサイルの改良型であり、イギリス海軍における最初期の艦対空ミサイルシステムの一つである。高速かつ長時間推力を維持する迎撃能力を持つ一方、信頼性と命中精度の双方に難があり、低空目標や高速目標に対しては苦戦を強いられる。\n特筆すべき点として、本ミサイルは必要に応じて地上施設への攻撃にも転用可能だが、その際の精度は低い。
rn_seacat=GWS-21,Sea Cat Mk.1,SAM,GWS-21シーキャットは、艦載個別防空（ポイント・ディフェンス）ミサイルシステムの最初期の例である。1962年にイギリス海軍で就役し、ボフォース40mm機関砲の後継として広く輸出された。指令照準線一致（CLOS）誘導方式を採用しているが、高速ジェット機やミサイルに対する有効性には疑問符が付く。
rn_seacat_mk2=GWS-24,Sea Cat Mk.2,SAM,GWS-24 シーキャット Mk.2は、低空性能、射程、信頼性を向上させ、先進的な火器管制装置を組み合わせた改良モデル。しかし、依然としてミサイル自体の性能は低く、現代的な脅威に対しては力不足である。
rn_seadart=GWS-30,Sea Dart,SAM,GWS-30シーダートは、イギリス軍の標準的な艦載中距離地対空ミサイル（SAM）であり、シースラグSAMの後継にあたる。固体ロケット・ブースターとラムジェット・サステナーを搭載し、性能面ではアメリカのスタンダード・ミサイルに匹敵する。
rn_seawolf=GWS-25,Sea Wolf,SAM,GWS-25シーウルフはシーキャットの後継であり、航空目標やシースキミング・ミサイルに対する性能が大幅に向上している。高い命中精度を誇るが、あくまで超短射程の個別艦防空（ポイント・ディフェンス）SAMであり、確実に防護できるのは自艦のみで、付近の味方ユニットまで守ることはできない。

usa_mim-14=MIM-14,Nike Hercules,SAM,MIM-14 ナイキ・ハーキュリーズは、米国およびNATO諸国で使用された地対空ミサイル。中・高高度の防空を担う。
usa_mim-23=MIM-23,Hawk,SAM,1960年代に米国で開発された移動式中距離地対空ミサイルシステム「ホーク」。高出力イルミネーター・レーダー（HPIR）によるセミアクティブ・レーダー誘導を使用する。高高度目標はパルス捕捉レーダー（PAR）、地表付近の目標は連続波捕捉レーダー（CWAR）で探知する重層的な構成となっている。

usn_rim-2f=RIM-2F,Terrier,SAM/ASuW,RIM-2F テリアは、アメリカ海軍が導入した最初期の地対空ミサイルの一つ。空母打撃群において戦闘機と対空砲の間を埋める中距離防空網として考案された。初期型はビームライディング方式だったが、このRIM-2Fは機動性と撃墜率を高めたセミアクティブ・レーダー誘導型である。他のSAMと同様、二次的に対水上攻撃にも使用可能。発射間隔はブースターフィンの手動組み立てが必要なため制限され、1基の発射機で30秒ごとに2発の発射が可能。
usn_rim-24b=RIM-24B,Tartar,SAM/ASuW
usn_rim-8=RIM-8J,Talos,SAM/ASuW,RIM-8Jタロスは、主にアメリカ海軍の巡洋艦で運用される巨大な長距離艦対空ミサイル・システム。中間誘導にビームライディング方式、終末誘導にセミアクティブ・レーダー・ホーミング方式を採用している。本ミサイルは発射前に組み立て作業を必要とするため、システムの弾薬庫が極めて巨大であることからも分かるように、より近代的なシステムに比べて発射速度は低い。
usn_rim-7=RIM-7E,Sea Sparrow,SAM/ASuW,RIM-7E シースパローは、NATO諸国の艦艇における主要な点防衛ミサイル。この最初期モデルは空対空型のAIM-7Eと同一の性能を持つが、艦船発射による射程と速度の低下が著しく、有効射程は極めて短い。また、AIM-7Eゆずりのシーカー特性により、低空での迎撃能力には難がある。
usn_rim-7h=RIM-7H,Sea Sparrow,SAM/ASuW,RIM-7H シースパローは、NATO諸国の艦艇における主要な点防衛ミサイル。H型（ホテル）は基本性能こそE型に近いが、新型発射機に適合させるための折り畳み翼を採用し、信頼性がわずかに向上している。
usn_rim-7m=RIM-7M,Sea Sparrow,SAM/ASuW,RIM-7M シースパローは、NATO諸国の艦艇における主要な点防衛ミサイル。M型（マイク）は空対空型のAIM-7Mをベースにしており、射程と速度こそ低下しているものの、シリーズで初めてシースキミング機やミサイルへの対処能力を獲得した。短射程ながら信頼性の高い点防衛兵器となっている。
usn_rim-66a=RIM-66A,SM-1MR,SAM/ASuW,RIM-66Aスタンダード1 MRは、以前RIM-24Cターターを使用していた艦艇向けの新型弾薬として開発された。物理的統合を容易にするため、ターターと共通の胴体設計を採用している。A型は最初期の派生型であり、1967年に運用を開始した。
usn_rim-66b=RIM-66B,SM-1MR,SAM/ASuW,RIM-66Bスタンダード1 MRは、以前RIM-24Cターターを使用していた艦艇向けの新型弾薬として開発された。物理的統合を容易にするため、ターターと共通の胴体設計を採用している。B型は新しい構成部品を採用したA型の大幅なアップグレード版であり、A型の多くがB型へと改修された。
usn_rim-66e=RIM-66E,SM-1MR,SAM/ASuW,RIM-66Bスタンダード・ミサイル1MR(SM-1MR)は、かつてRIM-24Cターターを運用していた艦艇向けの新型火器として開発された。物理的統合を容易にするため、本ミサイルはターターと共通の胴体設計を採用している。E型はB型の電子機器を再設計したもので、SM-2MRのコンポーネントを導入しており、限定的ながらシースキミング巡航ミサイルへの交戦能力を有する。
usn_rim-66g=RIM-66G,SM-2MR,SAM/ASuW,RIM-66G スタンダードミサイル2 MR Block IIは、米海軍の最新鋭水上戦闘艦に搭載された新型イージス武器システム（AWS）、および旧来の艦艇に施された「新脅威改修（NTU）」における中核兵器である。旧式のスタンダードミサイル1（SM-1）よりも高い能力を誇り、目標への照射時間の短縮によって、より多くのミサイルを同時誘導することが可能となった。\nBlock II仕様のSM-2MRは、従来のBlock Iと比較して2倍以上の射程を誇る。さらに高速目標への対処能力が向上し、最低迎撃高度も引き下げられているが、シースキマーへの対処能力に関しては未だ完全とは言い難い。\n\nRIM-66Gは、タイコンデロガ級ミサイル巡洋艦（初期型）のような、Mk 26連装ミサイル発射機を装備したイージス艦で運用されるSM-2MR Block IIの派生型である。
usn_rim-66c=RIM-66C,SM-2MR,SAM/ASuW,RIM-66Cスタンダード2 MRは、米海軍の最新鋭水上戦闘艦に搭載されるイージス武器システム、および旧型艦に適用されるNTU（新脅威改修）の根幹を成す。旧来のSM-1よりも高性能であり、イルミネーターによる目標照射時間を短縮することで、より多くのミサイルの同時誘導が可能となった。
usn_rim-67a=RIM-67A,SM-1ER,SAM/ASuW,RIM-67Aスタンダード1 ERは、RIM-8タロスを代替する新型弾薬として開発された。ミサイル本体はRIM-66Aと同一だが、射程延伸のため追加のブースターが装着されている。
usn_rim-67b=RIM-67B,SM-2ER,SAM/ASuW,RIM-67Bスタンダード2 ERは、かつてRIM-2テリアを搭載していた艦艇向けのNTU（新脅威改修）における中心兵装である。事実上RIM-66Cと同一の機体だが、射程延伸のため追加のブースターが装着されている。
usn_rim-67c=RIM-67C,SM-2ER,SAM/ASuW,RIM-67Cスタンダードミサイル2ERは、かつてRIM-2テリアを運用していた艦艇に適用された「新脅威改修（NTU）」の中核を成す兵器である。本弾はRIM-66Cと事実上の同等品であるが、射程延伸のために追加ブースターを装備している。\nBlock II仕様のSM-2ERは、従来のBlock Iと比較して速力と射程が向上し、高速目標への対処能力も強化されている。また、初期のスタンダードミサイルに比べて最低迎撃高度が引き下げられているが、シースキマーに対する有効性は未だ完全ではない。

wp_sa-n-1=SA-N-1,Goa,SAM/ASuW,SA-N-1 ゴア（M-1 ヴォルナ）は、ソ連最初期の艦隊防空ミサイルシステム。広域防空と対艦ミサイル防御を目的としている。当初は高高度の目標にしか有効ではなかったが、後の改良型では対水上攻撃能力や低空目標への対処能力、射程の延伸が図られた。
wp_sa-n-1c=SA-N-1C,Goa,SAM/ASuW,SA-N-1C ゴア（M-1 ヴォルナP）は、最初期モデルの改良型。対ジャミング・対チャフ性能が強化され、低空飛行目標への対応能力も向上している。
wp_sa-n-3=SA-N-3,Goblet,SAM/ASuW,SA-N-3 ゴブレット（M-11 シュトールム）は、ソ連の艦載地対空ミサイルシステム。多くのミサイル巡洋艦やヘリコプター巡洋艦、STOVL空母に搭載された。二次的な対水上攻撃能力を持ち、後期型では低空目標への性能も改善されている。
wp_sa-n-4=SA-N-4,Gecko,SAM/ASuW,SA-N-4 ゲッコー（9K33M オサM）は、陸上用のSA-8 ゲッコーの海軍仕様。格納式の旋回発射機に2発のミサイルを装備する。ソ連の多くの艦艇に短距離防空兵器として搭載されている。
wp_sa-n-5=SA-N-5,Grail,SAM,SA-N-5 グレイル（9K32 ストレラ-2）は、陸上ではSA-7として知られる携帯式防空ミサイル（MANPADS）の艦載版。艦上では簡易的な点防衛システムとして運用される。
wp_sa-n-6=SA-N-6,Grumble,SAM/ASuW,SA-N-6 グランブル（S-300F）は、陸上用のSA-10（S-300P）を海軍仕様にしたもの。ソ連のミサイル巡洋艦に搭載される強力な長距離システムであり、米国のSM-2に匹敵する性能を誇る。
wp_sa-n-7=SA-n-7,Gadfly,SAM/ASuW,SA-N-7 ガドフライ（3S90 ウラガン）は、陸上用のSA-11 ガドフライ（9K37 ブーク）の海軍仕様。洗練された高性能なシステムであり、ソヴレメンヌイ級駆逐艦から配備が開始された。
wp_sa-n-9=SA-n-9,Gauntlet,SAM/ASuW,SA-N-9 ガントレット（3K95 キンジャール）は、陸上用のSA-15 ガントレット（9K330 トール）の海軍仕様。垂直発射方式を採用しており、ソ連の主要な水上戦闘艦の多くに搭載されている。

wp_sa-2=SA-2,Guideline,SAM,SA-2 ガイドライン（S-75 ドヴィナ）は、ソ連の長距離地対空ミサイル。広範囲の爆撃機迎撃を目的として広く輸出され、ベトナム戦争で最もその名を馳せた。
wp_sa-3=SA-3,Goa,SAM,SA-3 ゴア（S-125 ネヴァ/ペチョラ）は、ソ連の中距離地対空ミサイル。より機動力の高い目標や低空飛行する目標への対応を目的としている。
wp_sa-4=SA-4,Ganef,SAM,SA-4 ガネフ（2K11 クルーグ）は、ソ連の移動式中距離地対空ミサイル。広範囲にわたる爆撃機の脅威に対抗するために設計された。
wp_sa-5=SA-5,Gammon,SAM,SA-5 ガモン（S-200）は、ソ連の超長距離地対空ミサイル。極めて高高度を飛行する爆撃機を遠距離で迎撃することを目的としている。ミサイルにはホーム・オン・ジャム（妨害源追尾）能力が備わっている。
wp_sa-6=SA-6,Gainful,SAM,SA-6 ゲインフル（2K12 クブ）は、ソ連の移動式地対空ミサイル。約15マイル（約24km）までの近距離の脅威を排除することを目的としている。
wp_sa-8=SA-8,Gecko,SAM,SA-8 ゲッコー（9K33M3 オサ）は、ソ連の自走式地対空ミサイル。戦車師団や自動車化狙撃師団に随伴し、野戦防空を提供することを目的としている。
wp_sa-11=SA-11,Gadfly,SAM,SA-11 ガドフライ（9K37 ブーク）は、ソ連の移動式地対空ミサイル。約18マイル（約29km）までの短距離の脅威を排除することを目的としている。
wp_sa-13=SA-13,Gopher,SAM,SA-13 ゴーファー（9K35 ストレラ-10）は、ソ連の高い機動性を持つ短距離地対空ミサイル。ヘリコプターなどの低空から突如出現する脅威への対処を目的としている。

# ---------- Anti-radar Missiles ---------
usn_agm-45=AGM-45B,Shrike,ARM,AGM-45 シュライクは、AIM-7 スパローの機体に新型シーカーを組み合わせたアメリカ製の対レーダーミサイル。射程が短く、速度や弾頭威力も平凡で、対応できる周波数帯（S、C、Xバンド）も限られているが、安価で軽量なため広く使用されている。
usn_agm-78=AGM-78D,Standard ARM,ARM,AGM-78 スタンダードARM（STARM）は、強力な防空陣地を射程外から叩くために開発されたアメリカの長距離対レーダーミサイル。SM-1MR 艦対空ミサイルから派生しており、長時間燃焼するサステイン・モーターと山なりの飛行プロファイルにより長射程を実現している。強力な弾頭により、命中したレーダーシステムを確実に粉砕する。非常に高価で希少な兵器である。
usn_agm-88a=AGM-88A,HARM,ARM,AGM-88A HARM（高速対レーダーミサイル）は、あらゆるカテゴリーで卓越した性能を誇るアメリカの長距離対レーダーミサイル。1985年時点でNATOで最も近代的なARMであり、信頼性と最大速度において先代を圧倒している。配備初期のため、運用数は限られている。
usn_agm-122a=AGM-122A,Sidearm,ARM,AGM-122A サイドアームは、主にヘリコプターや固定翼機で使用される短距離戦術対レーダーミサイル。短命に終わったAIM-9Cをベースにしており、突如出現する短距離防空（SHORAD）目標を排除するのに効果的だが、本格的な防空網に正面から挑むのには向いていない。

usn_rim-8h=RIM-8H,Talos ARM,ARM,RIM-8Hタロスは、RIM-8タロスSAMの対レーダー仕様であり、その巨大な機体を生かして艦載対レーダーミサイル（ARM）としては極めて長い射程と高い速度を誇る。SAMをベースとしているものの、本ミサイルに対空能力はなく、レーダー波を発信している水上目標のみを攻撃可能である。

wp_as-11=AS-11,Kilter,ARM,AS-11キルター（Kh-58）は、Su-24M攻撃機への搭載用に開発されたソ連の対放射ミサイル。ソ連空軍で最も先進的なARMの一つであり、超音速飛行時に発射することで極めて長い射程を実現する。
wp_as-12=AS-12,Kegler,ARM,AS-12ケグラー（Kh-25MP）は、ソ連の空中発射型超音速中距離対レーダーミサイル。ソ連軍で最も一般的に運用されているARMであり、米国のAGM-45シュライクにほぼ匹敵する。

wp_as-2b=AS-2B,Kipper,ASM,K-10SPはK-10Sの派生型であり、弾頭をアザリヤ・ジャミングシステムに換装している。

# ---------- Anti-ship Missiles ----------
is_gabriel_2=Gabriel 2,,ASM,ガブリエルは、世界最初期のシースキミング対艦ミサイルの一つを自負するイスラエル製の兵器。Mk.2は初期型を改良したモデルだが、基本設計は酷似している。

it_seakiller_2=Sea Killer 2,,ASM,シーキラー2は、イタリアで開発された短距離対艦ミサイル。イラン海軍のアルヴァンド級フリゲートに装備され、5連装発射機に搭載された。
it_otomat_mk1=Otomat MK1,,ASM,オトマート Mk.1は、イタリアとフランスの共同開発による中距離対艦ミサイル。

jasdf_asm-1=ASM-1,,ASM,ASM-1（80式空対艦誘導弾）は、日本製の空対艦ミサイル。スタンドオフ距離からの攻撃が可能である。

fr_as12=AS.12,,ASM,AS.12はフランス製の指令誘導式短距離ヘリコプター発射型空対艦ミサイル。SS.11対戦車誘導弾（ATGM）の改良型であり、ロケットモーターの延長と弾頭の大幅な大型化が図られている。舟艇や小型艦艇に対して深刻な脅威となり得る兵器である。
fr_am-39=AM39,Exocet,ASM,AM39 エグゾセは、フランス製のスタンドオフ対艦ミサイル。ハープーンに代わる兵器として、NATO諸国や多くの国々で採用されている。AM39は空中発射型である。
fr_mm-38=MM38,Exocet,ASM,MM38 エグゾセは、フランス製のスタンドオフ対艦ミサイル。水上発射型バリアントである。

knm_penguin_mk2=AGM-119,Penguin Mk2,ASM,AGM-119 ペンギンは、ノルウェーが米国と協力して開発した小型の対艦ミサイル。空中および水上の双方から発射可能。

plan_sy-1=SY-1,Scrubbrush,ASM,SY-1（上游-1）は、ソ連のスティックス（Styx）ミサイルを中国がライセンス生産したもの。
plan_sy-1a=SY-1A,,ASM,SY-1Aは、ソ連のスティックスをベースにした中国独自の発展型。
plan_hy-1=HY-1,Safflower,ASM,HY-1（海鷹-1）は、ソ連のスティックスをベースにした中国の対艦ミサイル。
plan_hy-1j=HY-1J,Safflower,ASM,HY-1Jは、HY-1の改良バリアント。
plan_hy-1a=HY-1A,Safflower,ASM,HY-1AはHY-1Jの改良型。シーカーが刷新され、より低高度の飛行プロファイルを持つため、迎撃が困難になっている。
plan_hy-2=HY-2,Seersucker,ASM,HY-2（海鷹-2）はスティックス系の更なる発展型。射程が延伸され、ソ連のP-20に概ね匹敵する。
pla_hy-3=HY-3,Sawhorse,ASM,HY-3（海鷹-3）はラムジェット推進の沿岸防衛用超音速対艦ミサイル。最高速度マッハ 2.5、射程は130～180kmに達する。1990年代初頭に開発が完了したが、正式採用には至らなかった。
pla_yj-1=YJ-1,Saples,ASM,YJ-1は空中発射型の短距離超音速対艦ミサイルであり、マッハ2を超える速度と終末段階でのシースキミング（海面追随）飛行を特徴とする。本ミサイルは制式採用には至らなかったが、1980年代後半に少数の先行量産型が供給され、主にSH-5飛行艇での運用が想定されていた。
pla_yj-6=YJ-6,Kraken,ASM,YJ-6は中国の空中発射型対艦ミサイルであり、地上/艦載型のSY-1/HY-1をベースに開発された。空中発射により射程が延伸されているが、初期型のシーカーを搭載しているため、他の初期型スティックスやシルクワームと同様にカウンターメジャーに対して脆弱である。
plan_yj-8=YJ-8,Sardine,ASM,YJ-8（鷹撃-8）は中国の対艦ミサイルであり、フランスのエグゾセに概ね匹敵する。発射後、20～30mまで上昇した後、終末フェーズでは5～7mの高度をシースキミングで飛行して攻撃する。

rn_sea_skua=Sea Skua,,ASM,シースクアはイギリス製の短距離対艦ミサイル。

usn_agm-12b=AGM-12B,Bullpup,ASM,AGM-12 ブルパップは、アメリカ製の空中発射型超音速スタンドオフ誘導兵器。ソ連のAS-7と同様、オペレーターが手動でミサイルを誘導する必要があり、機体を標的に向かって直線的に飛ばし続けなければならないという重大な欠点がある。
usn_agm-123=AGM-123,Skipper,ASM,スキッパーは、ペイブウェイIIレーザー誘導爆弾にロケットブースターを組み合わせたアメリカの中短距離対艦ミサイル。ハープーンの使用が困難なペルシャ湾のような混雑した海域において、誤射のリスクを抑えつつ長射程を得るために開発された。
usn_agm-84a=AGM-84A,Harpoon,ASM,ハープーンは、NATO諸国で広く採用されているアメリカのスタンドオフ対艦兵器。あらかじめ設定されたルートを飛行し、終末フェーズでアクティブ・レーダー・シーカーを起動する。AGM-84は空中発射型である。
usn_agm-84c=AGM-84C,Harpoon,ASM,ハープーンは、NATO諸国で広く採用されているアメリカ製のスタンドオフ対艦兵器である。本兵器は、事前にプログラムされた経路を飛行した後、アクティブ・レーダー・シーカーを起動して目標を捜索する。AGM-84Cは空中発射型であり、終末段階でのポップアップ機動は行わず、シースキミング（海面追随）飛行によって艦艇をより効果的に攻撃する。
usn_agm-84d=AGM-84D,Harpoon,ASM,AGM-84Dは1985年に登場した改良型ハープーン。ECCM能力が強化され、燃料の改良により射程が延伸されている。

usn_rgm-84a=RGM-84A,Harpoon,ASM,ハープーンの水上発射型。近接防御兵器（CIWS）を回避するため、終末フェーズでポップアップ機動を行う。
usn_rgm-84c=RGM-84C,Harpoon,ASM,ハープーンは、NATO諸国で広く採用されているアメリカ製のスタンドオフ対艦兵器である。本兵器は、事前にプログラムされた経路を飛行した後、アクティブ・レーダー・シーカーを起動して目標を捜索する。RGM-84Cは水上発射型であり、終末段階でのポップアップ機動は行わず、シースキミング（海面追随）飛行によって艦艇をより効果的に攻撃する。
usn_rgm-84d=RGM-84D,Harpoon,ASM,ハープーンは、NATO諸国で広く採用されているアメリカ製のスタンドオフ対艦兵器である。本兵器は、事前にプログラムされた経路を飛行した後、アクティブ・レーダー・シーカーを起動して目標を捜索する。RGM-84Dは水上発射型である。1985年に登場した改良型であり、ECCM（対電子防護）能力の向上に加え、燃料の改良によって射程が延伸されている。
usn_ugm-84b=UGM-84B,Harpoon,ASM,ハープーンの潜水艦発射型。ポップアップ機動を行わないモデル。

usn_ugm-84a=UGM-84A,Harpoon,ASM,ハープーンの潜水艦発射型。使い捨てのカプセルを用いて水中から発射され、終末フェーズでポップアップ機動を行う。
usn_ugm-84b=UGM-84B,Harpoon,ASM,ハープーンは、NATO諸国で広く採用されているアメリカ製のスタンドオフ対艦兵器である。本兵装はあらかじめプログラミングされた経路を飛行した後、アクティブ・レーダー・シーカーを起動する。UGM-84Bはイギリス海軍向けに特別に製造された潜水艦発射型である。初期のUGM-84Aとは異なり、終末段階でのポップアップ機動は行わず、シースキミング（海面追随）飛行によってより効果的に艦艇を攻撃する。
usn_ugm-84c=UGM-84C,Harpoon,ASM,ハープーンは、NATO諸国で広く採用されているアメリカ製のスタンドオフ対艦兵器である。本兵装はあらかじめプログラミングされた経路を飛行した後、アクティブ・レーダー・シーカーを起動する。UGM-84Cは使い捨てキャニスターを使用した潜水艦発射型である。初期のUGM-84Aとは異なり、終末段階でのポップアップ機動は行わず、シースキミング（海面追随）飛行によってより効果的に艦艇を攻撃する。
usn_ugm-109b=UGM-109B,Tomahawk,ASM,RGM-109B トマホーク対艦ミサイル（TASM）は、アメリカ製のスタンドオフ対艦兵器である。本兵装はあらかじめプログラミングされた経路を飛行した後、アクティブ・レーダー・シーカーを起動し、欺瞞機動を交えた索敵パターンでの飛行が可能である。\nこれは魚雷発射管からのみ展開される潜水艦発射モデルである。

wp_as-2=AS-2,Kipper,ASM,AS-2 キッパー（K-10S）は、Tu-16に搭載されるソ連の空中発射型超音速スタンドオフ対艦ミサイル。水上発射型のSS-N-3に近い性能を持つが、現代的な防空網に対しては脆弱性が否めない。
wp_as-4=AS-4,Kitchen,ASM,AS-4 キッチン（Kh-22）は、Tu-22MやTu-95に搭載されるソ連の空中発射型超音速スタンドオフ対艦ミサイル。高高度を高速で飛行し、終末フェーズで超音速ダイブを行うため、迎撃は極めて困難である。
wp_as-6=AS-6,Kingfish,ASM,AS-6 キングフィッシュ（Kh-26）は、Tu-16に搭載される空中発射型超音速スタンドオフミサイル。AS-4の小型版とも言える存在で、同様に高速高高度からの終末ダイブを行い、迎撃側を圧倒する。
wp_as-7=AS-7,Kerry,ASM,AS-7 ケリー（Kh-23 グロム）は、ソ連の空中発射型超音速スタンドオフ誘導兵器。米国のブルパップと同様の手動指令誘導方式であり、同様の運用上の欠点を持つ。
wp_as-10=AS-10,Karen,ASM,AS-10 カレン（Kh-25/Kh-25M）は、ソ連の空中発射型超音速スタンドオフミサイル。レーザー誘導を採用しており、撃ちっぱなしに近い運用が可能。
wp_as-13=AS-13,Kingbolt,ASM,AS-13 キングボルト（Kh-59 オヴォド）は、ソ連の空中発射型亜音速スタンドオフミサイル。慣性誘導でプログラムされた座標へ向かい、終末フェーズでTV誘導に切り替えて標的を捉える。
wp_as-14a=AS-14A,Kedge,ASM,AS-14A ケッジ（Kh-29L）は、ソ連の空中発射型超音速空対地ミサイル。強力な弾頭とレーザー誘導を備える。
wp_as-14b=AS-14B,Kedge,ASM,AS-14B ケッジ（Kh-29T）は、TV誘導を採用したモデル。夜間性能は低下するが、より遠距離からの攻撃が可能となっている。

wp_ss-n-2=SS-N-2,Styx,ASM,SS-N-2 スティックス（P-15 テルミート）は、ソ連の亜音速水上発射型対艦ミサイル。中国でも「シルクワーム」としてライセンス生産された。沿岸部の地上施設への攻撃も可能である。
wp_ss-n-2c=SS-N-2C,Styx,ASM,SS-N-2C スティックス（P-15 テルミートM）は改良型モデル。射程が延伸され、ECCM能力が向上している。
wp_ss-n-3=SS-N-3,Shaddock,ASM,SS-N-3 シャドック（P-35）は、ソ連の水上発射型亜音速対艦ミサイル。登場時は脅威であったが、亜音速かつ高高度を飛行する特性は、現代の地対空ミサイルの格好の標的となる。また、誘導中はずっと発射母艦がミサイルとの通信を維持しなければならず、潜水艦であっても攻撃中は浮上し続けなければならないという致命的な弱点がある。
wp_ss-n-3b=SS-N-3B,Sepal,ASM,SS-N-3B セパル（プログレス）はP-35の改良型。飛行高度の低下と、ジャミングやチャフに対する抗堪性が向上している。
wp_ss-n-7=SS-N-7,Starbright,ASM,SS-N-7 スターブライト（P-70 アメチースト）は、ソ連の潜水艦発射型対艦ミサイル。潜航中の潜水艦から発射可能な世界初の対艦ミサイルである。比較的短射程であり、後にSS-N-9 シレーンに置き換えられた。
wp_ss-n-9=SS-N-9,Siren,ASM,SS-N-9 シレーン（P-120 マラヒート）は、ソ連の水上発射型亜音速対艦ミサイル。スティックスよりも高速かつ長射程であり、終末フェーズでの回避機動が可能。
wp_ss-n-12=SS-N-12,Sandbox,ASM,SS-N-12 サンドボックス（P-500 バザルト）は、SS-N-3の後継として開発された超音速対艦ミサイル。先代よりも遥かに高速で、ミサイル間データリンクを備えている。これにより、斉射されたうちの1発だけが高高度を飛んで「目」となり、残りのミサイルは低高度で接近するという高度な運用が可能。生存性を高める防御用ECMも搭載している。
wp_ss-n-19=SS-N-19,Shipwreck,ASM,SS-N-19 シップレック（P-700 グラニート）は、ソ連の超音速スタンドオフ対艦兵器。高度なミサイル間データリンクにより、斉射された複数のミサイルが自律的に目標を分配する能力を持つ。終末フェーズでの回避機動、オンボードECM、デコイ、さらにはCIWSの破片に耐える装甲までも備えている。あらゆる尺度から見て、極めて恐るべき兵器である。
wp_ss-n-22=SS-N-22,Sunburn,ASM,SS-N-22 サンバーン（P-270 モスキート）は、ソ連の超音速シースキミング対艦ミサイル。終末フェーズにおいて超音速で海面スレスレを飛行しながら、激しい蛇行機動（スネーキング）を行うことで、敵の防空網を突破する。

#----------- Land Strike only missiles---------
wp_as-4b=AS-4B,Kitchen-B,Land Attack,AS-4B キッチン（Kh-22MP シュトルム）は、ソ連製の超音速スタンドオフ対地ミサイル。

fr_as11=AS.11,,Land Attack,AS.11（SS.11）は、フランス製の指令誘導式短距離対戦車ミサイル。本モデルは戦車攻撃用の成形炸薬弾頭ではなく、小型舟艇への攻撃を目的とした半徹甲弾頭を装備している。

usn_agm-65b=AGM-65B,Maverick,Land Attack,AGM-65Bは、アメリカ製のTV誘導式空対地スタンドオフ兵器。発射母機のオペレーターがレティクル（十字線）を目標に合わせることでミサイルが目標を捕捉し、発射後はAGM-62ウォールアイと同様に自律誘導される。
usaf_agm-86c=AGM-86C,CALCM,Land Attack,従来型空中発射巡洋ミサイル（CALCM）は、アメリカ製の空中発射型スタンドオフ対地ミサイルであり、B-52の主力兵装である。発射後は母機からの入力を必要とせず、地形照合レーダーと内蔵デジタル地図を用いた地形等高線照合（TERCOM）によって事前プログラムされた経路を自律飛行する。

usn_rgm-109c=RGM-109C,Tomahawk,Land Attack,トマホーク対地攻撃ミサイル（TLAM）は、アメリカのスタンドオフ対地ミサイル。地形照合（TERCOM）レーダーと内部のデジタル地図を用いて自律飛行し、発射後は母機からの入力を必要とせずに目標を正確に捉える。

usn_ugm-109c=UGM-109C,Tomahawk,Land Attack,UGM-109Cトマホーク対地攻撃ミサイル（TLAM）は、アメリカ製の対地スタンドオフミサイルである。発射後は母機からの制御を一切必要とせず、地形マッピングレーダーと内蔵のデジタル地図を用いた地形照合（TERCOM）により、事前プログラムされた経路に従って目標まで自律飛行する。\nこれは魚雷発射管からのみ運用される潜水艦発射モデルである。潜水艦からの発射にあたっては燃料を最大まで搭載できない制約があるため、水上艦発射型と比較して射程が若干短縮されている。

usa_bgm-71a=BGM-71A,BGM-71A TOW,Land Attack,BGM-71 TOWは、アメリカ製の有線誘導対戦車ミサイル。ヘリコプターや装甲車から運用される。

wp_at-6=AT-6,Spiral,Land Attack,AT-6スパイラル（9M114ココン）は、ソ連製の超音速対戦車誘導弾。Ka-29やMi-24などの攻撃ヘリコプターで運用される。長射程、高速、そして強力な弾頭を備えているのが特徴である。

wp_at-10=AT-10,Sabber,Land Attack,AT-10 サバーは、T-55M戦車などで使用されるソ連の対戦車誘導ミサイル。


ran_ikara=GWS-40,Ikara,ASW,GWS-40 イカラは、ロケットモーター推進のオーストラリア製対潜巡航ミサイルである。Mk-46またはMk-44魚雷を運搬し、目標付近で投下することで水中脅威を撃破する。米国のASROCの2倍の射程を誇る一方で速度はやや遅く、発射機の構成上、複数を迅速に連続発射することはできない。

usn_rur-5=RUR-5,ASROC,ASW,RUR-5 アスロック（Anti-Submarine Rocket）は、スタンドオフ対潜兵器。艦船から発射され、弾道飛行の末にMk 46対潜魚雷を投下する。

wp_apr-2=APR-2,,ASW,APR-2は、ソ連の空中投下型対潜魚雷。シーカー射程は0.75海里、水深600mまでの潜水艦に対処可能。
wp_ss-n-14a=SS-N-14A,Silex,ASW,SS-N-14 サイレックス（メテール）は、ソ連の対潜スタンドオフ兵器。小型巡洋ミサイルの機体の下に魚雷を懸架し、目標付近で投下する。
wp_ss-n-14b=SS-N-14B,Silex-B,ASW/ASuW,SS-N-14 サイレックスB（ラストルブ）は、対潜および対水上の双方に使用可能なデュアルパーパス・スタンドオフ兵器。
wp_ss-n-16=SS-N-16,Stallion,ASW,SS-N-16 スタリオン（ヴォドパート）は、ソ連の潜水艦発射型対潜兵器。弾道飛行を経て標的付近に魚雷を投下する。

# ------------------ RBU ------------------
knm_terne_shell=Terne III Mortar,,ASW Mortar,テルネは、1960年代にノルウェーで開発されたロケット推進式対潜兵器システム。

plan_type62dc=FQF-1200,,ASW Mortar,FQF-1200は、中国製の5連装対潜ロケット発射機。
plan_type75dc=FQF-2500,,ASW Mortar,FQF-2500は、中国製の12連装対潜ロケット発射機。

rn_limbo_shell=LIMBO Mortar,,ASW Mortar,リンボー（対潜迫撃砲 Mk 10）は、1950年代にイギリスで開発された対潜迫撃砲。艦載ソナーのデータを基に、3発の爆雷を標的周囲に三角形のパターンで投下する。
rn_squid_shell=SQUID Mortar,,ASW Mortar,スクイッドは、第二次世界大戦期にイギリスで開発された対潜迫撃砲。

swe_375mm_rocket=Bofors M/50,,ASW Mortar,ボフォース M/50は、スウェーデン製の375mm対潜ロケット発射機。

wp_rgb-10=RBU-1000,,ASW Mortar,RBU-1000（スメルチ-3）は、ソ連の300mm対潜ロケット発射機。射程は約1000ヤード（約914m）。
wp_rgb-12=RBU-1200,,ASW Mortar,RBU-1200（スメルチ-3）は、ソ連の251mm対潜ロケット発射機。射程は約1200ヤード（約1100m）。
wp_rgb-25=RBU-2500,,ASW Mortar,RBU-2500（スメルチ-1）は、ソ連の213mm対潜ロケット発射機。射程は約2500ヤード（約2300m）。
wp_rgb-60=RBU-6000,,ASW Mortar,RBU-6000（スメルチ-2）は、ソ連の213mm対潜ロケット発射機。最大射程は約6000ヤード（約5500m）に達する。

# --------------- Torpedoes ---------------
fr_e15=E15,,ASuW Torpedo,フランスのE15魚雷は、パッシブ・ソナー誘導を備えた特異な55cm重対水上魚雷である。
fr_l3=L3,,ASW Torpedo,フランスのL3魚雷は、特異な55cm径の中量級対潜魚雷である。

ger_dm1=DM1,,ASW Torpedo,ドイツ初の対潜専用有線誘導魚雷。
ger_dm2=DM2,,ASuW Torpedo,ドイツの対水上標的専用の有線誘導魚雷。
ger_sst4=SST4,,ASuW Torpedo,ドイツ製の対水上有線誘導重魚雷。諸外国への輸出用として生産された。

it_a-244s_air=A-244,,ASW Torpedo,イタリアの軽量空中投下型対潜魚雷。アクティブおよびパッシブ・ソナー誘導を備える。

jmsdf_type80=Type 80,,Torpedo,80式長魚雷。1970年代のGRX-1およびGRX-2研究プログラムの成果であり、米海軍のMk 37の影響を受けつつも、推進系や航続距離においてMk 37を上回る性能を持つ対潜・対水上両用有線誘導魚雷である。
jmsdf_type54=Type 54,,Torpedo,54式魚雷3型改1。戦後初の国産魚雷。当初は不具合が多発したが、改良を重ねた結果、この3型改1が量産された。

knm_tp612=TP612,,ASuW Torpedo,スウェーデン製のTP612は、重型の有線誘導魚雷だがシーカーは備えていない。TP611をベースに静粛性の向上とスイムアウト発射能力を追加した発展型。
knm_tp613=TP613,,ASuW Torpedo,スウェーデン製のTP613は、パッシブ・ソナー・シーカーを備えた重型の有線誘導魚雷。

plan_yu-1=Yu-1,,ASuW Torpedo,魚-1（Yu-1）は、中国初の国産重魚雷。無誘導の直進魚雷であり、構造が単純なため信頼性が高く、効果的な兵器である。
plan_yu-3=Yu-3,,ASW Torpedo,魚-3（Yu-3）は、中国のパッシブ誘導対潜重魚雷。低速なため、原子力潜水艦に振り切られるリスクがあり、主にディーゼル潜水艦を標的とする。シーカー射程は約1600ヤード。
plan_yu-4=Yu-4A,,ASuW Torpedo,魚-4A（Yu-4）は、中国のパッシブ誘導対水上重魚雷。低速であり、至近距離での攻撃に適している。

rn_mark9_mod2=MkIX,,ASuW Torpedo,イギリスのMk IX**（マーク9）魚雷は、第二次世界大戦期に導入された対水上魚雷。1930年代の設計を最終段階までアップグレードしたもので、航走時間の延長と弾頭の強化が行われている。

usn_mk16=Mk-16,,ASuW Torpedo,Mk 16魚雷は、第二次世界大戦期の直進魚雷をベースに、1950年代から60年代にかけて米攻撃型潜水艦で使用された高速・超高威力の対艦魚雷。誘導装置こそ持たないが、標的のサイズに関わらず、命中すればほぼ確実に沈めることができる。Mod 8は初期型の高威力弾頭とMod 1の長射程を両立させたモデル。
usn_mk37=Mk-37 Mod 0,,ASW Torpedo,Mk 37は多くの国で採用された米海軍の標準的対潜魚雷。1959年の導入当時は先進的だったが、後にソ連の新型高性能潜水艦に対しては速度不足が露呈することとなった。
usn_mk37_mod1=Mk-37 Mod 1,,ASW Torpedo,Mk 37魚雷に有線誘導機能を追加したモデル。引き換えに速度がわずかに低下している。
usn_mk44_air=Mk-44,,ASW Torpedo,Mk-44はNATOの旧式対潜魚雷であり、冷戦期を通じて広く普及した兵器である。信頼性は高いものの、短射程かつ低速であり、高速で深く潜航する潜水艦に対しては苦戦を強いられる。本型は航空機発射型である。
usn_mk44_ship=Mk-44,,ASW Torpedo,Mk-44はNATOの旧式対潜魚雷であり、冷戦期を通じて広く普及した兵器である。信頼性は高いものの、短射程かつ低速であり、高速で深く潜航する潜水艦に対しては苦戦を強いられる。本型は水上発射型である。
usn_mk46_air=Mk-46,,ASW Torpedo,Mk 46魚雷は、ソ連の高性能潜水艦を撃破するために設計された、NATO標準の軽量対潜魚雷。このバリアントは空中投下用である。
usn_mk46_ship=Mk-46,,ASW Torpedo,Mk 46軽量対潜魚雷の水上艦発射型。
usn_mk48=Mk-48,,Torpedo,Mk 48はアメリカ製の重魚雷。有線誘導により、発射母艦からの再標的設定が可能。

wp_45-36nu=45-36NU,,ASuW Torpedo,45-36NUは、第二次世界大戦前の設計による旧式の450mm直進魚雷。1930年代のイタリア製魚雷の影響を強く受けている。軽量で威力が小さいため、1950年代以降は有効性が低下しているが、代用兵器として使われることもある。
wp_53-38=53-38,,ASuW Torpedo,53-38は、第二次大戦期のソ連の重直進魚雷。単純かつ信頼性が高い。史上最悪の死者を出したヴィルヘルム・グストロフ号およびゴヤ号の撃沈は、この53-38魚雷を用いたソ連潜水艦によるものである。
wp_53-39=53-39,,ASuW Torpedo,53-39は、第二次世界大戦期のソ連の重直進魚雷。
wp_53-56v=53-56,,ASuW Torpedo,53-56Vは、53-38を改良したソ連の重直進魚雷。
wp_53-65K=53-65K,,WH Torpedo,53-65は、水上艦を破壊するために設計されたソ連のウェイク・ホーミング（航跡追尾）重魚雷。
wp_65-76=65-76,,WH Torpedo,65-76は、ソ連の650mm航跡追尾魚雷。「空母キラー」として知られ、米海軍の巨大空母を撃沈するために特別に開発された。その巨大さゆえ、一部の潜水艦でしか運用できない。
wp_at-1=AT-1,,ASW Torpedo,AT-1は、ヘリコプター専用のソ連製空中投下型電動対潜魚雷。アクティブ/パッシブ音響誘導を備える。
wp_at-2=AT-2,,ASW Torpedo,AT-2は、ソ連の空中発射型電動重対潜魚雷。空中発射魚雷の多くが軽量級である中、数少ない重量級の空中発射兵器である。
wp_set-40=SET-40,,ASW Torpedo,SET-40は、アクティブ/パッシブ・ソナー誘導を備えたソ連の軽量電動対潜魚雷。
wp_set-65=SET-65,,ASW Torpedo,SET-65は、アクティブ・ソナー誘導を備えたソ連の重量級電動対潜魚雷。
wp_test-71=TEST-71,,ASW Torpedo,TEST-71は、ソ連の重量級有線誘導対潜魚雷。SET-65をベースに、より高度なアクティブ/パッシブ・ホーミング能力を備えている。
wp_umgt-1=UMGT-1,,ASW Torpedo,UMGT-1はソ連の空中投下型対潜魚雷であり、SS-N-14やSS-N-16対潜ミサイルの弾頭としても使用される。軽量ながら極めて危険な兵器である。
wp_uset-80=USET-80,,Torpedo,USET-80は、ソ連の近代的な対潜・対水上両用魚雷。アクティブ/パッシブ双方の誘導システムを持ち、潜水艦と水上艦の双方にとって極めて回避困難な脅威となる。

# ------------------ Bombs -----------------
fr_samp_t25=SAMP-25,,Bomb,SAMP Type 25は、フランス製の230kg（500ポンド）通常爆弾。米国のMk 82に相当する。
fr_samp_t21=SAMP-21,,Bomb,SAMP Type 21は、フランス製の400kg（880ポンド）通常爆弾。米国のMk 83に相当する。

pla_type-2=Type-100-2,,Bomb,100-2式は、中国製の100kg汎用爆弾。ソ連のFAB-100に相当する。
pla_type-3-250=Type-250-3,,Bomb,250-3式は、中国製の250kg汎用爆弾。ソ連のFAB-250に相当する。
pla_type-3-500=Type-500-3,,Bomb,500-3式は、中国製の500kg汎用爆弾。ソ連のFAB-500に相当する。

raf_bl755=BL755,,Cluster Bomb,BL755は、広範囲に散布される147発の対戦車高爆（HEAT）子弾を内蔵するクラスター爆弾。イラン・イラク戦争やフォークランド紛争で多用された。

usaf_gbu-2=GBU-2,Paveway I,Guided Bomb,GBU-2 ペイブウェイIは、アメリカの2000ポンド（907kg）レーザー誘導爆弾。Mk 84通常爆弾にレーザーシーカーと誘導フィンを取り付けたものである。
usaf_gbu-15=GBU-15,,Guided Bomb,GBU-15(V)2は、アメリカ空軍のF-111やF-4Eといった超音速戦術機で運用され、諸外国へも輸出された赤外線誘導式滑空爆弾である。本兵装は、全天候下で使用可能で高い信頼性を誇る赤外線画像（IIR）シーカーを搭載している。また、データリンク機能を備えており、シーカー映像を母機へ転送することや、投下後の再照準を行うことも可能である。
usaf_bolt-117=BOLT-117,,Guided Bomb,BOLT-117は米国製の750lb（340kg）レーザー誘導爆弾。M-117無誘導爆弾をベースに、機首装着型のレーザーシーカーと誘導用のフィンを追加した改修型である。
usaf_gbu-11=GBU-11,Paveway I,Guided Bomb,GBU-11は米国製の3000lb（1400kg）レーザー誘導爆弾。高い爆発威力から、橋梁やバンカーといった堅固な目標の破壊を目的とした超重量級誘導爆弾である。
usaf_m117=M117,,Bomb,M117は朝鮮戦争期に開発された750ポンド（340kg）爆弾。ベトナム戦争で米空軍により多用されたが、後にMk 80シリーズへと置き換えられた。
usaf_m118=M118,,Demolition Bomb,M118は、橋梁、バンカー、要塞、鉄道、およびその他の堅固な構造物といった点目標への使用を目的とした、米国製の3000lb（1400kg）超重量級解体爆弾である。
usaf_cbu-24=CBU-24,,Cluster Bomb,CBU-24は665発の破片効果子弾を散布するクラスター爆弾。ワイルド・ウィーゼル任務においてSAM陣地を攻撃するために広く使用された。

usn_gbu-10=GBU-10,Paveway II,Guided Bomb,GBU-10 ペイブウェイIIは、アメリカの2000ポンド（907kg）レーザー誘導爆弾。Mk 84をベースとしており、初期のペイブウェイIから誘導キットがアップグレードされている。
usn_gbu-12=GBU-12,Paveway II,Guided Bomb,GBU-12 ペイブウェイIIは、アメリカの500ポンド（227kg）レーザー誘導爆弾。Mk 82をベースとしている。
usn_gbu-16=GBU-16,Paveway II,Guided Bomb,GBU-16 ペイウェイIIは、アメリカ製の1000lb(460kg)レーザー誘導爆弾。Mk 83通常爆弾をベースに、機首のレーザーシーカーと誘導用のフィンを追加したものである。
usn_mk-82=Mk-82,,Bomb,Mk 82は、500ポンド（227kg）の低抵抗汎用通常爆弾（無誘導爆弾）。
usn_mk-82_snakeye=Mk-82 Snakeye,,Bomb,Mk 82 「スネークアイ」は、展開式のフィンを備えた500ポンド（227kg）の高抵抗通常爆弾。低空・高速での投下時、爆弾を急速に減速させることで、発射母機を爆風から遠ざける役割を果たす。
usn_mk-83=Mk-83,,Bomb,Mk 83は、1000ポンド（454kg）の低抵抗汎用通常爆弾。
usn_mk-84=Mk-84,,Bomb,Mk 84は、2000ポンド（900kg）の低抵抗汎用通常爆弾。
usn_rockeye=CBU-100,Rockeye,Cluster Bomb,CBU-100 ロックアイIIは、247発の子弾を散布するアメリカの500ポンド（227kg）クラスター爆弾。
usn_walleye2=AGM-62,Walleye II,Guided Bomb,AGM-62 ウォールアイは、1960年代から90年代にかけて米軍で使用されたテレビ誘導滑空爆弾。

usn_mk54_dc=Mk-54,,Depth Bomb,Mk 54航空爆雷は、第二次世界大戦期に設計され、冷戦期を通じて使用されたアメリカの航空投下式爆雷。

wp_fab-100=OFAB-100,,Bomb,OFAB-100-120は、ソ連およびその同盟国で多用された100kg汎用爆弾。
wp_fab-250=FAB-250,,Bomb,FAB-250は、ソ連設計の250kg汎用通常爆弾。
wp_fab-500=FAB-500 M-62,,Bomb,FAB-500はソ連設計の500kg（1100lb）航空投下型汎用爆弾。高性能炸薬弾頭を備え、主にソビエト連邦とその同盟国で使用されている。
wp_fab-500_m54=FAB-500 M-54,,Bomb,FAB-500はソ連設計の500kg（1100lb）航空投下型汎用爆弾。主にソビエト連邦とその同盟国で使用されている。本型は機内爆弾倉などへの大量搭載を目的とした短胴型の中抵抗爆弾であるが、低抵抗モデルと比較して命中精度は劣る。
wp_fab-1500_m54=FAB-1500 M-54,,Bomb,FAB-1500はソ連設計の1500kg（3300lb）航空投下型汎用爆弾。大型高性能爆弾ファミリーの1500kgモデルであり、主に大型艦艇、バンカー、空軍基地などの堅固な目標に対して使用される。
wp_fab-3000_m54=FAB-3000 M-54,,Bomb,FAB-3000はソ連設計の3000kg（6600lb）航空投下型汎用爆弾。大型高性能爆弾ファミリーの3000kgモデルであり、主に大型艦艇、バンカー、空軍基地などの堅固な目標に対して使用される。
wp_fab-9000_m54=FAB-9000 M-54,,Bomb,FAB-9000はソ連設計の9000kg（20,000lb）航空投下型汎用爆弾。大型高性能爆弾ファミリーの9000kgモデルであり、実戦で使用された通常爆弾としては最大級の一つである。堅固な目標を完全に壊滅させることに特化している。

wp_kab-500l=KAB-500L,,Guided Bomb,KAB-500Lはソビエト連邦が設計した重量500kg(1100lb)のレーザー誘導爆弾。主にソ連とその同盟国で運用されている。FAB-500をベースに、レーザーシーカーと誘導用フィンを追加したモデルである。

wp_rbk-250=RBK-250,,Cluster Bomb,RBK-250は、ソ連の250kgクラスター爆弾。
wp_rbk-500=RBK-500,,Cluster Bomb,RBK-500は、ソ連の500kgクラスター爆弾。

wp_plab-100=PLAB-100,,Depth Bomb,PLAB-100は、ソ連製の100kg航空投下式対潜爆雷。

# ---------------- Sonobuoys ---------------
plan_skf-1=SKF-1,,Passive Sonobuoy,SKF-1は、1960年代から中国海軍で使用されているパッシブ専用の無指向性ソノブイ。
plan_skf-2=SKF-2,,Passive Sonobuoy,SKF-2は、1970年代半ばから使用されている中国海軍のパッシブ指向性ソノブイ。

usn_ssq-41=AN/SSQ-41,LOFAR,Sonobuoy,SSQ-41A 「ジェゼベル」は、低周波解析・記録（LOFAR）タイプのソノブイ。NATOで最も一般的なパッシブ・ソノブイであり、方位の特定能力はないが、感度は良好で、西側海軍の備蓄に大量に含まれている。
usn_ssq-47=AN/SSQ-47,Julie,Active Sonobuoy,SSQ-47A 「ジュリー」は、連続アクティブ測距タイプのソノブイ。方位特定能力はないが、複数のブイを用いて目標位置を特定するのに役立つ。連続的にピンを打つため、寿命は30分と短い。
usn_ssq-53=AN/SSQ-53,DIFAR,Passive Sonobuoy,SSQ-53は、指向性低周波解析・記録（DIFAR）タイプのソノブイ。オペレーターに磁方位情報を提供でき、旧式の無指向性ブイから大幅に進化している。
usn_ssq-62=AN/SSQ-62,DICASS,Active Sonobuoy,AN/SSQ-62 DICASSは、SSQ-53等のパッシブ・ソノブイで捕捉した潜水艦の位置を最終的に特定するために使用されるアクティブ・ソノブイ。
usn_ssq-77=AN/SSQ-77,VLAD,Sonobuoy,SSQ-77Aは、垂直線配列（VLAD）型パッシブ・ソノブイ。極めて高感度なソナーアレイを垂直に展開することで、静粛性の高い潜水艦や深い海域の目標を遠距離で捉えることが可能。高価で重量があるため、主に標的の精密な局地化に使用される。
usn_ssq-101=AN/SSQ-101,,Active Sonobuoy,AN/SSQ-101 空中投下型アクティブ受信機（ADAR）は、浅海域のマルチスタティック・システム用に設計されたソノブイ。多数のハイドロフォンを用いて正確な方位を特定する。

wp_rgb-1=RGB-1,,Passive Sonobuoy,RGB-1は、ソ連で使用されているパッシブ専用の無指向性ソノブイ。
wp_rgb-nm1=RGB-NM-1,,Passive Sonobuoy,RGB-NM-1は、ソ連の「バクー」ソナー・スイートの一部として使用されるパッシブ・ソノブイ。
wp_rgb-3=RGB-3,,Active Sonobuoy,RGB-3は、ソ連のアクティブ専用ソノブイ。

# ------------------ FFAR -----------------
usn_zuni=Zuni,,FFAR,ズーニーは、主に地上攻撃機や攻撃ヘリコプターで運用される5.0インチ折り畳み翼空中ロケット弾（FFAR）。LAU-10 4連装ロケットポッドから発射される。
usn_hydra=Hydra 70,,FFAR,ハイドラ70は、戦闘機やヘリコプターで使用される2.75インチ折り畳み翼空中ロケット弾（FFAR）。最大19連装のポッドに搭載される。

wp_s-5=S-5,,FFAR,S-5はソ連の55mm空中ロケット弾。第二次世界大戦時のドイツのR4Mロケット弾の系譜を継いでおり、最大32連装のポッドから発射される。
wp_s-8=S-8,,FFAR,S-8はソ連の80mm空中ロケット弾。滑走路破壊用などの特殊バリアントも存在する。
wp_s-24=S-24,,FFAR,S-24は、ソ連の巨大な240mm空中ロケット弾。他のFFARとは異なり、単発で吊り下げて運用される。
wp_s-25=S-25,,FFAR,S-25は、ソ連最大の空中ロケット弾（266mm）。約60kgの炸薬を内蔵した強力な弾頭を備え、単発で運用される。

# ------------------ MLRS -----------------
ir_107mm_rocket=Haseb-1,,MLRS,ハセブ1は、中国の63式107mm多連装ロケットをイランが国産化したもの。イラン軍では発射機とロケットの両方をハセブと呼ぶ。

usa_m26=M26,,MLRS,M26は、M270 多連装ロケットシステム（MLRS）で使用される227mm無誘導ロケット。1発につき最大800個の子弾を内蔵し、2000平方メートルを制圧する能力を持つ。

wp_grad=Grad,,MLRS,M-21OFは、BM-21自走多連装ロケットから発射される弾薬。システム全体として「グラート（Grad）」の名で知られる。


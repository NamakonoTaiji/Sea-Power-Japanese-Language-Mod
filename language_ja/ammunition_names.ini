# ----------------- Decoys ----------------
rn_type_182_decoy=Type 182,,Decoy,Type 182曳航式対抗手段は、イギリス海軍の水上艦艇で運用される魚雷デコイである。このデコイは偽のソナーパルスを発信して接近する魚雷のシーカーを妨害する。ただし、効果を発揮するためには、デコイが魚雷と艦の間に位置していなければならない。

usn_an_slq_25_nixie_decoy=AN/SLQ-25,Nixie,Decoy,ニクシー（AN/SLQ-25）は、米海軍の水上艦で使用される曳航式デコイ。接近する魚雷を母艦から引き離すための信号を発生させる。

usn_moss=MOSS,MK-70,Decoy,Mk 70 MOSS（Mobile Submarine Simulator）は、敵のソナーを母艦から逸らすために使用される潜水艦模倣デコイ。潜水艦自体の騒音やアクティブ・ソナーの反射音をシミュレート可能。

wp_mg-44=MG-44,Korund,Decoy,MG-44 コルンドは、ソ連の第2世代自走式水中音響潜水艦シミュレーター。潜水艦の専用400mm筒から発射される。


DefaultDescription=チャーチル級潜水艦は1970年以降に就役したイギリスの原子力攻撃潜水艦シリーズ（全3隻）であり、先行するヴァリアント級との類似性から「改良ヴァリアント」型とみなされている。チャーチル級は、静粛性の向上、ソナーの刷新、および推進プラント配置の改良により、ヴァリアント級に比べ発展を遂げている。

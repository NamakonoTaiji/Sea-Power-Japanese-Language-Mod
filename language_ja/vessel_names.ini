[plan_dd_luda1]
Type=DD,駆逐艦
Default=旅大I型,Luda I
DefaultDescription=ソ連のネウストラシミ級駆逐艦をベースに開発された旅大（Luda）型は、中国で建造された初の近代的なミサイル駆逐艦である。PLANでは051型として知られ、対水上戦闘に特化しており、HY-1A対艦ミサイル用の3連装発射機を2基装備していた。後の派生型ではセンサー、戦闘システム、武装が改良された。1971年から1990年の間に同型艦17隻が建造され、PLANにおいて最大数の水上戦闘艦クラスとなった。

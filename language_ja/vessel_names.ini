DefaultDescription=瓊沙（Qiongsha）型貨物船は、中国人民解放軍海軍（PLAN）向けの武装貨物・兵員輸送艦であり、民間輸送船の設計から派生したものである。その汎用性は、兵員輸送艦から補給艦、さらには洋上での予備病院船としての役割に至るまで、多岐にわたる任務に表れており、PLANにとって貴重な補助艦艇となっている。

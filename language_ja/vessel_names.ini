[plan_k_type_037]
Type=FS,コルベット
Default=037型(海南型),Hainan
DefaultDescription=PLANおよび他の多くの海軍で使用されている、多数が建造された駆潜艇。海南（Hainan）型（033型）は小型かつ高速で航続距離が長く、南太平洋全域での運用能力を証明したコルベットである。これらの船舶は無数の役割を担っており、特に対潜能力を備えた高速砲艦として知られ、そのサイズに見合わない強力な武装を誇る。ソナーと対潜ロケットにより広範なマルチロール能力を持つが、対潜性能自体は特筆すべきものではない。
Variant1=招遠 605,Zhaoyuan

[plan_lst_yukan]
Type=LST,揚陸艦
Default=玉侃型,Yukan
DefaultDescription=玉侃（Yukan）型LST（072型）は、PLANにとって第一世代の新型戦車揚陸艦であり、両用戦支援任務において第二次世界大戦時代の旧式な米国製揚陸艦を置き換えた。他の多くの揚陸艦と同様、自衛および上陸支援用に中口径砲を装備している。これは、前面ランプから車両を展開するために海岸に乗り上げる（ビーチング）必要があるためである。また、上陸用舟艇の運用や、甲板上への相当量の貨物積載も可能である。
Variant1=雲台山 LST-927,Yuntaishan
Variant2=五峰山 LST-928,Wufengshan
Variant3=紫金山 LST-929,Zijinshan

[plan_msc_type_010]
Type=MSO,掃海艇
Default=010型,Type 010
DefaultDescription=010型掃海艇は、ソ連のT-43K級掃海艇の中国派生型であり、機関銃による火力が追加されている。ソ連のオリジナル設計よりも航続距離が伸び、居住性が向上したこと、および武装が強化されたことにより、多数が建造された安価で効果的な哨戒艇としてPLANで重宝されている。
Variant1=364,364

[plan_pt_shanghai2]
Type=PT,哨戒艇
Default=上海II型,Shanghai II
DefaultDescription=上海（Shanghai）II型（062型）哨戒艇は、小型ながら重武装を施されたPLANの短距離砲艇であり、その小ささに似合わず沿岸作戦や大型艦への「格上攻撃」に適している。これは上海II型の初期バッチであり、対潜ロケットと小型の艦橋構造物を備えている。
Variant1=上海II型,Shanghai II

[plan_pt_shanghai2b]
Type=PT,哨戒艇
Default=上海IIB型,Shanghai IIB
DefaultDescription=上海（Shanghai）IIB型（062型）哨戒艇は、小型ながら重武装を施されたPLANの短距離砲艇であり、その小ささに似合わず沿岸作戦や大型艦への「格上攻撃」に適している。これは上海II型の後期バッチであり、対潜ロケットに代わって大型化された艦橋構造物を備えている。
Variant1=上海IIB型,Shanghai IIB

[plan_ptg_type_024]
Type=PTG,ミサイル艇
Default=024型(河谷型),Heku
DefaultDescription=河谷（Heku）型（024型）は、PLANで非常に一般的なミサイル艇であり、ソ連のコマール級ミサイル艇を国内で鋼鉄製船体に改良したものである。これらの艇はその高速性により、特に沿岸地域において集団で運用されると脅威となる。
Variant1=3139,3139


Default=江東型,Jiangdong
DefaultDescription=成都型の後継艦であり、防空護衛艦として構想された。短距離SAMであるHQ-61を採用し、37mm連装機関砲を4基（成都型は2基）搭載している。対潜能力は依然として非常に弱く、FQF-1200対潜ロケット爆雷投射機2基と爆雷投下軌条を備えるのみである。

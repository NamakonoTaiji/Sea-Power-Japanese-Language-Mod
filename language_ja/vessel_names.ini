[wp_rkr_kirov]
Type=TARKR,ミサイル巡洋艦
Default=キーロフ級,Kirov
DefaultDescription=ソ連において「オルラン（1144型計画：ウミワシの意）」として知られるキーロフ級は、巨大な原子力推進ミサイル巡洋艦である。第二次世界大戦時の戦艦に匹敵する規模を持ち、史上最強の水上戦闘艦の一つに数えられる。1980年以降に2隻が就役し、さらに2隻が建造中である。その巨体は、大量の対艦ミサイル、広域防空ミサイル・システム、および複数の近接防御火器を収容するために必要とされた。\n\n高度なソナーと長射程の対潜兵器を備えているが、通常は専用の対潜艦に守られた水上打撃群の旗艦として運用される。
Variant1=キーロフ RKR-181,Kirov

[wp_rkr_kresta1]
Type=RKR,ミサイル巡洋艦
Default=クレスタI型,Kresta
DefaultDescription=1134型計画「ベルクート（イヌワシ）」、あるいはクレスタI型は、重心が高く居住性が悪かったキンダ級ミサイル巡洋艦の拡大改良型として設計された。クレスタI型は対艦任務を主眼としているが、対空および対潜能力も大幅に向上している。もしこれらの艦が北大西洋の船団航路に侵入すれば、NATOにとって通商破壊戦の重大な脅威となるだろう。
Variant1=アドミラル・ゾズーリャ RKR-060,Admiral Zozulya
Variant2=ウラジオストク RKR-097,Vladivostok
Variant3=バイス・アドミラル・ドロズド RKR-072,Vice-Admiral Drozd
Variant4=セヴァストポリ RKR-048,Sevastopol


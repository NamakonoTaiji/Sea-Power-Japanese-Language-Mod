DefaultDescription=カリフォルニア級巡洋艦の2隻は1974年から1975年にかけて就役した。実質的に無制限の航続距離を活かし、高速空母機動部隊の護衛として理想的な能力を発揮した。原子力推進を前提に一から設計されたこれらの艦は、量産を意図した初の原子力水上戦闘艦と評された（先行するロングビーチ、ベインブリッジ、トラクスタンはいずれも単独の艦級であった）。建造費が極めて高騰したため、後続艦の計画はキャンセルされ、後のヴァージニア級へと引き継がれた。Mark 13ミサイル発射機と5インチ砲を前後に備え、前方にはアスロック発射機と次発装填装置を有する強力な艦であった。1980年代初頭の改修でファランクスCIWSが追加され、電子戦スイートもAN/SLQ-32(V)3へと更新された。莫大な費用を投じて燃料交換を含む改修が行われたわずか数年後、1990年代後半に2隻とも退役した。

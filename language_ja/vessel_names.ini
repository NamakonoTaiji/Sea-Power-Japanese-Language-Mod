[****************************** Australia ******************************]
[ran_ffg_adelaide_shorthull]
Type=FFG,フリゲート
Default=アデレード級 (短船体型),Adelaide
DefaultDescription=アデレード級ミサイルフリゲートは、オーストラリア海軍が運用する6隻のFFGシリーズであり、米国のオリバー・ハザード・ペリー級FFGの派生型である。最初の4隻は米国の造船所で建造された。これらのフリゲートは、1970年代の軽駆逐艦計画の失敗を補うため、1980年からオーストラリア海軍への就役を開始した。アメリカ海軍の同型艦とほぼ同等の基準で建造されており、近代的な対空、対水上、および対潜戦システムを備えている。\n\n最初の3隻は短船体（ショートハル）構成で建造されたため、曳航ソナーを装備しておらず、LAMPS Mk.IIIヘリコプターの運用能力も持たない。そのため、非戦闘用の武装のないAS-350ヘリコプターの搭載を余儀なくされている。
Variant1=アデレード FFG-1,Adelaide
Variant2=キャンベラ FFG-2,Canberra
Variant3=シドニー FFG-3,Sydney

[ran_ss_oberon]
Type=SS,哨戒潜水艦
Default=オベロン級 (オーストラリア海軍),Oberon
DefaultDescription=オベロン級は、高強度の船体材料と近代化された装備を使用し、ポーパス級の改良発展型として開発されたイギリス設計のディーゼル電気推進攻撃・哨戒潜水艦（全27隻）である。オーストラリア海軍は、イギリス海軍の標準仕様からわずかな変更を加えたオベロン級潜水艦6隻を2回に分けて発注した。最も大きな特徴は、米国製のMk37魚雷を兵装として採用した点である。\n\nオーストラリア海軍は1970年代後半、1980年代以降に予想される脅威に対抗するため、潜水艦のセンサーと兵装を刷新する近代化改修計画（SWUP）を開始した。これには米国海軍のMk48魚雷、MicroPUFFSフランクアレイ・パッシブソナー、および最終的には潜水艦発射型のUGM-84ハープーン・ミサイルが含まれており、1985年までに6隻すべてにこれらの改修が行われた。

[plan_ff_chengdu]
Type=FF,フリゲート
Default=成都型,Chengdu
DefaultDescription=中ソ対立の激化前に中華人民共和国に提供された、ソ連のリガ級対潜フリゲートを基に開発された船級。成都（Chengdu）型は、オリジナルの3連装魚雷発射管をスティクス派生の「サフラン（海鷹-2）」ミサイル用2連装発射機に換装することで、対水上戦闘能力を向上させている。対潜能力は非常に弱く、RBU-1200対潜ロケット爆雷投射機を2基備えるのみである。本級は、その後のすべてのPLANフリゲートの進化の基礎となった。
Variant1=昆明 FF-505,Kunming
Variant2=成都 FF-506,Chengdu
Variant3=貴陽 FF-507,Guiyang
Variant4=衡陽 FF-508,Hengyang


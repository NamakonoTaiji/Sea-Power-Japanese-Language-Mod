[usn_qh-50c]
Type=Drone Helicopter,無人ヘリコプター
Default=QH-50C DASH,QH-50
DefaultDescription=QH-50 DASH（無人対潜ヘリコプター）は、ヘリコプター格納庫を備えない小型艦艇において、遠距離対潜兵器として機能することを目的としている。FRAM計画の主要コンポーネントとして、ギアリング級駆逐艦などの旧式艦や戦後の護衛艦に搭載された。しかし、艦上運用における信頼性の低さから事故が多発し、1973年までに米軍から退役した。海上自衛隊は唯一の海外運用国であり、定期的な整備により運用に成功し、1977年まで使用された。QH-50Cは最初の量産型で、300shpのターボシャフトエンジンを搭載し、373機が製造された。
Squadron1=QH-50 DASH,QH-50
Callsigns=Squadron1,Dash

[usn_qh-50d]
Type=Drone Helicopter,無人ヘリコプター
Default=QH-50D DASH,QH-50
DefaultDescription=QH-50 DASH（無人対潜ヘリコプター）は、ヘリコプター格納庫を備えない小型艦艇において、遠距離対潜兵器として機能することを目的としている。FRAM計画の主要コンポーネントとして、ギアリング級駆逐艦などの旧式艦や戦後の護衛艦に搭載された。しかし、艦上運用における信頼性の低さから事故が多発し、1973年までに米軍から退役した。海上自衛隊は唯一の海外運用国であり、定期的な整備により運用に成功し、1977年まで使用された。QH-50DはQH-50Cの改良型であり、より強力な365shpエンジンを搭載し、グラスファイバー製ローターブレードを採用、尾翼アセンブリが廃止されている。
Squadron1=QH-50 DASH,QH-50
Squadron2=QH-50 DASH,QH-50
Callsigns=Squadron1,Dash|Squadron2,Dash


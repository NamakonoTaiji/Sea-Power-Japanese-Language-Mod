M242=M242|M242 チェーンガン|25mm M242 チェーンガン|M242 チェーンガンは、アメリカの25mm単銃身チェーン駆動機関砲である。地上および海上の様々な役割で使用されている。現代の機関砲の中で最も成功したモデルの一つであることが証明されている。

RDL-2_ECM=ECMジャマー|電子妨害対策（ECM）は、敵レーダーに対してバラージ（ノイズ）ジャミングを行い、敵の探知距離を大幅に減少させることができる。また、敵のレーダー信号を傍受、変調して再送信することで、敵レーダーに目標の正確な位置を誤認させることも可能である。




MK7_Gun=MK 7砲|16インチ50口径 Mk7砲|16インチ50口径 Mk7はアイオワ級戦艦の主兵装であり、計画中止となったモンタナ級戦艦の主兵装としても予定されていた。
MK16_Gun=MK 16砲|6インチ47口径 Mk16砲|6インチ47口径 Mk16砲は、戦前および第二次世界大戦期のアメリカ海軍の数隻の軽巡洋艦の主砲として使用された。主に三連装砲塔に搭載され、水上目標に対して使用された。Mk16DP砲は、水上目標のみならず航空機に対しても使用可能なMk16の両用砲型である。戦後のウースター級軽巡洋艦や、対空砲術訓練艦ミシシッピに搭載された。
MK28=MK 28砲|5インチ38口径 Mk28砲|Mk28砲は、連装砲塔に収められた一対のMk12 5インチ38口径砲で構成される。38口径の砲身は、以前のアメリカ標準であった5インチ51口径平射砲と5インチ25口径対空砲の中間の長さを採用した妥協案であった。
MK33=MK 33砲|3インチ50口径 Mk33砲|Mk33砲は、開放型または密閉型の連装マウントに収められた一対の速射型Mk22 3インチ50口径砲で構成される。これらの砲は、それらが置き換えた四連装40mmマウントよりもはるかに強力なパンチ力を備えている。
MK33_Oslo=MK 33砲|3インチ50口径 Mk33砲|Mk33砲は、開放型または密閉型の連装マウントに収められた一対の速射型Mk22 3インチ50口径砲で構成される。これらの砲は、それらが置き換えた四連装40mmマウントよりもはるかに強力なパンチ力を備えている。
MK34=MK 34砲|3インチ50口径 Mk34砲|Mk34砲は、開放型マウントに収められた速射型Mk22 3インチ50口径砲で構成される。この砲は、それが置き換えた四連装40mmマウントよりもはるかに強力なパンチ力を備えている。
MK42=MK 42砲|5インチ54口径 Mk42砲|1950年代、第二次世界大戦で使用された5インチ38口径砲よりも射程が長く、発射速度が速い砲が必要となったため、用途の異なる3インチ70口径 Mk26砲と並行して開発された。5インチ54口径 Mk42は自動化された両用（対空/対水上目標）砲マウントである。通常、Mk68砲火器管制システムから遠隔制御される。
MK45=MK 45砲|5インチ54口径 Mk45砲|5インチ54口径 Mk45砲は、Mk45マウントにMk19 5インチ54口径砲を搭載したアメリカの艦載砲マウントである。以前のMk42マウントと比較して、軽量でメンテナンスが容易になっている。Mk86砲火器管制システムから遠隔制御される。
MK75=MK 75砲|76mm Mk75砲|Mk75砲は、イタリアで設計・建造された艦載機関砲である。コンパクトでありながら高い発射速度と幅広い種類の弾薬を備えており、対空、対水上、ポイントディフェンス、および沿岸砲撃支援が可能である。Mk75は広く輸出されており、60の海軍で使用されている。
#---------------------------------------- CIWS ----------------------------------------

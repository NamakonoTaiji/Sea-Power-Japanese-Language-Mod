CXAM=CXAM|CXAMは、アメリカ海軍の長距離対空捜索レーダーの試作型である。第二次世界大戦開始直前に大型艦に装備された。18x16フィートの巨大な「マットレス」型アンテナで仰角調整が可能であったが、ビーム幅が広すぎたため高度測定には向かなかった。CXAMは戦時中の対空捜索レーダーの直系の祖となり、そのほとんどはこの基本設計を段階的に改良したものであった。
CXAM-1=CXAM-1|CXAM-1はCXAMを段階的に改良したもので、計14セットが戦艦、巡洋艦、航空母艦に納入・設置された。アンテナはマットレス型の外見を維持したが、仰角調整機能は削除された。精度は200ヤードに向上し、1943年まで一部の艦で運用され続けた。大型艦では後にSKまたはSK-2に置き換えられた。
SA=SA|SAシリーズは、CXAMの機能と性能を護衛艦や補助艦艇用に小型化したアンテナで再現することを目指したものである。比較的成功を収め、駆逐護衛艦やフリゲートの標準的な対空捜索セットとなり、一部の駆逐艦や軽巡洋艦にも搭載された。このタイプは、戦後半にアメリカの造船所で改装された自由フランス軍の艦艇にも装備された。
SC-1=SC-1|SAと同様、SCは小型アンテナを使用してCXAMの性能を小型艦にもたらそうとする試みであった。不幸にもアンテナの小型化により有効射程が低下し、初期のSCは現場で不評であった。その後、1942年1月に出力を2倍、射程を2倍にしたSC-1が導入され、すぐに全SCが換装された。このセットは、戦時中にSC-2が利用可能になるまで駆逐艦や補助艦艇に装備された。
SC-2=SC-2|SC-2は、アンテナを大幅に大型化することでSC-1を改良した。このセットはBGおよびBL IFFシステムへの対応を備えており、終戦まで駆逐艦の主要なレーダーとなった。SC-2のわずかな改良型（SC-3、SC-4、SC-5）は、1963年まで駆逐艦で運用され続けた。
SK=SK|SKは、戦時中の大型艦用標準対空捜索セットであった。本質的にはCXAMサイズのアンテナを備えたSC-2セットであり、方位と斜距離データのみを提供する2次元レーダーシステムであった。高度測定には追加のセンサーが必要であった。
SK-2=SK-2|このセットはSKを段階的に改良したもので、サイドローブを減少させるために設計された17フィートの皿型アンテナを備えていた。大戦後半、SKとSK-2はともにビーム仰角が低いため、高高度飛行中の航空機を検出できないとして批判された。75セットが生産され、就役時や改装時の大型戦闘艦に装備された。
SM=SM|SMは、アメリカ初の戦闘機誘導用に設計されたレーダーであり、円錐走査型の「ペンシルビーム」を組み込むことで、以前の対空捜索レーダーでは不可能だった空中目標の高度測定を可能にした。SMは重量が18,000ポンド（アンテナだけで4,000ポンド）と非常に重く、大型空母にしか搭載できなかった。後に、より小型の艦艇用にSM-1とSPが建造された。
SP=SP|SPは、SM高度測定レーダーの軽量な後継機である。搭載する艦に応じて2種類のアンテナを使い分けることができ、駆逐艦や軽空母用には小型のアンテナが用意された。このセットは沖縄戦で活動したギアリング級レーダーピケット駆逐艦（DDR）に装備された。300セットが製造され、終戦までには、前檣のSKまたはSK-2を補完するために主檣にSPを搭載する主力艦の姿が一般的となった。
SR=SR|SRはCXAM以来となる完全に新しい対空捜索セットで、以前のレーダーセットで先駆的に採用された多くの新機能を組み込んでいた。アンテナはSC-2とほぼ同サイズながら出力は2倍以上あり、終戦間際の駆逐艦に装備された。また、大型艦のバックアップ用対空捜索レーダーとしても装備され、1961年まで運用された。
SR-2=SR-2|SR-2は当初駆逐護衛艦用として意図された50cm帯2D対空捜索セットであったが、生産開始後にあまりにも巨大すぎることが判明した。試作モデルはミッドウェイ級大型空母、数隻の軽巡洋艦、および最初の4隻の潜水艦レーダーピケット（SSR）に装備された。このセットは性能が劣っていたため、後にAN/SPS-6に置き換えられた。
SR-3=SR-3|SR-3およびSR-6は、フェーディングを抑え性能を高めるためにLバンドを使用し、艦隊全体でSKおよびSCを置き換えるように設計された。しかし実際には、選択されたアンテナが戦後のレポートで「アンテナが不十分」と評されるほど貧弱であったため、両セットとも性能は低かった。SR-6はSR-3の軽量版で、アンテナがより小型であった。
SR-6=SR-6|SR-3およびSR-6は、フェーディングを抑え性能を高めるためにLバンドを使用し、艦隊全体でSKおよびSCを置き換えるように設計された。しかし実際には、選択されたアンテナが戦後のレポートで「アンテナが不十分」と評されるほど貧弱であったため、両セットとも性能は低かった。SR-6はSR-3の軽量版で、アンテナがより小型であった。
SPS-6=SPS-6|AN/SPS-6は、第二次世界大戦後にアメリカ海軍が第1世代の対空捜索レーダーとして使用した2次元レーダーであり、同盟国にも広く輸出された。2Dレーダーであるため、方位と斜距離データのみを提供する。高度を特定するには追加のセンサーが必要となる。
SPS-12=SPS-12|1950年代から1980年代にかけて運用されたAN/SPS-12は、中距離の2次元対空・対水上監視レーダー。
SPS-29=SPS-29|AN/SPS-29は、第二次世界大戦後にアメリカ海軍が早期警戒レーダーとして使用した2次元レーダーで、冷戦中の海軍艦艇に装備された。2Dレーダーとして方位と斜距離データのみを提供する。高度測定には追加のセンサーを要する。
SPS-30=SPS-30|AN/SPS-8の近代化版に強力な送信機を組み合わせたAN/SPS-30は、航空機の探知および監視に使用される艦載統合Sバンド捜索・高度測定レーダーシステム。
UPA-43=UPA-43|AN/UPA-43は、アメリカ海軍で使用されている敵味方識別（IFF）質問機。AN/SPS-48のような後期のレーダーは統合されたIFF質問機を備えており、独立したアンテナは不要となっている。
SPS-32=SPS-32|エンタープライズおよびロングビーチで使用された有名なSCANFARシステムの一部であるAN/SPS-32は、アンテナシステムの水平方向を担い、主に航空監視に使用される。
SPS-33=SPS-33|エンタープライズおよびロングビーチで使用された有名なSCANFARシステムの一部であるAN/SPS-33は、アンテナシステムの垂直方向を担い、主に目標追尾に使用される。
SPS-37=SPS-37|AN/SPS-37は冷戦初期にアメリカ海軍が早期警戒レーダーとして使用した2次元レーダーで、AN/SPS-29の改良発展型である。2Dレーダーとして方位と斜距離データのみを提供する。
SPS-39=SPS-39|AN/SPS-39は方位、距離、高度を提供する3D長距離対空捜索レーダー。大型のSPS-48と同様に、方位角については機械的に回転するが、仰角については電子的にスキャンする。3Dレーダーは、2D早期警戒レーダーと目標交戦用の火器管制レーダーの中間的な役割を果たす。
SPS-40=SPS-40|AN/SPS-40は多くのアメリカ艦艇に共通して搭載されている長距離2D対空捜索レーダー。2Dレーダーとして方位と斜距離データのみを提供する。
SPS-43=SPS-43|AN/SPS-43は、主にアメリカの空母やミサイル巡洋艦で使用されている超長距離対空捜索レーダーシステム。VHF帯で作動するAN/SPS-43は、ジャミング対策として周波数ホッピングを採用している。方位と斜距離のみを提供する2Dレーダー。
SPS-48=SPS-48|AN/SPS-48は長距離3D対空捜索レーダー。目標の方位角はアンテナの基部を回転させる機械的走査によって検出され、仰角は電気的走査によって決定される。3Dレーダーは早期警戒レーダーと火器管制レーダーの橋渡しを行う。
SPS-49=SPS-49|AN/SPS-49は長距離2D対空捜索レーダーであり、SPS-40の後継機。多くのアメリカおよび同盟国の艦艇における主要な対空捜索レーダーである。旧式艦ではNTU近代化プログラムの際にSPS-40から換装された。
SPS-52=SPS-52|AN/SPS-52は方位、距離、高度を提供する3D長距離対空捜索レーダー。大型のSPS-48と同様に、方位角については機械的に回転するが、仰角については電子的にスキャンする。
SPN-43=SPN-43|AN/SPN-43は、空母やその他の航空機運用艦艇に搭載され、艦から50海里以内の航空機の識別と管制を行う2D ATC（航空交通管制）レーダー。
SPY-1A=SPY-1A|AN/SPY-1は長距離3Dパッシブ・フェーズドアレイ・レーダーであり、イージス武器システムの基幹コンポーネント。4つの分散配置されたコンピュータ制御アンテナを使用して、艦の周囲360度を継続的にカバーする。
MK-23_TAS=MK-23 TAS|Mk.23 TAS（目標捕捉システム）は、NATOシースパロー・ポイントディフェンス・システムと組み合わせて使用される、海面を這うミサイルや高仰角からの攻撃を検出するための小型・高速回転の中距離2Dレーダー。

#---Surface only---
SPS-10=SPS-10|AN/SPS-10は、戦後および冷戦期に多くのアメリカおよび同盟国の艦艇に装備された2次元対水上捜索レーダー。
SPS-55=SPS-55|AN/SPS-55は固体素子式の対水上捜索・航海レーダーで、スプルーアンス級とその派生型、オリバー・ハザード・ペリー級フリゲート、アヴェンジャー級掃海艦に装備されている。
SPS-67=SPS-67|AN/SPS-67は、水上目標および超低空飛行目標の探知・追尾のためにアメリカ艦艇に広く使用されている短距離対水上捜索レーダー。

#---Fire Control---
#SAM
MK-115=MK-115|Mk-115は、シースパロー基本ポイントディフェンスミサイルシステム（BPDMS）に目標照射を提供する有人ディレクター。
MK-95=MK-95|Mk-95火器管制レーダーは、アップグレードされたNATOシースパロー・ポイントディフェンスミサイルシステムの一部であり、セミアクティブ・レーダー・ホーミング・ミサイルシステムに目標照射を提供する。
SPW-2=SPW-2|AN/SPW-2は、RIM-8タロス・ミサイルの飛行プロファイルにおける電波指令誘導（ビームライディング）部分で使用される誘導レーダー。
SPG-49=SPG-49|AN/SPG-49は、RIM-8タロス・ミサイル用の火器管制レーダー。飛行終末時のセミアクティブ・レーダー・ホーミング部分における目標追尾およびターミナル照射に使用される。
SPG-51=SPG-51|AN/SPG-51はCおよびXバンドの砲・ミサイル火器管制レーダーであり、ターターおよびスタンダードMRミサイルシステムで使用される。
SPG-55=SPG-55|AN/SPG-55は、テリアおよびスタンダードERミサイルシステムに追尾および照射を提供する火器管制レーダー。特殊な対水上追尾モードにより、ミサイルを対艦任務に使用することも可能。
SPG-60=SPG-60|AN/SPG-60別置目標照射レーダー（STIR）は、Mk-86砲火器管制システムを装備する艦における、ターターおよびスタンダードMRミサイルシステム用のXバンド・モノパルス追尾・目標照射レーダー。
SPG-62=SPG-62|AN/SPG-62は、イージス武器システムを装備する艦でスタンダードSM-2ミサイルの終末照射に使用されるXバンド連続波火器管制レーダー。
#Guns
MK37_GFCS_MK4=Mk37 GFCS (Radar Mk4 "FD")|Mk37砲火器管制システム（GFCS）は、両用砲である5インチ38口径砲を制御する。ディレクターにはMk4 "FD"測距レーダーが装備されており、対空と対水上の両方の目標に交戦可能な非常に成功した組み合わせとなった。
MK37_GFCS_MK12=Mk37 GFCS (Radar Mk12/22)|Mk37砲火器管制システム（GFCS）は、両用砲である5インチ38口径砲を制御する。ディレクターにはMk12測距レーダーとMk22高度測定器が装備されている。このディレクターとレーダーの組み合わせは、1944年半ばまでにほぼすべての新造および改装艦艇に装備された。
MK37_GFCS_MK28=Mk37 GFCS (Radar Mk28)|Mk37砲火器管制システム（GFCS）は、両用砲である5インチ38口径砲を制御する。ディレクターには小型の皿型アンテナを持つMk28測距レーダーが装備されている。これは旧式改装艦向けの軽量化策であり、標準的なMk12およびMk22の設置がトップヘビーの問題で許容されない場合に採用された。
MK37_GFCS=MK37 GFCS|Mk37砲火器管制システム（GFCS）は、両用砲である5インチ38口径砲を制御する。ディレクターにはMk25測距レーダーが装備されており、戦後のすべてのMk37設置における標準的な組み合わせとなった。この構成のMk37 GFCSは1990年代初頭まで運用され続けた。
MK38_GFCS_MK3=Mk38 GFCS (Radar Mk3 "FC")|Mk38砲火器管制システム（GFCS）は、戦艦級の主砲を指揮し、水上および地上目標に対して非常に正確な火器管制を行う。このシステムは、ノースカロライナ、サウスダコタ、アイオワ級戦艦の巨大な塔型上部構造物の頂点に配置された装甲ディレクターを特徴としていた。アラスカ級大型巡洋艦にも装備された。このディレクターには、初期のアメリカ製火器管制セットの一つであるMk3 "FC"測距レーダーが装備されている。このディレクターとレーダーの組み合わせは、Mk8や後のMk13に置き換えられる前の1942年から1943年にかけて重要な任務を遂行した。
MK38_GFCS=Mk38 GFCS (Radar Mk13)|Mk38砲火器管制システム（GFCS）は、戦艦級の主砲を指揮し、水上および地上目標に対して非常に正確な火器管制を行う。このシステムは、ノースカロライナ、サウスダコタ、アイオワ級戦艦の巨大な塔型上部構造物の頂点に配置された装甲ディレクターを特徴としていた。ディレクターにはMk13測距レーダーが装備され、アイオワ級の退役に伴い1990年代初頭まで運用された。
MK56_GFCS=MK56 GFCS|Mk-56砲火器管制システムは、3インチ砲および5インチ砲を装備する艦で使用される。Xバンド・レーダートラッカーにより、水上目標と高速の空中目標の両方に交戦が可能。
MK63_GFCS=MK63 GFCS|Mk-63砲火器管制システムは、3インチ砲および5インチ砲を装備する艦で使用される。Xバンド・レーダートラッカーにより、水上目標と高速の空中目標の両方に交戦が可能。
MK68_GFCS=MK68 GFCS|Mk-68砲火器管制システムは、Mk-42 5インチ54口径単装砲を装備する艦で使用される。Xバンド・レーダートラッカーにより、水上目標と高速の空中目標の両方に交戦が可能。
MK86_GFCS=MK86 GFCS|Mk-86砲火器管制システムは、Mk-45 5インチ54口径単装砲を装備する艦で使用される。Xバンド・レーダートラッカーにより、水上目標と高速の空中目標の両方に交戦が可能。以前のディレクターとは異なり、無人であり光学バックアップとして遠隔TVカメラを使用する。
MK92_FCS=MK92 FCS|Mk-92は、アメリカ海軍がオリバー・ハザード・ペリー級フリゲートやペガサス級高速ミサイル艇で使用しているオランダのWM-25火器管制レーダーのライセンス生産版で、スタンダードMRミサイルと76mm砲を制御する。
SPQ-9=SPQ-9|AN/SPQ-9は、Mk-86砲火器管制システムに関連付けられたXバンド・レーダー。

#---------- Submarines ----------
BPS-14_15=BPS-14|AN/BPS-14は、アメリカの潜水艦が航海に使用する対水上捜索レーダー。

#---------------------------------------- Aircraft radar ----------------------------------------
AN/APY-1=AN/APY-1|AN/APY-1は、E-3 セントリー（AWACS）に搭載されている超長距離対空・対水上捜索レーダーで、早期警戒および戦闘指揮管制機能を提供する。
LN-66=LN-66|LN-66は多くの商業船や軍艦に装備されている民間の短距離対水上捜索レーダーだが、SH-2F シースプライト（LAMPS）ヘリコプターにも使用されている。
AN/APS-20=AN/APS-20|AN/APS-20は、P-2H ネプチューンで使用されているSバンド長距離対空捜索レーダー。
AN/APS-80=AN/APS-80|AN/APS-80は、Xバンドの航空機用長距離監視・対水上捜索レーダー。このレーダーセットは機械的に走査されるアンテナを使用して360度のカバーを提供する。初期のP-3 オライオンや日本のUS-1に搭載された。
AN/APS-115=AN/APS-115|AN/APS-115は、P-3 オライオンで使用されているXバンド対水上捜索レーダー。AN/APS-80Aから発展した。
AN/APS-116=AN/APS-116|AN/APS-116は、短時間しか露出しない潜水艦の潜望鏡やマストを検出するために特別に設計された対水上捜索レーダー。
AN/APS-125=AN/APS-125|AN/APS-125は、アメリカ海軍が空中早期警戒に使用するUHF帯長距離対空捜索レーダー。
AN/APQ-126=AN/APQ-126|AN/APQ-126は、A-7DおよびA-7E攻撃機で使用されている航空機用航海・攻撃レーダーであり、全天候攻撃能力を提供する。
AN/APQ-148=AN/APQ-148|AN/APQ-148は、後期のA-6の各派生型で使用されているマルチモード航空機レーダーであり、高度な全天候低空攻撃能力を提供する。
AN/APD-7=AN/APD-7
AN/AWG-9=AN/AWG-9|AN/AWG-9レーダーは、AIM-54 フェニックス・ミサイルシステムでの使用を特に意図した長距離トラック・ホワイル・スキャン（走査時追尾）レーダーであり、最大6目標の同時交戦が可能。F-14のみに装備されている。
AN/AWG-9_Phoenix=AN/AWG-9 (AIM-54誘導)|AIM-54 フェニックス・ミサイルシステム専用の誘導モードで、最大6目標の同時交戦が可能。このモードはAIM-54にのみ適用され、AIM-7を一度に誘導できるのは1発のみである。
AN/APG-63=AN/APG-63|AN/APG-63は、F-15に装備されている長距離トラック・ホワイル・スキャン・レーダー。
AN/APQ-109=AN/APQ-109|AN/APQ-109は、F-4Dで使用されている長距離マルチモードレーダー。
AN/APQ-120=AN/APQ-120|AN/APQ-120は、F-4Eで使用されている長距離マルチモードレーダー。
AN/AWG-10A=AN/AWG-10|AN/AWG-10は、F-4Jで使用されている長距離マルチモード統合レーダー。
MD-9=MD-9|初期のB-52各型で使用された尾部銃座用火器管制レーダー。

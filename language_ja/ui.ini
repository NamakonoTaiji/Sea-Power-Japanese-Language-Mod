BatteryLow=${Name}: バッテリー残量が10%以下！速度は微速(1/3)に制限される。
# -------------------- Sensors --------------------
UnableToSendWatch=${Name}: 不可。現在潜航中。
UnableToUseFCRUnderwater=${Name}: 水中でのレーダー展開は不可。
UnableToRaiseMast=${Name}: 深度${Depth}以下ではマストを上げられない。以上。
UnableToRaiseMastSeaState=${Name}: 海上が荒れているためマストを上げられない。以上。
UnableToDeployTowedDueSpeed=${Name}: 速度が${MinDeploySpeed}から${MaxDeploySpeed}の範囲外のため${TowedSystemName}を展開できない。以上。
UnableToDeployTowedDueAltitude=${Name}: 高度が${MaxDeployAltitude}を超えているため${TowedSystemName}を展開できない。以上。
UnableToDeployTowedDueSpeedAndAlt=${Name}: 現在の速度と高度では${TowedSystemName}を展開できない。以上。
TooShallowToDeployTowed=${Name}: 海底距離が${MinDepthUnderKeel}未満のため${TowedSystemName}を展開できない。以上。
UnableToUseSnorkelAtThisSpeed=${Name}: 制限速度を超えているためシュノーケルを展開できない。以上。
SurfacedSubsCannotDeployTowed=${Name}: 水上では${TowedSystemName}を展開できない。以上。
BottomIsTooCloseToSub=${Name}: 海底まで50フィート未満のため${TowedSystemName}を展開できない。以上。
NeedToRetractDippingSonar=${Name}: 命令遂行のため吊下式ソナーを格納する。以上。

# -------------------- Weapons/Engage --------------------
Engage=${Name}: トラック${TrackId}と交戦する。了解。


[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=PLAN 03 - Operation Silent Spear (1985)
Description=While on an intelligence gathering mission off Okinawa, one of our Type 091 submarines was detected by the Japanese. Use every capability at your disposal to evade their ASW net and escape the area.
Taskforce1StartMessage=OPERATION\nSILENT SPEAR (1985)|Our Type 091 submarine has approached very close to Okinawa on an intelligence gathering mission, but we were detected briefly by the Japanese and their ASW net is closing in on us.\n\nWe must reach the marked area on the map to escape. An enemy surface force is approaching, and we previously detected at least one submarine nearby. JMSDF air out of Kadena AFB may also be tasked to locate us.\n\nChangzheng 4 must survive.|Start mission
Taskforce1Changzheng4mustsurviveMessage=DEFEAT|FM CMDR North Sea Fleet\nTO CMDR Northern Theater Command\n\n1. Submarine 404 has missed two scheduled check-ins.\n\n2. Radio intercepts from Okinawa/Miyako area show large ASW operation underway by JMSDF with multiple reports of depth charging and sinking an unknown submarine.\n\n3. We assess that Submarine 404 is lost in action with all hands sunk by JMSDF.|Exit mission
Taskforce1Reachareatoescape-playervictoryMessage=VICTORY|FM CMDR North Sea Fleet\nTO CMDR Northern Theater Command\n\n1. Submarine 404 has successfully reported in during pre-set check-in time.\n\n2. 404 reports it was attacked by JMSDF units but successfully escaped the area with intelligence data also transmitted with its report.\n\n3. Radio intercepts from Okinawa/Miyako area show large-scale ASW hunt by JMSDF, without success.\n\n4. Commander of Submarine 404 will be decorated for valor on return to Shandong. Victory is ours!|Exit mission
Trigger3Condition_Condition1AreaLabel=Reach this area to escape
Objective_EscapeArea=Escape the area
Objective_Changzheng4MustSurvive=Changzheng 4 must survive

Taskforce1StartMessage=<size=20>Guerre sino-vietnamienne de 1979</size>\nBATAILLE DE LA MER\nDE CHINE MERIDIONALE|Alors que les hostilitÃĐs font rage sur terre entre la Chine et le Vietnam, notre avant-poste isolÃĐ des Paracels a ÃĐtÃĐ attaquÃĐ par les Vietnamiens et les SoviÃĐtiques. Un convoi de renforts a ÃĐtÃĐ envoyÃĐ depuis la base navale de Yulin. Escortez-le jusqu'aux Paracels et dÃĐtruisez toutes les forces ennemies rencontrÃĐes.\n\nDes forces lÃĐgÃĻres vietnamiennes se dÃĐplaceraient vers l'est depuis HaÃŊphong, et une petite force soviÃĐtique a quittÃĐ Cam Ranh la nuit derniÃĻre, centrÃĐe sur le croiseur de classe Sverdlov Amiral Senyavin.\n\nAu moins un navire de dÃĐbarquement du convoi doit survivre.|DÃĐmarrer la mission
StartForecast=1030 Local: La pluie a cessÃĐ, Vent Force 3
Taskforce1AtleastoneLSTmustsurviveMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT ThÃĐÃĒtre d'opÃĐrations sud\n\n1. La Force d'attaque des mers du Sud signale que notre groupe de renforts se dirigeant vers les ÃŪles Xisha a ÃĐtÃĐ dÃĐtruit par les forces vietnamiennes et soviÃĐtiques.\n\n 2. Nous avons ordonnÃĐ Ã  toutes les forces prÃĐsentes dans la zone de se replier sur Hainan pour se regrouper. De nouvelles actions contre les Vietnamiens sont prÃĐvues.\n\n 3. Le commandant de la Force d'attaque des mers du Sud, en charge des opÃĐrations, arrivera par le premier vol militaire pour se prÃĐsenter aux autoritÃĐs et ÃŠtre entendu.|Quitter la mission
Taskforce1Time+30minweatherchangeMessage=MESSAGE NAVAL|DE CMDT Flotte des mers du sud\nA CMDT Forces d'attaque des mers du sud\n\n1. Les observations mÃĐtÃĐorologiques Ã  10h30, heure locale, indiquent un fort changement de temps. Les opÃĐrations aÃĐriennes sont dÃĐsormais possibles depuis la base aÃĐrienne de Sanya.\n\n2. Les avions de la 8e Division aÃĐrienne et de la 5e Division aÃĐrienne de la PLANAF sont dÃĐsormais disponibles pour des missions.\n\n3. En raison des pertes au combat et de l'utilisation intensive de missiles, seules quelques sorties seront possibles. Bonne chance.|Bien reÃ§u
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=VICTOIRE|DE CMDT Forces d'attaque des mers du sud\nA CMDT ThÃĐÃĒtre d'opÃĐrations sud\n\n1. C'est avec grand plaisir que la Force d'attaque des mers du Sud annonce que le convoi de renforts a atteint notre garnison de l'ÃŪle Robert.\n\n2. De plus, l'attaque vietnamienne a ÃĐtÃĐ repoussÃĐe. Leurs forces commandos, appuyÃĐes par le croiseur lÃĐger soviÃĐtique Amiral Senyavine, ont ÃĐtÃĐ dÃĐtruites.\n\n3. Nous avons subi des pertes, mais remportÃĐ une grande victoire sur l'ennemi.|Quitter la mission
Taskforce1Noplayershipsremaining-defeatMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT Forces d'attaque des mers du sud\n\n1. Nous avons perdu tout contact avec tous les navires affectÃĐs Ã  l'opÃĐration des ÃŪles Xisha. Nous estimons que tous nos navires ont ÃĐtÃĐ perdus au combat contre l'ennemi.\n\n2. Nous avons ordonnÃĐ Ã  toutes les forces prÃĐsentes dans la zone de se replier sur Hainan pour se regrouper. De nouvelles actions contre les Vietnamiens sont prÃĐvues.\n\n3. Le commandant de la Force d'attaque des mers du Sud, sur place, est portÃĐ disparu et prÃĐsumÃĐ mort.|Quitter la mission

Taskforce1AtleastoneLSTmustsurviveMessage=ΊΝρΈ░░|Έ░εΉΜι: ΈΓρΊΧ┤ΊΧρΈΝΑ ΉΓυΈι╣Ά┤Α\nΉΙαΉΜι: Southern Theater Command ΉΓυΈι╣Ά┤Α\n\n1. ΈΓρΊΧ┤ Ά│╡Ά▓σ Έ╢ΑΈΝΑΈΛΦ ΉΜεΉΓυ Ά╡░ΈΠΕΈκε ΊΨξΊΧαΈΛΦ Ήγ░ΈουΉζα ΉδΡΆ╡░Ήζ┤ Έ▓ιΊΛ╕ΈΓρΆ│╝ ΉΗΝΈιρΆ╡░ΉΩΡ ΉζαΊΧ┤ ΊΝΝΆ┤┤ΈΡαΉΩΙΈΜνΆ│ι Έ│┤Ά│ιΊΨΙΉΛ╡ΈΜΙΈΜν.\n\n2. Ήγ░ΈουΈΛΦ Ήζ┤ ΉπΑΉΩφΉζα ΈςρΈΥι Έ│ΣΈιξΉΩΡΆ▓Ν ΉηυΊΟ╕ΉΕ▒ΉζΕ ΉεΕΊΧ┤ ΊΧαΉζ┤ΈΓεΉε╝Έκε ΊδΕΊΘ┤ΊΧαΈζ╝Ά│ι ΈςΖΈι╣ΊΨΙΉΛ╡ΈΜΙΈΜν. Έ▓ιΊΛ╕ΈΓρΉΩΡ ΈΝΑΊΧε Ή╢ΦΆ░Α Ήκ░Ή╣αΆ░Α Ά│ΕΊγΞΈΡαΉΨ┤ ΉηΙΉΛ╡ΈΜΙΈΜν.\n\n3. ΊαΕΉηξ ΉπΑΊεαΆ┤ΑΉζ╕ ΈΓρΊΧ┤ Ά│╡Ά▓σΆ╡░ ΉΓυΈι╣Ά┤ΑΉζΑ ΉΜυΈυ╕ΉζΕ ΉεΕΊΧ┤ Ά░ΑΉηξ Έ╣ιΈξ╕ Ά╡░Ήγσ Έ╣ΕΊΨΚΆ╕░Έκε ΈΠΕΉ░σΊΧι Ά▓ΔΉηΖΈΜΙΈΜν.|Έψ╕ΉΖα ΈΓαΆ░ΑΆ╕░
Taskforce1Time+30minweatherchangeMessage=ΊΧ┤Ά╡░ ΈσΦΉΕ╕ΉπΑ|Έ░εΉΜι: ΈΓρΊΧ┤ΊΧρΈΝΑ ΉΓυΈι╣Ά┤Α\nΉΙαΉΜι: ΈΓρΊΧ┤ Ά│╡Ά▓σΈΝΑ ΉΓυΈι╣Ά┤Α\n\n1. ΊαΕΉπΑ ΉΜεΆ░ΕΉε╝Έκε 10ΉΜε 30Έ╢ΕΉΩΡ Ά╕░ΉΔΒ Ά┤ΑΉ╕κΉζΕ ΊΗ╡ΊΧ┤ Ά╕░ΉΔΒΉζ┤ ΊΒυΆ▓Ν ΉΔΒΉΛ╣ΊΧαΈΛΦ Ά▓ΔΉζΕ ΊβΧΉζ╕ΊΧι ΉΙα ΉηΙΉΛ╡ΈΜΙΈΜν. Ήζ┤Ήιε ΉΓ░ΉΧ╝ Ά│╡Ά╡░ Ά╕░ΉπΑΉΩΡΉΕε ΊΧφΆ│╡ ΉηΣΉιΕΉζ┤ Ά░ΑΈΛξΊΧσΈΜΙΈΜν.\n\n2. Ήιε8ΊΧφΆ│╡ΉΓυΈΜρ Έ░Π ΉνΣΆ╡φΊΧ┤Ά╡░ΊΧφΆ│╡ΈΝΑ Ήιε5ΊΧφΆ│╡ΉΓυΈΜρ ΊΧφΆ│╡Ά╕░Ά░Α Ήζ┤Ήιε ΉηΕΈυ┤ ΉΙαΊΨΚΉζ┤ Ά░ΑΈΛξΊΧσΈΜΙΈΜν.\n\n3. ΉιΕΊΙυ ΉΗΡΉΜνΆ│╝ ΈΝΑΈθΚ Έψ╕ΉΓυΉζ╝ ΉΓυΉγσΉε╝Έκε Ήζ╕ΊΧ┤ ΈςΘ Ά░ΑΉπΑ ΉλΖΈξαΈπΝ Ά░ΑΈΛξΊΧσΈΜΙΈΜν. ΊΨΚΉγ┤ΉζΕ Έ╣ΧΈΜΙΈΜν.|ΊβΧΉζ╕ΈΡρ & Ά│ΕΉΗΞ
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=ΉΛ╣Έου|Έ░εΉΜι: ΈΓρΊΧ┤Ά│╡Ά▓σΈΝΑ ΉΓυΈι╣Ά┤Α\nTO CMDR Southern Theater Command\n\n1. ΈπνΉγ░ Ά╕░ΉΒαΆ▓ΝΈΠΕ, ΈΓρΊΧ┤ Ά│╡Ά▓σΆ╡░ΉζΑ Ά░ΧΊβΦ Ία╕ΉΗκΈΝΑΆ░Α ΈκεΈ▓ΕΊΛ╕ ΉΕυΉΩΡ ΉηΙΈΛΦ Ήγ░Έου ΉΙαΈ╣ΕΈΝΑΉΩΡ ΉΕ▒Ά│╡ΉιΒΉε╝Έκε ΈΠΕΉ░σΊΨΙΈΜνΆ│ι Έ│┤Ά│ιΊΧσΈΜΙΈΜν.\n\n2. Ά▓ΝΈΜνΆ░Α Έ▓ιΊΛ╕ΈΓρΆ╡░Ήζα Ά│╡Ά▓σΉζ┤ Ά▓σΊΘ┤ΈΡαΉΩΙΉΛ╡ΈΜΙΈΜν. ΉΗΝΈιρ Ά▓╜ΉΙεΉΨΣΊΧρ ΉιεΈΠΖ ΉΕ╝ΉΧ╝Έ╣ΙΉζα ΉπΑΉδΡΉζΕ Έ░δΉζΑ Ά╖╕ΈΥνΉζα ΉΛ╡Ά▓σ Έ╢ΑΈΝΑΈΛΦ ΊΝΝΆ┤┤ΈΡαΉΩΙΉΛ╡ΈΜΙΈΜν.\n\n3. Ήγ░ΈουΈΛΦ ΊΝρΈ░░Έξ╝ ΈΜ╣ΊΨΙΉπΑΈπΝ, ΉιΒΉζΕ ΉΔΒΈΝΑΈκε ΊΒ░ ΉΛ╣ΈουΈξ╝ Ά▒░ΈΣΡΉΩΙΉΛ╡ΈΜΙΈΜν.|Έψ╕ΉΖα ΈΓαΆ░ΑΆ╕░
Taskforce1Noplayershipsremaining-defeatMessage=ΊΝρΈ░░|Έ░εΉΜι: ΈΓρΊΧ┤ΊΧρΈΝΑ ΉΓυΈι╣Ά┤Α\nΉΙαΉΜι: Southern Theater Command ΉΓυΈι╣Ά┤Α\n\n1. ΉΜεΉΓυ Ά╡░ΈΠΕ ΉηΣΉιΕΉΩΡ Έ░░ΉιΧΈΡε ΈςρΈΥι ΉΕιΈ░ΧΆ│╝Ήζα ΈςρΈΥι ΉΩ░Έζ╜Ήζ┤ ΈΒΛΆ▓╝ΉΛ╡ΈΜΙΈΜν. Ήγ░ΈουΈΛΦ ΉιΒΉΩΡ ΈΝΑΊΧε ΉιΕΊΙυΉΩΡΉΕε ΈςρΈΥι ΊΧρΉΕιΉζΕ ΉηΔΉΩΙΈΜνΆ│ι ΊΠΚΆ░ΑΊΧσΈΜΙΈΜν.\n\n2. Ήγ░ΈουΈΛΦ Ήζ┤ ΉπΑΉΩφΉζα ΈςρΈΥι Έ│ΣΈιξΉΩΡΆ▓Ν ΉηυΊΟ╕ΉΕ▒ΉζΕ ΉεΕΊΧ┤ ΊΧαΉζ┤ΈΓεΉε╝Έκε ΊδΕΊΘ┤ΊΧαΈζ╝Ά│ι ΈςΖΈι╣ΊΨΙΉΛ╡ΈΜΙΈΜν. Έ▓ιΊΛ╕ΈΓρΉΩΡ ΈΝΑΊΧε Ή╢ΦΆ░Α Ήκ░Ή╣αΆ░Α Ά│ΕΊγΞΈΡαΉΨ┤ ΉηΙΉΛ╡ΈΜΙΈΜν.\n\n3. ΊαΕΉηξ ΉπΑΊεαΆ┤ΑΉζ╕ ΈΓρΊΧ┤ Ά│╡Ά▓σΆ╡░ ΉΓυΈι╣Ά┤ΑΉζ┤ ΉΜνΉλΖΈΡαΉΨ┤ ΉΓυΈπζΊΧε Ά▓ΔΉε╝Έκε Ή╢ΦΉιΧΈΡσΈΜΙΈΜν.|Έψ╕ΉΖα ΈΓαΆ░ΑΆ╕░

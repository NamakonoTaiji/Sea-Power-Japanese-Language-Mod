Taskforce1StartMessage=<size=20>ΉνΣΉδΦΉιΕΉθΒ 1979</size>\nΈΓρΉνΣΆ╡φΊΧ┤\nΉιΕΊΙυ|ΉνΣΆ╡φΆ│╝ Έ▓ιΊΛ╕ΈΓρ ΉΓυΉζ┤Ήζα ΉεκΉπΑΉΩΡΉΕε ΉιΒΈΝΑ ΊΨΚΉεΕΆ░Α ΉπΕΊΨΚΈΡρΉΩΡ ΈΦ░Έζ╝ ΉΜεΉΓυ Ά╡░ΈΠΕΉΩΡ ΉηΙΈΛΦ Ά│ιΈο╜ΈΡε ΉιΕΉ┤Ι Ά╕░ΉπΑΆ░Α Έ▓ιΊΛ╕ΈΓρΆ│╝ ΉΗΝΈιρΉζα Ά│╡Ά▓σΉζΕ Έ░δΆ▓Ν ΈΡαΉΩΙΉΛ╡ΈΜΙΈΜν. ΉειΈο░ ΊΧ┤Ά╡░ Ά╕░ΉπΑΉΩΡΉΕε Ά░ΧΊβΦ Ία╕ΉΗκΈΝΑΆ░Α ΊΝΝΆ▓υΈΡαΉΩΙΉΛ╡ΈΜΙΈΜν. Ία╕ΉΗκΈΝΑΈξ╝ ΉΜεΉΓυ Ά╡░ΈΠΕΈκε Ία╕ΉΗκΊΧαΆ│ι ΈπΙΉμ╝Ή╣ε ΉιΒ Έ│ΣΈιξΉζΕ ΈςρΈΣΡ Ά▓σΊΝΝΊΧαΉΕ╕ΉγΦ.\n\nΈ▓ιΊΛ╕ΈΓρ Ά▓╜Ά╡░Ήζ┤ ΊΧαΉζ┤ΊΡΒΉΩΡΉΕε ΈΠβΉς╜Ήε╝Έκε Ήζ┤ΈΠβ ΉνΣΉζ╕ Ά▓ΔΉε╝Έκε ΉΧΝΈινΉκΝΉε╝Έσ░, ΉΗΝΆ╖εΈςρ ΉΗΝΈιρΆ╡░Ήζ┤ ΉΨ┤ΉιψΈ░ν ΉΛνΈ▓ιΈξ┤ΈΥνΈκεΊΦΕΆ╕Κ ΉΙεΉΨΣΊΧρ ΉΕ╕ΈΔΡΈ╣Ι ΉιεΈΠΖΉζΕ ΉνΣΉΜυΉε╝Έκε Ή║ΕΈηΑΉζΕ ΈΨιΈΓυΉΛ╡ΈΜΙΈΜν.\n\nΉιΒΉΨ┤ΈΠΕ ΊΧαΈΓαΉζα Ία╕ΉΗκ ΉΔΒΈξβΊΧρΉζΑ ΉΔζΉκ┤ΊΧ┤ΉΧ╝ ΊΧσΈΜΙΈΜν.|Έψ╕ΉΖα ΉΜεΉηΣ

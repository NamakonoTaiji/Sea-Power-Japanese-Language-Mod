Taskforce1StartMessage=<size=20>Sino-Vietnamesischer Krieg 1979</size>\nSCHLACHT IM\nSÜDCHINESISCHEN MEER|Da die Feindseligkeiten an Land zwischen China und Vietnam andauern, wird unser isolierter Vorposten auf den Paracel-Inseln von vietnamesischen und sowjetischen Kräften angegriffen. Zur Versärkung wurde ein Konvoi von der Marinebasis Yulin ausgesandt. Eskortieren Sie den Konvoi zu den Paracel-Inseln und vernichten Sie alle angetroffenen feindlichen Kräfte.\n\nBerichten zufolge verlegen leichte vietnamesische Kräfte ostwärts aus Haiphong, zudem ist in der vergangenen Nacht ist eine kleiner sowjetischer Verband von Cam Ranh ausgelaufen, angeführt von einem Kreuzer der Sverdlov-Klasse Admiral Senyavin.\n\nMindestens ein Landungsschiff des Konvois muss überleben.|Mission Starten
StartForecast=1030 Ortszeit: Regen hört auf, Windstärke 3
Taskforce1AtleastoneLSTmustsurviveMessage=NIEDERLAGE|VON KDT Südmeerflotte\nAN KDT, Southern Theater Command\n\n1. Der Südmeerkampfverband meldet, dass unsere Verstärkunk auf dem Weg zu den Xisha-Inseln von vietnamesischen und sowjetischen Streitkräften vernichtet wurde.\n\n2. Wir haben allen Kräfte im Einsatzgebiet befohlen, sich nach Hainan zurückzuziehen, um sich neu zu formieren. Weitere Operationen gegen die Vietnamesen sind geplant.\n\n3. Der Kommandant des Südmeerkampfverbandes, der den Einsatz vor Ort geführt hat, wird mit dem frühestmöglichen Militärflug eintreffen, um sich zur Vernehmung zu melden.|Mission Beenden
Taskforce1Time+30minweatherchangeMessage=NACHRICHT DER MARINE|VON KDT Südmeerflotte\nAN KDT Südmeerkampfverband\n\n1. Wetterbericht, 1030 Ortszeit: Das schwere Wetter hat nachgelassen. Der Flugbetrieb vom Luftwaffenstützpunkt Sanya kann ab sofort aufgenommen werden.\n\n2. Flugzeuge der 8th Air Division und der 5th Air Division der PLAN-Luftstreitkräfte stehen nun zur Auftragserteilung bereit.\n\n3. Aufgrund von Verlusten im Gefecht und intensivem Raketeneinsatz sind nur noch wenige Einsätze möglich. Viel Erfolg.|Bestätigen & Fortfahren
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=SIEG|VON KDT Südmeerkampfverband\nAN KDT Southern Theater Command\n\n1. Mit großer Freude meldet der Südmeerkampfverband, dass der Konvoi erfolgreich unsere Garnison auf Robert Island erreicht hat.\n\n2. Darüber hinaus wurde der Angriff der Vietnamesen zurückgeschlagen. Ihr Kampfverband, angeführt vom sowjetischen Kreuzer ADMIRAL SENYAVIN, ist vernichtet.\n\n3. Wir haben Verluste erlitten, aber einen großen Sieg über den Feind errungen.|Mission Beenden
Taskforce1Noplayershipsremaining-defeatMessage=NIEDERLAGE|VON KDT Südmeerflotte\nAN KDT, Southern Theater Command\n\n1. Wir haben jeglichen Kontakt zu allen Schiffen verloren, die an der Operation um die Xisha-Inseln beteiligt waren. Wir gehen davon aus, dass sämtliche Einheiten im Gefecht gegen den Feind zerstört worden sind.\n\n2. Wir haben allen Kräfte im Einsatzgebiet befohlen, sich nach Hainan zurückzuziehen, um sich neu zu formieren. Weitere Operationen gegen die Vietnamesen sind geplant.\n\n3. Der Kommandant des Südmeerkampfverbandes, der den Einsatz vor Ort geführt hat, gilt als im Einsatz vermisst und wird als gefallen betrachtet.|Mission Beenden

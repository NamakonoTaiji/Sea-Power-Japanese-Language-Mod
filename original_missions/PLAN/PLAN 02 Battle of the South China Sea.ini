Taskforce1StartMessage=<size=20>Guerre sino-vietnamienne de 1979</size>\nBATAILLE DE LA MER\nDE CHINE MERIDIONALE|Alors que les hostilit├σs font rage sur terre entre la Chine et le Vietnam, notre avant-poste isol├σ des Paracels a ├σt├σ attaqu├σ par les Vietnamiens et les Sovi├σtiques. Un convoi de renforts a ├σt├σ envoy├σ depuis la base navale de Yulin. Escortez-le jusqu'aux Paracels et d├σtruisez toutes les forces ennemies rencontr├σes.\n\nDes forces l├σg├ρres vietnamiennes se d├σplaceraient vers l'est depuis Ha├ψphong, et une petite force sovi├σtique a quitt├σ Cam Ranh la nuit derni├ρre, centr├σe sur le croiseur de classe Sverdlov Amiral Senyavin.\n\nAu moins un navire de d├σbarquement du convoi doit survivre.|D├σmarrer la mission
StartForecast=1030 Local: La pluie a cess├σ, Vent Force 3
Taskforce1AtleastoneLSTmustsurviveMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT Th├σ├λtre d'op├σrations sud\n\n1. La Force d'attaque des mers du Sud signale que notre groupe de renforts se dirigeant vers les ├χles Xisha a ├σt├σ d├σtruit par les forces vietnamiennes et sovi├σtiques.\n\n 2. Nous avons ordonn├σ ├ι toutes les forces pr├σsentes dans la zone de se replier sur Hainan pour se regrouper. De nouvelles actions contre les Vietnamiens sont pr├σvues.\n\n 3. Le commandant de la Force d'attaque des mers du Sud, en charge des op├σrations, arrivera par le premier vol militaire pour se pr├σsenter aux autorit├σs et ├ςtre entendu.|Quitter la mission
Taskforce1Time+30minweatherchangeMessage=MESSAGE NAVAL|DE CMDT Flotte des mers du sud\nA CMDT Forces d'attaque des mers du sud\n\n1. Les observations m├σt├σorologiques ├ι 10h30, heure locale, indiquent un fort changement de temps. Les op├σrations a├σriennes sont d├σsormais possibles depuis la base a├σrienne de Sanya.\n\n2. Les avions de la 8e Division a├σrienne et de la 5e Division a├σrienne de la PLANAF sont d├σsormais disponibles pour des missions.\n\n3. En raison des pertes au combat et de l'utilisation intensive de missiles, seules quelques sorties seront possibles. Bonne chance.|Bien re├πu
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=VICTOIRE|DE CMDT Forces d'attaque des mers du sud\nA CMDT Th├σ├λtre d'op├σrations sud\n\n1. C'est avec grand plaisir que la Force d'attaque des mers du Sud annonce que le convoi de renforts a atteint notre garnison de l'├χle Robert.\n\n2. De plus, l'attaque vietnamienne a ├σt├σ repouss├σe. Leurs forces commandos, appuy├σes par le croiseur l├σger sovi├σtique Amiral Senyavine, ont ├σt├σ d├σtruites.\n\n3. Nous avons subi des pertes, mais remport├σ une grande victoire sur l'ennemi.|Quitter la mission
Taskforce1Noplayershipsremaining-defeatMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT Forces d'attaque des mers du sud\n\n1. Nous avons perdu tout contact avec tous les navires affect├σs ├ι l'op├σration des ├χles Xisha. Nous estimons que tous nos navires ont ├σt├σ perdus au combat contre l'ennemi.\n\n2. Nous avons ordonn├σ ├ι toutes les forces pr├σsentes dans la zone de se replier sur Hainan pour se regrouper. De nouvelles actions contre les Vietnamiens sont pr├σvues.\n\n3. Le commandant de la Force d'attaque des mers du Sud, sur place, est port├σ disparu et pr├σsum├σ mort.|Quitter la mission

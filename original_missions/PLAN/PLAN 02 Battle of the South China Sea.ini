Taskforce1StartMessage=<size=20>Sino-Vietnamesischer Krieg 1979</size>\nSCHLACHT IM\nS▄DCHINESISCHEN MEER|Da die Feindseligkeiten an Land zwischen China und Vietnam andauern, wird unser isolierter Vorposten auf den Paracel-Inseln von vietnamesischen und sowjetischen Krϊften angegriffen. Zur Versϊrkung wurde ein Konvoi von der Marinebasis Yulin ausgesandt. Eskortieren Sie den Konvoi zu den Paracel-Inseln und vernichten Sie alle angetroffenen feindlichen Krϊfte.\n\nBerichten zufolge verlegen leichte vietnamesische Krϊfte ostwϊrts aus Haiphong, zudem ist in der vergangenen Nacht ist eine kleiner sowjetischer Verband von Cam Ranh ausgelaufen, angefⁿhrt von einem Kreuzer der Sverdlov-Klasse ΕAdmiral SenyavinΥ.\n\nMindestens ein Landungsschiff des Konvois muss ⁿberleben.|Mission Starten
StartForecast=1030 Ortszeit: Regen h÷rt auf, Windstϊrke 3
Taskforce1AtleastoneLSTmustsurviveMessage=NIEDERLAGE|VON KDT Sⁿdmeerflotte\nAN KDT, Southern Theater Command\n\n1. Der Sⁿdmeerkampfverband meldet, dass unsere Verstϊrkunk auf dem Weg zu den Xisha-Inseln von vietnamesischen und sowjetischen Streitkrϊften vernichtet wurde.\n\n2. Wir haben allen Krϊfte im Einsatzgebiet befohlen, sich nach Hainan zurⁿckzuziehen, um sich neu zu formieren. Weitere Operationen gegen die Vietnamesen sind geplant.\n\n3. Der Kommandant des Sⁿdmeerkampfverbandes, der den Einsatz vor Ort gefⁿhrt hat, wird mit dem frⁿhestm÷glichen Militϊrflug eintreffen, um sich zur Vernehmung zu melden.|Mission Beenden
Taskforce1Time+30minweatherchangeMessage=NACHRICHT DER MARINE|VON KDT Sⁿdmeerflotte\nAN KDT Sⁿdmeerkampfverband\n\n1. Wetterbericht, 1030 Ortszeit: Das schwere Wetter hat nachgelassen. Der Flugbetrieb vom Luftwaffenstⁿtzpunkt Sanya kann ab sofort aufgenommen werden.\n\n2. Flugzeuge der 8th Air Division und der 5th Air Division der PLAN-Luftstreitkrϊfte stehen nun zur Auftragserteilung bereit.\n\n3. Aufgrund von Verlusten im Gefecht und intensivem Raketeneinsatz sind nur noch wenige Einsϊtze m÷glich. Viel Erfolg.|Bestϊtigen & Fortfahren
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=SIEG|VON KDT Sⁿdmeerkampfverband\nAN KDT Southern Theater Command\n\n1. Mit gro▀er Freude meldet der Sⁿdmeerkampfverband, dass der Konvoi erfolgreich unsere Garnison auf Robert Island erreicht hat.\n\n2. Darⁿber hinaus wurde der Angriff der Vietnamesen zurⁿckgeschlagen. Ihr Kampfverband, angefⁿhrt vom sowjetischen Kreuzer ADMIRAL SENYAVIN, ist vernichtet.\n\n3. Wir haben Verluste erlitten, aber einen gro▀en Sieg ⁿber den Feind errungen.|Mission Beenden
Taskforce1Noplayershipsremaining-defeatMessage=NIEDERLAGE|VON KDT Sⁿdmeerflotte\nAN KDT, Southern Theater Command\n\n1. Wir haben jeglichen Kontakt zu allen Schiffen verloren, die an der Operation um die Xisha-Inseln beteiligt waren. Wir gehen davon aus, dass sϊmtliche Einheiten im Gefecht gegen den Feind zerst÷rt worden sind.\n\n2. Wir haben allen Krϊfte im Einsatzgebiet befohlen, sich nach Hainan zurⁿckzuziehen, um sich neu zu formieren. Weitere Operationen gegen die Vietnamesen sind geplant.\n\n3. Der Kommandant des Sⁿdmeerkampfverbandes, der den Einsatz vor Ort gefⁿhrt hat, gilt als im Einsatz vermisst und wird als gefallen betrachtet.|Mission Beenden

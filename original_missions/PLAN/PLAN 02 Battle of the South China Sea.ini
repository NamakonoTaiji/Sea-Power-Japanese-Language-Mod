
[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=PLAN 02 - Battle of the South China Sea (1979)
Description=The Sino-Vietnamese War is underway, and Vietnamese forces are once again attempting to oust the PLA from the Paracels. With Soviet support, they are launching an attack on our isolated outpost on Robert Island. Take charge of the South Seas Fleet forces at Hainan to resupply and reinforce our forces in the Paracels, and destroy any Vietnamese counterattack.
Taskforce1Vessel3NameOverride=333
Taskforce1Vessel3ShortNameOverride=333
Taskforce1Vessel7NameOverride=287
Taskforce1Vessel7ShortNameOverride=287
Taskforce1Vessel8NameOverride=321
Taskforce1Vessel8ShortNameOverride=321
Taskforce1Vessel9NameOverride=322
Taskforce1Vessel9ShortNameOverride=322
NeutralLandUnit1NameOverride=Sanya Airbase
NeutralLandUnit1ShortNameOverride=Sanya Airbase
Taskforce1StartMessage=<size=20>Sino-Vietnamese War 1979</size>\nBATTLE OF THE\nSOUTH CHINA SEA|With hostilities underway on land between China and Vietnam, our isolated outpost in the Paracels has come under attack by the Vietnamese and Soviets. A reinforcement convoy has been sent from Yulin naval base. Escort the convoy to the Paracels, and destroy any enemy forces encountered.\n\nVietnamese light forces are reportedly moving east from Haiphong, and a small Soviet force left Cam Ranh last night, centered on the Sverdlov-class cruiser Admiral Senyavin.\n\nAt least one convoy landing ship must survive.|Start mission
StartForecast=1030 Local: Rain stops, Wind Force 3
Taskforce1AtleastoneLSTmustsurviveMessage=DEFEAT|FM CMDR, South Seas Fleet\nTO CMDR, Southern Theater Command\n\n1. South Seas Attack Force reports that our reinforcement group heading to Xisha Islands has been destroyed by Vietnamese and Soviet forces.\n\n2. We have ordered all forces in the area to retreat to Hainan to regroup. Further action against the Vietnamese is planned.\n\n3. Commander South Seas Attack Force, the on-scene commander, will arrive by earliest military flight to report for questioning.|Exit mission
Taskforce1Time+30minweatherchangeMessage=NAVAL MESSAGE|FM CMDR South Seas Fleet\nTO CMDR South Seas Attack Force\n\n1. Weather observation at 1030 local time shows heavy weather lifting. Air operations are now possible from Sanya Air Base.\n\n2. 8th Air Division and PLANAF 5th Air Division aircraft are now available for tasking.\n\n3. Due to combat losses and heavy missile use, only a few sorties are possible. Good luck.|Acknowledge & continue
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=VICTORY|FM CMDR South Seas Attack Force\nTO CMDR Southern Theater Command\n\n1. With great pleasure, South Seas Attack Force reports reinforcement convoy has successfully reached our garrison at Robert Island.\n\n2. Further, attack by Vietnamese has been repulsed. Their raiding force supported by Soviet light cruiser ADMIRAL SENYAVIN is destroyed.\n\n3. We have taken losses, but scored a great victory over the enemy.|Exit mission
Taskforce1Noplayershipsremaining-defeatMessage=DEFEAT|FM CMDR, South Seas Fleet\nTO CMDR, Southern Theater Command\n\n1. We have lost all contact with all ships assigned to Xisha Islands operation. We assess that all our ships have been lost in action against the enemy.\n\n2. We have ordered all forces in the area to retreat to Hainan to regroup. Further action against the Vietnamese is planned.\n\n3. Commander South Seas Attack Force, the on-scene commander, is missing in action and presumed dead.|Exit mission

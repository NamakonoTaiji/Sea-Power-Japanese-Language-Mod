Taskforce1StartMessage=FLUCHT AUS\nDER SULUSEE|Unsere Kräfte, die ein Manöver zur Wahrung der Freiheit der Schifffahrt in der Sulusee durchführen, sind durch philippinische Streitkräfte angegriffen worden. Kämpfen Sie sich durch die Balabacstraße und erreichen Sie die Palawan-Passage, um nach Norden zu entkommen.\n\nDie philippinischen Kräfte versuchen, die Balabacstraße zu blockieren. Besagte Kräfte werden von leichten Kampfhubschraubern unterstützt, zudem könnten auch Jagdflugzeuge eingesetzt werden. Unsere Südmeerflotte setzt alles daran, uns schnellstens zu unterstützen, doch wir werden voraussichtlich bis zum Erreichen der Straße auf uns allein gestellt sein.\n\nMindestens eines Ihrer Schiffe muss überleben.|Mission Starten
Taskforce1Reachareatoescape-playervictoryMessage=SIEG|VON KDT, Südmeerflotte\nAN KDT, Southern Theater Command\n\n1. Die Aufklärungsgruppe Sulusee hat die BalabacStraße erfolgreich passiert und unsere Hoheitsgewässer erreicht.\n\n2. Sie meldete schwere AngriffE durch philippinische Streitkräfte, unterstützt von vietnamesischen Flugzeugen. Dies stellt eine erhebliche Eskalation uns gegenüber dar.\n\n3. Der Kommandant der Aufklärungsgruppe Sulusee wird nach seiner Rückkehr nach Yulin für seine Tapferkeit ausgezeichnet. Wir haben einen großen Sieg errungen!|Mission Beenden
Taskforce1SuluSeaForcedestroyed-playerdefeatMessage=NIEDERLAGE|VON KDT, Südmeerflotte\nAN KDT, Southern Theater Command\n\n1. Wir haben den Kontakt zur Aufklärungsgruppe Sulusee verloren.\n\n2. Die letzte Meldung des Kommandanten der Aufklärungsgruppe Sulusee wies darauf hin, dass sie anhaltenden Bomben- und Flugkörperangriffen durch philippinische Kräfte ausgesetzt waren.\n\n3. Wir gehen davon aus, dass die Aufklärungsgruppe Sulusee vernichtet wurde.|Mission Beenden
Taskforce1USSAGattacked-sidechangeMessage=NACHRICHT DER MARINE|VON KDT, Südmeerflotte\nAN KDT, Aufklärungsgruppe Sulusee\n\n1. WARNUNG: Ein US-Einsatzverband vor Palawan meldet, von unseren Seezielflugkörpern angegriffen und getroffen worden zu sein.\n\n2. Zwar wollen die Amerikaner diplomatischen Protest einlegen, doch beachten Sie, dass die US-Streitkräfte im Gebiet dennoch auch militärisch gegen Sie vorgehen könnten.\n\n3. Setzen Sie Ihren Auftrag fort und entkommen Sie, wenn möglich. Viel Glück.|Bestätigen & Fortfahren
Taskforce145minSSGsidechangeMessage=NACHRICHT DER MARINE|VON KDT, Südmeerflotte\nAN KDT, Aufklärungsgruppe Sulusee\n\n1. Das experimentelle U-Boot Yuanzheng 351, welches sich derzeit auf Ausbildungsfahrt bei den Spratly-Inseln befindet, hat soeben Meldung erstattet und steht nun zur Unterstützung bereit.\n\n2. Yuanzheng 351 hält Position südwestlich der Balabacstraße und ist mit 6 Ũ YJ-8-Flugkörpern ausgerüstet.\n\n3. Hinweis: Dieses U-Boot ist ein Hochwertziel, sein Überleben ist zwingend erforderlich.|Bestätigen & Fortfahren
Taskforce1351mustsurviveMessage=NIEDERLAGE|VON KDT, Südmeerflotte\nAN KDT, Southern Theater Command\n\n1. Das U-Boot 351 hat die planmäßige Meldung verpasst.\n\n2. Die letzte Übertragung von 351 berichtete von einem Angriff unbekannter Kräfte. Wir gehen davon aus, dass wir das U-Boot 351 verloren haben.\n\n3. Der Kommandant der Aufklärungsgruppe Sulusee wird sich schnellstmöglich im Hauptquartier melden, um an einer dringenden Nachbesprechung teilzunehmen, da anzunehmen ist, dass sein leichtsinniges Handeln zum Verlust dieses wertvollen Einsatzmitteln geführt hat.|Mission Beenden
Trigger2Condition_Condition1AreaLabel=Dieses Gebiet erreichen um zu entkommen!
Objective_ReachMarkedArea=Erreichen Sie das markierte Gebiet um zu entkommen
Objective_OneShipMustSurvive=Mindestens eines Ihrer Schiffe muss überleben
Objective_351MustSurvive=Yuanzheng 351 muss überleben

Taskforce1Reachareatoescape-playervictoryMessage=VICTOIRE|DE CMDT Flotte des mers du sud\nA CMDT ThÃĐÃĒtre d'opÃĐrations sud\n\n1. La Force de reconnaissance maritime de Sulu a traversÃĐ avec succÃĻs le dÃĐtroit de Balabac et s'est rÃĐfugiÃĐe dans nos eaux territoriales.\n\n2. Elle a signalÃĐ avoir subi une attaque massive des forces philippines appuyÃĐes par l'aviation vietnamienne. Il s'agit d'une escalade majeure des hostilitÃĐs Ã  notre encontre.\n\n3. Le commandant de la Force de reconnaissance maritime de Sulu sera dÃĐcorÃĐ pour sa bravoure Ã  son retour Ã  Yulin. Nous avons remportÃĐ une grande victoire !|Quitter la mission
Taskforce1SuluSeaForcedestroyed-playerdefeatMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT ThÃĐÃĒtre d'opÃĐrations sud\n\n1. Nous avons perdu le contact avec la Force de reconnaissance maritime de Sulu.\n\n2. La derniÃĻre transmission du commandant de la Force de reconnaissance maritime de Sulu indiquait qu'elle avait subi des attaques soutenues de bombes, de roquettes et de missiles de la part des forces philippines.\n\n3. Nous estimons que la Force de reconnaissance maritime de Sulu a ÃĐtÃĐ dÃĐtruite.|Quitter la mission
Taskforce1USSAGattacked-sidechangeMessage=MESSAGE NAVAL|DE CMDT Flotte des mers du sud\nA CMDT Force de reconnaissance Mer de Sulu\n\n1. AVERTISSEMENT : La force opÃĐrationnelle amÃĐricaine au large de Palawan signale avoir ÃĐtÃĐ attaquÃĐe et touchÃĐe par nos missiles antinavires.\n\n2. Les AmÃĐricains ont dÃĐposÃĐ un recours diplomatique, mais sachez que les forces amÃĐricaines prÃĐsentes dans la zone pourraient vous attaquer sans avertissement.\n\n3. Poursuivez votre opÃĐration et ÃĐchappez-vous si possible. Bonne chance.|Bien reÃ§u
Taskforce145minSSGsidechangeMessage=NAVAL MESSAGE|DE CMDT Flotte des mers du sud\nA CMDT Force de reconnaissance Mer de Sulu\n\n1. Le sous-marin expÃĐrimental Yuanzheng 351, en croisiÃĻre d'entraÃŪnement prÃĻs des ÃŪles Spratly, vient de se signaler et est dÃĐsormais prÃŠt Ã  vous aider.\n\n2. Le Yuanzheng 351 est en attente au sud-ouest du dÃĐtroit de Balabac et est ÃĐquipÃĐ de six missiles YJ-8.\n\n3. Remarque : ce sous-marin est un ÃĐlÃĐment clÃĐ de notre dÃĐfense et sa survie est essentielle. |Bien reÃ§u
Taskforce1351mustsurviveMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT ThÃĐÃĒtre d'opÃĐrations sud\n\n1. Le sous-marin 351 nâa pas atteint son point de contrÃīle planifiÃĐ.\n\n2. La derniÃĻre transmission du 351 signale une attaque par des forces inconnues. Nous estimons que le sous-marin 351 a ÃĐtÃĐ perdu.\n\n3. Le commandant de la force de reconnaissance maritime de Sulu se prÃĐsentera au plus tÃīt au GQG pour un compte rendu, car nous pensons que son acte imprudent a entraÃŪnÃĐ la perte de cet atout stratÃĐgique essentiel.|Quitter la mission

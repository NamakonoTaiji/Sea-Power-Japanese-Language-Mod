[Language_de]
Name=PLAN 04 - Flucht aus der Sulusee (1988)
Description=Die Südmeerflotte hat einen Kampfverband (SAG) in die Sulusee zu einem Manöver zur Wahrung der Freiheit der Schifffahrt entsandt. Leider geriet die SAG unter Beschuss durch philippinische Streitkräfte. Kämpfen Sie sich durch die Balabacstraße und erreichen Sie die Palawan-Passage, um nach Norden zu entkommen.
Taskforce2Vessel1NameOverride=Francisco Dagohoy PF-10
Taskforce2Vessel1ShortNameOverride=Francisco Dagohoy PF-10
Taskforce2Vessel2NameOverride=Diego Silang PF-9
Taskforce2Vessel2ShortNameOverride=Diego Silang PF-9

Taskforce1StartMessage=ESCAPE FROM\nTHE SULU SEA|Our force conducting an exercise in the Sulu Sea has come under attack by Filipino forces. Fight your way through the Balabac Strait and reach the Palawan Passage to escape north.\n\nFilipino surface forces are attempting to blockade the strait. They are supported by light attack helicopters, and strike aircraft may sortie in support as well. Our South Seas Fleet is scrambling to assist, but we are likely on our own until we transit the strait.\n\nAt least one of your ships must survive.|Start mission
Taskforce1Reachareatoescape-playervictoryMessage=VICTORY|FM CMDR, South Seas Fleet\nTO CMDR, Southern Theater Command\n\n1. Sulu Sea Scouting Force has successfully transited Balabac Strait and escaped to our territorial waters.\n\n2. They reported coming under heavy attack by Filipino forces supported by Vietnamese aircraft. This is a major escalation of hostility against us.\n\n3. Commander Sulu Sea Scouting Force will be decorated for valor on his return to Yulin. We have won a great victory!|Exit mission
Taskforce1SuluSeaForcedestroyed-playerdefeatMessage=DEFEAT|FM CMDR, South Seas Fleet\nTO CMDR, Southern Theater Command\n\n1. We have lost contact with Sulu Sea Scouting Force.\n\n2. Last transmission from Commander, Sulu Sea Scouting Force, indicated they had come under sustained bomb, rocket, and missile attack by Philippines forces.\n\n3. We assess that Sulu Sea Scouting Force has been destroyed.|Exit mission
Taskforce1USSAGattacked-sidechangeMessage=NAVAL MESSAGE|FM CMDR, South Seas Fleet\nTO CMDR, Sulu Sea Scouting Force\n\n1. WARNING: US task force off Palawan reports being attacked and hit by our anti-ship missiles.\n\n2. Americans are filing a diplomatic protest, but be advised that US forces in the area may attack you without warning.\n\n3. Continue your operation and escape if you can. Good luck.|Acknowledge & continue
Taskforce145minSSGsidechangeMessage=NAVAL MESSAGE|FM CMDR, South Seas Fleet\nTO CMDR, Sulu Sea Scouting Force\n\n1. Experimental submarine Yuanzheng 351 on training cruise near Spratly Islands has just reported in and is now ready to assist you.\n\n2. Yuanzheng 351 is holding station southwest of Balabac Strait and is equipped with 6 x YJ-8 missiles.\n\n3. Note: this submarine is a critical defense asset and its survival is required.|Acknowledge & continue
Taskforce1351mustsurviveMessage=DEFEAT|FM CMDR, South Seas Fleet\nTO CMDR, Southern Theater Command\n\n1. Submarine 351 has now missed scheduled check-in.\n\n2. Last transmission from 351 reported coming under attack by unknown forces. We assess Submarine 351 has been lost.\n\n3. Commander Sulu Sea Scouting Force will report to GHQ at earliest for debriefing, as we believe his reckless action has led to loss of this critical strategic asset.|Exit mission
Trigger2Condition_Condition1AreaLabel=Reach this area to escape!
Objective_ReachMarkedArea=Reach the marked area to escape
Objective_OneShipMustSurvive=At least one of your ships must survive
Objective_351MustSurvive=Yuanzheng 351 must survive

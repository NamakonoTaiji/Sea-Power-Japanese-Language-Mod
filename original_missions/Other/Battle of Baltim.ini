[Language_ko]
Name=발팀 해전 1973
Description=욤 키푸르 전쟁이 시작된 지 사흘 만에 이스라엘 군대는 아랍 국가들에 맞서 치열한 전투를 벌이고 있습니다. 최근 라타키아 해전에서 승리하고 돌아온 사르급 미사일 고속정 부대가 IDF의 시나이 진격을 지원하기 위해 서쪽으로 재배치되었습니다. 사이드 항구로 이동한 다음 해당 지역에서 이집트 미사일 고속정 함대를 찾아 파괴하십시오.
Taskforce1StartmessageMessage=<size=20>욤 키푸르 전쟁 - 파트2</size>\\n발팀 해전|욤 키푸르 전쟁이 시작된 지 사흘 만에 이스라엘 군대는 아랍 국가들에 맞서 치열한 전투를 벌이고 있습니다. 최근 라타키아 해전에서 승리하고 돌아온 사르급 미사일 고속정 부대가 IDF의 시나이 진격을 지원하기 위해 서쪽으로 재배치되었습니다.\\n\\n정찰 결과 알렉산드리아에서 동쪽으로 이동하는 이집트 오사급 미사일 고속정 4척이 발견되었습니다. 서쪽으로 이동하여 그들을 파괴하십시오. 해안 근처에서는 민간 교통이 혼잡할 것으로 예상됩니다.\\n\\n최소한 한 척의 이스라엘 함선이 생존해야 합니다.|미션 시작
Taskforce1Osasdestroyed-playervictoryMessage=승리|승리! 당신은 모든 이집트군의 미사일 고속정을 격파했습니다. 수고하셨습니다, 사령관님.|미션 나가기
Taskforce2Osasdestroyed-playervictoryMessage="<color=red>미션 실패</color>|모든 아군이 전멸했습니다. 당신은 패배했습니다."
Taskforce1Playerdestroyed-playerdefeatMessage=패배|패배! 당신은 모든 함선을 잃었습니다!|미션 나가기
Objective_DestroyEnemyMissileBoats=적의 미사일 고속정 파괴

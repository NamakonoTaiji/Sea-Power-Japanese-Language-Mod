[Language_cn]
Name=巴尔的姆之战（1973）
Description=赎罪日战争爆发三天后，以色列军队正全力与阿拉伯国家作战。你的导弹艇部队刚从拉塔基亚之战中得胜而归，已改道向西，支援以色列国防军向西奈半岛推进。前往塞得港，找到并摧毁此地区的埃及导弹艇舰队。
Taskforce1StartmessageMessage=<size=20>赎罪日战争——第2部分</size>\n巴尔的姆之战|赎罪日战争爆发三天后，以色列军队正全力与阿拉伯国家作战。你的导弹艇部队刚从拉塔基亚之战中得胜而归，已改道向西，支援以色列国防军向西奈半岛推进。\n\n侦察发现埃及的4艘205型导弹艇从亚历山大港向东移动，向西航行并摧毁它们。预计靠近海岸的位置会有大量民用船只通行。\n\n至少有一艘以色列船只不被击沉。|开始任务
Taskforce1Osasdestroyed-playervictoryMessage=任务完成！|任务完成！埃及导弹艇已被全部摧毁。干得好，指挥官！|退出任务
Taskforce2Osasdestroyed-playervictoryMessage=<color=red>任务失败！</color>|我军部队已损失殆尽，你失败了。
Taskforce1Playerdestroyed-playerdefeatMessage=任务失败！|你失败了！你的所有船只都在战斗中损失了！|退出任务
Objective_DestroyEnemyMissileBoats=摧毁敌方导弹艇
Objective_OneShipMustSurvive=玩家至少有一艘船只不被击沉

[Language_es]

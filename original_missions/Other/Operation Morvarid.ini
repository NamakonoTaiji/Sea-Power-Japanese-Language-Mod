
[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=Operation Morvarid 1980
Description=The Iranian Navy has been ordered to strike the oil terminals off Um-Qasr. Last night, naval special forces landed on the offshore platforms and planted demolition charges, destroying them. The Iranian patrol boats Joshan and Paykan are now off Al-Faw attempting to lure the Iraqi Navy into battle. Command the Iranian forces in the area to destroy them.
Taskforce2LandUnit1NameOverride=Al-Faw Radar Site
Taskforce2LandUnit1ShortNameOverride=Al-Faw Radar Site
NeutralLandUnit1NameOverride=Khor al-Amaya Oil Terminal
NeutralLandUnit1ShortNameOverride=Khor al-Amaya
NeutralLandUnit2NameOverride=Mina al-Bakr Oil Terminal
NeutralLandUnit2ShortNameOverride=Mina al-Bakr Oil Terminal
Taskforce1StartmessageMessage=<size=20>The Iran-Iraq War</size>\nOPERATION MORVARID|The Iranian navy has been ordered to attack Iraqi installations at Um-Qasr and Al-Faw. Your force of missile boats is holding station off the Shatt al-Arab river, attempting to lure the Iraqis into battle.\n\nOnce enemy forces exit the harbor, engage and destroy them. Friendly air support is inbound from Bushehr, reporting on top in 15 minutes.\n\nAt least one of your patrol boats must survive.|Start mission
Taskforce1Playershipsdestroyed-defeatMessage=DEFEAT|Defeat! All of your ships have been destroyed!|Exit mission
Taskforce1ContactwarningmessageMessage=VHF RADIO CALL|"Joshan, this is Paykan. Enemy boats are attempting an attack from Al-Faw to the north and Um-Qasr to the west. We should use the oil platforms to confuse their missile seekers."|Acknowledged!
Taskforce1Allshipsdestroyed-playervictoryMessage=VICTORY|Victory! All of the Iraqi Navy ships have been destroyed. Their remaining naval forces will spend the rest of the war in port. Good work, Commander.|Exit mission
Taskforce1LSMdetectedmessageMessage=VHF RADIO CALL|"Commander, there is a large surface contact exiting Um-Qasr escorted by two smaller contacts. We evaluate this track to be one of the Iraqi LSMs, likely carrying naval special forces attempting to reoccupy the oil terminal platforms. Command has ordered that we destroy this group when possible."|Acknowledged!
Taskforce1F-4EcheckinMessage=MISSION UPDATE|"Commander, this is Phantom flight from Bushehr checking in from the east. Two aircraft, four Mavericks each, ready for direction, over."|Acknowledged!
Objective_DestroyEnemyForces=Destroy all enemy forces encountered
Objective_OneShipMustSurvive=At least one of your ships must survive
[Language_fr]
Name=Opération Morvarid 1980
Description=La marine iranienne a reçu l'ordre de frapper les terminaux pétroliers au large d'Um-Qasr. La nuit dernière, des forces spéciales navales ont débarqué sur les plateformes offshore et posé des charges de démolition, les détruisant. Les patrouilleurs iraniens Joshan et Paykan se trouvent actuellement au large d'Al-Faw et tentent d'attirer la marine irakienne au combat. Donnez l'ordre aux forces iraniennes présentes dans la zone de les détruire.
Taskforce2LandUnit1NameOverride=Site radar d'Al-Faw
Taskforce2LandUnit1ShortNameOverride=Site radar d'Al-Faw
NeutralLandUnit1NameOverride=Terminal pétrolier de Khor al-Amaya
NeutralLandUnit1ShortNameOverride=Khor al-Amaya
NeutralLandUnit2NameOverride=Terminal pétrolier de Mina al-Bakr
NeutralLandUnit2ShortNameOverride=Terminal pétrolier de Mina al-Bakr
Taskforce1StartmessageMessage=<size=20>Guerre Iran-Irak</size>\nOPERATION MORVARID|La marine iranienne a reçu l'ordre d'attaquer les installations irakiennes d'Um-Qasr et d'Al-Faw. Votre flotille de vedettes lance-missiles maintient sa position au large du Chatt al-Arab, tentant d'attirer les Irakiens au combat.\n\nUne fois les forces ennemies sorties du port, engagez-les et détruisez-les. Un soutien aérien allié arrive de Bushehr, et sera annoncé dans 15 minutes.\n\nAu moins une de vos vedettes doit survivre.|Commencer la mission
Taskforce1Playershipsdestroyed-defeatMessage=DEFAITE|Défaite ! Tous vos navires ont été détruits !|Quitter la mission
Taskforce1ContactwarningmessageMessage=APPEL RADIO VHF|"Joshan, ici Paykan. Des bateaux ennemis tentent une attaque depuis Al-Faw au nord et Um-Qasr à l'ouest. Nous devrions utiliser les plateformes pétrolières pour dérouter leurs autodirecteurs de missiles."|Bien reçu !
Taskforce1Allshipsdestroyed-playervictoryMessage=VICTOIRE|Victoire ! Tous les navires de la marine irakienne ont été détruits. Les forces navales restantes passeront le reste de la guerre au port. Bravo, Commandant.|Quitter la mission
Taskforce1LSMdetectedmessageMessage=APPEL RADIO VHF|"Commandant, un important contact de surface quitte Um-Qasr, escorté par deux contacts plus petits. Nous estimons qu'il s'agit d'un des LSM irakiens, transportant probablement des forces spéciales navales tentant de réoccuper les plateformes du terminal pétrolier. Le commandement a ordonné la destruction de ce groupe dès que possible."|Bien reçu !
Taskforce1F-4EcheckinMessage=MISSION UPDATE|"Commandant, ici l'escadrille Phantom de Bushehr, arrivée de l'est. Deux appareils, quatre Mavericks chacun, prêts à recevoir vos ordres. À vous."|Bien reçu !
Objective_DestroyEnemyForces=Détruisez toutes les forces ennemies rencontrées
Objective_OneShipMustSurvive=Au moins l'un de vos navires doit survivre
[Language_cn]
Name=珍珠行动（1980）
Description=伊朗海军已收到命令对乌姆盖萨尔附近的油港进行打击。昨夜，海军特种部队登上了海上平台，放置了破拆炸药并将其炸毁。伊朗海军的胸甲号和箭头号巡逻艇正在法奥附近，试图引诱伊拉克海军交战。指挥此区域内的伊朗军队消灭敌军。
Taskforce2LandUnit1NameOverride=法奥雷达站
Taskforce2LandUnit1ShortNameOverride=法奥雷达站
NeutralLandUnit1NameOverride=豪尔艾迈耶油港
NeutralLandUnit1ShortNameOverride=豪尔艾迈耶油港
NeutralLandUnit2NameOverride=米纳巴克尔油港
NeutralLandUnit2ShortNameOverride=米纳巴克尔油港
Taskforce1StartmessageMessage=<size=20>两伊战争</size>\n珍珠行动|伊朗海军已收到命令攻击伊拉克在乌姆盖萨尔和法奥的设施。你的导弹艇部队正在阿拉伯河附近停留，尝试引诱伊拉克人交战。\n\n一旦敌军部队离开港口，就与他们交战并将其消灭。友方空中支援会从布什尔方向入场，15分钟后就位。\n\n玩家至少有一艘船只不被击沉。|开始任务
Taskforce1Playershipsdestroyed-defeatMessage=任务失败！|任务失败！你的所有船只都都已被摧毁！|退出任务
Taskforce1ContactwarningmessageMessage=甚高频无线电呼叫|胸甲号，这里是箭头号。敌方船只正试图从北部的法奥和西部的乌姆盖萨尔发起攻击。我们应该利用石油平台来迷惑他们的导弹导引头。|收到！
Taskforce1Allshipsdestroyed-playervictoryMessage=任务完成！|任务完成！所有伊拉克船只已被摧毁。他们海军的残部只能在战争中做缩头乌龟了。干得好，指挥官。|退出任务
Taskforce1LSMdetectedmessageMessage=甚高频无线电呼叫|指挥官，有一个大型接触在两个小型接触的护航下离开了乌姆盖萨尔。我们评估此踪迹是一艘伊拉克的中型登陆舰，它很可能搭载着试图夺回石油平台的海军特种部队。指挥部命令我们在可能的时机摧毁此船队。|收到！
Taskforce1F-4EcheckinMessage=任务更新|指挥官，我们是从布什尔起飞的鬼怪小队，我们有两架飞机，每架携带四枚小牛导弹，等待你的指示，完毕。|收到！
Objective_DestroyEnemyForces=消灭遭遇的所有敌军
Objective_OneShipMustSurvive=玩家至少有一艘船只不被击沉

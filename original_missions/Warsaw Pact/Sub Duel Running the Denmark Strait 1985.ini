[Language_en]
Name=Sub Duel - Running the Denmark Strait (1985)
Description=War has broken out and our Northern Fleet submarines are ordered to enter the Atlantic to begin convoy hunting operations. Command the Alfa class submarine K-316 to run the Denmark Strait and destroy any NATO submarines who get in your way.
Taskforce1StartMessage=<size=24>Sub Duel Series</size>\nRUNNING THE\nDENMARK STRAIT (1985)|Command has ordered the Northern Fleet to surge into the Atlantic and begin hunting NATO convoys. K-316 is off Iceland and must transit the Denmark Strait.\n\nOne American submarine is reported nearby. Sink her if you can!\n\nK-316 must survive.|Start mission
Taskforce1K-316mustsurviveMessage=MISSION FAILED|FROM GHQ RED BANNER NORTHERN FLEET\nTO GENERAL STAFF, MOSCOW\n\n1. We have lost contact with submarine K-316 and assess it is destroyed.\n\n2. K-316 was assigned to clear lane through Denmark Strait for follow-on transit by missile submarines for convoy interdiction duty.\n\n3. We assess that American attack submarine in this area is still active. We advise that further attack submarines are allocated to this area to remove the American.|Exit mission
Taskforce1LAdestroyedMessage=MISSION ACCOMPLISHED|FM HQ RED BANNER NORTHERN FLEET\nTO GENERAL STAFF, MOSCOW\n\n1. Submarine K-316 reports American Los Angeles class submarine in Denmark Strait has been sunk.\n\n2. K-316 is now proceeding into the North Atlantic to support convoy interdiction operations. This lane now clear for transit by our missile submarines.\n\n3. Commander K-316 is recommended for decoration for heroism in battle against the Americans. Victory is ours!\n\n<size=16>A submarine has gained a proficiency level:\n\nK-316: <color=DarkOrange>Seasoned</color></size>|Exit mission
Trigger4Condition_Condition1AreaLabel=Suspected location of American submarine
Objective_DestroyBaltimore=Sink the Los Angeles SSN
Objective_K-316MustSurvive=K-316 must survive
[Language_cn]
Name=潜艇对决——穿越丹麦海峡（1985）
Description=战争已经爆发，我们北方舰队的潜艇收到命令进入大西洋以开展护航队猎杀行动。指挥705型潜艇K-316号穿越丹麦海峡并消灭前来拦截的北约潜艇。
Taskforce1StartMessage=<size=24>潜艇对决</size>\n穿越\n丹麦海峡（1985）|指挥部已命令北方舰队进军大西洋以猎杀北约护航队。K-316号位于冰岛附近海域，需要穿过丹麦海峡。\n\n报告显示附近有一艘美国潜艇，尽可能将其击沉！\n\nK-316号不能被击沉。|开始任务
Taskforce1K-316mustsurviveMessage=任务失败！|发件：北方舰队总部\n收件：莫斯科总参谋部\n\n1.我们失去了与K-316号潜艇的联系，根据评估它已被摧毁。\n\n2.K-316号潜艇曾收到命令为执行护航队拦截任务的后续导弹潜艇开辟丹麦海峡航道。\n\n3.我们评估美国攻击型潜艇仍在此区域内活动，建议向此区域增派更多攻击型潜艇以将其消灭。|退出任务
Taskforce1LAdestroyedMessage=任务完成！|发件：北方舰队总部\n收件：莫斯科总参谋部\n\n1.K-316号潜艇报告丹麦海峡的美国洛杉矶级潜艇已被击沉。\n\n2.K-316号目前正进入北大西洋以支援护航队拦截任务。我方导弹潜艇的航线已安全。\n\n3.K-316号潜艇的指挥官在对抗美国人的战斗中表现英勇，建议进行嘉奖。胜利属于我们！ \n\n<size=16>一艘潜艇达到了新的专业水准：\n\nK-316号: <color=DarkOrange>精通</color></size>|退出任务
Trigger4Condition_Condition1AreaLabel=美国潜艇疑似位置
Objective_DestroyBaltimore=击沉洛杉矶级核潜艇
Objective_K-316MustSurvive=K-316号不能被击沉

[Language_de]
Name=U-Boot-Duell – Durchbruch durch die Dänemarkstraße (1985)
Description=Der Krieg ist ausgebrochen und unsere U-Boote der Nordflotte wurden angewiesen, in den Atlantik einzulaufen, um mit der Jagd auf NATO-Konvois zu beginnen. Übernehmen Sie das Kommando über das U-Boot K-316 (ALFA-Klasse), durchqueren Sie die Dänemarkstraße und vernichten Sie alle NATO-U-Boote, die sich Ihnen in den Weg stellen.
Taskforce1StartMessage=<size=24>U-Boot-Duell-Serie</size>\nDURCHBRUCH DURCH DIE\nDÄNEMARKSTRASSE (1985)|Das Kommando hat der Nordflotte befohlen, verstärkt in den Atlantik vorzustoßen und mit der Bekämpfung von NATO-Konvois zu beginnen. K-316 befindet sich vor Island und muss die Dänemarkstraße passieren.\n\nEin amerikanisches U-Boot wird im Einsatzraum gemeldet. Versenken Sie es, wenn möglich!\n\nK-316 muss überleben.|Mission starten
Taskforce1K-316mustsurviveMessage=MISSION FEHLGESCHLAGEN|VON HQ ROTBANNER-NORDFLOTTE\nAN GENERALSTAB, MOSKAU\n\n1. Der Kontakt zum U-Boot K-316 ist abgerissen. Es wird davon ausgegangen, dass es zerstört wurde.\n\n2. K-316 hatte den Auftrag, einen Weg durch die Dänemarkstraße für den nachfolgenden Transit von Raketen-U-Booten zur Konvoibekämpfung freizukämpfen.\n\n3. Es wird vermutet, dass das amerikanische Jagd-U-Boot in diesem Raum weiterhin aktiv ist. Es wird empfohlen, weitere Jagd-U-Boote in diesen Raum zu verlegen, um das amerikanische U-Boot zu eliminieren.|Mission beenden
Taskforce1LAdestroyedMessage=MISSION ERFOLGREICH|FM HQ ROTBANNER-NORDFLOTTE\nAN GENERALSTAB, MOSKAU\n\n1. U-Boot K-316 meldet die Versenkung eines amerikanischen U-Bootes der LOS-ANGELES-Klasse in der Dänemarkstraße.\n\n2. K-316 verlegt nun in den Nordatlantik zur Unterstützung weiterer Operationen. Die Dänemarkstraße ist nun frei für den Transit unserer Raketen-U-Boote.\n\n3. Der Kommandant von K-316 wird aufgrund seines heldenhaften Einsatzes im Gefecht gegen die Amerikaner zur Auszeichnung vorgeschlagen. Der Sieg ist unser!\n\n<size=16>Ein U-Boot hat an Erfahrung gewonnen:\n\nK-316: <color=DarkOrange>Erfahren</color></size>|Mission beenden
Trigger4Condition_Condition1AreaLabel=Vermutete Position des amerikanischen U-Bootes
Objective_DestroyBaltimore=Jagd-U-Boot der LOS-ANGELES-Klasse versenken
Objective_K-316MustSurvive=K-316 muss überleben

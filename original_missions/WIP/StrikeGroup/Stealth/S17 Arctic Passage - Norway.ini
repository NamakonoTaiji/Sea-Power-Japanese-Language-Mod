[Language_en]
Name=S17 Arctic Passage - Norway
EscapezoneAreaLabel=(Relative) Safety
Taskforce2BriefingMessage=Comrade Captain,\n\nYour task force is to continue on its current course and clear the Norwegian coast en route to the Atlantic. Our goal is to break through NATO's defenses and secure a path into the North Atlantic, where you will gain freedom of movement.\n\nBe advised, Norwegian fast attack boats have been reported in the area, likely hiding within the fjords. These vessels are small but heavily armed with anti-ship missiles. Exercise extreme caution as you navigate these waters. Your task force must maintain formation and engage any threats quickly and decisively.\n\nProceed with vigilance. The Motherland depends on your success.\n\nEnd of Message
Taskforce1BluevictoryMessage=Congratulations! The Soviet task force has been destroyed. 

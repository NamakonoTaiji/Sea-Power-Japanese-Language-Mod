
[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=Iceland under attack
Taskforce1BriefingMessage=Date: 231100Z NOV 87\nFrom: NATO HIGH COMMAND\nTo: COMMANDING OFFICER\nSubject: URGENT RESPONSE REQUIRED - SOVIET INVASION OF ICELAND\n\nCAPTAIN,\n\nTHE SITUATION IS CRITICAL. SOVIET FORCES HAVE LANDED SOUTH OF REYKJAVIK, ICELAND. THIS INVASION MARKS A MAJOR ESCALATION IN THE CONFLICT, AND THE CONTROL OF ICELAND IS VITAL TO NATO OPERATIONS IN THE NORTH ATLANTIC. IF THE SOVIETS SECURE ICELAND, THEY WILL SEVERELY DISRUPT NATO'S ABILITY TO CONTROL SEA AND AIR ROUTES, CREATING A GAP IN OUR DEFENSES.\n\nYOUR IMMEDIATE ORDERS:\n\n- MOBILIZE YOUR FORCES TO INTERCEPT AND DISRUPT THE SOVIET LANDING FORCE.\n- PREVENT SOVIET CONTROL OF REYKJAVIK AT ALL COSTS.\n- COORDINATE WITH AIR AND SEA SUPPORT TO COUNTER THIS AGGRESSION.\n- THE LOSS OF ICELAND WOULD BE A STRATEGIC DISASTER FOR NATO. THE STAKES COULD NOT BE HIGHER—FAILURE IS NOT AN OPTION.\n\nGOOD LUCK, COMMANDER.\n\nEND OF MESSAGE
Taskforce1RejkjaviklostMessage=CAPTAIN,\n\nTHE SITUATION HAS WORSENED. REYKJAVIK AIRPORT HAS BEEN NEUTRALIZED BY SOVIET FORCES, CUTTING OFF CRUCIAL AIR SUPPORT AND RESUPPLY OPTIONS. INTELLIGENCE NOW CONFIRMS A SECOND SOVIET LANDING FORCE APPROACHING SOUTH-WEST OF VIK. IF THIS FORCE ESTABLISHES A FOOTHOLD, NATO’S POSITION ON ICELAND WILL BECOME UNTENABLE.\n\nYOUR ORDERS ARE AS FOLLOWS:\n\nINTERCEPT AND ELIMINATE THE SECOND SOVIET LANDING FORCE IMMEDIATELY.\nPRIORITIZE THE PREVENTION OF A FULL SCALE SOVIET LANDING.\nCOORDINATE WITH AVAILABLE NATO ASSETS TO DESTROY TRANSPORTS AND ESCORTS.\nTHIS IS A CRITICAL MOMENT. THE OUTCOME OF THIS OPERATION WILL DETERMINE ICELAND’S FATE. FAILURE IS NOT AN OPTION. ENGAGE WITH ALL AVAILABLE FIREPOWER.
Taskforce1VictoryblueMessage=CAPTAIN,\n\nCONGRATULATIONS ON THE SUCCESSFUL DESTRUCTION OF THE SECOND SOVIET LANDING GROUP SOUTH-WEST OF VIK. YOUR ACTIONS HAVE DEALT A SIGNIFICANT BLOW TO SOVIET PLANS IN ICELAND, BUT THE SITUATION REMAINS CRITICAL. WITH REYKJAVIK AIRPORT UNDER SOVIET CONTROL, ICELAND IS AT RISK OF FALLING COMPLETELY INTO ENEMY HANDS.\n\nWHILE THE LOSS OF ICELAND WOULD BE A DEVASTATING STRATEGIC SETBACK FOR NATO, THERE IS STILL A CHANCE TO CONTAIN THE SITUATION. YOUR MISSION HAS DISRUPTED THE ENEMY’S CAPACITY TO REINFORCE THEIR POSITION, AND WE CAN STILL DENY THEM FULL CONTROL OF THE ISLAND. CONTINUE TO INTERDICT ANY ADDITIONAL SOVIET FORCES IN THE REGION.\n\nYOUR VALOR AND STRATEGIC PRECISION HAVE EARNED THE ADMIRATION OF NATO HIGH COMMAND. STAY VIGILANT—THE FIGHT FOR ICELAND IS FAR FROM OVER.
Taskforce1MemphisdisabledMessage=CAPTAIN,\n\nBE ADVISED, THE USS MEMPHIS (SSN-691) HAS SUFFERED A CRITICAL SYSTEMS FAILURE AND IS NOW COMBAT INEFFECTIVE. ALL ATTEMPTS TO REPAIR HAVE BEEN UNSUCCESSFUL, AND SHE WILL BE FORCED TO WITHDRAW FROM OPERATIONS IMMEDIATELY.\n\nTHIS LOSS SIGNIFICANTLY REDUCES OUR SUBMARINE CAPABILITIES IN THE AREA. YOU WILL NEED TO PROCEED WITHOUT UNDERSEA SUPPORT UNTIL FURTHER REINFORCEMENTS CAN BE DEPLOYED. STAY ALERT FOR SOVIET SUBMARINE ACTIVITY, AS THEY WILL LIKELY SEEK TO EXPLOIT THIS WEAKNESS.\n\nMAINTAIN OPERATIONAL READINESS.\n\nEND OF MESSAGE
Taskforce12ndgrouparrivesMessage=CAPTAIN,\n\nIT IS WITH GRAVE CONCERN THAT WE INFORM YOU THE SECOND SOVIET LANDING FORCE HAS SUCCESSFULLY REACHED ICELAND’S SOUTH-WEST COAST NEAR VIK. THIS IS A MAJOR BLOW TO NATO'S STRATEGIC POSITION IN THE REGION. WITH REINFORCEMENTS NOW LANDED, THE SOVIETS WILL LIKELY MOVE TO FURTHER CONSOLIDATE THEIR CONTROL OF ICELAND.\n\nTHE FAILURE TO ELIMINATE THIS THREAT PUTS NATO'S ABILITY TO DEFEND THE NORTH ATLANTIC AT SERIOUS RISK. HOWEVER, THE SITUATION, WHILE DIRE, IS NOT BEYOND RECOVERY. ALL EFFORTS MUST NOW BE FOCUSED ON CONTAINING THE SOVIET FORCES AND PREVENTING FURTHER LANDINGS.\n\nNATO COMMAND WILL BE ASSESSING THE NEXT COURSE OF ACTION. REMAIN ON STATION AND AWAIT FURTHER ORDERS.\n\nEND OF MESSAGE

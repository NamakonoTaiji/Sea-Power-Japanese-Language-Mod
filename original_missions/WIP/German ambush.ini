[Language_en]
Name=Stealth17's German ambush
Description=A Soviet task force is passing through the Baltic Sea. The German navy is ready with a surprise.


Taskforce1BluelossMessage=Your submarines were destroyed. Mission failed.
Taskforce1BriefingMessage=Mission Overview:\n\nLocation: Baltic Sea, between Germany and Denmark\nObjective: Eliminate key Soviet ships: Missile Cruiser, Landing Ship, and Resupply Ship\nAssets Available:\n\n3 German submarines positioned for the attack\n1 P-3 Orion providing aerial surveillance\nSoviet MiG fighters patrolling overhead\nMission Briefing:\n\nCaptain,\n\nA Soviet task force is moving through the Baltic Sea, between Germany and Denmark. The task force includes a landing ship, supported by a missile cruiser and a resupply ship. Intelligence suggests this operation is critical for Soviet logistical support in the region. Your mission is to intercept and eliminate these priority targets before they reach their destination.\n\nThree German submarines are already in position to carry out this strike, but the task force is heavily defended by Soviet MiGs providing air cover. You will need to coordinate carefully with the available air and naval assets to ensure success.\n\nA German P-3 Orion has taken off from Nordholz Naval Airbase and will provide aerial surveillance to track the task force and gather key intel. However, the P-3 will need to evade Soviet MiGs, so its presence will be intermittent. Use its data for precise targeting.\n\nYour Objectives:\n\nEliminate the Soviet missile cruiser—this vessel is the main offensive and defensive asset protecting the task force.\nNeutralize the Soviet landing ship—stopping the deployment of ground forces is a top priority.\nDestroy the resupply ship—cripple the Soviet fleet’s ability to sustain operations.\nOperational Considerations:\n\nSoviet MiGs pose a serious threat to NATO air assets, including the P-3 Orion. Ensure that any coordination with the P-3 is brief and effective.\nCivilian merchant traffic in the Baltic is heavy—exercise caution to avoid collateral damage in these busy shipping lanes.\nTiming is critical. The Soviet task force must be eliminated before they reach their destination.\nNATO is relying on your precision and strategic coordination. Good luck, Captain. Strike hard and fast.\n\nEnd of Message\n\n
Taskforce1RedwinMessage=MISSION FAILED\n\nYou have failed in eliminating the landing force. We had expected much better from you.\n\n
Trigger4Condition_RedwinAreaLabel=Soviets goal


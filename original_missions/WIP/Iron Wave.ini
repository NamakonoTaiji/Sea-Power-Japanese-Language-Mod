[Language_en]
Name=Iron Wave
Taskforce2Cargoshipeliminated-NATOturnshostileMessage=Captain,\n\nCongratulations. The NATO cargo ship has been successfully eliminated. The critical supplies destined for Georgia have been destroyed, significantly disrupting NATO’s efforts in the region.\n\nBe advised: NATO forces in the area have detected the attack and are now turning hostile. Expect immediate retaliation from their escort vessels. Prepare for incoming engagements from NATO frigates and fast attack boats, as well as potential air support.\n\nMaintain defensive posture and engage enemy forces as necessary to protect your fleet. Air support is standing by and will be deployed upon request. Exercise caution—civilian traffic remains in the area.\n\nStay sharp, Captain. This mission is not over yet.\n\nEnd of Message
Taskforce2Cargoshiparrives-RedlosesMessage=The cargo ship has arrived. Mission failed.
Cargoshiparrives-RedlosesAreaLabel=Poti port arrival
Taskforce2EscapezoneSovietMessage=Captain,\n\nRetreat your task force to this area with haste. NATO is preparing a full blown response to sink your ships. \n\nMake sure at least 1 of your ships survives.\n\nEnd of message.
EscapezoneSovietAreaLabel=Retreat area
Taskforce2MissionbriefingMessage=Captain,\n\nNATO is attempting to deliver critical military supplies to Georgia via a disguised cargo ship moving through the Black Sea. These supplies are crucial to Georgia's ability to resist Soviet influence in the region. Your mission is to identify and eliminate the NATO cargo ship before it reaches Georgian waters. Be aware, the convoy is operating under NATO protection, but they will not engage unless provoked. Once you attack, expect a swift retaliation from NATO forces.\n\n============================\n\nYour objectives:\n\n1. Identify the NATO cargo ship within the convoy. Be sure to confirm the target before engagement.\n2. Eliminate the cargo ship carrying critical supplies to Georgia.\n3. Evade and neutralize any hostile NATO forces that engage after the attack.\n\n============================\n\nIntelligence Reports:\n\nNATO Escort Presence: The convoy is lightly escorted by NATO frigates and fast attack boats. These ships are currently maintaining a defensive posture but will retaliate aggressively once provoked.\n\nAir Support: NATO air forces, possibly from Turkey or NATO airbases in the region, may scramble after you engage. Expect fighter jets within minutes of your first strike.\n\nDisguised Cargo Ship: The cargo ship is disguised as a civilian vessel to avoid suspicion in international waters. Be careful not to engage the wrong target—collateral damage to civilian ships will complicate the mission.\n\n============================\n\nAssets Available:\nKashin-class Destroyer (Flagship): Provides air defense and long-range firepower against NATO frigates and escorts.\n\nThree Tarantul-class Corvettes: Fast and heavily armed with anti-ship missiles—ideal for engaging enemy escorts and chasing down fleeing vessels.\n\nLand-based fighters are on standby in Crimea for air support if NATO air forces deploy after your attack.\n\n============================\n\nOperational Considerations:\n\nTarget Identification: You must positively identify the NATO cargo ship before engaging. Failure to do so could lead to an international incident. Use your radar and intelligence assets to track the convoy.\n\nHostile Response: Once the target is engaged, NATO forces will immediately retaliate. You must be prepared to defend yourself and your fleet, especially against possible air threats.\n\nCivilian Traffic: The Black Sea is home to significant commercial traffic. Collateral damage will create diplomatic complications and possibly escalate the situation further—exercise extreme caution when engaging targets.\n\nPost-Strike Evacuation: After neutralizing the cargo ship, assess the strength of the NATO forces. If outgunned, you must evade and withdraw. The mission's primary objective is the destruction of the cargo ship, not prolonged engagement.\n\n============================\n\nRules of Engagement:\n\nEngage only the confirmed NATO cargo ship and its escorts if provoked. Avoid engaging civilian vessels at all costs. NATO will not fire unless fired upon, but retaliation is expected once the cargo ship is destroyed.\n\n
Taskforce2SovietsescapeMessage=Captain,\n\nYour (surviving) units have managed to retreat. Well done.\n\nMission completed.\n\n

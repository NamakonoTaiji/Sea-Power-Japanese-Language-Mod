[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=Volga Exercise (1985)
Description=The battlecruiser Kirov and a Sovremenny class destroyer are missing from latest imagery out of Murmansk. NATO believes these two ships are sortieing towards the GIUK Gap. The New Jersey SAG has been tasked to locate and destroy them before they can enter the Atlantic.
Taskforce1StartmessageMessage=VOLGA EXERCISE|The Kirov SAG has sortied from Murmansk and is attempting to enter the Atlantic. Take up a blocking position west of Iceland, then locate and sink the Kirov and any escorting ships. \n\nP-3s out of Keflavik are en route to assist search. Intel suspects AGI trawlers in the area could pass targeting data on your force.\n\nAt least one player ship must survive.|Start mission
Taskforce1OneplayershipmustsurviveMessage=DEFEAT|Defeat! The New Jersey SAG has been destroyed!|Exit mission
Taskforce1KirovSAGdestroyed-playervictoryMessage=VICTORY|Victory! The Kirov SAG has been destroyed, keeping a powerful raiding force out of the Atlantic and further securing our convoy operations to Europe. Good work, Commander.|Exit mission
Objective_DestroyKirovSAG=Destroy the Kirov SAG
Objective_OnePlayerShipMustSurvive=At least one of your ships must survive
[Language_fr]
Name=Exercice Volga (1985)
Description=Le croiseur Kirov et un destroyer de classe Sovremenny sont absents des dernières images provenant de Mourmansk. L'OTAN pense que ces deux navires font route vers la ligne GIUK. Le groupe aéronaval du New Jersey a été chargé de les localiser et de les détruire avant qu'ils ne puissent entrer dans l'Atlantique.
Taskforce1StartmessageMessage=EXERCICE VOLGA|Le croiseur Kirov a quitté Mourmansk et tente de pénétrer dans l'Atlantique. Prenez position à l'ouest de l'Islande pour le bloquer, puis localisez et coulez le Kirov et tous les navires qui l'escortent. \n\nDes P-3 en provenance de Keflavik sont en route pour aider aux recherches. Les services de renseignement soupçonnent que des chalutiers espions présents dans la zone pourraient transmettre des données de ciblage de vos forces.\n\nAu moins un navire OTAN doit survivre.|Commencer la mission
Taskforce1OneplayershipmustsurviveMessage=DEFAITE|Défaite ! Le New Jersey a été détruit !|Quitter la mission
Taskforce1KirovSAGdestroyed-playervictoryMessage=VICTOIRE|Victoire ! Le Kirov a été détruit, empêchant ainsi une puissante force d'intervention d'opérer dans l'Atlantique et sécurisant davantage nos opérations de convoi vers l'Europe. Bon travail, commandant. |Quitter la mission
Objective_DestroyKirovSAG=Détruire le croiseur Kirov
Objective_OnePlayerShipMustSurvive=Au moins l'un de vos navires doit survivre
[Language_cn]
Name=伏尔加河演习（1985）
Description=摩尔曼斯克的最新图像中缺少了基洛夫号巡洋舰和一艘956型驱逐舰。北约认为这两艘舰艇正驶向GIUK缺口。新泽西号水面行动群的任务是在它们进入大西洋前找到并摧毁它们。

Taskforce1StartmessageMessage=伏尔加河演习|基洛夫号水面行动群已离开摩尔曼斯克，试图进入大西洋。进入冰岛以西的封锁阵地，找到并击沉基洛夫号及其护航舰艇。\n\n凯夫拉维克的P-3正在协助搜索。情报显示此地区伪装成拖网渔船的辅助通用情报船可能会向敌军传递有关你部队的瞄准数据。\n\n玩家必须确保至少有一艘船只不被击沉。|开始任务
Taskforce1OneplayershipmustsurviveMessage=任务失败！|你失败了！新泽西号水面行动群已被摧毁！|退出任务
Taskforce1KirovSAGdestroyed-playervictoryMessage=任务完成！|你成功了！基洛夫号水面行动群已被摧毁，你使一支强大的突袭舰队无法进入大西洋，进一步保护了前往欧洲的护航队安全。干得好，指挥官！|退出任务

Objective_DestroyKirovSAG=摧毁基洛夫号水面行动群
Objective_OnePlayerShipMustSurvive=玩家至少有一艘船只不被击沉
[Language_ru]
Name=Учения «Волга» (1985)
Description=Тяжёлый крейсер «Киров» и эсминец класса «Современный» пытаются прорваться через Датский пролив в Атлантику. Ощущая некоторое дежавю, линкор и крейсер НАТО готовятся вступить с ними в бой.
Taskforce1StartmessageMessage=УЧЕНИЯ «ВОЛГА»|КУГ «Киров» пытается прорваться в Атлантику через Датский пролив. Займите позицию к западу от Исландии, затем выдвигайтесь вперёд, обнаружте и потопите «Киров» и все сопровождающие корабли. \n\nP-3 из Кефлавика направляются на помощь в поисках. Сохраняйте бдительность - разведка ожидает наличие кораблей-шпионов, которые могут выдать ваше расположение. Опасайтесь дальнобойных ракет «Кирова», скрытность - ваша лучшая защита. \n\nПо крайней мере один корабль игрока должен выжить.|Начать миссию
Taskforce1OneplayershipmustsurviveMessage=ПОРАЖЕНИЕ|Поражение! КУГ Нью Джерси полностью уничтожена!|Выйти из миссии
Taskforce1KirovSAGdestroyed-playervictoryMessage=ПОБЕДА|Победа! КУГ «Киров» полностью уничтожена! Её присутствие в Атлантике создало бы серьёзную угрозу нашим конвоям.\nХорошая работа, Командир.|Выйти из миссии
Objective_DestroyKirovSAG=Уничтожить КУГ «Киров»
Objective_OnePlayerShipMustSurvive=Хотя бы один союзный корабль должен уцелеть.
[Language_de]
Name=Volga-Übung (1985)
Description=Der Schlachtkreuzer Kirov und ein Zerstörer der Sovremenny-Klasse fehlen auf den neuesten Satellitenbildern aus Murmansk. Die NATO geht davon aus, dass diese beiden Schiffe in Richtung GIUK-Lücke auslaufen. Die New Jersey Surface Action Group wurde beauftragt, sie aufzuspüren und zu zerstören, bevor sie in den Atlantik erreichen.
Taskforce1StartmessageMessage=VOLGA-ÜBUNG|Die Kirov SAG ist aus Murmansk ausgelaufen und versucht, den Atlantik zu erreichen. Beziehen Sie Stellung westlich von Island, lokalisieren und zerstören Sie die Kirov sowie alle begleitenden Schiffe. \n\nZu Ihrer Unterstützung sind P-3-Aufklärungsflugzeuge aus Keflavík unterwegs. Laut Geheimdienstberichten ist es möglich, dass sich AGI-Trawler in der Region befinden, die Zielinformationen über Ihre Verbände weitergeben könnten.\n\nMindestens ein eigenes Schiff muss überleben.|Mission Starten
Taskforce1OneplayershipmustsurviveMessage=NIEDERLAGE|Sie wurden besigt! Ihre New Jersey SAG wurde zerstört!|Mission Beenden
Taskforce1KirovSAGdestroyed-playervictoryMessage=SIEG|Sieg! Die Kirov-SAG wurde zerstört und somit am Vorstoß in den Atlantik gehindert. Unsere Präsenz innerhalb Europas ist dadurch weiter gesichert. Gute Arbeit, Kommandant.|Mission Beenden
Objective_DestroyKirovSAG=Zerstören Sie die Kirov SAG
Objective_OnePlayerShipMustSurvive=Mindestens ein eigenes Schiff muss überleben
[Language_es]
[Language_fr]
[Language_ko]
Name=볼가 훈련 (1985)
Description=전투 순양함 키로프와 소브레멘니급 구축함이 무르만스크의 최신 이미지에서 실종되었습니다. NATO는 이 두 함선이 GIUK 갭을 향해 출격하고 있다고 믿고 있습니다. 뉴저지 수상전단은 그들이 대서양에 진입하기 전에 그들을 찾아 파괴하는 임무를 맡았습니다.
Taskforce1StartmessageMessage=볼가 훈련|키로프 수상전단은 무르만스크에서 출격하여 대서양 진출을 시도하고 있습니다. 아이슬란드 서쪽의 차단 지점을 점령한 다음 키로프와 호위함을 찾아 침몰시키세요.\n\n케플라비크에서 출발한 P-3가 수색을 지원하기 위해 이동 중입니다. 정보상으론 이 지역의 AGI 트롤어선이 병력에 대한 표적 데이터를 통과할 수 있다고 의심하고 있습니다.\n\n적어도 한 척의 플레이어 함선은 반드시 살아남아야 함|임무 시작
Taskforce1OneplayershipmustsurviveMessage=패배|패배! 뉴저지 수상전단이 파괴되었습니다!|임무 종료
Taskforce1KirovSAGdestroyed-playervictoryMessage=승리|승리! 키로프 수상전단이 파괴되어 강력한 공습 부대가 대서양에서 철수하고 유럽으로의 호송 작전을 더욱 안전하게 수행할 수 있게 되었습니다. 잘하셨습니다 사령관님.|임무 종료
Objective_DestroyKirovSAG=키로프 수상전단 격파
Objective_OnePlayerShipMustSurvive=적어도 한 척의 배는 반드시 살아남아야 함


[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=Sub Duel - Pacific Shield (1971)
Description=Conflict has broken out in Europe, and USS Scamp has been ordered to neutralize a Soviet Yankee class SSBN operating in its patrol box off San Diego. Intel believes the Soviets may be preparing to strike the Western Seaboard. Locate and destroy the SSBN before it can launch!
Taskforce1StartMessage=<size=24>Sub Duel Series</size>\n PACIFIC SHIELD (1971)|Conflict has broken out in Europe and the USS Scamp has been ordered to sink a Yankee class SSBN you have been shadowing for the past day. Locate and sink the Yankee before it can fire its missiles!\n\nIntel believes the Soviets may launch against CONUS by 1230Z.\n\nUSS Scamp must survive.\n\n|Start mission
Taskforce1StartIntel=Destroy the Yankee before 1230Z!
Taskforce1ScampmustsurviveMessage=MISSION FAILED|FM COMSUBPAC\nTO CINCPACFLT\n\n1. (S) SCAMP was assigned search and destroy mission against YANKEE SSBN off San Diego at time 1000Z 04MAR.\n\n2. (S) SCAMP reported initial contact with YANKEE SSBN but has now missed two scheduled check-ins. We assess that SCAMP has been destroyed.\n\n3. (S) We are surging forces to the area to attempt to destroy this contact but Soviet first strike on West Coast is now possible from this unit.|Exit mission
Taskforce1DestroyYankeeMessage=MISSION ACCOMPLISHED|FM COMSUBPAC\nTO CINCLANTFLT\n\n1. (S) USS SCAMP reports torpedoing and sinking YANKEE class SSBN in patrol area off California coast.\n\n2. (S) Prior to sinking, SCAMP reports hearing transients likely associated with missile hatch opening. We assess that SCAMP sank this submarine just prior to strategic weapon employment against our coast.\n\n3. (S) Recommend recognition for SCAMP’s Commanding Officer and crew. SCAMP is returning to normal patrol area at this time.\n\n<size=16>A submarine has gained a proficiency level:\n\nUSS Scamp SSN-588: <color=Green>Veterans</color></size>|Exit mission
Taskforce1YankeelaunchesMessage=MISSION FAILED|FM CINCLANTFLT\nTO JCS, SECDEF, CJCS, NORAD\n\nFLASH EMERGENCY\n\n(TS) NATIONAL TECHNICAL MEANS AND PACIFIC FLEET ASW FORCES REPORT DETECTION OF MISSILE LAUNCH TRANSIENTS CONSISTENT WITH SLBM FIRING FROM SUBMERGED PLATFORM IN EASTERN PACIFIC.\n\n(TS) INITIAL TRAJECTORY ANALYSIS INDICATES MISSILE(S) ON BALLISTIC TRACK CONSISTENT WITH TARGETING WEST COAST OF UNITED STATES. IMPACT AREA POSSIBLY CALIFORNIA COASTAL REGION.\n\n(TS) ADDITIONAL REPORTING TO FOLLOW AS DATA IS CORRELATED.\n\n(TS) THIS IS A FLASH MESSAGE. IMMEDIATE ATTENTION REQUESTED.|Exit mission
Objective_DestroyYankee=Destroy Yankee class SSBN before 1230Z
Objective_ScampMustSurvive=USS Scamp must survive
[Language_cn]

[Language_ru]

[Language_de]
Name=U-Boot-Duell – Pacific Shield (1971)
Description=In Europa kommt es zu Kampfhandlungen und der USS Scamp wurde befohlen, ein sowjetisches SSBN der YANKEE-Klasse zu neutralisieren, das offenbar in seinem zugewiesenen Patrouillengebiet vor San Diego operiert. Die Aufklärung geht davon aus, dass die Sowjets einen Angriff auf die US-Westküste vorbereiten könnten. Suchen und vernichten Sie das SSBN, bevor es zum Abschuss kommt!
Taskforce1StartMessage=<size=24>U-Boot-Duell-Serie</size>\n PACIFIC SHIELD (1971)|In Europa kommt es zu Kampfhandlungen und die USS Scamp wurde angewiesen, ein SSBN der YANKEE-Klasse zu versenken, das seit dem gestrigen Tag beschattet wird. Suchen und versenken Sie die YANKEE, bevor sie ihre Raketen einsetzen kann!\n\nDie Aufklärung geht davon aus, dass die Sowjets bis 1230Z einen Angriff auf CONUS durchführen könnten.\n\nDie USS Scamp muss überleben.\n\n|Mission starten
Taskforce1StartIntel=YANKEE vor 1230Z zerstören!
Taskforce1ScampmustsurviveMessage=MISSION FEHLGESCHLAGEN|FM COMSUBPAC\nAN CINCPACFLT\n\n1. (S) SCAMP war am 04MAR um 1000Z mit einem Such- und Vernichtungsauftrag gegen ein SSBN der YANKEE-Klasse vor San Diego beauftragt.\n\n2. (S) SCAMP meldete Erstkontakt mit dem YANKEE-SSBN, hat jedoch inzwischen zwei planmäßige Lage- und Statusmeldungen versäumt. Es wird vermutet, dass SCAMP zerstört wurde.\n\n3. (S) Kräfte werden in den Raum verlegt, um diesen Kontakt zu bekämpfen. Ein sowjetischer Erstschlag gegen die Westküste ist durch diese Einheit nunmehr möglich.|Mission beenden
Taskforce1DestroyYankeeMessage=MISSION ERFOLGREICH|FM COMSUBPAC\nAN CINCLANTFLT\n\n1. (S) USS SCAMP meldet Torpedierung und Versenkung eines SSBN der YANKEE-Klasse im Patrouillengebiet vor der Küste Kaliforniens.\n\n2. (S) Vor der Versenkung meldete SCAMP Geräusche, die vermutlich mit dem Öffnen der Raketensilos in Zusammenhang standen. Es wird vermutet, dass SCAMP dieses U-Boot unmittelbar vor dem Einsatz strategischer Waffen gegen unsere Küste versenkt hat.\n\n3. (S) Empfehlung zur Auszeichnung des Kommandanten und der Besatzung von SCAMP wird angeregt. SCAMP kehrt derzeit in ihr reguläres Patrouillengebiet zurück.\n\n<size=16>Ein U-Boot hat an Erfahrung gewonnen:\n\nUSS Scamp SSN-588: <color=Green>Veteran</color></size>|Mission beenden
Taskforce1YankeelaunchesMessage=MISSION FEHLGESCHLAGEN|FM CINCLANTFLT\nAN JCS, SECDEF, CJCS, NORAD\n\nBLITZ NOTFALLMELDUNG\n\n(TS) DIE NATIONALE TECHNISCHE AUFKLÄRUNG UND U-JAGD-KRÄFTE DER PACIFIC FLEET MELDEN DIE DETEKTION VON STARTGERÄUSCHEN, DIE MIT DEM ABSCHUSS VON SLBM VON EINER UNTERGETAUCHTEN PLATTFORM IM ÖSTLICHEN PAZIFIK ÜBEREINSTIMMEN.\n\n(TS) ERSTE TRAJEKTORIEANALYSEN WEISEN AUF BALLISTISCHE FLUGBAHNEN HIN, DIE MIT EINER ZIELRICHTUNG AUF DIE WESTKÜSTE DER VEREINIGTEN STAATEN KORRESPONDIEREN. EINSCHLAGSGEBIET MÖGLICHERWEISE KÜSTENREGION KALIFORNIENS.\n\n(TS) WEITERE MELDUNGEN FOLGEN NACH DATENKORRELATION.\n\n(TS) DIES IST EINE BLITZMELDUNG. SOFORTIGE BEARBEITUNG ERFORDERLICH.|Mission beenden
Objective_DestroyYankee=SSBN der YANKEE-Klasse vor 1230Z zerstören
Objective_ScampMustSurvive=Die USS Scamp muss überleben

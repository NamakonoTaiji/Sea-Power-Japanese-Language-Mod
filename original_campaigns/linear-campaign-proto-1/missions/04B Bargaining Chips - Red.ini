Taskforce1LandUnit1ShortNameOverride=ATU
Taskforce1REDFORVictoryMessage=패배|발신: 애투 공군 기지 사령관\n수신: 미해군 7함대\n\n1. WP 병력이 몇 시간 내에 현장에 도착할 것이라고 평가하세요. 현재 모든 긴급 파괴 프로토콜을 시행하고 있습니다. 우호적인 표면 힘이 제거되거나 효과가 없게 되었습니다.|임무 종료
Taskforce2REDFORVictoryMessage=승리|발신:TF 보스토크 사령관\n수신: 미합중국 태평양함대\n\n1. 모든 나토군이 제거되었다고 평가하세요. 상륙 부대가 지금 해안으로 이동할 준비를 하고 있습니다.\n\n2. 승리는 우리의 것입니다, 동지들.|임무 종료
Taskforce1BLUFORVictoryMessage=승리|발신:애투섬 공군기지 사령관\n수신:미합중국 7함대 사령부\n\n1. 모든 WP 부대가 제거되었음을 평가하십시오. 우리는 남아 있는 유닛을 찾기 위해 모든 MPRA를 샅샅이 뒤지고 있습니다.\n\n2. 전체 보고서는 12시간 이내에 제출될 예정입니다.|임무 종료
Taskforce2BLUFORVictoryMessage=패배|발신: COMPACFLT\n수신: 모스크바 사령부\n\n1. TF 보스토크와 침공군과의 연락이 끊겼습니다. 우리는 미국이 우리의 진격을 저지할 수 있을 만큼 충분한 병력을 배치할 수 있었다고 평가합니다.\n\n2. 괌 공격에 대한 새로운 옵션이 개발 중이며 12시간 내에 준비될 예정입니다.|임무 종료
Taskforce2WelcomeAboardMessage=<size=20>분쟁의 미적분학: 파트 4 (소련)</size>\\n협상 카드|사령부는 우리에게 애투 섬을 침공하여 미국으로부터 이 영토를 점령하라고 명령했습니다. 우리 정보 당국은 미국 항공모함이 섬 동쪽 끝에 있는 카스코 코브 비행장에서 출발하고 있으며, 미군 지상군이 하와이에서 북쪽으로 이동하고 있을 가능성이 높다고 보고 있습니다.\\n\\n마주친 적 병력을 모두 격파하고 상륙 지역에 상륙하도록 하세요.|미션 시작
Taskforce2Tu-95CheckInMessage=항공기 점검중|TF 보스토크, 여긴 정찰기. 서쪽에서부터 확인중이다, 이상.|확인됨!

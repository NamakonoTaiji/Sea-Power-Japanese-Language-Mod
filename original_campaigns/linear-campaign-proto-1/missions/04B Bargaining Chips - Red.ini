MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing\BriefingMap_cn.xml
Taskforce1LandUnit1NameOverride=卡斯科湾机场（ATU）
Taskforce1LandUnit1ShortNameOverride=ATU
Taskforce1REDFORVictoryMessage=任务失败！|发件：阿图岛航空基地指挥官\n收件：第七舰队司令\n\n1.我们评估华约部队将在数小时内抵达。我们此时正在执行所有紧急破坏程序。友方水面部队已被消灭或失去战斗力。|退出任务
Taskforce2REDFORVictoryMessage=任务完成！|发件：东方特遣舰队司令\n收件：太平洋舰队司令\n\n1.根据评估，所有北约部队已被消灭。两栖部队正在准备登陆。\n\n2.上将同志，胜利属于我们。|退出任务
Taskforce1BLUFORVictoryMessage=任务完成！|发件：阿图岛航空基地指挥官\n收件：第七舰队司令\n\n1.根据评估，所有华约部队已被消灭。所有海上巡逻侦察机正在紧急起飞以搜索此区域内的剩余单位。\n\n2.我们胜利了，将军。完整报告将在未来12小时内发送。|退出任务
Taskforce2BLUFORVictoryMessage=任务失败！|发件：太平洋舰队司令\n收件：莫斯科总部\n\n1.我们失去了与东方特遣舰队和登陆部队的联系。我们评估美国人有能力部署足够的兵力以反制我们的推进。\n\n2.攻击关岛的新方案正在筹备中，预计将于12小时后完成。我们部队的损失不会没有意义。|退出任务
Taskforce2WelcomeAboardMessage=<size=20>冲突演算：第4部分（苏联）</size>\n谈判筹码|指挥部命令我们登陆阿图岛并从美国人手中夺取此岛屿。我们的情报显示美军舰载机已从岛屿东侧的卡斯科湾机场起飞，美军水面部队可能正在从夏威夷向北移动。\n\n消灭遭遇的所有敌军并确保我们的两栖部队能抵达登陆区域。|开始任务
Taskforce2Tu-95CheckInMessage=飞机入场|东方特遣舰队，这里是侦察机。我们从西方入场，完毕。|收到！

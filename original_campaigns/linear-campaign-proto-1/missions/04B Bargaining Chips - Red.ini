MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing\BriefingMap_de.xml
Taskforce1LandUnit1NameOverride=Flugplatz Casco Cove (ATU)
Taskforce1LandUnit1ShortNameOverride=ATU
Taskforce1REDFORVictoryMessage=NIEDERLAGE|VON KDT, LUFTWAFFENSTÜTZPUNKT ATTU\nAN COMSEVENTHFLT\n\n1. Es wird davon ausgegangen, dass Streitkräfte des Warschauer Pakts innerhalb weniger Stunden am Einsatzort eintreffen werden. Wir setzen derzeit sämtliche Notfall-Protokolle um. Eigene Seestreitkräfte wurden entweder ausgeschaltet oder sind kampfunfähig.|Mission Beenden
Taskforce2REDFORVictoryMessage=SIEG|VON KDT, TF Vostok\nAN COMPACFLT\n\n1. Es wird davon ausgegangen, dass alle NATO-Streitkräfte ausgeschaltet wurden. Die Landungseinheiten bereiten sich nun auf das Anlanden vor..\n\n2. Der Sieg gehört uns, Genosse General.|Mission Beenden
Taskforce1BLUFORVictoryMessage=SIEG|VON KDT, ATTU AIRBASE\nAN COMSEVENTHFLT\n\n1. Wir gehen davon aus, dass alle Streitkräfte des Warschauer Pakts ausgeschaltet wurden. Alle verfügbaren Seefernaufklärer (MPRA) werden gestartet, um das Gebiet nach verbliebenen Einheiten abzusuchen.\n\n2. Der Sieg gehört uns, Admiral. Ein vollständiger Bericht folgt innerhalb der nächsten 12 Stunden.|Mission Beenden
Taskforce2BLUFORVictoryMessage=NIEDERLAGE|VON COMPACFLT\nAN MOSKAU HQ\n\n1. Wir haben den Kontakt zu Task Force Wostok und den Invasionseinheiten verloren. Es wird davon ausgegangen, dass es den Amerikanern gelungen ist, ausreichend Truppen zu verlegen, um unseren Vormarsch zu stoppen.\n\n2. Neue Angriffsoptionen gegen Guam werden derzeit ausgearbeitet und stehen in 12 Stunden bereit. Der Verlust unserer Kräfte wird nicht umsonst gewesen sein.|Mission Beenden
Taskforce2WelcomeAboardMessage=<size=20>Calculus of Conflict: Teil 4 (Sowjet)</size>\nVERHANDLUNGSMASSE|Das Oberkommando hat den Befehl erteilt, die Insel Attu zu erobern und dieses Gebiet den Amerikanern zu entreißen. Nachrichtendienstliche Erkenntnisse deuten darauf hin, dass amerikanische Flugzeuge vom Flugfeld Casco Cove am Ostufer der Insel aus operieren. Zudem ist mit dem Eintreffen der US NAVY aus dem Raum Hawaii zu rechnen\n\nZerstören Sie alle feindlichen Kräfte auf die Sie treffen und sichern Sie das Erreichen des Landungsgebiets.|Mission Starten
Taskforce2Tu-95CheckInMessage=FLUGZEUG MELDET SICH|Task Force Vostok, hier Aufklärungsflug. Melde mich aus westlicher Richtung, Ende.|Bestätige!
Trigger3Condition_Condition3AreaLabel=Aufmarschgebiet der Invasionstruppen
Objective_ReachLandingArea=Erreichen Sie das Landungsgebiet mit den Invasionstruppen.
Objective_DestroyUSForces=Vernichten Sie alle US-Streitkräfte, auf die Sie treffen.

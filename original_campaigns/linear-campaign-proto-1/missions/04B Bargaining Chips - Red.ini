[Language_ko]
Name=04B 협상 카드 (소련)
Description=바르샤바 조약기구와 나토 간의 군사 행동은 여러 소련 잠수함이 GIUK 갭 근처에서 손상되거나 침몰한 이후로 중단되었습니다. 다른 곳에서는 유럽에서 육상 전투가 불안정한 교착 상태에 빠졌으며, 양측 모두 비교 우위와 전쟁 목표를 재평가하고 있습니다. 협상이 진행 중이지만, 지렛대가 없어서 어느 쪽도 아직 합의에 이르지 못하고 있습니다.

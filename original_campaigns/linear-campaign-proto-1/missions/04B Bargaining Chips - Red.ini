[Language_en]
Name=04B Bargaining Chips (Soviet)
Description=Military actions between the Warsaw Pact and NATO have stalled since several USSR submarines were damaged or sunk in vicinity of the GIUK Gap.  Elsewhere, land fighting has ground into an uneasy stalemate in Europe with both sides reevaluating their comparative advantages and war goals. Negotiations are ongoing, but with no leverage, neither side is willing to come to a settlement yet.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing\BriefingText_en.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing\BriefingMap_en.xml
Taskforce1LandUnit1NameOverride=Casco Cove Airfield (ATU)
Taskforce1LandUnit1ShortNameOverride=ATU
Taskforce1REDFORVictoryMessage=DEFEAT|FM CMDR, ATTU AIRFORCE BASE\nTO COMSEVENTHFLT\n\n1. Assess that WP forces will be on scene within hours. We are implementing all emergency destruction protocols at this time. Friendly surface forces have been eliminated or rendered ineffective.|Exit mission
Taskforce2REDFORVictoryMessage=VICTORY|FM CMDR, TF Vostok\nTO COMPACFLT\n\n1. Assess that all NATO forces have been eliminated. Amphibious forces are preparing to move ashore now.\n\n2. Victory is ours, comrades.|Exit mission
Taskforce1BLUFORVictoryMessage=VICTORY|FM CMDR, ATTU AIRBASE\nTO COMSEVENTHFLT\n\n1. Assess that all WP forces have been eliminated. We are scrambling all MPRA to search the area for remaining units.\n\n2. Full report to come within 12 hours.|Exit mission
Taskforce2BLUFORVictoryMessage=DEFEAT|FM COMPACFLT\nTO MOSCOW HQ\n\n1. We have lost contact with TF Vostok and the Invasion Force. We assess that the Americans were able to deploy enough forces to counteract our advance.\n\n2. New options for attacks on Guam are being developed and will be ready in 12 hours.|Exit mission
Taskforce2WelcomeAboardMessage=<size=20>Calculus of Conflict: Part 4 (Soviet)</size>\nBARGAINING CHIPS|Command has ordered us to invade the island of Attu and seize this territory from the Americans. Our intelligence believes American carrier aircraft are staged out of the airfield at Casco Cove on the eastern end of the island, and U.S. surface forces are likely moving north from Hawaii.\n\nDestroy any enemy forces encountered and ensure our amphibious forces reach the landing area.|Start mission
Taskforce2Tu-95CheckInMessage=AIRCRAFT CHECK IN|TF Vostok, this is Recon Flight. Checking in from the west, over.|Acknowledged!
Trigger3Condition_Condition3AreaLabel=Invasion Force Launch Area
Objective_ReachLandingArea=Reach landing area with Invasion Force
Objective_DestroyUSForces=Destroy all US forces encountered
[Language_cn]
Name=04B谈判筹码（苏联）
Description=自几艘苏联潜艇在GIUK缺口附近受损或沉没以来，华约与北约之间的军事行动已陷入停滞。其他方面，欧洲的地面战争陷入了令人不安的僵局，双方都在重新评估各自的比较优势和战争目标。谈判正在进行中，但由于缺乏筹码，双方都不愿达成解决方案。
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\04B Bargaining Chips - Red_briefing

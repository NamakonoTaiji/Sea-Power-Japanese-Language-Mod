[AllowedVessels]
usn_dd_gearing=Los destructores de clase Gearing son escoltas de tiempo de guerra reacondicionadas con buen armamento de armas y capacidad básica ASW. Estos barcos están al final de su vida de servicio, habiendo sido reactivados de la flota de reserva, y son los mejores empleados contra submarinos de menor capacidad y unidades de superficie.
usn_ff_garcia=Las fragatas de clase García son naves básicas de detección ASW con un solo helicóptero SH-2F. Son útiles para ampliar el área de búsqueda submarino de la formación, pero prácticamente no tienen capacidad de defensa de misiles y deben permanecer dentro del paraguas SAM de escoltas mejor protegidas.
usn_ffg_brooke=Las fragatas de clase Brooke ofrecen un paquete de escolta compacto con misiles y capacidad ASW. Más capaz que las fragatas anteriores de clase García, su lanzador Mark 22 sólo puede llevar 16 misiles SM-1MR, limitando su eficacia de defensa aérea.
usn_ff_knox_84=Las fragatas de clase Knox son escorts ASW con buenas suites sonar y soporte para un helicóptero SH-2F. Refits recientes dieron a los barcos de esta clase misiles Harpoon y Phalanx CIWS.
usn_ffg_oliver_hazard_perry=Las fragatas de Oliver Hazard Perry son escorts equilibradas con dos helicópteros, Harpoons y defensa aérea de mediano alcance. Son buques de pantalla flexibles, especialmente cuando se mezclan con especialistas de AAW más fuertes.
usn_ddg_adams_early=Charles F. Los destructores de clase Adams son una unidad de caballos de trabajo con capacidad local de defensa aérea y dos pistolas de 5 pulgadas. Refits añadidos recientes misiles Harpoon, pero estos barcos carecen de un hangar y un array remolcado, limitando su capacidad ASW. Esta versión Early representa los 13 barcos originales de la clase, equipados con el lanzador Mark 11 de dos brazos.
usn_ddg_adams_late=Charles F. Los destructores de clase Adams son una unidad de caballos de trabajo con capacidad local de defensa aérea y dos pistolas de 5 pulgadas. Refits añadidos recientes misiles Harpoon, pero estos barcos carecen de un hangar y un array remolcado, limitando su capacidad ASW. Esta versión tardía representa los 10 barcos finales de la clase, equipados con el más rápido lanzamiento de un solo brazo Mark 13, con dos Harpoons adicionales.
usn_ddg_coontz=Los destructores de clase Coontz son destructores de misiles guiados antiguos con capacidad de defensa aérea. Pueden proteger una formación contra las amenazas aéreas, pero su lanzamiento relativamente lento Mark 10 limita su capacidad de comprometer varias amenazas a la vez, y carecen de sistemas CIWS.
usn_ddg_mahan=USS Mahan fue reconfigurado como el barco de prueba para el programa NTU en 1980. Con una capacidad de defensa aérea moderna inusualmente fuerte, las exigencias de la guerra han puesto a disposición del buque como escolta de primera línea.
usn_dd_spruance=Los destructores de clase Spruance son fuertes plataformas ASW con dos helicópteros, una matriz remolcada y un excelente sonar de casco. Son cazadores submarinos altamente capaces y pantallas de formación, pero confían en otros barcos para la defensa del aire. En tiempos de guerra, estos buques han sido actualizados para operar helicópteros SH-3H además del SH-2F, mejorando su capacidad ASW.
usn_dd_spruance_abl=A principios de la década de 1980, varios destructores de clase Spruance fueron reacondicionados con Mark 143 Armored Box Launchers (ABL) para misiles de crucero Tomahawk, agregando capacidad de huelga al fuerte paquete ASW y helicóptero de la clase. Son escorts versátiles que pueden contribuir a misiones de ataque terrestre mientras se siguen proyectando contra submarinos. En tiempos de guerra, estos buques han sido actualizados para operar helicópteros SH-3H además del SH-2F, mejorando su capacidad ASW.
usn_ddg_kidd=Los destructores de clase Kidd son modernos escoltas de varias misiones con potentes baterías de misiles SM-1MR, Harpoon, capacidad ASW, helicópteros y CIWS. Son excelentes comandantes de pantalla todo propósito pero carecen de una matriz remolcada, así que son mejor operados con otros barcos ASW.
usn_cg_belknap=Los cruceros de clase Belknap proporcionan defensa aérea de área con misiles SM-2ER. Son anclas de defensa aérea de formación valiosa capaces de alcanzar objetivos a muy larga distancia, pero sus lanzadores Mark 10 son lentos para recargar y son los mejores emparejados con un barco SM-1MR de disparo más rápido para defensa capa. A diferencia de la clase Leahy, la clase Belknap tiene un gancho de hangar y pistola, dándoles flexibilidad.
usn_cg_leahy=Los cruceros de primera clase son potentes buques de guerra antiaéreo de doble calibre con misiles SM-2ER, capaces de alcanzar objetivos a muy largo plazo. Se especializan enteramente en defensa aérea de largo alcance, y deben ser emparejados con una escolta SM-1MR de disparo más rápido para defensa capa.
usn_clg_oklahoma_city=USS Oklahoma City es un crucero ligero de tiempo de guerra que fue reconstruido completamente en un crucero insignia y guiado-misile en 1960. Reactivado de la flota de reserva, su sistema de misiles es obsoleto, pero sus pistolas de calibre rápido de 6 pulgadas sobresalen en el bombardeo de la costa.
usn_cgn_california=Los cruceros nucleares de clase californiana son escoltas multiusos con lanzadores y revistas Mark 13 de doble participación para 80 interceptores SM-1MR. Ellos carecen de helicópteros y sólo tienen capacidad ASW limitada, pero son buques de defensa de formación confiables con excelente resistencia.
usn_cgn_virginia=Los cruceros nucleares de clase Virginia son escoltas multiusos de alta gama con lanzadores de doble arma Mark 26 para misiles SM-1MR, Harpoon y capacidad limitada de ASW. Al igual que la clase de California, no llevan helicópteros, pero ofrecen mayor capacidad de combate y resistencia como poderosos barcos antiaéreos.
usn_cgn_long_beach_83=Long Beach es un potente crucero antiaéreo con misiles SM-2ER de largo alcance con revistas profundas. El buque también lleva misiles Tomahawk para ataques terrestres, pero no tiene helicópteros ni capacidad limitada de ASW, por lo que debe ser escoltado.
usn_cg_ticonderoga=Los cruceros de clase Ticonderoga son los buques de defensa aérea más modernos existentes, equipados con el sistema de combate AEGIS y el radar SPY-1. Son los principales buques de defensa aérea que pueden manejar la mayoría de las amenazas aéreas, y sobresalen cuando están emparejados con un buque SM-2ER más largo como Belknap, Leahy o Long Beach.
usn_bb_iowa=Los buques de combate de clase Iowa son combatientes de superficie fuertemente armados y blindados con armas poderosas y baterías de misiles anti-tierra. Sobresalen en bombardeos y presencia superficial, pero no tienen capacidad de ASW ni de defensa aérea y deben ser escoltados por otras unidades.
usn_lha_tarawa=Los buques de asalto de clase Tarawa ofrecen una gran plataforma aérea y anfibia para operaciones centradas en helicópteros. Son buques de apoyo valiosos, pero necesitan escolta porque sus propias defensas no bastan en zonas de alta amenaza.
usn_cv_kitty_hawk=Kitty Hawk-class transportistas son plataformas de aviación estratégicas que proyectan energía aérea a través de un océano. Pueden transformar el alcance de un equipo de tareas, pero deben ser protegidos por escoltas y submarinos capas.
usn_avp_barnegat_mod=Las fragatas de clase Bonifacio se convierten en licitaciones de plan marino, proporcionadas como superávit de guerra al sur de Vietnam y posteriormente llevadas al servicio filipino. Han sido equipados con cuatro Harpoons en botes en medio de naves y un helipad improvisado soporta un helicóptero de ataque ligero.
ran_ddg_perth=Los destructores de clase Perth son la versión australiana de los destructores de clase estadounidense Charles F. Adams. Diferen algo en la configuración del diseño americano, incorporando el arma antisubmarina Ikara en lugar del lanzador ASROC. De otro modo son idénticos en armamento y capacidad para los buques de clase Adams más tarde.
ran_ffg_adelaide_shorthull=Las fragatas de clase Adelaide son versiones australianas de las fragatas americanas de clase Perry. Son valiosas escorts con capacidad local de defensa aérea. Durante la guerra, han sido equipados para operar helicópteros estadounidenses SH-2F.
jmsdf_dd_yamagumo=Los destructores de clase Yamagumo son escoltas mayores de JMSDF totalmente enfocadas en ASW. Su falta de capacidad de defensa aérea significa que deben operar con cobertura SAM de otros barcos.
jmsdf_dd_takatsuki=Los destructores de clase Takatsuki son capaces plataformas ASW con dos pistolas de 5 pulgadas y soporte para el helicóptero dron QH-50 DASH. Su defensa aérea es muy limitada, por lo que son los mejores empleados contra submarinos o unidades de superficie enemigas de menor capacidad.
jmsdf_ddg_tachikaze=Los destructores de clase Tachikaze son modernos barcos japoneses de defensa aérea equipados con la marca 13 astern. Son similares en capacidad para los destructores de clase estadounidense Charles F. Adams, actuando como excelentes combatientes de todo propósito.
jmsdf_ddh_haruna=Los destructores de helicópteros de clase Haruna son escoltas especializadas de comando ASW con un destacamento de helicópteros grande. Son excelentes insignias de pantalla submarino, pero carecen de misiles para la autodefensa y deben ser escoltados si se espera un ataque aéreo.

[AllowedHelicopters]
usn_sh-2f=Los helicópteros SH-2F extienden el área de búsqueda ASW de un barco y ayudan a procesar contactos submarinos más allá del rango de sonar de casco. Su radar también les permite explorar por delante y realizar reconocimiento de superficie para fragatas y destructores.
usn_sh-3h=Los helicópteros SH-3H son aviones ASW de largo alcance con sonar, MAD, sonobuoys y torpedos. No llevan radar de búsqueda superficial como el SH-2F, por lo que son más fuertes en el procesamiento submarino y búsqueda y rescate en lugar de explorador aéreo.
usn_qh-50d=Los drones QH-50 DASH proporcionan un alcance remoto ligero de ASW para escoltas mayores. Amplian el rango de entrega de torpedos, pero su falta de sensores y tripulación los hace limitados en cada otro papel.
jmsdf_hss-2=Los helicópteros HSS-2 son aviones ASW de largo alcance con sonar, MAD, sonobuoys y torpedos. No llevan radar de búsqueda superficial como el SH-2F, por lo que son más fuertes en el procesamiento submarino y búsqueda y rescate en lugar de explorador aéreo.
usmc_ah-1t=Los helicópteros de ataque AH-1T proporcionan un apoyo aéreo cercano, ataques con cohetes y golpes antiaérmicos de buques que pueden albergarlos. Son peligrosos contra objetivos de superficie o tierra expuestos, pero no tienen sistema de radar y no deben utilizarse como exploradores.
fr_as-350=Los helicópteros AS350 son aeronaves ligeras de utilidad para transporte y enlace. Son medios de apoyo económicos, pero no llevan sensores ni armas de combate y deben mantenerse lejos del espacio aéreo disputado. En servicio australiano han operado desde fragatas de la clase Adelaide como aeronaves de entrenamiento, con una función secundaria de reconocimiento y CSAR.

[AllowedAircraft]
fr_mirage_iii=El caza Mirage IIIO proporciona una capacidad básica aire-aire, pero su armamento de misiles es de corto alcance y el modelo queda superado por interceptores más modernos.
raaf_f-111c=Los aviones de ataque F-111C aportan gran alcance, una carga útil pesada y un excelente potencial de ataque en profundidad. En servicio australiano están equipados para misiones de ataque de precisión y antibuque, y pueden llevar misiles AIM-9 para autodefensa, lo que los hace más flexibles que otros tipos de aviones de ataque.
usn_ea-6b=Los EA-6B proporcionan apoyo de guerra electrónica que mejora la supervivencia de los ataques y perturba los sensores enemigos. Son un multiplicador de fuerza, ya que sus potentes pods de interferencia AN/ALQ-99 degradan el rendimiento de los sensores enemigos y reducen la eficacia de sus defensas.
usn_f-14a=Los cazas F-14A son aeronaves de defensa de flota de alto nivel con capacidad de interceptación de largo alcance. Su potente radar y sus misiles AIM-54A los convierten en el principal caza de superioridad aérea embarcado de Estados Unidos.
usn_fa-18a=Los cazas de ataque F/A-18A son los cazas polivalentes más nuevos disponibles para la OTAN. Capaces tanto de combate aire-aire como de ataque terrestre, son aeronaves muy flexibles y útiles para una variedad de funciones. Estos aviones australianos han sido puestos en servicio por la guerra pese a seguir técnicamente en pruebas.
usn_p-3c=Los aviones P-3C son plataformas de patrullas marítimas de largo alcance para la búsqueda de una zona amplia y el procesamiento de la ASW. Son excelentes para encontrar submarinos y contactos de superficie antes de amenazar la fuerza principal.
usmc_av-8a=Los corredores AV-8C proporcionan capacidad de ataque V/STOL de corto alcance desde cubiertas de aviación anfibias y aeródromos. Sobresalen a la vuelta rápida de cerca apoyo, huelga de luz y tareas locales de SEAD, pero necesitan protección contra combatientes modernos y defensas aéreas densas.
usn_a-7e=Los aviones A-7E son plataformas de ataque ligero fiables para tareas de ataque y apoyo. Ofrecen una buena eficiencia de carga útil, pero necesitan escoltas y apoyo electrónico en el espacio aéreo defendido.
usn_a-6e=Los aviones A-6E son plataformas de ataque con una fuerte capacidad de ataque naval. Están bien adaptados a misiones de huelga peligrosas cuando están emparejados con cubierta de combate y guerra electrónica.
usn_e-2c=Las aeronaves E-2C suministran alerta temprana aérea y cobertura de mando para operaciones aéreas navales. Amplian el rango de detección y mejoran el tiempo de reacción, haciéndolos poderosos multiplicadores de fuerza.
usn_s-3a=Los aviones S-3A son plataformas de transporte ASW con una fuerte patrulla marítima y capacidad de apoyo. Se utilizan mejor para construir una pantalla submarino externa alrededor de los portaaviones y los principales grupos de superficie.
usaf_f-15c=Los cazas F-15C son aviones dedicados de superioridad aérea con excelente rendimiento y capacidad de misiles. Úsalos para ganar control aéreo y proteger paquetes de huelga de los combatientes enemigos.
usaf_f-4e=Los aviones F-4E son combatientes mayores flexibles que pueden apoyar las misiones de defensa aérea y huelga. Todavía encajan bien en paquetes mixtos, aunque están clasificados por nuevas plataformas de superioridad aérea.
usaf_e-3a=Los aviones E-3A AWACS proporcionan una amplia vigilancia aérea y apoyo de mando. Son grandes multiplicadores de fuerza para operaciones aéreas, mejorando la detección y la coordinación en una amplia zona.
usaf_b-52g=Los bombarderos B-52G proporcionan una gran capacidad de huelga de largo alcance contra objetivos grandes o fijos. Requieren una cuidadosa planificación y protección, pero pueden producir efectos que ningún avión táctico puede coincidir.

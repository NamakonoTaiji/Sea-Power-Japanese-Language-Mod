[AllowedVessels]
usn_dd_gearing=Gearing-class 파괴자는 좋은 총 armament 및 기본적인 ASW 기능을 가진 전사적인 호위입니다. 이 선박은 그들의 서비스 생활의 끝에, 예비선에서 재 활성화되고, 더 낮은 수용량 잠수함 및 표면 단위에 대하여 고용된 제일입니다.
usn_ff_garcia=Garcia-class frigates는 단일 SH-2F 헬리콥터와 기본 ASW 선별 선박입니다. 그들은 형성의 잠수함 수색 지역을 확장하는 데 유용합니다, 그러나 실제로 더 나은 보호된 에스코트의 SAM 우산 안쪽에 남아 있어야 합니다.
usn_ffg_brooke=Brooke 종류 frigates는 미사일과 ASW 기능을 가진 조밀한 호위 포장을 제안합니다. 전진 Garcia-class frigates 보다는 더 많은 것은, 그들의 표 22 발사기만 16 SM-1MR 미사일을 나르고, 그들의 공기 방어 효과를 제한하.
usn_ff_knox_84=Knox-class frigates는 좋은 sonar 스위트와 1개의 SH-2F 헬리콥터를 위한 지원을 가진 ASW 에스코트입니다. 최근 refits는이 클래스 Harpoon missiles와 Phalanx CIWS의 선박을 준.
usn_ffg_oliver_hazard_perry=Oliver Hazard Perry-class frigates는 2 개의 헬리콥터, Harpoons 및 중간 범위 공기 방어와 균형 잡힌 에스코트입니다. 그들은 더 강한 AAW 전문가와 섞일 때 가동 가능한 스크린 배입니다.
usn_ddg_adams_early=Charles F. Adams-class 파괴자는 국부적으로 공기 방위 기능 및 2개의 5inch 총을 가진 솜씨 단위입니다. 최근 refits는 Harpoon missiles를 추가했지만,이 선박은 격납고와 견인 된 배열이 부족하여 ASW 기능을 제한합니다. 이 이른 버전은 쌍둥이 팔 표 11 발사기에 장착 된 클래스의 원래 13 배를 나타냅니다.
usn_ddg_adams_late=Charles F. Adams-class 파괴자는 국부적으로 공기 방위 기능 및 2개의 5inch 총을 가진 솜씨 단위입니다. 최근 refits는 Harpoon missiles를 추가했지만,이 선박은 격납고와 견인 된 배열이 부족하여 ASW 기능을 제한합니다. 이 늦은 버전은 클래스의 최종 10 배를 나타냅니다, 더 빠른 발사 단일 팔 마크 13 발사기에 장착, 두 개의 추가 Harpoons.
usn_ddg_coontz=Coontz-class 파괴자는 지역 공기 증거 기능을 가진 이전 안내한 파괴자입니다. 그들은 공기 위협에 대한 형성을 보호 할 수 있습니다, 그러나 그들의 상대적으로 느린 발사 마크 10 발사기는 한 번에 여러 위협에 참여하는 능력을 제한, 그들은 CIWS 시스템을 부족.
usn_ddg_mahan=USS Mahan은 1980 년 NTU 프로그램에 대한 테스트 배로 재구성되었습니다. 비정상적으로 강한 현대 공기 조밀한 기능으로 Fitted, 전쟁 exigencies는 첫번째 선 AAW 호위로 유효한 배를 만들었습니다.
usn_dd_spruance=Spruance-class 파괴자는 두 개의 헬리콥터, 견인 된 배열 및 우수한 선체 sonar와 강력한 ASW 플랫폼입니다. 그들은 매우 잠수함 사냥꾼과 대형 스크린, 그러나 그들은 공기 방위를 위한 다른 배에 의존합니다. 전쟁에서, 이 배는 SH-2F 이외에 SH-3H 헬리콥터를 운영하기 위해 업데이트되었습니다.
usn_dd_spruance_abl=1980 년대 초에, 몇몇 Spruance 종류 파괴자는 Tomahawk cruise missiles를 위한 Mark 143 기갑 상자 발사기 (ABL)로, 종류의 강한 ASW 및 헬리콥터 포장에 타격 기능을 추가했습니다. 그들은 여전히 대담한 임무에 기여할 수있는 다양한 에스코트입니다. 전쟁에서, 이 배는 SH-2F 이외에 SH-3H 헬리콥터를 운영하기 위해 업데이트되었습니다.
usn_ddg_kidd=Kidd-class 파괴자는 강력한 SM-1MR 미사일 배터리, Harpoon, ASW 기능, 헬리콥터 및 CIWS와 현대적인 멀티 배출 호위입니다. 그들은 우수한 다목적 스크린 사령관 그러나 towed 배열이 부족합니다, 그래서 다른 ASW 배로 운영하고 있습니다.
usn_cg_belknap=Belknap-class cruisers는 SM-2ER missiles를 가진 지역 공기 방위를 제공합니다. 그들은 매우 긴 범위에서 대상을 참여할 수있는 귀중한 대형 공기 밀도 앵커이지만, 마크 10 발사기는 다시로드가 느리고 그들은 계층 방어에 대한 빠른 발사 SM-1MR 선박과 가장 잘 결합됩니다. Leahy-class와는 달리 Belknap-class는 격납고 총 등반이 있으며 유연성을 제공합니다.
usn_cg_leahy=Leahy-class cruisers는 SM-2ER missiles를 가진 강력한 두 배 최후 반대로 공기 warfare 배, 아주 장거리에 매력적인 표적을 할 수 있습니다. 그들은 장거리 공기 방위에서 전적으로 전문화하고, 층을 꿴 방위를 위한 더 빠른 firing SM-1MR 호위로 묶여야 합니다.
usn_clg_oklahoma_city=USS Oklahoma City는 1960 년 기함과 인도의 순항으로 완전히 재건 된 전쟁 빛 도예입니다. 예비 함대에서 재 활성화, 그녀의 미사일 시스템은 무효하지만, 그녀의 6 인치 급류 총은 해안 폭격에 excel.
usn_cgn_california=캘리포니아 급 핵 cruisers는 80 SM-1MR interceptors를 위한 두 배 최후 표 13 발사자와 잡지를 가진 다목적 에스코트입니다. 그들은 헬리콥터가 부족하고 ASW 기능을 제한했지만 우수한 내구성을 가진 신뢰할 수있는 대형 선박입니다.
usn_cgn_virginia=버지니아 급 핵 cruisers는 SM-1MR missiles, Harpoon 및 제한된 ASW 기능을 위한 쌍둥이 팔 표 26 발사기를 가진 상한 다중목적 에스코트입니다. 캘리포니아 클래스처럼, 그들은 헬리콥터를 운반, 하지만 강력한 안티 에어 warfare 배로 향상된 전투 기능과 지구력을 제공합니다.
usn_cgn_long_beach_83=Long Beach는 깊은 잡지를 가진 장거리 SM-2ER 미사일을 가진 강력한 반대로 공기 warfare cruiser입니다. 배는 또한 토지 부착을위한 토마 호크 미사일을 운반하지만 헬리콥터 및 제한된 ASW 기능에 적합하므로 에스코트해야합니다.
usn_cg_ticonderoga=Ticonderoga-class cruisers는 AEGIS 전투 시스템과 SPY-1 레이더와 장착 된 존재에서 가장 현대적인 공기 방위 선박입니다. 그들은 대부분의 공기 위협을 처리 할 수있는 최고의 공기 밀도 선박이며 Belknap, Leahy 또는 Long Beach와 같은 더 긴 배열 된 SM-2ER 배로 묶을 때 탁월합니다.
usn_bb_iowa=Iowa-class 배틀은 강력한 총과 안티 표면 미사일 배터리를 가진 갑작스런 표면 전투기입니다. 그들은 폭격과 표면 존재에 excel, 그러나 ASW 또는 공기 방어 능력이 없으며 다른 단위로 호위해야합니다.
usn_lha_tarawa=Tarawa급 강습상륙함은 헬리콥터 중심 작전을 위한 대형 항공 및 상륙 플랫폼을 제공한다. 귀중한 지원함이지만 자체 방어력만으로는 고위협 지역에서 충분하지 않으므로 호위가 필요하다.
usn_cv_kitty_hawk=Kitty Hawk-class 캐리어는 해양에서 대기 전력을 계획하는 전략적 항공 플랫폼입니다. 그들은 작업의 힘의 도달을 변환 할 수 있지만 계층화된 에스코트와 하위 마린에 의해 보호해야합니다.
usn_avp_barnegat_mod=Bonifacio-class frigates는 전쟁 surplus로 제공 하 고 나중에 Philippine 서비스에. 그들은 용기에 4 개의 Harpoons와 함께 장착되어 있으며 improvised helipad aft는 light-attack 헬리콥터를 지원합니다.
ran_ddg_perth=퍼스 클래스 파괴자는 미국 찰스 F. Adams-class 파괴자의 호주 버전입니다. 그들은 ASROC 발사기의 장소에 있는 Ikara anti-submarine 무기 amidships를 통합하는 미국 디자인에서 약간 다릅니다. 그들은 나중에 Adams-class 배에 armament와 기능과 동일합니다.
ran_ffg_adelaide_shorthull=Adelaide-class frigates는 American Perry-class frigates의 호주 버전입니다. 그들은 지역 공기 방위 기능을 가진 귀중한 에스코트입니다. 전쟁 동안, 그들은 미국 SH-2F 헬리콥터를 운영하기 위해 옷을 입었다.
jmsdf_dd_yamagumo=Yamagumo-class 파괴자는 ASW에 중점을 둔 JMSDF 에스코트입니다. 공기 방어 기능의 그들의 부족은 다른 배에서 SAM 적용으로 작동해야 합니다.
jmsdf_dd_takatsuki=Takatsuki-class 파괴자는 QH-50 DASH 드론 헬리콥터에 대한 두 개의 5 인치 총과 지원을 가진 ASW 플랫폼이 가능합니다. 그들의 공기 증거는 아주 제한됩니다, 그래서 그들은 submarines 또는 더 낮은 capability 적 표면 단위에 대하여 잘 고용됩니다.
jmsdf_ddg_tachikaze=Tachikaze-class 파괴자는 Mark 13 발사기 Astern에 장착 된 현대적인 일본 공기 방위 선박입니다. 그들은 미국 Charles F. Adams-class 파괴자와 유사하며 우수한 다목적 전투기 역할을합니다.
jmsdf_ddh_haruna=Haruna-class 헬리콥터 파괴자는 대형 헬리콥터 탈착과 ASW 명령 에스코트를 전문으로합니다. 그들은 우수한 submarine 스크린 기함, 그러나 각자 defense를 위한 미사일이 부족하고 공기 공격이 예상되는 경우에 에스코트되어야 합니다.

[AllowedHelicopters]
usn_sh-2f=SH-2F 헬리콥터는 선박의 ASW 검색 영역을 확장하고 hull sonar 범위를 넘어 급성 잠수함 접촉을 돕습니다. 그들의 레이더는 또한 그들이 앞서 나가고 frigates 및 파괴자를 위한 표면 reconnaissance를 실행합니다.
usn_sh-3h=SH-3H 헬리콥터는 하수인, MAD, sonobuoys 및 torpedoes를 가진 장거리 ASW 항공기입니다. 그들은 SH-2F와 같은 표면 연구 레이더를 수행하지 않습니다, 그래서 그들은 소마린 prosecution에서 가장 강하고 기동성 scouting보다 오히려 검색 및 구조.
usn_qh-50d=QH-50 DASH 드론은 이전 에스코트에 대한 경량 원격 ASW 도달을 제공합니다. 그들은 torpedo 배달 범위를 확장하지만 센서와 승무원의 부족은 다른 모든 역할에서 제한된다.
jmsdf_hss-2=HSS-2 헬리콥터는 하수인, MAD, sonobuoys 및 torpedoes를 가진 장거리 ASW 항공기입니다. 그들은 SH-2F와 같은 표면 연구 레이더를 수행하지 않습니다, 그래서 그들은 소마린 prosecution에서 가장 강하고 기동성 scouting보다 오히려 검색 및 구조.
usmc_ah-1t=AH-1T 공격 헬리콥터는 가까운 공기 지원, 로켓 공격 및 선박에서 폭발 방지 펀치를 제공합니다. 그들은 노출 표면 또는 토지 대상에 위험하지만 레이더 시스템을 수행하고 scouts로 사용하지 않아야합니다.
fr_as-350=AS350 헬리콥터는 수송과 연락 임무에 쓰이는 경량 다목적 항공기이다. 저렴한 지원 전력이지만 전투 센서나 무장을 갖추지 않았으므로 분쟁 공역을 피해야 한다. 호주군에서는 Adelaide급 호위함에서 훈련기로 운용되었으며, 부차적으로 정찰 및 CSAR 임무도 맡았다.

[AllowedAircraft]
fr_mirage_iii=Mirage IIIO 전투기는 기본적인 공대공 능력을 제공하지만 미사일 무장의 사거리가 짧고, 더 현대적인 요격기에 비해 성능이 뒤처진다.
raaf_f-111c=F-111C 공격기는 긴 항속거리, 큰 탑재량, 뛰어난 종심 타격 능력을 제공한다. 호주군에서는 정밀 타격과 대함 임무에 맞춰 운용되며, 자위용 AIM-9 미사일을 탑재할 수 있어 다른 공격기보다 더 유연하다.
usn_ea-6b=EA-6B 항공기는 타격 생존성을 높이고 적 센서를 교란하는 전자전 지원을 제공한다. 강력한 AN/ALQ-99 재밍 포드가 적 센서 성능을 떨어뜨리고 방어 효과를 낮추는 전력 승수이다.
usn_f-14a=F-14A 전투기는 장거리 요격 능력을 갖춘 고성능 함대 방공기이다. 강력한 레이더와 AIM-54A 미사일 덕분에 미 해군 항모 기반 제공 전투기의 최상위 기종이다.
usn_fa-18a=F/A-18A 전투공격기는 NATO가 사용할 수 있는 최신 다목적 전투기이다. 공대공 전투와 지상 공격을 모두 수행할 수 있어 다양한 임무에 유연하게 투입할 수 있다. 이 호주 항공기들은 기술적으로 아직 시험 중이지만 전시 상황 때문에 실전에 투입되었다.
usn_p-3c=P-3C 항공기는 광범위한 검색 및 ASW prosecution에 대한 장거리 해상 순찰 플랫폼입니다. 그들은 주요 힘을 위협하기 전에 submarines와 표면 접촉을 찾는 것이 좋습니다.
usmc_av-8a=AV-8C Harriers는 mphibious 항공 갑판과 비행기에서 짧 범위 V/STOL 공격 기능을 제공합니다. 그들은 빠른 턴어라운드 근접 지원, 빛 파업 및 로컬 SEAD 작업에 excel, 그러나 현대 전투기와 dense 공기 방어에 대한 보호가 필요합니다.
usn_a-7e=A-7E 항공기는 파업과 가까운 지원 작업을 위한 신뢰할 수 있는 가벼운 공격 플랫폼입니다. 그들은 좋은 페이로드 효율을 제공하지만 에스코트와 전자 지원이 방어 된 에어 스페이스에 필요합니다.
usn_a-6e=A-6E 항공기는 강력한 해군 타격 기능을 가진 모든 날씨 공격 플랫폼입니다. 그들은 전투기 덮개와 전자 warfare로 묶을 때 위험한 타격 임무에 잘 적응됩니다.
usn_e-2c=E-2C 항공기는 공차 조기 경고 및 해군 공기 작동 명령 적용을 제공합니다. 그들은 탐지 범위를 확장하고 반응 시간을 개량하고, 그(것)들을 강력한 힘 승압기를 만들기.
usn_s-3a=S-3A 항공기는 강력한 해상 순찰 및 지원 기능을 갖춘 ASW 플랫폼입니다. 그들은 운반대와 중요한 지상 그룹의 주위에 외부 submarine 스크린을 건설하기 위하여 베스트 이용됩니다.
usaf_f-15c=F-15C 전투기는 우수한 성과 및 missile 기능을 가진 전용 공기 superiority 항공기입니다. 공기 제어를 승리하고 적 전투기에서 타격 패키지를 보호합니다.
usaf_f-4e=F-4E 항공기는 공기 방어 및 타격 임무를 지원할 수있는 유연한 이전 전투기입니다. 그들은 여전히 혼합 패키지에 잘 적합하지만, 그들은 더 새로운 공기 superiority 플랫폼에 의해 outclassed.
usaf_e-3a=E-3A AWACS 항공기는 넓은 공시 감시 및 명령 지원을 제공합니다. 그들은 공기 가동을 위한 중요한 힘 multipliers, 넓은 지역을 통하여 탐지와 조정을 개량합니다.
usaf_b-52g=B-52G 폭격기는 큰 조정 표적에 대하여 무거운 장거리 타격 수용량을 제공합니다. 그들은 주의적인 계획 및 보호를 요구합니다, 그러나 전술상 항공기가 일치할 수 없는 효력을 배달할 수 있습니다.

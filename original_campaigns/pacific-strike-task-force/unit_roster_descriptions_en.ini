[AllowedVessels]
usn_dd_gearing=Gearing-class destroyers are refitted wartime escorts with good gun armament and basic ASW capability. These ships are at the end of their service lives, having been reactivated from the reserve fleet, and are best employed against lower-capability submarines and surface units.
usn_ff_garcia=Garcia-class frigates are basic ASW screening ships with a single SH-2F helicopter. They are useful for extending the formation's submarine search area, but have virtually no missile-defense capability and must remain inside the SAM umbrella of better-protected escorts.
usn_ffg_brooke=Brooke-class frigates offer a compact escort package with missile and ASW capability. More capable than the preceding Garcia-class frigates, their Mark 22 launcher can only carry 16 SM-1MR missiles, limiting their air defense effectiveness.
usn_ff_knox_84=Knox-class frigates are ASW escorts with good sonar suites and support for one SH-2F helicopter. Recent refits gave the ships of this class Harpoon missiles and Phalanx CIWS.
usn_ffg_oliver_hazard_perry=Oliver Hazard Perry-class frigates are balanced escorts with two helicopters, Harpoons, and medium-range air defense. They are flexible screen ships, especially when mixed with stronger AAW specialists.
usn_ddg_adams_early=Charles F. Adams-class destroyers are a workhorse unit with local air defense capability and two 5-inch guns. Recent refits added Harpoon missiles, but these ships lack a hangar and a towed array, limiting their ASW capability. This Early version represents the original 13 ships of the class, fitted with the twin-arm Mark 11 launcher.
usn_ddg_adams_late=Charles F. Adams-class destroyers are a workhorse unit with local air defense capability and two 5-inch guns. Recent refits added Harpoon missiles, but these ships lack a hangar and a towed array, limiting their ASW capability. This Late version represents the final 10 ships of the class, fitted with the faster firing single-arm Mark 13 launcher, with two additional Harpoons.
usn_ddg_coontz=Coontz-class destroyers are older guided-missile destroyers with area air-defense capability. They can protect a formation against air threats, but their relatively slow firing Mark 10 launcher limits their ability to engage several threats at once, and they lack CIWS systems.
usn_ddg_mahan=USS Mahan was reconfigured as the test ship for the NTU program in 1980. Fitted with an unusually strong modern air-defense capability, war exigencies have made the ship available as a first-line AAW escort.
usn_dd_spruance=Spruance-class destroyers are strong ASW platforms with two helicopters, a towed array, and excellent hull sonar. They are highly capable submarine hunters and formation screens, but they rely on other ships for air defense. In wartime, these ships have been updated to operate SH-3H helicopters in addition to the SH-2F, enhancing their ASW capability.
usn_dd_spruance_abl=In the early 1980s, several Spruance-class destroyers were refitted with Mark 143 Armored Box Launchers (ABL) for Tomahawk cruise missiles, adding strike capability to the class' strong ASW and helicopter package. They are versatile escorts that can contribute to land-attack missions while still screening against submarines. In wartime, these ships have been updated to operate SH-3H helicopters in addition to the SH-2F, enhancing their ASW capability.
usn_ddg_kidd=Kidd-class destroyers are modern multi-mission escorts with strong SM-1MR missile batteries, Harpoon, ASW capability, helicopters, and CIWS. They are excellent all-purpose screen commanders but lack a towed array, so are best operated with other ASW ships.
usn_cg_belknap=Belknap-class cruisers provide area air defense with SM-2ER missiles. They are valuable formation air-defense anchors able to engage targets at very long range, but their Mark 10 launchers are slow to reload and they are best paired with a faster firing SM-1MR ship for layered defense. Unlike the Leahy-class, the Belknap-class have a hangar and gun astern, giving them flexibility.
usn_cg_leahy=Leahy-class cruisers are powerful double-ended anti-air warfare ships with SM-2ER missiles, capable of engaging targets at very long range. They specialize entirely in long-range air defense, and should be paired with a faster firing SM-1MR escort for layered defense.
usn_clg_oklahoma_city=USS Oklahoma City is a wartime light cruiser which was completely rebuilt into a flagship and guided-missile cruiser in 1960. Reactivated from the reserve fleet, her missile system is obsolete, but her 6-inch rapid-firing guns excel at shore bombardment.
usn_cgn_california=California-class nuclear cruisers are multi-purpose escorts with double-ended Mark 13 launchers and magazines for 80 SM-1MR interceptors. They lack helicopters and have only limited ASW capability, but are reliable formation-defense ships with excellent endurance.
usn_cgn_virginia=Virginia-class nuclear cruisers are high-end multi-purpose escorts with twin-arm Mark 26 launchers for SM-1MR missiles, Harpoon, and limited ASW capability. Like the California-class, they carry no helicopters, but offer improved combat capability and endurance as powerful anti-air warfare ships.
usn_cgn_long_beach_83=Long Beach is a powerful anti-air warfare cruiser fitted with long-range SM-2ER missiles with deep magazines. The ship also carries Tomahawk missiles for land-attack, but is fitted with no helicopters and only limited ASW capability, so must be escorted.
usn_cg_ticonderoga=Ticonderoga-class cruisers are the most modern air defense ships in existence, fitted with the AEGIS combat system and SPY-1 radar. They are premier air-defense ships that can handle most air threats, and excel when paired with a longer-ranged SM-2ER ship like Belknap, Leahy, or Long Beach.
usn_bb_iowa=Iowa-class battleships are heavily armed and armored surface combatants with powerful guns and anti-surface missile batteries. They excel at bombardment and surface presence, but have no ASW or air defense capability and must be escorted by other units.
usn_lha_tarawa=Tarawa-class assault ships provide a large aviation and amphibious platform for helicopter-heavy operations. They are valuable support ships, but require escorts because their own defenses are not enough for high-threat areas.
usn_cv_kitty_hawk=Kitty Hawk-class carriers are strategic aviation platforms that project air power across an ocean. They can transform a task force's reach, but must be protected by layered escorts and submarines.

usn_avp_barnegat_mod=Bonifacio-class frigates are converted seaplane tenders, provided as war surplus to South Vietnam and later brought into Philippine service. They have been fitted with four Harpoons in canisters amidships and an improvised helipad aft supports a light-attack helicopter.

ran_ddg_perth=The Perth-class destroyers are Australian version of the American Charles F. Adams-class destroyers. They differ somewhat in configuration from the American design, incorporating the Ikara anti-submarine weapon amidships in place of the ASROC launcher. They are otherwise identical in armament and capability to the later Adams-class ships.
ran_ffg_adelaide_shorthull=Adelaide-class frigates are Australian versions of the American Perry-class frigates. They are valuable escorts with local air defense capability. During wartime, they have been outfitted to operate American SH-2F helicopters.

jmsdf_dd_yamagumo=Yamagumo-class destroyers are older JMSDF escorts entirely focused on ASW. Their lack of air defense capability means they should operate with SAM coverage from other ships.
jmsdf_dd_takatsuki=Takatsuki-class destroyers are capable ASW platforms with two 5-inch guns and support for the QH-50 DASH drone helicopter. Their air-defense is very limited, so they are best employed against submarines or lower-capability enemy surface units.
jmsdf_ddg_tachikaze=Tachikaze-class destroyers are modern Japanese air defense ships fitted with the Mark 13 launcher astern. They are similar in capability to the American Charles F. Adams-class destroyers, acting as excellent all-purpose combatants.
jmsdf_ddh_haruna=Haruna-class helicopter destroyers are specialized ASW command escorts with a large helicopter detachment. They are excellent submarine-screen flagships, but lack missiles for self-defense and should be escorted if air attack is expected.

[AllowedHelicopters]
usn_sh-2f=SH-2F helicopters extend a ship's ASW search area and help prosecute submarine contacts beyond hull sonar range. Their radar also lets them scout ahead and perform surface reconnaissance for frigates and destroyers.
usn_sh-3h=SH-3H helicopters are long-range ASW aircraft with dipping sonar, MAD, sonobuoys, and torpedoes. They do not carry surface-search radar like the SH-2F, so they are strongest at submarine prosecution and search and rescue rather than airborne scouting.
usn_qh-50d=QH-50 DASH drones provide lightweight remote ASW reach for older escorts. They extend torpedo delivery range, but their lack of sensors and crew makes them limited in every other role.
jmsdf_hss-2=HSS-2 helicopters are long-range ASW aircraft with dipping sonar, MAD, sonobuoys, and torpedoes. They do not carry surface-search radar like the SH-2F, so they are strongest at submarine prosecution and search and rescue rather than airborne scouting.
usmc_ah-1t=AH-1T attack helicopters provide close air support, rocket attacks, and anti-armor punch from ships that can host them. They are dangerous against exposed surface or land targets, but carry no radar system and should not be used as scouts.
fr_as-350=AS350 helicopters are light utility aircraft for transport and liaison work. They are inexpensive support assets, but carry no combat sensors or weapons and should stay clear of contested airspace. In Australian service, they have operated from the Adelaide class frigates as training aircraft, with a secondary reconnaissance and CSAR role.

[AllowedAircraft]
fr_mirage_iii=The Mirage IIIO fighter provides basic air-to-air capability, but its missile armament is short-ranged and the type is outclassed by more modern interceptor aircraft.
raaf_f-111c=F-111C strike aircraft bring long range, heavy payload, and excellent deep-strike potential. In Australian service, they are outfitted for the precision strike and anti-ship role, and can carry AIM-9 missiles for self-defense making them more flexible than other attack aircraft types.
usn_ea-6b=EA-6B aircraft provide electronic warfare support that improves strike survivability and disrupts enemy sensors. They are a force multiplier, as their powerful AN/ALQ-99 jamming pods degrade enemy sensor performance and reduce effectiveness of their defenses.
usn_f-14a=F-14A fighters are high-end fleet-defense aircraft with long-range intercept capability. Their powerful radar and AIM-54A missiles make them the premier US carrier-based air-superiority fighter.
usn_fa-18a=F/A-18A strike fighters are the newest multirole fighters available to NATO. Capable of both air-to-air combat and ground attack, these are highly flexible aircraft useful for a variety of roles. These Australian aircraft have been pressed into service given wartime despite still technically undergoing trials.
usn_p-3c=P-3C aircraft are long-range maritime patrol platforms for wide-area search and ASW prosecution. They are excellent for finding submarines and surface contacts before they threaten the main force.
usmc_av-8a=AV-8C Harriers provide short-range V/STOL attack capability from amphibious aviation decks and airfields. They excel at fast turnaround close support, light strike, and local SEAD tasks, but need protection against modern fighters and dense air defenses.
usn_a-7e=A-7E aircraft are reliable light attack platforms for strike and close support tasks. They offer good payload efficiency, but need escorts and electronic support in defended airspace.
usn_a-6e=A-6E aircraft are all-weather attack platforms with strong naval strike capability. They are well suited to dangerous strike missions when paired with fighter cover and electronic warfare.
usn_e-2c=E-2C aircraft provide airborne early warning and command coverage for naval air operations. They extend detection range and improve reaction time, making them powerful force multipliers.
usn_s-3a=S-3A aircraft are carrier ASW platforms with strong maritime patrol and support capability. They are best used to build an outer submarine screen around carriers and major surface groups.
usaf_f-15c=F-15C fighters are dedicated air-superiority aircraft with excellent performance and missile capability. Use them to win air control and protect strike packages from enemy fighters.
usaf_f-4e=F-4E aircraft are flexible older fighters that can support air defense and strike missions. They still fit well in mixed packages, though they are outclassed by newer air-superiority platforms.
usaf_e-3a=E-3A AWACS aircraft provide broad airborne surveillance and command support. They are major force multipliers for air operations, improving detection and coordination across a wide area.
usaf_b-52g=B-52G bombers provide heavy long-range strike capacity against large or fixed targets. They require careful planning and protection, but can deliver effects no tactical aircraft can match.
[AllowedVessels]
usn_dd_gearing=Les destroyers de la classe d'équipement sont des escortes en temps de guerre dotées d'un bon armement et d'une capacité ASW de base. Ces navires sont à la fin de leur vie utile, ayant été réactivés de la flotte de réserve, et sont le mieux utilisés contre les sous-marins et les unités de surface à faible capacité.
usn_ff_garcia=Les frégates de la classe Garcia sont des navires de contrôle ASW de base avec un seul hélicoptère SH-2F. Ils sont utiles pour étendre la zone de recherche sous-marine de la formation, mais n'ont pratiquement aucune capacité de défense antimissile et doivent demeurer à l'intérieur du parapluie SAM d'escortes mieux protégées.
usn_ffg_brooke=Les frégates de classe Brooke offrent un ensemble compact d'escortes avec des missiles et des capacités ASW. Plus capable que les frégates de la précédente classe Garcia, leur lanceur Mark 22 ne peut transporter que 16 missiles SM-1MR, ce qui limite leur efficacité de défense aérienne.
usn_ff_knox_84=Les frégates de classe Knox sont des escortes ASW avec de bonnes suites sonar et support pour un hélicoptère SH-2F. De récents refits ont donné les navires de cette classe de missiles Harpoon et Phalanx CIWS.
usn_ffg_oliver_hazard_perry=Oliver Hazard Frégates de classe Perry sont des escortes équilibrées avec deux hélicoptères, Harpoons, et la défense aérienne de moyenne portée. Ils sont des vaisseaux d'écran flexibles, surtout lorsqu'ils sont mélangés avec des spécialistes plus forts de l'AAW.
usn_ddg_adams_early=Charles F. Adams-class destroyers sont une unité de cheval de travail avec une capacité de défense aérienne locale et deux canons de 5 pouces. De récents refits ont ajouté des missiles Harpoon, mais ces navires manquent d'un hangar et d'un réseau remorqué, limitant leur capacité ASW. Cette version Early représente les 13 navires originaux de la classe, équipés du lanceur à deux bras Mark 11.
usn_ddg_adams_late=Charles F. Adams-class destroyers sont une unité de cheval de travail avec une capacité de défense aérienne locale et deux canons de 5 pouces. De récents refits ont ajouté des missiles Harpoon, mais ces navires manquent d'un hangar et d'un réseau remorqué, limitant leur capacité ASW. Cette version tardive représente les 10 derniers bateaux de la classe, équipés du lanceur à bras simple Mark 13 plus rapide, avec deux Harpoons supplémentaires.
usn_ddg_coontz=Les destroyers de la classe Coontz sont d'anciens destroyers à missiles guidés avec une capacité de défense aérienne. Ils peuvent protéger une formation contre les menaces aériennes, mais leur lanceur Mark 10 à tir relativement lent limite leur capacité à faire face à plusieurs menaces en même temps, et ils ne disposent pas de systèmes CIWS.
usn_ddg_mahan=USS Mahan a été reconfiguré comme navire d'essai pour le programme NTU en 1980. Doté d'une capacité de défense aérienne exceptionnellement solide, les exigences de guerre ont rendu le navire disponible en tant qu'escorte AAW de première ligne.
usn_dd_spruance=Les destroyers de la classe Spruance sont de solides plates-formes ASW avec deux hélicoptères, un réseau remorqué et un excellent sonar de coque. Ils sont des chasseurs sous-marins hautement capables et des écrans de formation, mais ils comptent sur d'autres navires pour la défense aérienne. En temps de guerre, ces navires ont été mis à jour pour exploiter des hélicoptères SH-3H en plus du SH-2F, améliorant leur capacité ASW.
usn_dd_spruance_abl=Au début des années 1980, plusieurs destroyers de la classe Spruance ont été équipés de lance-boîtes blindées (ABL) de Mark 143 pour les missiles de croisière Tomahawk, ajoutant ainsi une capacité de frappe au solide équipement ASW et hélicoptère de la classe. Ce sont des escortes polyvalentes qui peuvent contribuer aux missions d'attaque terrestre tout en scrutant les sous-marins. En temps de guerre, ces navires ont été mis à jour pour exploiter des hélicoptères SH-3H en plus du SH-2F, améliorant leur capacité ASW.
usn_ddg_kidd=Les destroyers de classe kidd sont des escortes multimissions modernes avec de fortes batteries de missiles SM-1MR, Harpoon, capacité ASW, hélicoptères et CIWS. Ils sont d'excellents commandants d'écran tout usage, mais ne disposent pas d'un réseau remorqué, donc sont mieux exploités avec d'autres navires ASW.
usn_cg_belknap=Les croiseurs de la classe Belknap assurent la défense aérienne de la zone avec des missiles SM-2ER. Ce sont de précieuses ancres de défense aérienne de formation capables d'engager des cibles à très longue portée, mais leurs lanceurs Mark 10 sont lents à recharger et ils sont mieux jumelés avec un vaisseau SM-1MR à tir plus rapide pour la défense en couches. Contrairement à la classe Leahy, la classe Belknap dispose d'un hangar et d'un canon arrière, ce qui leur donne de la souplesse.
usn_cg_leahy=Les croiseurs de la classe Leahy sont de puissants navires de guerre antiaériens à double extrémité équipés de missiles SM-2ER, capables d'atteindre des cibles à très longue portée. Ils se spécialisent entièrement dans la défense aérienne à longue portée, et devraient être jumelés avec une escorte SM-1MR à tir plus rapide pour la défense en couches.
usn_clg_oklahoma_city=USS Oklahoma City est un croiseur léger en temps de guerre qui a été complètement reconstruit en un croiseur phare et guide-missile en 1960. Réactivée de la flotte de réserve, son système de missiles est obsolète, mais ses canons à tir rapide de 6 pouces excellent au bombardement à terre.
usn_cgn_california=Les croiseurs nucléaires de classe californienne sont des escortes polyvalentes avec des lanceurs Mark 13 doubles et des magazines pour 80 intercepteurs SM-1MR. Ils manquent d'hélicoptères et n'ont que des capacités ASW limitées, mais ils sont des navires de formation et de défense fiables avec une excellente endurance.
usn_cgn_virginia=Les croiseurs nucléaires de classe Virginie sont des escortes polyvalentes haut de gamme avec des lanceurs à deux bras Mark 26 pour missiles SM-1MR, Harpoon et une capacité ASW limitée. Comme la classe californienne, ils ne transportent pas d'hélicoptères, mais offrent une capacité de combat améliorée et une endurance accrue en tant que puissants navires antiaériens.
usn_cgn_long_beach_83=Long Beach est un puissant croiseur anti-aérien équipé de missiles SM-2ER à longue portée avec des magazines profonds. Le navire transporte également des missiles Tomahawk pour une attaque terrestre, mais il n'est équipé d'aucun hélicoptère et ne dispose que d'une capacité limitée d'ASW.
usn_cg_ticonderoga=Les croiseurs de la classe Ticonderoga sont les navires de défense aérienne les plus modernes, équipés du système de combat AEGIS et du radar SPY-1. Ce sont les premiers navires de défense aérienne qui peuvent faire face à la plupart des menaces aériennes, et excellent lorsqu'ils sont jumelés à un navire SM-2ER plus long comme Belknap, Leahy ou Long Beach.
usn_bb_iowa=Les navires de la classe Iowa sont des combattants de surface lourdement armés et blindés dotés de puissantes armes et de batteries anti-missiles. Ils excellent au bombardement et à la présence en surface, mais n'ont pas de capacité de défense aérienne ou de défense aérienne et doivent être escortés par d'autres unités.
usn_lha_tarawa=Les navires d'assaut de classe Tarawa offrent une grande plateforme aérienne et amphibie pour les opérations centrées sur les hélicoptères. Ce sont de précieux bâtiments de soutien, mais ils doivent être escortés car leurs propres défenses ne suffisent pas dans les zones à forte menace.
usn_cv_kitty_hawk=Les transporteurs de la classe Kitty Hawk sont des plates-formes aériennes stratégiques qui projettent l'énergie aérienne à travers un océan. Ils peuvent transformer la portée d'une force opérationnelle, mais doivent être protégés par des escortes et des sous-marins en couches.
usn_avp_barnegat_mod=Les frégates de la classe Bonifacio sont converties en offres d'hydravions, fournies comme surplus de guerre au Sud-Vietnam et ensuite mises en service aux Philippines. Ils ont été équipés de quatre Harpoons dans des conteneurs au milieu de navires et un héliport improvisé à l'arrière soutient un hélicoptère à attaque légère.
ran_ddg_perth=Les destroyers de la classe Perth sont la version australienne des destroyers américains Charles F. Adams. Ils diffèrent quelque peu de la configuration américaine, intégrant les armes anti-sous-marines Ikara au milieu des navires à la place du lanceur ASROC. Ils sont autrement identiques dans l'armement et la capacité aux navires de classe Adams plus tard.
ran_ffg_adelaide_shorthull=Les frégates de classe Adélaïde sont des versions australiennes des frégates de classe American Perry. Ce sont des escortes précieuses avec une capacité de défense aérienne locale. Pendant la guerre, ils ont été équipés pour exploiter des hélicoptères américains SH-2F.
jmsdf_dd_yamagumo=Les destroyers de la classe Yamagumo sont des escortes JMSDF plus anciennes entièrement centrées sur ASW. Leur manque de capacité de défense aérienne signifie qu'ils doivent opérer avec la couverture SAM d'autres navires.
jmsdf_dd_takatsuki=Les destroyers de la classe Takatsuki sont des plates-formes ASW capables avec deux canons de 5 pouces et support pour l'hélicoptère de drone QH-50 DASH. Leur défense aérienne est très limitée, donc ils sont le mieux utilisés contre les sous-marins ou les unités de surface ennemies de faible capacité.
jmsdf_ddg_tachikaze=Les destroyers de la classe Tachikaze sont des navires modernes de défense aérienne japonais équipés du lanceur arrière Mark 13. Ils sont semblables aux destroyers de la classe Charles F. Adams, agissant comme d'excellents combattants polyvalents.
jmsdf_ddh_haruna=Les destroyers d'hélicoptères de la classe Haruna sont des escortes spéciales de commandement de l'ASW avec un grand détachement d'hélicoptères. Il s'agit d'excellents phares à écran sous-marin, mais ils manquent de missiles pour se défendre et devraient être escortés en cas d'attaque aérienne.

[AllowedHelicopters]
usn_sh-2f=Les hélicoptères SH-2F prolongent la zone de recherche ASW d'un navire et aident à poursuivre les contacts sous-marins au-delà de la portée du sonar de coque. Leur radar leur permet également d'effectuer des reconnaissances de surface pour les frégates et les destroyers.
usn_sh-3h=Les hélicoptères SH-3H sont des avions ASW de longue portée avec sonar, MAD, sonoboues et torpilles. Ils ne portent pas de radar de recherche en surface comme le SH-2F, donc ils sont les plus forts aux poursuites sous-marines et aux recherches et sauvetages plutôt qu'aux reconnaissances aériennes.
usn_qh-50d=Les drones DASH QH-50 fournissent une portée ASW à distance légère pour les escortes plus anciennes. Ils étendent la portée de livraison des torpilles, mais leur manque de capteurs et d'équipage les limite dans tous les autres rôles.
jmsdf_hss-2=Les hélicoptères HSS-2 sont des avions ASW à longue portée avec sonar, MAD, sonoboues et torpilles. Ils ne portent pas de radar de recherche en surface comme le SH-2F, donc ils sont les plus forts aux poursuites sous-marines et aux recherches et sauvetages plutôt qu'aux reconnaissances aériennes.
usmc_ah-1t=Les hélicoptères d'attaque AH-1T fournissent un soutien aérien rapproché, des tirs de roquettes et des coups de poing anti-armor provenant de navires qui peuvent les accueillir. Ils sont dangereux contre les cibles terrestres ou de surface exposées, mais ne portent aucun système radar et ne devraient pas être utilisés comme éclaireurs.
fr_as-350=Les hélicoptères AS350 sont des aéronefs utilitaires légers pour le transport et les liaisons. Ce sont des moyens de soutien peu coûteux, mais ils n'emportent ni capteurs de combat ni armement et doivent rester à l'écart de l'espace aérien contesté. En service australien, ils ont opéré depuis les frégates de classe Adelaide comme appareils d'entraînement, avec un rôle secondaire de reconnaissance et de CSAR.

[AllowedAircraft]
fr_mirage_iii=Le chasseur Mirage IIIO fournit une capacité air-air de base, mais son armement de missiles est de courte portée et l'appareil est dépassé par des intercepteurs plus modernes.
raaf_f-111c=Les avions d'attaque F-111C apportent un long rayon d'action, une lourde charge utile et un excellent potentiel de frappe dans la profondeur. En service australien, ils sont équipés pour les frappes de précision et le rôle antinavire, et peuvent emporter des missiles AIM-9 d'autodéfense, ce qui les rend plus flexibles que d'autres types d'avions d'attaque.
usn_ea-6b=Les EA-6B fournissent un appui de guerre électronique qui améliore la survivabilité des frappes et perturbe les capteurs ennemis. Ce sont des multiplicateurs de force: leurs puissants pods de brouillage AN/ALQ-99 dégradent les performances des capteurs ennemis et réduisent l'efficacité de leurs défenses.
usn_f-14a=Les chasseurs F-14A sont des appareils haut de gamme de défense de flotte dotés d'une capacité d'interception à longue portée. Leur puissant radar et leurs missiles AIM-54A en font le principal chasseur américain embarqué de supériorité aérienne.
usn_fa-18a=Les chasseurs d'attaque F/A-18A sont les plus récents chasseurs multirôles disponibles pour l'OTAN. Capables à la fois de combat air-air et d'attaque au sol, ce sont des appareils très flexibles utiles dans de nombreux rôles. Ces avions australiens ont été mis en service en raison de la guerre, bien qu'ils soient encore techniquement en essais.
usn_p-3c=Les aéronefs P-3C sont des plates-formes de patrouille maritime à longue portée pour les recherches à grande échelle et les poursuites en matière de sécurité aérienne. Ils sont excellents pour trouver des sous-marins et des contacts de surface avant de menacer la force principale.
usmc_av-8a=Les Harriers AV-8C offrent une capacité d'attaque V/STOL de courte portée à partir de ponts d'aviation et d'aérodromes amphibies. Ils excellent à l'appui rapproché rapide, frappe légère et tâches SEAD locales, mais ont besoin de protection contre les combattants modernes et les défenses aériennes denses.
usn_a-7e=Les aéronefs A-7E sont des plates-formes d'attaque légères fiables pour les tâches de frappe et de soutien rapproché. Ils offrent une bonne efficacité de charge utile, mais ont besoin d'escortes et de soutien électronique dans l'espace aérien défendu.
usn_a-6e=Les avions A-6E sont des plates-formes d'attaque toutes temps avec une forte capacité de frappe navale. Ils sont bien adaptés aux missions de frappe dangereuses lorsqu'ils sont jumelés avec la couverture des chasseurs et la guerre électronique.
usn_e-2c=Les avions E-2C assurent l'alerte rapide et la couverture des opérations aériennes navales. Ils étendent la portée de détection et améliorent le temps de réaction, ce qui en fait des multiplicateurs de force puissants.
usn_s-3a=Les avions S-3A sont des plates-formes ASW porteuses dotées d'une forte capacité de patrouille maritime et de soutien. Ils sont le mieux utilisés pour construire un écran sous-marin extérieur autour des transporteurs et des grands groupes de surface.
usaf_f-15c=Les chasseurs F-15C sont des avions spécialisés dans la surveillance aérienne avec une excellente performance et une capacité de missiles. Utilisez-les pour gagner le contrôle aérien et protéger les paquets de frappe des combattants ennemis.
usaf_f-4e=Les avions F-4E sont des chasseurs plus âgés souples qui peuvent appuyer des missions de défense aérienne et de frappe. Ils s'intègrent toujours bien dans les paquets mixtes, bien qu'ils soient dépassés par les nouvelles plates-formes air-supériorité.
usaf_e-3a=Les avions E-3A AWACS assurent une surveillance aérienne et un soutien au commandement. Il s'agit d'un important multiplicateur de force pour les opérations aériennes, améliorant la détection et la coordination dans une vaste zone.
usaf_b-52g=Les bombardiers B-52G fournissent une forte capacité de frappe à longue portée contre des cibles grandes ou fixes. Ils nécessitent une planification et une protection minutieuses, mais ils peuvent produire des effets qu'aucun avion tactique ne peut égaler.

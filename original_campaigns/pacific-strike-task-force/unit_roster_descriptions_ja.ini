[AllowedVessels]
usn_dd_gearing=ギアリング級駆逐艦は、優れた砲装と基本的な対潜(ASW)能力を備えた、改修済みの戦時建造護衛艦である。予備役艦隊から再役したこれらの艦艇は艦齢の終わりに近づいており、能力の低い潜水艦や水上部隊に対して運用するのが最適である。
usn_ff_garcia=ガルシア級フリゲートは、SH-2Fヘリコプター1機を運用する基本的な対潜(ASW)直掩艦である。艦隊陣形の潜水艦捜索範囲を広げるのに有用であるが、ミサイル防衛能力はほぼ皆無であり、より防空能力の高い護衛艦のSAM防空圏の中に留まらなければならない。
usn_ffg_brooke=ブルック級フリゲートは、ミサイルおよび対潜(ASW)能力を備えたコンパクトな護衛艦である。先行するガルシア級フリゲートよりも高性能であるが、そのMk22発射機にはSM-1MRミサイルを16発しか搭載できず、防空能力の維持に制限がある。
usn_ff_knox_84=ノックス級フリゲートは、優れたソナースイートとSH-2Fヘリコプター1機の運用能力を備えた対潜(ASW)護衛艦である。近年の近代化改修により、ハープーンミサイルとファランクスCIWSが追加装備された。
usn_ffg_oliver_hazard_perry=オリバー・ハザード・ペリー級フリゲートは、2機のヘリコプター、ハープーン、および中距離防空能力を備えたバランスの取れた護衛艦である。柔軟な直掩任務が可能であり、特に強力な防空(AAW)専門艦と組み合わせることで真価を発揮する。
usn_ddg_adams_early=チャールズ・F・アダムズ級駆逐艦は、個別防空能力と2門の5インチ砲を備えた艦隊の主力艦である。近年の改修でハープーンミサイルが追加されたが、格納庫と曳航ソナー(タドアレイ)を持たないため対潜(ASW)能力は限定的である。この初期型は、連装のMk11発射機を装備した本級の最初の13隻に相当する。
usn_ddg_adams_late=チャールズ・F・アダムズ級駆逐艦は、個別防空能力と2門の5インチ砲を備えた艦隊の主力艦である。近年の改修でハープーンミサイルが追加されたが、格納庫と曳航ソナー(タドアレイ)を持たないため対潜(ASW)能力は限定的である。この後期型は、速射性の高い単装のMk13発射機を装備し、さらにハープーンを2発追加した本級の最終建造艦10隻に相当する。
usn_ddg_coontz=クーンツ級駆逐艦は、艦隊防空能力を備えた旧式のミサイル駆逐艦である。航空脅威から艦隊を保護できるが、発射速度が比較的遅いMk10発射機を装備しているため複数目標への同時対処能力に制限があり、CIWSも持たない。
usn_ddg_mahan=USSマハンは、1980年にNTU(新脅威アップグレード)計画の試験艦として改修された。異例の強力な近代的防空能力を備えており、戦時下の緊迫した状況により、第一線の防空(AAW)護衛艦として実戦投入されている。
usn_dd_spruance=スプルーアンス級駆逐艦は、2機のヘリコプター、曳航ソナー、および優れた船体ソナーを備えた強力な対潜(ASW)艦である。極めて優秀な潜水艦ハンターであり艦隊の直掩を担うが、防空は他艦に依存する。戦時には、従来のSH-2Fに加えてSH-3Hヘリコプターの運用を可能にするアップデートが施され、対潜能力がさらに強化された。
usn_dd_spruance_abl=1980年代初頭、一部のスプルーアンス級駆逐艦はトマホーク巡航ミサイル用のMk143装甲ボックス発射機(ABL)を装備する改修を受け、強力な対潜能力に加えて打撃能力を獲得した。潜水艦を警戒しつつ対地攻撃任務にも貢献できる多用途護衛艦である。戦時にはSH-2Fに加えてSH-3Hヘリコプターの運用も可能となり、対潜能力がさらに強化されている。
usn_ddg_kidd=キッド級駆逐艦は、強力なSM-1MRミサイル、ハープーン、対潜(ASW)能力、ヘリコプター、およびCIWSを備えた近代的な多目的護衛艦である。万能な直掩指揮艦として極めて優秀であるが、曳航ソナーを持たないため、核心的な対潜艦と同行させるのが望ましい。
usn_cg_belknap=ベルナップ級巡洋艦は、SM-2ERミサイルによる広域防空を担う。極めて長距離の目標と交戦可能な艦隊防空の要であるが、Mk10発射機の再装填が遅いため、レイヤードディフェンス(階層防御)を構築するには速射性の高いSM-1MR搭載艦と組ませるのが最善である。リーヒ級と異なり艦尾に格納庫と主砲を備え、高い柔軟性を誇る。
usn_cg_leahy=リーヒ級巡洋艦は、艦の前後に発射機を配置した強力な防空巡洋艦であり、SM-2ERミサイルによる超長距離交戦能力を持つ。長距離防空に完全特化しているため、階層防御を補うべく速射性の高いSM-1MR搭載艦と連携させるべきである。
usn_clg_oklahoma_city=USSオクラホマシティは、第二次大戦中に建造された軽巡洋艦を1960年に旗艦設備付きのミサイル巡洋艦へと全面改装した艦である。予備役艦隊から再役したためミサイルシステム自体は旧式化しているが、6インチ速射砲による艦砲射撃能力は極めて優秀である。
usn_cgn_california=カリフォルニア級原子力巡洋艦は、前後に配置されたMk13発射機と計80発のSM-1MRミサイル庫を備えた多目的護衛艦である。ヘリコプターを持たず対潜(ASW)能力も限定的であるが、原子力艦ならではの優れた耐久性と航続力を誇る信頼性の高い防衛艦である。
usn_cgn_virginia=バージニア級原子力巡洋艦は、SM-1MRミサイル用の連装Mk26発射機、ハープーン、および限定的な対潜(ASW)能力を備えた高性能な原子力多目的護衛艦である。カリフォルニア級と同じくヘリコプターは運用できないが、強力な防空艦としてより優れた戦闘能力と航続力を誇る。
usn_cgn_long_beach_83=ロングビーチは、豊富な弾薬庫と長距離SM-2ERミサイルを装備した強力な防空巡洋艦である。対地攻撃用のトマホークミサイルも搭載しているが、ヘリコプターは運用できず対潜(ASW)能力も限定的なため、他艦による護衛が不可欠である。
usn_cg_ticonderoga=タイコンデロガ級巡洋艦は、イージス戦闘システムとSPY-1レーダーを搭載した現存する最新鋭の防空艦である。大半の航空脅威を単艦で制圧可能な最高峰の性能を誇り、ベルナップ、リーヒ、ロングビーチといった長距離SM-2ERミサイル搭載艦と連携することで圧倒的な防空網を形成する。
usn_bb_iowa=アイオワ級戦艦は、圧倒的な巨砲と対水上ミプレセンスミサイルを備えた重武装・重装甲の主力水上戦闘艦である。艦砲射撃や海上プレゼンスの誇示において比類なき能力を持つが、対潜(ASW)および防空能力を一切持たないため、随伴艦による護衛が絶対条件となる。
usn_lha_tarawa=タラワ級強襲揚陸艦は、ヘリコプター主体の作戦展開を可能にする広大な航空・揚陸プラットフォームを提供する。極めて重要な支援艦であるが、高脅威地域における個艦防衛力は不十分なため護衛を要する。
usn_cv_kitty_hawk=キティホーク級空母は、広大な海洋にわたり航空戦力を投射する戦略的航空プラットフォームである。任務部隊の作戦展開能力を飛躍的に向上させるが、階層的な護衛艦隊や潜水艦による厳重な保護が不可欠である。
usn_avp_barnegat_mod=ボニファシオ級フリゲートは水上機母艦を改装した艦であり、余剰兵器として南ベトナムに供与された後、フィリピン海軍で就役した。艦中央部に4発のハープーンキャニスターを、艦尾に急造のヘリパッドを備え、軽攻撃ヘリコプター1機を運用可能である。
ran_ddg_perth=パース級駆逐艦は、米海軍のチャールズ・F・アダムズ級駆逐艦のオーストラリア仕様である。米軍仕様とは構成が異なり、ASROC発射機の代わりに艦中央部にイカラ対潜ミサイルを装備している。それ以外の兵装および性能はアダムズ級後期型と同一である。
ran_ffg_adelaide_shorthull=アデレード級フリゲートは、米海軍のペリー級フリゲートのオーストラリア仕様である。個別防空能力を備えた貴重な護衛艦であり、戦時には米軍製のSH-2Fヘリコプターを運用できるように改修が施されている。
jmsdf_dd_yamagumo=やまぐも型護衛艦は、対潜(ASW)に完全特化した海上自衛隊の旧式護衛艦である。防空能力を持たないため、運用時は他艦のSAMによる防空掩護が必須となる。
jmsdf_dd_takatsuki=たかつき型護衛艦は、2門の5インチ砲とQH-50 DASH無人ヘリコプターを装備した実力派の対潜(ASW)艦である。防空能力は極めて限定的なため、潜水艦の掃討や能力の低い敵水上部隊への対処に充てるのが望ましい。
jmsdf_ddg_tachikaze=たちかぜ型護衛艦は、艦尾にMk13発射機を装備した海上自衛隊のミサイル護衛艦である。米海軍のチャールズ・F・アダムズ級駆逐艦に匹敵する性能を持ち、優秀な万成戦闘艦として機能する。
jmsdf_ddh_haruna=はるな型護衛艦は、多数のヘリコプターを運用可能な対潜(ASW)指揮護衛艦である。対潜直掩の旗艦として極めて優秀であるが、自衛用ミサイルを欠いているため、航空攻撃の危険がある海域では護衛を要する。

[AllowedHelicopters]
usn_sh-2f=SH-2Fヘリコプターは、艦艇の対潜(ASW)捜索範囲を広げ、船体ソナーの探知外にある潜水艦の追撃を支援する。また、レーダーを用いた前方進出により、フリゲートや駆逐艦のための水上偵察を行うことも可能である。
usn_sh-3h=SH-3Hヘリコプターは、ディッピングソナー、MAD(磁気探知機)、ソノブイ、および魚雷を備えた長距離対潜(ASW)機である。SH-2Fのような対水上捜索レーダーは持たないため、空中偵察よりも潜水艦の掃討や捜捜索救難において真価を発揮する。
usn_qh-50d=QH-50 DASHドローンは、旧式護衛艦に対潜(ASW)用の軽量な遠隔攻撃手段を提供する。魚雷の投下射程を延伸できるが、独自のセンサーや搭乗員を持たないため、それ以外の任務での汎用性は皆無に等しい。
jmsdf_hss-2=HSS-2ヘリコプターは、ディッピングソナー、MAD(磁気探知機)、ソノブイ、および魚雷を備えた長距離対潜(ASW)機である。SH-2Fのような対水上捜索レーダーを持たないため、空中偵察よりも潜水艦の掃討や捜索救難を得意とする。
usmc_ah-1t=AH-1T攻撃ヘリコプターは、運用可能な艦船から近接航空支援、ロケット攻撃、対装甲打撃力を提供する。無防備な水上・地上目標に対して高い制圧力を誇るが、レーダーを搭載していないため偵察任務には不向きである。
fr_as-350=AS350ヘリコプターは、輸送や連絡業務を担う軽多用途機である。低コストな支援アセットであるが、戦闘用センサーや武装を持たないため、敵の脅威がある空域への進入は避けるべきである。オーストラリア軍ではアデレード級フリゲートから訓練機として運用され、副次的に偵察およびCSAR任務も担っている。

[AllowedAircraft]
fr_mirage_iii=ミラージュIIIO戦闘機は基本的な空対空能力を提供するが、ミサイル兵装は短射程であり、より近代的な迎撃機には性能で劣る。
raaf_f-111c=F-111C攻撃機は、長大な航続距離、大きな兵装搭載量、そして優れた縦深攻撃能力を備える。オーストラリア軍では精密攻撃および対艦任務向けに装備され、自衛用のAIM-9ミサイルも搭載できるため、他の攻撃機より柔軟に運用できる。
usn_ea-6b=EA-6B電子戦機は、攻撃隊の生存性を高め、敵センサーを妨害する電子戦支援を提供する。強力なAN/ALQ-99ジャミングポッドで敵のセンサー性能を低下させ、防御能力を弱める戦力倍加装置である。
usn_f-14a=F-14A戦闘機は、長距離迎撃能力を備えた最高峰の艦隊防空機である。強力なレーダーとAIM-54Aミサイルにより、米空母航空団における最上位の制空戦闘機となっている。
usn_fa-18a=F/A-18A戦闘攻撃機は、NATOで使用可能な最新の多用途戦闘機である。空対空戦闘と対地攻撃の双方に対応でき、さまざまな任務で活用できる極めて柔軟な機体である。これらのオーストラリア機は、技術的にはまだ試験中であるにもかかわらず、戦時下の必要により実戦投入された。
usn_p-3c=P-3C哨戒機は、広域捜索および対潜(ASW)掃討を担う長距離洋上哨戒プラットフォームである。敵の潜水艦や水上部隊が我が主力に接近する前に探知・捕捉する能力に秀でている。
usmc_av-8a=AV-8Cハリアーは、強襲揚陸艦の飛行甲板や前線飛行場から展開可能なV/STOL(垂直・短距離離着陸)攻撃機である。迅速なターンアラウンドによる近接航空支援、軽攻撃、局地的なSEAD(敵防空網制圧)任務に優れるが、近代戦闘機や濃密な防空網に対しては護衛を要する。
usn_a-7e=A-7E攻撃機は、対地・対水上攻撃および近接支援任務を担う信頼性の高い軽攻撃機である。優れた兵装搭載効率を誇るが、敵の防空網が健在な空域では戦闘機の護衛や電子戦支援が不可欠となる。
usn_a-6e=A-6E攻撃機は、強力な対艦・対地打撃力を備えた全天候型攻撃機である。戦闘機の掩護や電子戦支援と連携させることで、極めて危険な強襲作戦で真価を発揮する。
usn_e-2c=E-2C早期警戒機は、洋上航空作戦における早期警戒(AEW)および管制指揮を担う。艦隊の探知射程を大幅に延伸し、敵の奇襲に対する反応時間を改善する強力な戦力倍増因子である。
usn_s-3a=S-3A対潜機は、優れた洋上哨戒能力と支援能力を兼ね備えた艦載対潜(ASW)機である。空母や主力水上戦闘群の周囲に外縁対潜防御網を構築する任務に最適である。
usaf_f-15c=F-15C戦闘機は、圧倒的な運動性能とミサイル交戦能力を誇る制空特化型戦闘機である。完全な制空権を奪取し、敵戦闘機から自軍の攻撃隊を守り抜くために運用する。
usaf_f-4e=F-4E戦闘機は、防空から対地攻撃までこなす柔軟な旧式マルチロール機である。最新鋭の制空戦闘機には見劣りするものの、混成攻撃隊の数合わせや支援として依然として有用である。
usaf_e-3a=E-3A AWACSは、広大な空域の監視と作戦管制支援を提供する。広範囲に及ぶ探知・要撃管制能力を向上させ、航空作戦を統率する極めて重要な戦力倍増因子である。
usaf_b-52g=B-52G戦略爆撃機は、大規模目標や固定陣地に対する圧倒的な長距離爆撃能力を提供する。緻密な作戦計画と強固な護衛を要するが、通常の戦術機では不可能な破壊をもたらす。
[AllowedVessels]
usn_dd_gearing=Эсминцы класса Gearing переоборудованы в военное время с хорошим вооружением и базовыми возможностями ASW. Эти корабли находятся в конце срока службы, будучи реактивированными из резервного флота, и лучше всего используются против подводных лодок и надводных частей с меньшей способностью.
usn_ff_garcia=Фрегаты класса «Гарсия» являются базовыми кораблями-экранистами с одним вертолетом SH-2F. Они полезны для расширения зоны поиска подводных лодок, но практически не имеют возможности противоракетной обороны и должны оставаться в зонтике SAM лучше защищенных эскортов.
usn_ffg_brooke=Фрегаты класса «Брук» предлагают компактный пакет сопровождения с возможностями ракеты и ASW. Более способные, чем предыдущие фрегаты класса Garcia, их пусковая установка Mark 22 может нести только 16 ракет SM-1MR, что ограничивает их эффективность противовоздушной обороны.
usn_ff_knox_84=Фрегаты класса Knox - это эскорт ASW с хорошими гидролокаторами и поддержкой одного вертолета SH-2F. Последние переоборудования дали кораблям этого класса ракеты Harpoon и Phalanx CIWS.
usn_ffg_oliver_hazard_perry=Фрегаты класса Oliver Hazard Perry представляют собой сбалансированное сопровождение с двумя вертолетами, Harpoons и ПВО средней дальности. Это гибкие экранные корабли, особенно в сочетании с более сильными специалистами AAW.
usn_ddg_adams_early=Эсминцы класса Charles F. Adams являются рабочей лошадкой с местной противовоздушной обороной и двумя 5-дюймовыми пушками. Недавние переоборудования добавили ракеты Harpoon, но этим кораблям не хватает ангара и буксируемого массива, что ограничивает их возможности. Эта ранняя версия представляет собой оригинальные 13 кораблей класса, оснащенных двухрукой пусковой установкой Mark 11.
usn_ddg_adams_late=Эсминцы класса Charles F. Adams являются рабочей лошадкой с местной противовоздушной обороной и двумя 5-дюймовыми пушками. Недавние переоборудования добавили ракеты Harpoon, но этим кораблям не хватает ангара и буксируемого массива, что ограничивает их возможности. Эта поздная версия представляет собой 10 последних кораблей класса, оснащенных более быстрой однорукой пусковой установкой Mark 13 с двумя дополнительными гарпунами.
usn_ddg_coontz=Эсминцы класса Coontz являются более старыми ракетными эсминцами с возможностью противовоздушной обороны. Они могут защитить формирование от воздушных угроз, но их относительно медленная пусковая установка Mark 10 ограничивает их способность противостоять нескольким угрозам одновременно.
usn_ddg_mahan=USS Mahan был перенастроен в качестве испытательного корабля для программы НТУ в 1980 году. Обладая необычайно сильным современным потенциалом противовоздушной обороны, военные потребности сделали корабль доступным в качестве эскорта AAW первой линии.
usn_dd_spruance=Эсминцы класса Spruance представляют собой прочные платформы ASW с двумя вертолетами, буксируемой решеткой и отличным гидролокатором корпуса. Они очень способные охотники за подводными лодками и экраны формирований, но они полагаются на другие корабли для противовоздушной обороны. В военное время эти корабли были модернизированы для эксплуатации вертолетов SH-3H в дополнение к SH-2F, что улучшило их возможности.
usn_dd_spruance_abl=В начале 1980-х несколько эсминцев класса Spruance были переоборудованы с Mark 143 Armored Box Launchers (ABL) для крылатых ракет Tomahawk, добавив ударную способность к сильному ASW класса и пакету вертолета. Это универсальные эскорты, которые могут участвовать в миссиях по наземным атакам, все еще проводя скрининг на подводные лодки. В военное время эти корабли были модернизированы для эксплуатации вертолетов SH-3H в дополнение к SH-2F, что улучшило их возможности.
usn_ddg_kidd=Эсминцы класса Kidd - это современные многоцелевые эскорты с мощными ракетными батареями SM-1MR, Harpoon, возможностями ASW, вертолетами и CIWS. Они превосходные универсальные командиры экрана, но не имеют буксируемого массива, поэтому лучше всего управляются с другими кораблями ASW.
usn_cg_belknap=Крейсеры класса «Белкнап» обеспечивают ПВО района ракетами SM-2ER. Это ценные якоря ПВО, способные поражать цели на очень большой дальности, но их пусковые установки Mark 10 медленно перезаряжаются, и они лучше всего сочетаются с более быстрым огневым кораблем SM-1MR для многоуровневой обороны. В отличие от Leahy-класса, у Belknap-класса есть ангар и корма для оружия, что дает им гибкость.
usn_cg_leahy=Крейсеры класса Leahy представляют собой мощные двухконтурные противовоздушные корабли с ракетами SM-2ER, способные поражать цели на очень большой дальности. Они полностью специализируются на противовоздушной обороне большой дальности и должны быть сопряжены с более быстрым огневым сопровождением SM-1MR для многоуровневой обороны.
usn_clg_oklahoma_city=USS Oklahoma City - легкий крейсер военного времени, который был полностью перестроен в флагманский и управляемый ракетный крейсер в 1960 году. Восстановленная из резервного флота, ее ракетная система устарела, но ее 6-дюймовые скорострельные пушки превосходят береговые бомбардировки.
usn_cgn_california=Ядерные крейсеры калифорнийского класса представляют собой многоцелевое сопровождение с двухконтурными пусковыми установками Mark 13 и магазинами для 80 перехватчиков SM-1MR. Они не имеют вертолетов и имеют только ограниченные возможности, но являются надежными кораблями обороны с отличной выносливостью.
usn_cgn_virginia=Ядерные крейсеры класса Virginia представляют собой высококлассные многоцелевые эскорты с двухрукими пусковыми установками Mark 26 для ракет SM-1MR, Harpoon и ограниченными возможностями ASW. Как и калифорнийский класс, они не несут вертолетов, но предлагают улучшенные боевые возможности и выносливость в качестве мощных противовоздушных кораблей.
usn_cgn_long_beach_83=Long Beach - мощный крейсер противовоздушной обороны, оснащенный ракетами SM-2ER большой дальности с глубокими магазинами. Корабль также несет ракеты «Томагавк» для наземной атаки, но не оснащен вертолетами и имеет лишь ограниченные возможности для сопровождения.
usn_cg_ticonderoga=Крейсеры класса Ticonderoga являются самыми современными кораблями противовоздушной обороны, оснащенными боевой системой AEGIS и радаром SPY-1. Они являются ведущими кораблями противовоздушной обороны, которые могут справиться с большинством воздушных угроз, и преуспевают в сочетании с более дальним кораблем SM-2ER, таким как Belknap, Leahy или Long Beach.
usn_bb_iowa=Линкоры класса Айова являются тяжеловооруженными и бронированными надводными комбатантами с мощными пушками и противоповерхностными ракетными батареями. Они отлично справляются с бомбардировками и наземным присутствием, но не имеют противолодочной обороны и должны сопровождаться другими подразделениями.
usn_lha_tarawa=Десантно-штурмовые корабли класса Tarawa обеспечивают крупную авиационную и амфибийную платформу для операций с большим числом вертолетов. Это ценные корабли поддержки, но в районах с высокой угрозой им требуется эскорт, поскольку их собственная оборона недостаточна.
usn_cv_kitty_hawk=Авианосцы класса Kitty Hawk являются стратегическими авиационными платформами, которые проецируют воздушную мощь через океан. Они могут трансформировать радиус действия оперативная группа, но должны быть защищены многоуровневыми эскортами и подводными лодками.
usn_avp_barnegat_mod=Фрегаты класса Bonifacio являются переоборудованными тендерами на гидросамолеты, предоставленными в качестве военного излишка в Южный Вьетнам и позже введенными в филиппинскую службу. Они были оснащены четырьмя гарпунами в канистрах, а импровизированная вертолетная площадка поддерживает легкий ударный вертолет.
ran_ddg_perth=Эсминцы класса Perth являются австралийской версией американских эсминцев класса Charles F. Adams. Они несколько отличаются по конфигурации от американской конструкции, включающей противолодочное оружие «Икара» вместо пусковой установки ASROC. В остальном они идентичны по вооружению и возможностям более поздним кораблям класса «Адамс».
ran_ffg_adelaide_shorthull=Фрегаты класса «Аделаида» являются австралийскими версиями американских фрегатов класса «Перри». Это ценные эскорты с местной противовоздушной обороной. Во время войны они были оснащены для эксплуатации американских вертолетов SH-2F.
jmsdf_dd_yamagumo=Эсминцы класса «Ямагумо» — это более старые эскорты JMSDF, полностью ориентированные на ASW. Отсутствие у них противовоздушной обороны означает, что они должны действовать с прикрытием ЗРК с других кораблей.
jmsdf_dd_takatsuki=Эсминцы класса «Такацуки» являются способными платформами ASW с двумя 5-дюймовыми пушками и поддержкой беспилотного вертолета QH-50 DASH. Их противовоздушная оборона очень ограничена, поэтому они лучше всего используются против подводных лодок или надводных частей противника с меньшей способностью.
jmsdf_ddg_tachikaze=Эсминцы класса «Тачикадзе» - это современные японские корабли ПВО, оснащенные пусковой установкой Mark 13. По своим возможностям они схожи с американскими эсминцами класса Charles F. Adams, выступающими в роли превосходных универсальных комбатантов.
jmsdf_ddh_haruna=Эсминцы вертолетов класса «Харуна» — это специализированные командные эскорты ASW с большим вертолетным отрядом. Они являются отличными флагманами с подводным экраном, но не имеют ракет для самообороны и должны сопровождаться, если ожидается воздушная атака.

[AllowedHelicopters]
usn_sh-2f=Вертолеты SH-2F расширяют зону поиска корабля и помогают осуществлять контакты подводных лодок за пределами радиуса действия гидролокатора корпуса. Их радар также позволяет им вести разведку и выполнять надводную разведку для фрегатов и эсминцев.
usn_sh-3h=Вертолеты SH-3H являются дальнобойными самолетами ASW с погружением гидролокатора, MAD, сонобуев и торпед. Они не несут РЛС наземного поиска, как SH-2F, поэтому они наиболее сильны в подводном преследовании и поиске и спасении, а не в воздушной разведке.
usn_qh-50d=Дроны QH-50 DASH обеспечивают легкую дистанционную досягаемость для старых эскортов. Они расширяют диапазон доставки торпед, но их отсутствие датчиков и экипажа делает их ограниченными в любой другой роли.
jmsdf_hss-2=Вертолеты HSS-2 являются дальнобойными самолетами ASW с погружением гидролокатора, MAD, сонобуев и торпед. Они не несут РЛС наземного поиска, как SH-2F, поэтому они наиболее сильны в подводном преследовании и поиске и спасении, а не в воздушной разведке.
usmc_ah-1t=Атакующие вертолеты AH-1T обеспечивают тесную поддержку с воздуха, ракетные атаки и противоброневой удар с кораблей, которые могут принять их. Они опасны для открытых надводных или наземных целей, но не имеют радиолокационной системы и не должны использоваться в качестве разведчиков.
fr_as-350=Вертолеты AS350 - легкие многоцелевые машины для транспортных и связных задач. Это недорогие средства поддержки, но они не несут боевых датчиков или вооружения и должны держаться вне спорного воздушного пространства. В австралийской службе они использовались с фрегатов класса Adelaide как учебные машины, а также во второстепенной роли разведки и CSAR.

[AllowedAircraft]
fr_mirage_iii=Истребитель Mirage IIIO обеспечивает базовые возможности боя воздух-воздух, но его ракетное вооружение имеет малую дальность, а сам тип уступает более современным перехватчикам.
raaf_f-111c=Ударные самолеты F-111C обладают большой дальностью, тяжелой боевой нагрузкой и отличным потенциалом для глубоких ударов. В австралийской службе они оснащены для высокоточных ударов и противокорабельных задач, а также могут нести AIM-9 для самообороны, что делает их гибче других ударных самолетов.
usn_ea-6b=Самолеты EA-6B обеспечивают поддержку радиоэлектронной борьбы, повышая выживаемость ударных групп и нарушая работу вражеских датчиков. Это множитель силы: их мощные контейнеры постановки помех AN/ALQ-99 ухудшают работу сенсоров противника и снижают эффективность его обороны.
usn_f-14a=Истребители F-14A - высококлассные самолеты ПВО флота с возможностью дальнего перехвата. Мощная РЛС и ракеты AIM-54A делают их главным палубным истребителем США для завоевания превосходства в воздухе.
usn_fa-18a=Ударные истребители F/A-18A - новейшие многоцелевые истребители, доступные НАТО. Способные вести как воздушный бой, так и наносить удары по наземным целям, они являются очень гибкими самолетами для самых разных задач. Эти австралийские машины были введены в строй в условиях войны, хотя технически все еще проходили испытания.
usn_p-3c=Самолеты P-3C являются морскими патрульными платформами большой дальности для поиска и судебного преследования. Они отлично подходят для поиска подводных лодок и поверхностных контактов, прежде чем они будут угрожать основной силе.
usmc_av-8a=AV-8C Harriers обеспечивают возможность атаки V/STOL малой дальности с палуб десантной авиации и аэродромов. Они отлично справляются с быстрой поддержкой, легким ударом и местными задачами SEAD, но нуждаются в защите от современных истребителей и плотной противовоздушной обороны.
usn_a-7e=Самолеты А-7Е являются надежными легкими ударными платформами для ударных и близких задач поддержки. Они обеспечивают хорошую эффективность полезной нагрузки, но нуждаются в сопровождении и электронной поддержке в защищенном воздушном пространстве.
usn_a-6e=Самолеты A-6E являются всепогодными ударными платформами с мощными возможностями нанесения ударов с моря. Они хорошо подходят для опасных ударных миссий в сочетании с прикрытием истребителей и радиоэлектронной войной.
usn_e-2c=Самолеты E-2C обеспечивают воздушное раннее предупреждение и покрытие командования для военно-морских воздушных операций. Они расширяют диапазон обнаружения и улучшают время реакции, делая их мощными множителями силы.
usn_s-3a=Самолеты S-3A являются платформами ASW с мощным морским патрулированием и поддержкой. Они лучше всего используются для создания внешнего экрана подводных лодок вокруг носителей и основных надводных групп.
usaf_f-15c=Истребители F-15C - это самолеты с превосходными характеристиками и ракетными возможностями. Используйте их, чтобы получить контроль над воздухом и защитить ударные пакеты от вражеских истребителей.
usaf_f-4e=Самолеты F-4E - это гибкие старые истребители, которые могут поддерживать противовоздушную оборону и наносить удары. Они по-прежнему хорошо вписываются в смешанные пакеты, хотя они превосходят новые платформы с превосходством в воздухе.
usaf_e-3a=Самолеты E-3A AWACS обеспечивают широкое воздушное наблюдение и поддержку командования. Они являются основными множителями силы для воздушных операций, улучшая обнаружение и координацию на широкой территории.
usaf_b-52g=Бомбардировщики B-52G обеспечивают большую дальность поражения крупных или фиксированных целей. Они требуют тщательного планирования и защиты, но могут обеспечить эффект, который не может сравниться ни с одним тактическим самолетом.

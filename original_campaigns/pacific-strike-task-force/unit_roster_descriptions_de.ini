[AllowedVessels]
usn_dd_gearing=Zerstörer der Gearing-Klasse sind modernisierte Geleitschiffe aus dem Zweiten Weltkrieg mit guter Artilleriebewaffnung und grundlegender U-Jagd-Fähigkeit. Die aus der Reserveflotte reaktivierten Schiffe stehen am Ende ihrer Dienstzeit und eignen sich vor allem zur Bekämpfung weniger leistungsfähiger U-Boote und feindlicher Schiffe.
usn_ff_garcia=Fregatten der Garcia-Klasse sind einfache, auf die U-Jagd ausgelegte Geleitschiffe mit einem SH-2F-Hubschrauber. Sie können den U-Boot-Suchbereich eines Verbandes erheblich erweitern, verfügen jedoch nur über eine äußerst begrenzte Flugabwehr und müssen daher innerhalb des Flugabwehrschirms besser geschützter Geleitschiffe operieren.
usn_ffg_brooke=Fregatten der Brooke-Klasse vereinen Flugabwehr- und U-Jagd-Fähigkeiten in einem kompakten Schiffsentwurf. Sie sind leistungsfähiger als die vorangegangenen Fregatten der Garcia-Klasse, doch ihr Mark-22-Starter kann lediglich 16 SM-1MR-Lenkflugkörper aufnehmen, wodurch ihre Durchhaltefähigkeit im Flugabwehrkampf begrenzt bleibt.
usn_ff_knox_84=Fregatten der Knox-Klasse sind U-Jagd-Geleitschiffe mit guter Sonarausstattung und einem SH-2F-Hubschrauber. Im Zuge jüngster Modernisierungen erhielten die Schiffe Harpoon-Seezielflugkörper und Phalanx-Nahbereichsabwehrsysteme.
usn_ffg_oliver_hazard_perry=Fregatten der Oliver-Hazard-Perry-Klasse sind ausgewogene Geleitschiffe mit zwei Hubschraubern, Harpoon-Seezielflugkörpern und Flugabwehr mittlerer Reichweite. Sie sind flexibel einsetzbare Sicherungsschiffe, insbesondere in Verbindung mit leistungsfähigeren Flugabwehreinheiten.
usn_ddg_adams_early=Zerstörer der Charles-F.-Adams-Klasse sind bewährte Geleitschiffe mit leistungsfähiger Flugabwehr und zwei 5-Zoll-Geschützen. Im Zuge jüngster Modernisierungen erhielten sie Harpoon-Seezielflugkörper, doch das Fehlen eines Hangars und einer Schleppsonaranlage begrenzt ihre U-Jagd-Fähigkeit. Diese frühe Ausführung entspricht den ersten 13 Schiffen der Klasse, die mit dem Mark-11-Doppelarmstarter ausgestattet waren.
usn_ddg_adams_late=Zerstörer der Charles-F.-Adams-Klasse sind bewährte Geleitschiffe mit leistungsfähiger Flugabwehr und zwei 5-Zoll-Geschützen. Im Zuge jüngster Modernisierungen erhielten sie Harpoon-Seezielflugkörper, doch das Fehlen eines Hangars und einer Schleppsonaranlage begrenzt ihre U-Jagd-Fähigkeit. Diese späte Ausführung entspricht den letzten zehn Schiffen der Klasse, die mit dem schneller feuernden Mark-13-Einzelarmstarter und zwei zusätzlichen Harpoon-Seezielflugkörpern ausgestattet waren.
usn_ddg_coontz=Zerstörer der Coontz-Klasse sind ältere Lenkwaffenzerstörer für die weiträumige Verbandsflugabwehr. Sie können einen Verband wirksam gegen Bedrohungen aus der Luft schützen, doch die geringe Feuergeschwindigkeit ihres Mark-10-Starters begrenzt die Bekämpfung mehrerer Ziele in kurzer Folge. Zudem verfügen sie über kein Nahbereichsabwehrsystem.
usn_ddg_mahan=Die USS Mahan wurde 1980 als Erprobungsschiff für das NTU-Programm ausgerüstet. Dank ihrer für ein Schiff dieser Generation außergewöhnlich leistungsfähigen Flugabwehr steht sie unter Kriegsbedingungen als erstklassiges Flugabwehr-Geleitschiff zur Verfügung.
usn_dd_spruance=Zerstörer der Spruance-Klasse sind leistungsfähige U-Jagd-Plattformen mit zwei Hubschraubern, einer Schleppsonaranlage und einem ausgezeichneten Rumpfsonar. Sie sind besonders wirksame U-Boot-Jäger und Sicherungsschiffe, benötigen für die Flugabwehr jedoch die Unterstützung anderer Einheiten. Unter Kriegsbedingungen wurden sie so nachgerüstet, dass sie sowohl SH-2F- als auch SH-3H-Hubschrauber einsetzen konnten, wodurch sich ihre U-Jagd-Fähigkeit weiter verbesserte.
usn_dd_spruance_abl=Anfang der 1980er-Jahre wurden mehrere Zerstörer der Spruance-Klasse mit gepanzerten Mark-143-Boxstartern (ABL) für Tomahawk-Marschflugkörper nachgerüstet. Damit erhielt die Klasse zusätzlich zu ihrer umfangreichen U-Jagd-Ausstattung und ihrer Hubschrauberkomponente die Fähigkeit zum Angriff auf Landziele. Diese vielseitigen Geleitschiffe können offensive Aufgaben übernehmen und zugleich den Verband gegen U-Boote sichern. Unter Kriegsbedingungen wurden sie so nachgerüstet, dass sie sowohl SH-2F- als auch SH-3H-Hubschrauber einsetzen konnten, wodurch sich ihre U-Jagd-Fähigkeit weiter verbesserte.
usn_ddg_kidd=Zerstörer der Kidd-Klasse sind moderne Mehrzweck-Geleitschiffe mit umfangreicher SM-1MR-Bewaffnung, Harpoon-Seezielflugkörpern, U-Jagd-Fähigkeit, Bordhubschraubern und Nahbereichsabwehrsystemen. Sie eignen sich hervorragend als Führungsschiffe eines gemischten Sicherungsverbandes, verfügen jedoch über keine Schleppsonaranlage und sollten daher gemeinsam mit weiteren U-Jagd-Schiffen eingesetzt werden.
usn_cg_belknap=Kreuzer der Belknap-Klasse gewährleisten mit SM-2ER-Lenkflugkörpern die weiträumige Verbandsflugabwehr. Sie bilden wichtige Eckpfeiler der Luftverteidigung und können Ziele auf große Entfernung bekämpfen. Die geringe Feuergeschwindigkeit ihres Mark-10-Starters erschwert jedoch die Abwehr mehrerer Ziele in kurzer Folge. Für eine gestaffelte Verteidigung sollten sie daher mit einem Geleitschiff kombiniert werden, dessen SM-1MR-System eine höhere Feuergeschwindigkeit aufweist. Anders als die Leahy-Klasse verfügen Schiffe der Belknap-Klasse über einen Hangar und ein Geschütz am Heck, wodurch sie flexibler einsetzbar sind.
usn_cg_leahy=Kreuzer der Leahy-Klasse sind leistungsfähige Flugabwehrschiffe mit SM-2ER-Startern an Bug und Heck. Sie können Ziele auf große Entfernung bekämpfen und sind vollständig auf die weiträumige Verbandsflugabwehr spezialisiert. Für eine gestaffelte Verteidigung sollten sie mit einem Geleitschiff kombiniert werden, dessen SM-1MR-System eine höhere Feuergeschwindigkeit aufweist.
usn_clg_oklahoma_city=Die USS Oklahoma City ist ein leichter Kreuzer aus dem Zweiten Weltkrieg, der 1960 umfassend zum Flaggschiff und Lenkwaffenkreuzer umgebaut wurde. Nach ihrer Reaktivierung aus der Reserveflotte gilt ihr Lenkflugkörpersystem als veraltet, doch ihre schnellfeuernden 6-Zoll-Geschütze eignen sich hervorragend für den Küstenbeschuss.
usn_cgn_california=Nuklearkreuzer der California-Klasse sind Mehrzweck-Geleitschiffe mit Mark-13-Startern an Bug und Heck sowie Magazinen für insgesamt 80 SM-1MR-Lenkflugkörper. Sie führen keine Hubschrauber mit und verfügen nur über begrenzte U-Jagd-Fähigkeiten, sind jedoch zuverlässige Schiffe für die Verbandsverteidigung und zeichnen sich durch große Ausdauer aus.
usn_cgn_virginia=Nuklearkreuzer der Virginia-Klasse sind leistungsfähige Mehrzweck-Geleitschiffe mit Mark-26-Doppelarmstartern für SM-1MR-Lenkflugkörper, Harpoon-Seezielflugkörpern und begrenzter U-Jagd-Fähigkeit. Wie die California-Klasse führen sie keine Hubschrauber mit, verfügen jedoch über eine höhere Kampfkraft und große Ausdauer.
usn_cgn_long_beach_83=Die USS Long Beach ist ein leistungsfähiger Flugabwehrkreuzer mit weitreichenden SM-2ER-Lenkflugkörpern und großen Munitionsvorräten. Das Schiff führt außerdem Tomahawk-Marschflugkörper für Angriffe auf Landziele mit, besitzt jedoch keinen Bordhubschrauber und nur begrenzte U-Jagd-Fähigkeiten. Es ist daher auf Geleitschutz angewiesen.
usn_cg_ticonderoga=Kreuzer der Ticonderoga-Klasse sind die modernsten Flugabwehrschiffe ihrer Zeit und mit dem AEGIS-Kampfsystem sowie dem SPY-1-Radar ausgestattet. Sie gehören zur Spitzenklasse der Flugabwehrschiffe und können auch massierte Luftangriffe bewältigen. Besonders wirkungsvoll sind sie in Verbindung mit einem Kreuzer, der Lenkflugkörper größerer Reichweite führt, etwa einem Schiff der Belknap-, Leahy- oder Long-Beach-Klasse.
usn_bb_iowa=Schlachtschiffe der Iowa-Klasse sind schwer bewaffnete und gepanzerte Überwasserkampfschiffe mit leistungsfähiger Artillerie und umfangreicher Seezielflugkörperbewaffnung. Sie eignen sich hervorragend für Beschussaufgaben und zur Demonstration maritimer Präsenz, verfügen jedoch über keine U-Jagd-Fähigkeit und nur über eine unzureichende Flugabwehr. Sie müssen daher von anderen Einheiten gesichert werden.
usn_lha_tarawa=Amphibische Angriffsschiffe der Tarawa-Klasse bilden große Träger- und Landungsplattformen für amphibische und hubschraubergestützte Operationen. Sie sind wertvolle Unterstützungsschiffe, benötigen in stark bedrohten Einsatzgebieten jedoch Geleitschutz, da ihre eigene Verteidigungsfähigkeit nicht ausreicht.
usn_cv_kitty_hawk=Flugzeugträger der Kitty-Hawk-Klasse sind strategisch bedeutsame Trägerplattformen, von denen aus luftgestützte Kampfkraft über große Entfernungen eingesetzt werden kann. Sie erweitern Reichweite und Handlungsmöglichkeiten einer Task Force entscheidend, müssen jedoch durch eine gestaffelte Sicherung aus Geleitschiffen und U-Booten geschützt werden.
usn_avp_barnegat_mod=Fregatten der Bonifacio-Klasse sind umgebaute Seeflugzeugtender, die als überschüssiges Kriegsmaterial an Südvietnam abgegeben und später von der philippinischen Marine übernommen wurden. Mittschiffs wurden sie mit vier Harpoon-Seezielflugkörpern in Startbehältern ausgerüstet. Ein improvisiertes Hubschrauberdeck am Heck ermöglicht den Einsatz eines leichten Angriffshubschraubers.
ran_ddg_perth=Die Zerstörer der Perth-Klasse sind die australische Ausführung der amerikanischen Charles-F.-Adams-Klasse. Sie unterscheiden sich in einigen Punkten von der amerikanischen Konstruktion, da mittschiffs die Ikara-U-Jagd-Waffe anstelle des ASROC-Starters eingebaut ist. Ansonsten entsprechen Bewaffnung und Fähigkeiten weitgehend den späteren Schiffen der Adams-Klasse.
ran_ffg_adelaide_shorthull=Fregatten der Adelaide-Klasse sind australische Ausführungen der amerikanischen Oliver-Hazard-Perry-Klasse. Sie sind wertvolle Geleitschiffe mit Flugabwehr mittlerer Reichweite. Unter Kriegsbedingungen wurden sie für den Einsatz amerikanischer SH-2F-Hubschrauber ausgerüstet.
jmsdf_dd_yamagumo=Zerstörer der Yamagumo-Klasse sind ältere Geleitschiffe der JMSDF, die vollständig auf die U-Jagd ausgerichtet sind. Da sie über keine nennenswerte Flugabwehr verfügen, sollten sie unter dem Flugabwehrschirm anderer Schiffe operieren.
jmsdf_dd_takatsuki=Zerstörer der Takatsuki-Klasse sind leistungsfähige U-Jagd-Plattformen mit zwei 5-Zoll-Geschützen und Einrichtungen für den Betrieb des unbemannten QH-50-DASH-Hubschraubers. Ihre Flugabwehrfähigkeit ist sehr begrenzt, weshalb sie vor allem gegen U-Boote oder weniger leistungsfähige feindliche Schiffe eingesetzt werden sollten.
jmsdf_ddg_tachikaze=Zerstörer der Tachikaze-Klasse sind moderne japanische Flugabwehrschiffe mit einem Mark-13-Starter am Heck. Ihre Fähigkeiten ähneln denen der amerikanischen Zerstörer der Charles-F.-Adams-Klasse. Sie eignen sich besonders als Flugabwehr-Geleitschiffe und können zusätzlich feindliche Schiffe bekämpfen.
jmsdf_ddh_haruna=Hubschrauberzerstörer der Haruna-Klasse sind spezialisierte U-Jagd-Führungs- und Geleitschiffe mit einer starken Hubschrauberkomponente. Sie eignen sich hervorragend als Führungsschiffe eines U-Jagd-Verbandes, verfügen jedoch über keine Flugabwehrlenkflugkörper zur Selbstverteidigung und sollten bei erwarteten Luftangriffen durch andere Schiffe gesichert werden.

[AllowedHelicopters]
usn_sh-2f=SH-2F-Hubschrauber erweitern den U-Boot-Suchbereich eines Schiffes und ermöglichen die Bekämpfung von U-Boot-Kontakten außerhalb der Reichweite des Rumpfsonars. Mit ihrem Radar können sie außerdem Vorausaufklärung betreiben und Seeziele für Fregatten und Zerstörer erfassen.
usn_sh-3h=SH-3H-Hubschrauber sind U-Jagd-Hubschrauber großer Reichweite mit Tauchsonar, MAD, Sonarbojen und Torpedos. Im Gegensatz zum SH-2F verfügen sie über kein Seeraumüberwachungsradar. Ihre Stärken liegen daher in der Suche und Bekämpfung von U-Booten sowie in Such- und Rettungseinsätzen, nicht in der luftgestützten Vorausaufklärung.
usn_qh-50d=Unbemannte QH-50-DASH-Hubschrauber verschaffen älteren Geleitschiffen eine begrenzte ferngesteuerte U-Jagd-Fähigkeit. Sie ermöglichen Torpedoeinsätze außerhalb der unmittelbaren Waffenreichweite des Trägerschiffs, sind mangels eigener Sensorik und aufgrund ihrer unbemannten Auslegung in anderen Rollen jedoch nur begrenzt einsetzbar.
jmsdf_hss-2=HSS-2-Hubschrauber sind U-Jagd-Hubschrauber großer Reichweite mit Tauchsonar, MAD, Sonarbojen und Torpedos. Im Gegensatz zum SH-2F verfügen sie über kein Seeraumüberwachungsradar. Ihre Stärken liegen daher in der Suche und Bekämpfung von U-Booten sowie in Such- und Rettungseinsätzen, nicht in der luftgestützten Vorausaufklärung.
usmc_ah-1t=AH-1T-Kampfhubschrauber können von geeigneten Schiffen aus für Luftnahunterstützung, Raketenangriffe und die Bekämpfung gepanzerter Ziele eingesetzt werden. Sie sind besonders gegen ungeschützte Land- und Seeziele wirksam, verfügen jedoch über kein Radar und eignen sich nicht zur Aufklärung.
fr_as-350=AS350-Hubschrauber sind leichte Mehrzweckluftfahrzeuge für Transport- und Verbindungsaufgaben. Sie sind kostengünstige Unterstützungsmittel, führen jedoch weder Kampfsensoren noch Waffen mit und sollten umkämpfte Lufträume meiden. Im australischen Dienst wurden sie von Fregatten der Adelaide-Klasse als Schulungsflugzeuge eingesetzt, mit einer Nebenrolle für Aufklärung und CSAR.

[AllowedAircraft]
fr_mirage_iii=Der Mirage IIIO-Jäger bietet grundlegende Luft-Luft-Fähigkeit, doch seine Lenkwaffenbewaffnung ist kurzreichweitig und der Typ ist moderneren Abfangjägern unterlegen.
raaf_f-111c=F-111C-Kampfflugzeuge verbinden große Reichweite mit hoher Waffenlast und ausgezeichnetem Potenzial für Angriffe tief im feindlichen Raum. Im australischen Dienst sind sie für Präzisionsangriffe und den Anti-Schiff-Einsatz ausgerüstet und können AIM-9 zur Selbstverteidigung mitführen, wodurch sie flexibler sind als andere Angriffsflugzeuge.
usn_ea-6b=EA-6B-Luftfahrzeuge führen elektronische Kampfführung durch, erhöhen die Überlebensfähigkeit von Angriffsverbänden und stören feindliche Sensoren. Sie sind ein Kraftmultiplikator: Ihre leistungsfähigen AN/ALQ-99-Störbehälter verschlechtern die feindliche Sensorleistung und mindern die Wirksamkeit der Verteidigung.
usn_f-14a=F-14A-Jagdflugzeuge sind leistungsfähige Flottenverteidiger mit großer Abfangreichweite. Ihr leistungsfähiges Radar und die AIM-54A-Lenkwaffen machen sie zum führenden trägergestützten US-Jagdflugzeug zur Erlangung der Luftüberlegenheit.
usn_fa-18a=F/A-18A-Mehrzweckkampfflugzeuge sind die modernsten NATO-Mehrzweckjäger im Bestand. Sie können sowohl Luftkämpfe als auch Bodenangriffe durchführen und sind dadurch äußerst flexible Flugzeuge für eine Vielzahl von Aufgaben. Diese australischen Maschinen wurden kriegsbedingt in den Einsatz gedrängt, obwohl sie technisch noch in der Erprobung stehen.
usn_p-3c=P-3C-Luftfahrzeuge sind weitreichende Seefernaufklärer für die großräumige Suche und U-Jagd. Sie eignen sich hervorragend dazu, U-Boote und feindliche Schiffe frühzeitig aufzuspüren, bevor diese den Hauptverband bedrohen.
usmc_av-8a=Dank ihrer V/STOL-Fähigkeit können Harrier-Kampfflugzeuge von amphibischen Flugdecks und Flugplätzen aus operieren und Angriffsaufgaben im Nahbereich übernehmen. Ihre Stärken liegen in schneller Luftnahunterstützung, leichten Angriffen und der örtlichen Unterdrückung feindlicher Flugabwehr. Gegen moderne Jagdflugzeuge und eine dichte Luftverteidigung benötigen sie jedoch Schutz.
usn_a-7e=A-7E-Luftfahrzeuge sind zuverlässige leichte Angriffsflugzeuge für Angriffe auf Boden- und Seeziele sowie für Luftnahunterstützung. Sie bieten ein gutes Verhältnis zwischen Waffenlast und Einsatzaufwand, benötigen in verteidigten Lufträumen jedoch Jagdschutz und elektronische Unterstützung.
usn_a-6e=A-6E-Luftfahrzeuge sind allwetterfähige Angriffsflugzeuge mit hoher Wirksamkeit gegen Seeziele. In Verbindung mit Jagdschutz und elektronischer Kampfführung eignen sie sich besonders für gefährliche Angriffsmissionen.
usn_e-2c=E-2C-Luftfahrzeuge stellen luftgestützte Frühwarnung und Führungsunterstützung für Seeluftoperationen bereit. Sie vergrößern die Erfassungsreichweite und verkürzen die Reaktionszeit, wodurch sie die Kampfkraft eines Verbandes erheblich erhöhen.
usn_s-3a=S-3A-Luftfahrzeuge sind trägergestützte U-Jagd-Plattformen mit guten Fähigkeiten zur Seefernaufklärung und zur Unterstützung des Verbandes. Sie eignen sich besonders zum Aufbau eines äußeren U-Jagd-Sicherungsschirms für Flugzeugträger und größere Verbände.
usaf_f-15c=F-15C-Jagdflugzeuge sind spezialisierte Luftüberlegenheitsjäger mit ausgezeichneter Flugleistung und leistungsfähiger Flugkörperbewaffnung. Sie eignen sich dazu, die Luftherrschaft zu erringen und Angriffsverbände gegen feindliche Jagdflugzeuge zu schützen.
usaf_f-4e=F-4E-Luftfahrzeuge sind vielseitige ältere Kampfflugzeuge, die sowohl Luftkampf- als auch Angriffsmissionen übernehmen können. In gemischten Verbänden sind sie weiterhin nützlich, werden von neueren Luftüberlegenheitsjägern jedoch übertroffen.
usaf_e-3a=E-3A-AWACS-Luftfahrzeuge bieten weiträumige luftgestützte Überwachung und Führungsunterstützung. Sie erhöhen die Kampfkraft von Luftverbänden erheblich und verbessern die Zielerfassung und Koordination über ein großes Gebiet.
usaf_b-52g=B-52G-Bomber können eine sehr hohe Waffenlast über große Entfernungen gegen großflächige oder ortsfeste Ziele einsetzen. Ihr Einsatz erfordert sorgfältige Planung und wirksamen Schutz; sie können jedoch Wirkungen erzielen, die mit taktischen Kampfflugzeugen nicht erreichbar sind.

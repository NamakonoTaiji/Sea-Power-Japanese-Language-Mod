Taskforce1StartMessage=<size=24>Pacific Strike - Sub Challenge 3</size>\nPATHFINDERS\n<size=24>September 20th, 1985</size>|HMAS Orion has been tasked to reconnoiter the approaches to the enemy base at Puerto Princesa City on Palawan. Approach undetected, visually identify the shore installations via periscope, then escape east once reconnaissance is complete.\n\nYou are free to engage enemy units in the area, but your first priority is reconnaissance.\n\nHMAS Orion must survive.|Start mission
Taskforce1HMASOrionmustsurviveMessage=DEFEAT|Defeat! HMAS Orion has been sunk!|Exit mission
Taskforce1PlayervictoryMessage=MISSION ACCOMPLISHED|Victory! All coastal missile sites and enemy installations have been identified and our landing forces will now have proper targeting data.|Exit mission
Taskforce1IdentifyshoreinstallationsMessage=MISSION UPDATE|Commander, we have successfully identified the major enemy installations, and we can now exfil to the east.|Acknowledge & continue
Objective_ReconInstallations=Identify all coastal missile batteries near the city
Objective_OrionMustSurvive=HMAS Orion must survive
Objective_ReachMarkedArea=Reach the marked area to escape

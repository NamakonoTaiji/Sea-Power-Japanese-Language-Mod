[Language_de]
Name=07 Gefecht in der Javasee
Description=Nach dem Durchbruch durch die Lombokstraße hat {TaskForceName} den Befehl erhalten, unverzüglich in die Javasee vorzustoßen. Ein schwerer sowjetischer Kampfverband um den Kreuzer Admiral Senyavin operiert nördlich von Jakarta und bedroht die indonesische Hauptstadt. Die Vernichtung dieses Verbands wird Indonesien wieder auf Seiten der Alliierten in den Krieg eintreten lassen.
Taskforce1LandUnit1NameOverride=Juanda Intl Airport (WARR)
Taskforce1LandUnit1ShortNameOverride=Juanda Intl
Taskforce2LandUnit1NameOverride=Cam Ranh Air Base
Taskforce2LandUnit1ShortNameOverride=Cam Ranh Air Base
Trigger5Condition_Condition1AreaLabel=Datum A01
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Teil 7</size>\nGEFECHT IN DER\nJAVASEE\n<size=24>27. August 1985</size>\nBody={TaskForceName} hat den Auftrag erhalten, einen schweren sowjetischen Kampfverband in der Javasee aufzuspüren und zu vernichten. Dieser Verband bedroht die indonesische Hauptstadt Jakarta. Seine Vernichtung wird Indonesien wieder auf Seiten der Alliierten in den Krieg eintreten lassen.\n\nDer sowjetische Verband wird wahrscheinlich von mindestens zwei U-Booten unterstützt. Alliierte Luftstreitkräfte operieren von dem kürzlich auf Surabaya eroberten Flugplatz aus und stehen für Einsätze zur Verfügung.\nButtonText=Mission starten\nPopupStyle=Intro
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR DEN RAUM JAVASEE\nGÜLTIG: 261100Z-261800Z AUG 85\nUm 1100Z sorgt eine Monsunströmung aus Südosten über der Javasee nördlich von Jakarta für aufgelockerte Bewölkung, Winde aus Südosten mit 10 bis 15 Knoten und leichte See. Ab 1200Z führt eine bodennahe Konvergenz zur Bildung vereinzelter Gewitter mit zunehmender Bewölkung, Niederschlag und böigem Wind. Die Bedingungen verschlechtern sich im Verlauf des Zeitraums. Ein Seegang der Stufe 3 bis 4 ist zu erwarten, die Sicht ist eingeschränkt und örtliche Böen beeinträchtigen See- und Luftoperationen.
Taskforce1FlagshipmustsurviveMessage=Title=MISSION FEHLGESCHLAGEN\nBody=Niederlage! {FlagshipName} wurde versenkt!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=CTF 77\nTo={TaskForceName}\nInfo=CINCPACFLT PEARL HARBOR HI\nSubj=RECON REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Aufklärung und Funkaufklärung bestätigen, dass der sowjetische Überwasserverband in der Javasee um ADMIRAL SENYAVIN zerstört wurde.\n\n2. (S) Die Bedrohung für Jakarta ist gebrochen. Die indonesische Regierung hat CINCPAC mitgeteilt, dass sie den aktiven Einsatz an der Seite der Alliierten mit sofortiger Wirkung wieder aufnimmt.\n\n3. (S) Der Präsident wollte diesen Druck von Jakarta genommen sehen. Sie haben ihn mit beiden Händen weggeräumt. Halten Sie ASW-Wachsamkeit, bis Sie das Gebiet verlassen haben. CTF 77 Ende.\nButtonText=Return to mission\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce1Time+30SSGNwarningMessage=From=CTF 77\nTo={TaskForceName}\nInfo=\nSubj=CONTACT REPORT-ECHO II SSGN DATUM A01\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) WARNUNG: Das US-U-Boot DRUM meldet zeitweilige Schraubengeräusche zweier Wellen auf Position 5.2 S, 109.5E um 1248Z. Datum A01 wurde festgelegt.\n\n2. (S) DRUM verlässt den Einsatzraum mit höchstmöglicher Geschwindigkeit, nachdem sämtliche Munition verbraucht wurde.\n\n3. (S) Der Nachrichtendienst bewertet diesen Kontakt als nicht lokalisiertes SSGN der ECHO-II-Klasse. Bekämpfen Sie diesen Kontakt, sofern die Lage dies zulässt und melden Sie anschließend die Position der Versenkung. Viel Glück und gute Jagd.\nButtonText=Bestätigen und fortfahren\nPopupStyle=NavalMessage
Taskforce1Time+30SSGNwarningIntel=US-U-Boot meldet Kontakt mit sowjetischem SSGN der ECHO-II-Klasse bei Datum A01. SSGN der ECHO-II-Klasse führen 8 x SS-N-12-Flugkörper mit ca. 300 sm Reichweite mit sich. USS DRUM SSN-677 operiert in der Nähe, versucht jedoch den Einsatzraum zu verlassen und darf nicht bekämpft werden.
Taskforce1DestroyDrumMessage=From=CTF 77\nTo={TaskForceName}\nInfo=COMSUBPAC\nCINCPACFLT PEARL HARBOR HI\nSubj=OPREP-LOSS OF USS DRUM\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) WARNUNG: USS DRUM meldet Angriff durch eigene Kräfte in der Javasee. Der Kontakt zu DRUM ist seitdem abgebrochen.\n\n2. (S) Stellen Sie das Feuer auf DRUM sofort ein. Nehmen Sie Ihre Patrouille wieder auf und setzen Sie die Suche nach feindlichen U-Booten fort.\n\n3. (S) Falls die Lage es zulässt, führen Sie CSAR im Bereich der Versenkung von DRUM durch. Aufgrund der flachen Gewässer könnten Überlebende vorhanden sein.\n\n4. (S) Nach Rückkehr nach Surabaya wird {TaskForceName} einen OPREP an COMSUBPAC, zur Information an CINCPACFLT, übermitteln, der die vollständigen Umstände der Versenkung von DRUM beschreibt. Stellen Sie bei allen weiteren Maßnahmen eine klare Zielidentifikation sicher. CTF 77 betrachtet den Verlust von DRUM durch Eigenbeschuss mit großer Sorge und tiefer Enttäuschung über eine ansonsten herausragende Leistung. CTF 77 Ende.\nButtonText=Bestätigen und fortfahren\nPopupStyle=NavalMessage

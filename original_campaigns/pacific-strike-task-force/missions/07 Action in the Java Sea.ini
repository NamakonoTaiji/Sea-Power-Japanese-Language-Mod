[Language_ja]
Name=07 ジャワ海の戦闘
Description=ロンボク海峡を突破した{TaskForceName}に対し、直ちにジャワ海へと進出せよとの命令が下った。巡洋艦「アドミラル・セニャーヴィン」を中心とする有力なソ連水上部隊がジャカルタ北方で活動しており、インドネシア政府を脅かしている。この部隊を撃滅すれば、インドネシアを同盟軍陣営として復帰させることができる。
Taskforce1LandUnit1NameOverride=ジュアンダ国際空港（WARR）
Taskforce1LandUnit1ShortNameOverride=ジュアンダ国際空港
Taskforce2LandUnit1NameOverride=カムラン湾空軍基地
Taskforce2LandUnit1ShortNameOverride=カムラン湾空軍基地
Trigger5Condition_Condition1AreaLabel=データムA01
Taskforce1StartMessage=<size=24>パシフィック・ストライク――第7部</size>\nジャワ海の戦闘\n<size=24>1985年8月27日</size>|{TaskForceName}はジャワ海におけるソ連海軍の有力な水上部隊を捜索・撃滅する任務を託された。この部隊はインドネシアの首都ジャカルタを脅かしており、これを排除することでインドネシアを同盟軍側として参戦させることができる。\n\nソ連部隊は少なくとも2隻の潜水艦による支援を受けている可能性が高い。同盟軍の航空部隊は、先頃奪還したバリ島の飛行場から出撃可能である。\n\n{FlagshipName}の生存が絶対条件である。|作戦開始
StartForecast=ジャワ海海域艦隊気象予報\n予報期間：85年8月26日1100Z～26日1800Z\n1100Z時点、ジャカルタ北方のジャワ海上空にある南東の季節風の影響により雲が広がり、南東の風10～15ノット、波浪は穏やか。1200Zまでに低層の収束により局地的な雷雨が発生し、雲量、降水、および突風が増加する見込み。予報期間を通じて気象条件は悪化し、波浪は海象状態3～4（シーステート3～4）に達し、視程の低下や局地的なスコールが水上および航空作戦に影響を及ぼす予想。
Taskforce1FlagshipmustsurviveMessage=作戦失敗|敗北！{FlagshipName}が撃沈された！|作戦終了
Taskforce1PlayervictoryMessage=作戦成功|勝利！ソ連水上部隊は壊滅した。この戦果によりインドネシア政府への圧力が緩和され、同国は同盟国側として戦争に復帰することが可能となる。\n\n---\n\n<size=16>主目標は達成された。現時点でミッションを終了して離脱するか、このまま敵軍への攻撃を続行するかを選択できる。\n\nスラバヤへの帰還後、貴官の任務部隊は完全に再補給され、任務部隊ステータスにて修理が利用可能となる。見事な手際だ、指揮官！</size>
Taskforce1Time+30SSGNwarningMessage=最優先電文（FLASH MESSAGE）|発：第77任務部隊指揮官（CTF 77）\n宛：{TaskForceName}\n\n1. (S) 警告：米潜水艦「ドラム（DRUM）」より、1248Zに南緯5.2度、東経109.5度の位置にて断続的な2軸推進の音響信号（トナール）を探知したとの警告あり。これに伴いデータムA01を設定した。\n\n2. (S) ドラムは全兵装を消費したため、最高速で同海域から離脱しつつある。\n\n3. (S) 情報部ではこの接敵目標を、位置未特定の「エコーII（ECHO II）」型原子力ミサイル潜水艦（SSGN）と判断。戦術状況が許せば本目標を追跡・撃破し、撃沈位置を報告せよ。諸君の幸運と健闘を祈る。|了解して続行
Taskforce1Time+30SSGNwarningIntel=米潜水艦がデータムA01にてソ連のエコーII（ECHO II）型SSGNとの接触を報告。エコーII型SSGNは射程約300マイルのSS-N-12ミサイルを8発搭載している。USSドラム（SSN-677）が同海域を離脱すべく近海で作戦行動中であり、絶対に攻撃してはならない。
Taskforce1DestroyDrumMessage=最優先電文（FLASH MESSAGE）|発：第77任務部隊指揮官（CTF 77）\n宛：{TaskForceName}\n\n1. (S) 警告：USSドラムより、ジャワ海にて友軍による攻撃を受けたとの報告あり。その後ドラムとの連絡は途絶した。\n\n2. (S) 直ちにドラムに対する一切の攻撃行動を中止せよ。哨戒ステーションへ復帰し、敵潜水艦の捜索を継続せよ。\n\n3. (S) 戦術状況が許せば、ドラムの沈没海域周辺で戦闘捜索救難（CSAR）を実施せよ。浅海域であるため、生存者が存在する可能性がある。\n\n4. (S) スラバヤへの帰投後、{TaskForceName}はドラム沈没の全経緯を記述した作戦報告書（OPREP）を太平洋艦隊潜水艦部隊司令官（COMSUBPAC）へ提出し、太平洋艦隊司令長官（CINCPACFLT）に伝達せよ。今後のすべての戦闘行動において、目標の識別を徹底せよ。第77任務部隊指揮官は、それまでの輝かしい戦果の中で、友軍誤射によりドラムを喪失したことを深刻に懸念し、深い落胆を表明する。第77任務部隊指揮官より。|了解して続行

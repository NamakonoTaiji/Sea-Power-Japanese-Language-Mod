[Language_ru]
Name=07 Действия в Яванское море
Description=После прорыва Ломбокский пролив, {TaskForceName} получил приказ немедленно перейти в Яванское море. Тяжелые советские надводные силы, сосредоточенные на крейсере «Адмирал Сенявин», действуют к северу от Джакарты и угрожают правительству Индонезии. Уничтожение этих сил вернет Индонезия в войну на стороне союзников.
Taskforce1LandUnit1NameOverride=Аэропорт Juanda Intl (WARR)
Taskforce1LandUnit1ShortNameOverride=Juanda Intl
Taskforce2LandUnit1NameOverride=Авиабаза Камрань
Taskforce2LandUnit1ShortNameOverride=Авиабаза Камрань
Trigger5Condition_Condition1AreaLabel=Датум А01
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Part 7</size>\nДействие в море Джавы\n<size=24> 27 августа 1985</size>\nBody={TaskForceName} была поставлена задача найти и уничтожить тяжелые советские надводные силы в Яванское море. Эта сила угрожает индонезийской столице Джакарте, и ее удаление вернет Индонезия в войну на стороне союзников.\n\nСоветские силы, вероятно, поддерживаются как минимум двумя подводными лодками. Союзническая авиация выходит из аэродрома в Сурабае и доступна для выполнения задач.\nButtonText=Начать миссию\nPopupStyle=Intro
StartForecast=ПЛЕТНЫЕ ВЕДОМОСТИ FORECAST ДЛЯ JAVA SEA AREA\n261100Z-261800Z AUG 85\nНа 1100Z юго-восточный муссонный поток над Яванское море к северу от Джакарты создает разбитый облачный покров, ветры SE 10-15 узлов и небольшие моря. К 1200Z низкоуровневая конвергенция будет генерировать рассеянные грозы с увеличением облачности, осадков и порывистых ветров. Условия будут ухудшаться в течение периода со строительством морей до состояния 3-4, снижением видимости и локализованными шквалами, влияющими на поверхностные и воздушные операции.
Taskforce1FlagshipmustsurviveMessage=Title=Миссии не удалось\nBody=Поражение! {FlagshipName} был потоплен!\nButtonText=Возвращение к миссии\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=CTF 77\nTo={TaskForceName}\nInfo=CINCPACFLT PEARL HARBOR HI\nSubj=RECON REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Разведка и радиоперехваты подтверждают, что советские надводные силы Яванское море, сосредоточенные на Адмирале Сеньявине, были уничтожены.\n\n2. (S) Угроза Джакарте нарушена. Индонезийское правительство сообщило CINCPAC, что оно немедленно возобновит активные операции с союзными войсками.\n\n3. (S) Объединенный комитет начальников штабов лично поздравил командира {TaskForceName} и все экипажи с работой, выполненной с ограниченными ресурсами и высоким риском. Отправляется КГ 77.\nButtonText=Вернуться к миссии\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce1Time+30SSGNwarningMessage=From=CTF 77\nTo={TaskForceName}\nInfo=\nSubj=CONTACT REPORT-ECHO II SSGN DATUM A01\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) ПРЕДУПРЕЖДЕНИЕ: подводная лодка США DRUM передает предупреждение о перемежающихся двухвинтовых тоналах в положении 5.2 S 109.5E в момент 1248Z. Датум А01 был создан.\n\n2. (S) ДРУМ расчищает район с максимальной скоростью, затрачивая все боеприпасы.\n\n3. (S) Intel оценивает этот контакт как нерасположенный SSGN класса ECHO II. Проследите за этим контактом, если тактическая ситуация позволяет, а затем сообщите о местоположении затопления. Удачи и хорошей охоты.\nButtonText=Подтвердить и продолжить\nPopupStyle=NavalMessage
Taskforce1Time+30SSGNwarningIntel=Подводная лодка США сообщает о контакте с СССР ECHO II класса SSGN на Datum A01. ECHO II класса SSGN несет 8 х ракет SS-N-12 с дальностью около 300 нм. USS DRUM SSN-677 работает поблизости, пытаясь очистить район.
Taskforce1DestroyDrumMessage=From=CTF 77\nTo={TaskForceName}\nInfo=COMSUBPAC\nCINCPACFLT PEARL HARBOR HI\nSubj=OPREP-LOSS OF USS DRUM\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Предупреждение: USS DRUM сообщает о нападении дружественных сил в Яванское море. С тех пор связь с ДРУМом потеряна.\n\n2. (S) Немедленно прекратить преследование ДРУМ. Вернитесь на патрульную станцию и продолжайте поиски подводных лодок противника.\n\n3. (S) Если позволяет тактическая ситуация, проводите КСАР вблизи затопления ДРУМ. Выжившие могут присутствовать из-за мелководья.\n\n4. (S) По возвращении в Сурабаю {TaskForceName} представит OPREP COMSUBPAC info CINCPACFLT с описанием полных обстоятельств потопления DRUM. Обеспечить надлежащую целевую дискриминацию во всех дальнейших действиях. КГ 77 рассматривает потерю DRUM в дружественных действиях с серьезной озабоченностью и глубоким разочарованием в других звездных показателях. Отправляется КГ 77.\nButtonText=Подтвердить и продолжить\nPopupStyle=NavalMessage

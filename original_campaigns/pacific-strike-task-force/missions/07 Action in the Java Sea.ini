
[Language_en]
Name=07 Action in the Java Sea
Description=After breaking through Lombok Strait, {TaskForceName} has received orders to proceed immediately into the Java Sea. A heavy Soviet surface force centered on the cruiser Admiral Senyavin is operating north of Jakarta and threatening the Indonesian government. Destroying this force will bring Indonesia back into the war on the Allied side.
Taskforce1LandUnit1NameOverride=Juanda Intl Airport (WARR)
Taskforce1LandUnit1ShortNameOverride=Juanda Intl
Taskforce2LandUnit1NameOverride=Cam Ranh Air Base
Taskforce2LandUnit1ShortNameOverride=Cam Ranh Air Base
Trigger5Condition_Condition1AreaLabel=Datum A01
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Part 7</size>\nACTION IN THE JAVA SEA\n<size=24>August 27th, 1985</size>\nBody={TaskForceName} has been tasked to locate and destroy a heavy Soviet surface force in the Java Sea. This force is threatening the Indonesian capital of Jakarta, and removing it will bring Indonesia back into the war on the Allied side.\n\nThe Soviet force is likely supported by at least two submarines. Allied air is staging out of the airfield at Surabaya and is available for tasking.\nButtonText=Start mission\nPopupStyle=Intro
StartForecast=FLEET WEATHER FORECAST FOR JAVA SEA AREA\nVALID: 261100Z-261800Z AUG 85\nAt 1100Z, southeast monsoonal flow over the Java Sea north of Jakarta produces broken cloud cover, SE winds 10-15 knots, and slight seas. By 1200Z, low-level convergence will generate scattered thunderstorms with increasing cloud cover, precipitation, and gusty winds. Conditions will deteriorate through the period with seas building to state 3–4, reduced visibility, and localized squalls impacting surface and air operations.
Taskforce1FlagshipmustsurviveMessage=Title=MISSION FAILED\nBody=Defeat! {FlagshipName} has been sunk!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=CTF 77\nTo={TaskForceName}\nInfo=CINCPACFLT PEARL HARBOR HI\nSubj=RECON REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Recon and radio intercepts confirm Soviet Java Sea surface force centered on ADMIRAL SENYAVIN has been destroyed.\n\n2. (S) Threat to Jakarta is broken. Indonesian government has informed CINCPAC it will resume active operations with Allied forces effective immediately.\n\n3. (S) Joint Chiefs have passed personal congratulations for Commander {TaskForceName} and all crews on a job well done with finite resources and high risk. CTF 77 sends.\nButtonText=Return to mission\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce1Time+30SSGNwarningMessage=From=CTF 77\nTo={TaskForceName}\nInfo=\nSubj=CONTACT REPORT-ECHO II SSGN DATUM A01\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) WARNING: U.S. submarine DRUM passes warning of intermittent twin screw tonals at position 5.2 S 109.5E at time 1248Z. Datum A01 has been established.\n\n2. (S) DRUM is clearing the area at best speed having expended all ordnance.\n\n3. (S) Intel evaluates this contact as unlocated ECHO II class SSGN. Prosecute this contact if tactical situation permits, then report location of sinking. Good luck and good hunting.\nButtonText=Acknowledge & continue\nPopupStyle=NavalMessage
Taskforce1Time+30SSGNwarningIntel=US submarine reports contact with USSR ECHO II class SSGN at Datum A01. ECHO II class SSGN carries 8 x SS-N-12 missiles with approx 300nm range. USS DRUM SSN-677 is operating nearby attempting to clear the area and must not be engaged.
Taskforce1DestroyDrumMessage=From=CTF 77\nTo={TaskForceName}\nInfo=COMSUBPAC\nCINCPACFLT PEARL HARBOR HI\nSubj=OPREP-LOSS OF USS DRUM\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) WARNING: USS DRUM reports attack by friendly forces in the Java Sea. Contact with DRUM since lost.\n\n2. (S) Cease prosecution of DRUM immediately. Return to patrol station and continue search for enemy submarines.\n\n3. (S) If tactical situation permits, conduct CSAR in vicinity of DRUM's sinking. Survivors may be present due to shallow waters.\n\n4. (S) On return to Surabaya, {TaskForceName} will submit OPREP to COMSUBPAC info CINCPACFLT describing full circumstances of DRUM sinking. Ensure proper target discrimination in all further action. CTF 77 views loss of DRUM to friendly action with grave concern and deep disappointment in otherwise stellar performance. CTF 77 sends.\nButtonText=Acknowledge & continue\nPopupStyle=NavalMessage
Objective_DestroySovietSAG=Destroy the Soviet SAG

Taskforce1StartMessage=Title=<size=24>Pacific Strike - Part 9</size>\nSHADOWS OFF PALAWAN\n<size=24>September 30th, 1985</size>\nBody=After repulsing the enemy attack against Sandakan, the Allies have mobilized for an amphibious assault against Palawan. Conduct an anti-surface sweep of the area, then land 17 MAU at Puerto Princesa.\n\nNote: follow-on operations are anticipated in the area, and resupply will not be available after this mission. Expend ordnance carefully.\nButtonText=Start mission\nPopupStyle=Intro
Taskforce1FlagshipmustsurviveMessage=Title=DEFEAT\nBody=Defeat! {FlagshipName} has been sunk!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1AmphibsmustsurviveMessage=Title=MISSION FAILED\nBody=Mission failed! Too many amphibious ships have been lost!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=CTF 77\nTo={TaskForceName}\nInfo=CINCPACFLT PEARL HARBOR HI\nTG 77.6\nSubj=OPERATION CHALLENGER-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Reports from TG 77.6 confirm 17 MAU is ashore at Puerto Princesa and landing beaches are secure.\n\n2. (S) Coastal missile and air-defense threat has been reduced sufficiently to permit continuation of Operation CHALLENGER. Allied forces are back on Palawan.\n\n3. (S) Intel believes enemy forces will sortie to counterattack soon and follow-on operations are anticipated. Clear east and await further orders. CTF 77 sends.\nButtonText=Return to mission\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce1EnableenemyhelosMessage=Title=MISSION UPDATE\nBody=Commander, enemy attack helicopters have been spotted approaching the landing beaches!\nButtonText=Acknowledge & continue\nPopupStyle=Notification
Objective_LandMAU=Land 17 MAU at the marked landing beaches
Objective_FlagshipMustSurvive={FlagshipName} must survive
Objective_USAmphibsMustSurvive=All Allied amphibious ships must survive
[Language_cn]
Name=09 Shadows off Palawan
[Language_ru]
Name=09 Тени от Палаван
Description=После отражения вражеской атаки против Сандакан союзники мобилизовались для десантного нападения на Палаван. Проведите антиповерхностную зачистку территории, затем приземлите 17-й экспедиционный отряд морской пехоты на Пуэрто-Принсеса.
Taskforce1Vessel5NameOverride=Изабела ЛП-41
Taskforce1Vessel5ShortNameOverride=Изабела
Taskforce1Vessel6NameOverride=Батаны LP-65
Taskforce1Vessel6ShortNameOverride=Батаны
Taskforce1LandUnit1NameOverride=Аэродром Сандакан (WBKS)
Taskforce1LandUnit1ShortNameOverride=Аэропорт Сандакан
Taskforce2LandUnit1NameOverride=Авиабаза Антонио Баутиста (RPVP)
Taskforce2LandUnit1ShortNameOverride=Антонио Баутиста авиабаза
Trigger4Condition_Condition1AreaLabel=Зона посадки
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Part 9</size>\nSHADOWS OFF PALAWAN\n<size=24>S 30 сентября 1985</size>\nBody=После отражения вражеской атаки против Сандакан союзники мобилизовались для десантного нападения на Палаван. Проведите антиповерхностную зачистку территории, затем приземлите 17-й экспедиционный отряд морской пехоты на Пуэрто-Принсеса.\n\nПримечание: ожидается проведение последующих операций в этом районе, и после этой миссии не будет обеспечено пополнение запасов. Тщательно расходуйте боеприпасы.\nButtonText=Начать миссию\nPopupStyle=Intro
Taskforce1FlagshipmustsurviveMessage=Title=Поражение\nBody=Поражение! {FlagshipName} был потоплен!\nButtonText=Возвращение к миссии\nPopupStyle=Outro
Taskforce1AmphibsmustsurviveMessage=Title=Миссии не удалось\nBody=Миссия провалилась! Слишком много десантных кораблей потеряно!\nButtonText=Возвращение к миссии\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=CTF 77\nTo={TaskForceName}\nInfo=CINCPACFLT PEARL HARBOR HI\nTG 77.6\nSubj=OPERATION CHALLENGER-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Отчеты TG 77.6 подтверждают, что 17-й экспедиционный отряд морской пехоты находится на берегу в Пуэрто-Принсеса, а посадочные пляжи безопасны.\n\n2. (S) Угроза береговой ракетной и противовоздушной обороны была уменьшена в достаточной степени, чтобы позволить продолжить операцию «Шалленджер». Силы союзников вернулись на Палаван.\n\n3. (S) Intel считает, что силы противника в скором времени вылетят для контратаки и ожидаются последующие операции. Очистите восток и ждите дальнейших приказов. Отправляется КГ 77.\nButtonText=Вернуться к миссии\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce1EnableenemyhelosMessage=Title=ОБНОВЛЕНО МИССИЯ\nBody=Командир, вражеские ударные вертолеты были замечены приближающимися к десантным пляжам!\nButtonText=Признание и продолжение\nPopupStyle=Notification
Objective_LandMAU=Земля 17-й экспедиционный отряд морской пехоты на отмеченных посадочных пляжах
Objective_FlagshipMustSurvive={FlagshipName} должен выжить
Objective_USAmphibsMustSurvive=Все десантные корабли союзников должны выжить
[Language_de]
Name=09 Schatten vor Palawan
Description=Nach der Abwehr des feindlichen Angriffs auf Sandakan haben die Alliierten Kräfte für einen amphibischen Angriff auf Palawan mobilisiert. Führen Sie eine Säuberung des Einsatzraums von Überwasserkräften durch und landen Sie anschließend die 17th MAU bei Puerto Princesa.
Taskforce1LandUnit1NameOverride=Sandakan Airfield (WBKS)
Taskforce1LandUnit1ShortNameOverride=Sandakan Airfield
Taskforce2LandUnit1NameOverride=Antonio Bautista Air Base (RPVP)
Taskforce2LandUnit1ShortNameOverride=Antonio Bautista Air Base
Trigger4Condition_Condition1AreaLabel=Landungszone
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Teil 9</size>\nSCHATTEN VOR PALAWAN\n<size=24>30. September 1985</size>\nBody=Nach der Abwehr des feindlichen Angriffs auf Sandakan haben sich die Alliierten Kräfte für einen Angriff auf Palawan gesammelt. Führen Sie eine Säuberung des Einsatzraums durch und landen Sie anschließend die 17th MAU bei Puerto Princesa.\n\nHinweis: Da Folgeoperationen in diesem Gebiet erwartet werden, ist zu beachten, dass nach dieser Mission keine Versorgung zur Verfügung stehen wird. Setzen Sie Ihre Munition mit Bedacht ein.\nButtonText=Mission starten\nPopupStyle=Intro
Taskforce1FlagshipmustsurviveMessage=Title=NIEDERLAGE\nBody=Niederlage! {FlagshipName} wurde versenkt!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1AmphibsmustsurviveMessage=Title=MISSION FEHLGESCHLAGEN\nBody=Mission fehlgeschlagen! Sie haben zu viele amphibische Schiffe verloren!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1PlayervictoryMessage=From=CTF 77\nTo={TaskForceName}\nInfo=CINCPACFLT PEARL HARBOR HI\nTG 77.6\nSubj=OPERATION CHALLENGER-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Meldungen von TG 77.6 bestätigen, dass 17 MAU bei Puerto Princesa an Land ist und die Landungsstrände gesichert sind.\n\n2. (S) Die Bedrohung durch Küstenflugkörper und Luftverteidigung wurde ausreichend verringert, um Operation CHALLENGER fortzusetzen. Alliierte Kräfte sind zurück auf Palawan.\n\n3. (S) Verdammt gute Arbeit für einen Tag, Kommandant. Sparen Sie, was übrig ist, bergen Sie Überlebende, soweit möglich, und bereiten Sie sich auf eine feindliche Reaktion von Luzon vor. CTF 77 Ende.\nButtonText=Return to mission\nPopupStyle=NavalMessage\nMessageRole=Outro
Taskforce1EnableenemyhelosMessage=Title=MISSIONSUPDATE\nBody=Kommandant, feindliche Kampfhubschrauber wurden im Anflug auf die gelandeten Kräfte gesichtet!\nButtonText=Bestätigen und fortfahren\nPopupStyle=Notification
Objective_LandMAU=17th MAU an den markierten Stränden anlanden
Objective_FlagshipMustSurvive={FlagshipName} muss überleben
Objective_USAmphibsMustSurvive=Alle alliierten amphibischen Schiffe müssen überleben

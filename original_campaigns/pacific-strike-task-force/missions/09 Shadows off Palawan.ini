
[Language_en]
Name=09 Shadows off Palawan
Description=After repulsing the enemy attack against Sandakan, the Allies have mobilized for an amphibious assault against Palawan. Conduct an anti-surface sweep of the area, then land 17 MAU at Puerto Princesa.

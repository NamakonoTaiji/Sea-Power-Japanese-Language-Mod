Taskforce1StartMessage=<size=24>パシフィック・ストライク - パート9</size>\nパラワン島沖の陰影\n<size=24>1985年9月30日</size>|サンダカンへの敵の攻撃を退けた後、同盟軍はパラワン島への揚陸強襲に向けて動員を開始した。当該海域の対水上掃討を実施し、その後プエルト・プリンセサに17 MAUを上陸させよ。\n\n注意：同海域では継続的な作戦が予想されており、本任務の終了後に再補給を受けることはできない。弾薬の消費には細心の注意を払え。\n\n{FlagshipName}および同盟軍の揚陸艦隊が生存しなければならない。|ミッション開始

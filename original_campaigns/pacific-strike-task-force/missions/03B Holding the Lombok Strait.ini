[Language_ja]
Name=03B ロンボク海峡死守
Description=インドネシアおよびマレーシアに対する敵の激しい攻撃により同盟軍は混乱に陥り、米軍はオーストラリア北部のダーウィンにて部隊の再編・集結を試みている。重要な同盟軍輸送部隊が南方へ脱出する時間を稼ぐため、貴任務部隊から1隻の艦艇が分派され、ロンボク海峡の死守を命じられた。
Taskforce2Vessel2NameOverride=ヴォズブジュデーンヌイ BPK-725
Taskforce2Vessel2ShortNameOverride=ヴォズブジュデーンヌイ
Trigger4Condition_Condition1AreaLabel=データムA01
Taskforce1StartmessageMessage=<size=24>パシフィック・ストライク――艦艇チャレンジ1</size>\nロンボク海峡死守\n<size=24>1985年7月12日</size>|同盟軍はオーストラリアへ後退中である。ソ連襲撃部隊によるロンボク海峡の封鎖を阻止するため、{SelectedUnitName}はこれまでの任務を解かれ、単艦で分派された。\n\n敵の航空部隊が水上襲撃部隊を掩護するため出撃する見込みであり、さらに少なくとも1隻のキロ型通常型潜水艦（SSK）が同海域で活動している疑いがある。捕捉したすべての敵水上艦艇および潜水艦を撃滅せよ。\n\n{SelectedUnitName}の生存が絶対条件である。|作戦開始
StartmessageForecast=ロンボク海峡海域艦隊気象予報\n予報期間：85年7月12日0200Z～12日0800Z\nロンボク海峡を吹き抜ける南東の季節風は夜間も続く見込みで、雲はまばら、波浪は海象状態3（シーステート3）の穏やかな状態となる予想。顕著な降雨や霧の発生は予想されておらず、海峡全域およびバリ～ロンボク接近経路の視程は良好に維持される。午前中の当直（モーニングウォッチ）を通じて気象条件は安定する見込みだが、水道内の風速増強域では局地的な突風の可能性がある。
Taskforce1SelectedunitmustsurviveMessage=作戦失敗|敗北！{SelectedUnitName}が撃沈された！|作戦終了
Taskforce1DatumA01messageMessage=最優先電文（FLASH MESSAGE）|発：太平洋艦隊司令長官（CINCPACFLT）\n宛：{SelectedUnitName}艦長\n\n1. (S) 警告：無線傍受により、ロンボク海峡の北方で活動中のキロ（KILO）型通常型潜水艦（SSK）1隻の存在が示唆された。\n\n2. (S) 0130Z時点で、位置南緯8.11度、東経115.8度にデータムA01（Datum A01）を設定した。\n\n3. (S) 当該接敵目標の撃滅は至上命令である。諸君の幸運と健闘を祈る。|了解して続行
Taskforce1DatumA01messageIntel=無線傍受により、ソ連海軍のキロ（KILO）型潜水艦が北方からロンボク海峡へ進入しつつある模様。地図上にデータムA01がマークされている。
Taskforce1Destroyenemyships-playervictoryMessage=作戦成功|発：第77任務部隊指揮官（CTF 77）\n宛：{SelectedUnitName}艦長\n\n1. (S) 偵察により、ロンボク海峡の封鎖を企図していたソ連襲撃部隊の本隊が壊滅したことを確認。\n\n2. (S) 情報部では今後72時間以内にキーロフ（KIROV）を含むソ連海軍部隊による続行作戦の可能性が高いとみているが、0300Z時点で重要な同盟軍輸送部隊はすべて海峡を脱出した。\n\n3. (S) 2200Zまでバリ島沖にとどまり、その後{TaskForceName}と合流してダーウィンへ向けて同海域を離脱せよ。見事な健闘であった（BZ）。第77任務部隊指揮官より。|作戦終了
Objective_DestroyRaidingForce=敵襲撃部隊の撃滅
Objective_DestroyEnemySub=遭遇したすべての敵潜水艦の撃滅
Objective_SelectedUnitMustSurvive={SelectedUnitName}の生存

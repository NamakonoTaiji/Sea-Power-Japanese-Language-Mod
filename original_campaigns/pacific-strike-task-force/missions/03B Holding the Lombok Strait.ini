Name=03B Holding the Lombok Strait
[Language_ru]
Name=Оборона Ломбокского пролива
Description=Heavy enemy attacks against Indonesia and Malaysia have left the Allies in disarray, and US forces are attempting to reconsolidate at Darwin in northern Australia. A single unit from your task force has been detached to hold the Lombok Strait long enough for critical Allied transport units to escape south.
Taskforce2Vessel2NameOverride=Возбуждённый
Taskforce2Vessel2ShortNameOverride=Возбуждённый
Trigger4Condition_Condition1AreaLabel=Зона A01
Taskforce1StartmessageMessage=Title=<size=24>Необязательная миссия:</size><size=32>\nОборона Ломбокского пролива</size>\n<size=24>Июль 12-е, 1985</size>\nBody=Allied forces are retreating to Australia. {SelectedUnitName} has been detached from previous assignment to prevent USSR raiding units from closing the Lombok Strait.\n\nEnemy air units will sortie to cover the surface raiding force, and at least one Kilo class SSK is suspected operating in the area. Destroy all enemy surface units and any submarines encountered.\nButtonText=Start mission\nPopupStyle=Intro
StartmessageForecast=ПЛЕТНАЯ МАШИНА ДЛЯ LOMBOK STRAIT\nВАЛИД: 120200Z-120800Z JUL 85\nЮго-восточный муссонный поток через Ломбокский пролив продолжится в течение ночи, с рассеянным облачным покровом и умеренным морем в штате 3. Не ожидается значительных дождей или тумана, и видимость должна оставаться хорошей по всему проливу и подходам Бали-Ломбок. Прогнозируется, что условия будут оставаться стабильными в течение утренних часов, с локализованными порывами в зоне ускорения канала.
Taskforce1SelectedunitmustsurviveMessage=Title=МИССИЯ ПРОВАЛЕНА\nBody=Поражение! {SelectedUnitName} был потоплен!\nButtonText=Continue playing\nPopupStyle=Outro
Taskforce1DatumA01messageMessage=From=CINCPACFLT\nTo=CO {SelectedUnitName}\nInfo=\nSubj=CONTACT REPORT-KILO SSK DATUM A01\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) ПРЕДУПРЕЖДЕНИЕ: Радиоперехваты показывают, что к северу от Ломбокский пролив работает 1 X SSK класса KILO.\n\n2. (S) Датум А01 был установлен на позиции 8.11S, 115.8E на момент 0130Z.\n\n3. (S) Необходимо, чтобы этот контакт был разрушен. Удачи и хорошей охоты.\nButtonText=Подтвердить и продолжить\nPopupStyle=NavalMessage
Taskforce1DatumA01messageIntel=Радиоперехват указывает на то что ДПЛ типа «Палтус» движется к Ломбокскому проливу с севера. Зона вероятного нахождения А01 обозначена на карте.
Taskforce1Destroyenemyships-playervictoryMessage=From=CTF 77\nTo=CO {SelectedUnitName}\nInfo=CINCPACFLT PEARL HARBOR HI\nSubj=RECON REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Разведка указывает, что основной корпус рейдерских сил СССР, пытавшихся закрыть Ломбокский пролив, был уничтожен.\n\n2. (S) По оценкам Intel, последующая эксплуатация военно-морских элементов СССР, включая KIROV, вероятна в ближайшие 72 часа, но по состоянию на 0300Z все критически важные транспорты союзников вышли из пролива.\n\n3. (S) Оставайтесь вне Бали до 2200Z, затем встречайтесь с {TaskForceName} и очистите область для Дарвин. BZ - КГ 77 передает.\nButtonText=Продолжить\nPopupStyle=NavalMessage\nMessageRole=Outro
Objective_DestroyRaidingForce=Уничтожить вражескую КУГ
Objective_DestroyEnemySub=Найти и уничтожить вражескую подводную лодку

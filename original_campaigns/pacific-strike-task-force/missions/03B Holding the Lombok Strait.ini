[Language_de]
Name=03B Die Lombokstraße halten
Description=Schwere feindliche Angriffe gegen Indonesien und Malaysia haben die Alliierten schwer getroffen und US-Streitkräfte versuchen, sich in Darwin im Norden Australiens neu zu formieren. Kommandieren Sie eine Einheit Ihrer Task Force ab, um die Lombokstraße lange genug zu halten, damit wichtige alliierte Transporteinheiten nach Süden entkommen können.
Taskforce2Vessel2NameOverride=Vozbuzhdenny BPK-725
Taskforce2Vessel2ShortNameOverride=Vozbuzhdenny
Trigger4Condition_Condition1AreaLabel=Datum A01
Taskforce1StartmessageMessage=Title=<size=24>Pacific Strike - Schiffsherausforderung 1</size>\nDIE LOMBOKSTRASSE HALTEN\n<size=24>12. Juli 1985</size>\nBody=Alliierte Kräfte ziehen sich nach Australien zurück. {SelectedUnitName} wurde aus ihrem bisherigen Auftrag herausgelöst, um sowjetische Kampfverbände daran zu hindern, die Lombokstraße abzuriegeln.\n\nDie feindliche Luftwaffe wird den Kampfverband decken und mindestens ein U-Boot der Kilo-Klasse wird im Einsatzraum vermutet. Zerstören Sie alle feindlichen Schiffe sowie alle aufgeklärten U-Boote.\nButtonText=Mission starten\nPopupStyle=Intro
StartmessageForecast=FLOTTEN-WETTERVORHERSAGE FÜR DIE LOMBOKSTRASSE\nGÜLTIG: 120200Z-120800Z JUL 85\nDie südöstliche Monsunströmung durch die Lombokstraße hält über Nacht an, mit aufgelockerter Bewölkung und mäßiger See bei Seegang der Stufe 3. Es wird kein nennenswerter Regen oder Nebel erwartet und die Sicht sollte über der Meerenge sowie dem Bereich zwischen Bali und Lombok ausreichend bleiben. Die Bedingungen bleiben voraussichtlich bis zur Morgenwache stabil, mit örtlichen Böen im Bereich des Kanals.
Taskforce1SelectedunitmustsurviveMessage=Title=MISSION FEHLGESCHLAGEN\nBody=Niederlage! {SelectedUnitName} wurde versenkt!\nButtonText=Continue playing\nPopupStyle=Outro
Taskforce1DatumA01messageMessage=From=CINCPACFLT\nTo=CO {SelectedUnitName}\nInfo=\nSubj=CONTACT REPORT-KILO SSK DATUM A01\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) WARNUNG: Funkaufklärung deutet auf 1 x U-Boot der KILO-Klasse hin, das nördlich der Lombokstraße operiert.\n\n2. (S) Datum A01 wurde um 0130Z auf Position 8.11S, 115.8E festgelegt.\n\n3. (S) Es ist zwingend erforderlich, diesen Kontakt zu bekämpfen. Viel Glück und gute Jagd.\nButtonText=Bestätigen und fortfahren\nPopupStyle=NavalMessage
Taskforce1DatumA01messageIntel=Funkaufklärung deutet darauf hin, dass ein sowjetisches U-Boot der KILO-Klasse von Norden in die Lombokstraße einläuft. Datum A01 ist auf Ihrer Karte hinzugefügt.
Taskforce1Destroyenemyships-playervictoryMessage=From=CTF 77\nTo=CO {SelectedUnitName}\nInfo=CINCPACFLT PEARL HARBOR HI\nSubj=RECON REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Die Erkenntnisse der Aufklärung deuten darauf hin, dass der Hauptteil des sowjetischen Kampfverbandes, der die Lombokstraße abzuriegeln versuchte, zerstört wurde.\n\n2. (S) Der Nachrichtendienst hält eine Folgeoperation sowjetischer Marinekräfte, einschließlich KIROV, innerhalb der nächsten 72 Stunden für wahrscheinlich. Stand 0300Z haben jedoch alle wichtigen alliierten Transporte die Meerenge verlassen.\n\n3. (S) Bleiben Sie bis 2200Z vor Bali, treffen Sie sich anschließend mit {TaskForceName} und verlassen Sie den Einsatzraum in Richtung Darwin. BZ - CTF 77 Ende.\nButtonText=Continue playing\nPopupStyle=NavalMessage\nMessageRole=Outro
Objective_DestroyRaidingForce=Zerstören Sie den feindlichen Kampfverband
Objective_DestroyEnemySub=Zerstören Sie alle feindlichen U-Boote
Objective_SelectedUnitMustSurvive={SelectedUnitName} muss überleben


[Language_en]
Name=03B Holding the Lombok Strait
Description=Heavy enemy attacks against Indonesia and Malaysia have left the Allies in disarray, and US forces are attempting to reconsolidate at Darwin in northern Australia. A single unit from your task force has been detached to hold the Lombok Strait long enough for critical Allied transport units to escape south.
Taskforce2Vessel2NameOverride=Vozbuzhdenny BPK-725
Taskforce2Vessel2ShortNameOverride=Vozbuzhdenny
Trigger4Condition_Condition1AreaLabel=Datum A01
Taskforce1StartmessageMessage=Title=<size=24>Pacific Strike - Ship Challenge 1</size>\nHOLDING THE LOMBOK STRAIT\n<size=24>July 12th, 1985</size>\nBody=Allied forces are retreating to Australia. {SelectedUnitName} has been detached from previous assignment to prevent USSR raiding units from closing the Lombok Strait.\n\nEnemy air units will sortie to cover the surface raiding force, and at least one Kilo class SSK is suspected operating in the area. Destroy all enemy surface units and any submarines encountered.\nButtonText=Start mission\nPopupStyle=Intro
StartmessageForecast=FLEET WEATHER FORECAST FOR LOMBOK STRAIT\nVALID: 120200Z-120800Z JUL 85\nSoutheasterly monsoon flow through Lombok Strait will continue overnight, with scattered cloud cover and moderate seas at State 3. No significant rain or fog is expected, and visibility should remain good across the strait and the Bali-Lombok approaches. Conditions are forecast to remain steady through the morning watch, with localized gusts possible in the channel acceleration zone.
Taskforce1SelectedunitmustsurviveMessage=Title=MISSION FAILED\nBody=Defeat! {SelectedUnitName} has been sunk!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1DatumA01messageMessage=From=CINCPACFLT\nTo=CO {SelectedUnitName}\nInfo=\nSubj=CONTACT REPORT-KILO SSK DATUM A01\nPrecedence=Flash\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) WARNING: Radio intercepts indicate 1 X KILO class SSK operating north of Lombok Strait.\n\n2. (S) Datum A01 has been established at position 8.11S, 115.8E at time 0130Z.\n\n3. (S) It is imperative this contact is destroyed. Good luck and good hunting.\nButtonText=Acknowledge & continue\nPopupStyle=NavalMessage
Taskforce1DatumA01messageIntel=Radio intercepts indicate USSR KILO class submarine moving into Lombok Strait from the north. Datum A01 is marked on your map.
Taskforce1Destroyenemyships-playervictoryMessage=From=CTF 77\nTo=CO {SelectedUnitName}\nInfo=CINCPACFLT PEARL HARBOR HI\nSubj=RECON REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Reconnaissance indicates the main body of USSR raiding force attempting to close Lombok Strait has been destroyed.\n\n2. (S) Intel estimates follow-on operation by USSR naval elements including KIROV is likely in next 72 hours, but as of 0300Z all critical Allied transports have exited the strait.\n\n3. (S) Remain off Bali until 2200Z, then rendezvous with {TaskForceName} and clear the area for Darwin. BZ - CTF 77 sends.\nButtonText=Continue playing\nPopupStyle=NavalMessage\nMessageRole=Outro
Objective_DestroyRaidingForce=Destroy enemy raiding force
Objective_DestroyEnemySub=Destroy any enemy subs encountered
Objective_SelectedUnitMustSurvive={SelectedUnitName} must survive


[Language_en]
Name=07A Hunt for the Cruiser
Description=The Slava SAG has been reported somewhere in the Sulu Sea. Command the HMAS Orion to locate and sink it.
Taskforce1StartMessage=<size=24>Pacific Strike - Sub Challenge 2</size>\nHUNT FOR\nTHE CRUISER\n<size=24>September 23rd, 1985</size>|The Slava SAG has been reported in the South China Sea, and Allied submarines have been ordered to sink it. Intel believes the SAG is escorting an amphibious ship destined to reinforce Palawan, and enemy submarines are likely supporting the force. Long range maritime patrol aircraft operating out of Cam Ranh are in the area as well.\n\nLocate and sink the Slava. Destruction of other enemy units is optional.\n\nHMAS Orion must survive.|Start mission
StartForecast=FLEET WEATHER FORECAST FOR SPRATLY ISLANDS AREA\nVALID: 230500-231200Z SEP 85\nStorm conditions over the Spratly Islands at 0500 local will begin to ease shortly thereafter as the pressure gradient weakens, with northwesterly winds gradually diminishing. Seas will subside from Sea State 5 to Sea State 4 by approximately 0600, while rain showers taper off and cease, though residual cloud cover and patchy fog may continue to limit visibility. Improving but still moderate conditions will persist through 1200 local, with no return to storm conditions expected during the period.
Taskforce1OrionmustsurviveMessage=MISSION FAILED|Defeat! HMAS Orion has been destroyed!|Exit mission
Taskforce1Slavasunk-playervictoryMessage=MISSION ACCOMPLISHED|Victory! The Slava has been destroyed, removing a very dangerous enemy missile combatant from the board. Excellent work, Commander.\n\n---\n\n<size=15>Our primary objective has been accomplished. You may exit the mission now, or continue to prosecute enemy forces.|Exit mission
Objective_DestroySlava=Sink the Slava
Objective_OrionMustSurvive=HMAS Orion must survive
Objective_DestroySAG=OPTIONAL: Destroy all enemy surface units
[Language_cn]
Name=07A Hunt for the Cruiser

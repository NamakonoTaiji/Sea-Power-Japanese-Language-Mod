
[Language_en]
Name=07A Hunt for the Cruiser
Description=The Slava SAG has been reported somewhere in the Sulu Sea. Command the HMAS Orion to locate and sink it.
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Sub Challenge 2</size>\nHUNT FOR THE CRUISER\n<size=24>September 23rd, 1985</size>\nBody=The Slava SAG has been reported in the South China Sea, and Allied submarines have been ordered to sink it. Intel believes the SAG is escorting an amphibious ship destined to reinforce Palawan, and enemy submarines are likely supporting the force. Long range maritime patrol aircraft operating out of Cam Ranh are in the area as well.\n\nLocate and sink the Slava. Destruction of other enemy units is optional.\nButtonText=Start mission\nPopupStyle=Intro
StartForecast=FLEET WEATHER FORECAST FOR SPRATLY ISLANDS AREA\nVALID: 230500-231200Z SEP 85\nStorm conditions over the Spratly Islands at 0500 local will begin to ease shortly thereafter as the pressure gradient weakens, with northwesterly winds gradually diminishing. Seas will subside from Sea State 5 to Sea State 4 by approximately 0600, while rain showers taper off and cease, though residual cloud cover and patchy fog may continue to limit visibility. Improving but still moderate conditions will persist through 1200 local, with no return to storm conditions expected during the period.
Taskforce1OrionmustsurviveMessage=Title=MISSION FAILED\nBody=Defeat! HMAS Orion has been destroyed!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1Slavasunk-playervictoryMessage=From=MARITIME HQ\nTo=HMAS ORION\nInfo=COMSUBPAC PEARL HARBOR HI\nCINCPACFLT PEARL HARBOR HI\nSubj=SUBMARINE REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=AustraliaRAN\nBody=1. (S) HQ acknowledges your report of successful sinking of SLAVA 23SEP.\n\n2. (S) Loss of this unit removes the principal missile threat from South China Sea area and badly degrades enemy forces available for action against us.\n\n3. (S) Excellent work, Commander. At first opportunity, your crew authorized to paint a red cruiser on ORION's scoreboard.\nButtonText=Return to mission\nPopupStyle=NavalMessage\nMessageRole=Outro
Objective_DestroySlava=Sink the Slava
Objective_OrionMustSurvive=HMAS Orion must survive
Objective_DestroySAG=OPTIONAL: Destroy all enemy surface units
[Language_cn]
Name=07A Hunt for the Cruiser
[Language_ru]
Name=07A Охота за крейсером
Description=«Слава» SAG был зарегистрирован где-то в море Сулу. Прикажи Ориону найти и потопить его.
Taskforce1StartMessage=Title=<size=24>Pacific Strike - Sub Challenge 2</size>\nОхота на убийцу\n<size=24>S 23 сентября 1985</size>\nBody=«Слава» SAG был зарегистрирован в Южно-Китайское море, и союзным подводным лодкам было приказано потопить его. Intel считает, что SAG сопровождает десантный корабль, предназначенный для усиления Палаван, и вражеские подводные лодки, вероятно, поддерживают силы. В этом районе также находятся морские патрульные самолеты большой дальности, действующие из Камрань.\n\nНайдите и потопите «Слава». Уничтожение других вражеских подразделений является необязательным.\nButtonText=Начать миссию\nPopupStyle=Intro
StartForecast=ПЛАВНАЯ МАШИНА FORECAST FOR SPRATLY ISLANDS AREA\n230500-231200Z SEP 85\nШтормовые условия над острова Спратли на уровне 0500 начнут ослабевать вскоре после того, как градиент давления ослабнет, а северо-западные ветры постепенно уменьшатся. Моря утихнут от состояния 5 до состояния 4 примерно на 0600, в то время как дождевые ливни сужаются и прекращаются, хотя остаточный облачный покров и туман могут продолжать ограничивать видимость. Улучшение, но все же умеренные условия сохранятся в течение 1200 местных, без возвращения к штормовым условиям, ожидаемым в течение периода.
Taskforce1OrionmustsurviveMessage=Title=Миссии не удалось\nBody=Поражение! "Орион" уничтожен!\nButtonText=Возвращение к миссии\nPopupStyle=Outro
Taskforce1Slavasunk-playervictoryMessage=From=MARITIME HQ\nTo=HMAS ORION\nInfo=COMSUBPAC PEARL HARBOR HI\nCINCPACFLT PEARL HARBOR HI\nSubj=SUBMARINE REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=AustraliaRAN\nBody=1. (S) HQ подтверждает ваше сообщение об успешном потоплении SLAVA 23SEP.\n\n2. (S) Потеря этого подразделения устраняет основную ракетную угрозу из района Южно-Китайское море и серьезно ослабляет силы противника, доступные для действий против нас.\n\n3. (S) Отличная работа, командир. При первой возможности ваша команда разрешила нарисовать красный крейсер на табло ORION.\nButtonText=Вернуться к миссии\nPopupStyle=NavalMessage\nMessageRole=Outro
Objective_DestroySlava=Скачать «Слава»
Objective_OrionMustSurvive=HMAS Orion должен выжить
Objective_DestroySAG=Опционально: Уничтожить все надводные части противника
[Language_de]
Name=07A Jagd auf den Kreuzer
Description=Die Slava-SAG wurde irgendwo in der Sulusee gemeldet. Übernehmen Sie das Kommando über die HMAS Orion, um sie aufzuspüren und zu versenken.
Taskforce1StartMessage=Title=<size=24>Pacific Strike - U-Boot-Herausforderung 2</size>\nJAGD AUF DEN KREUZER\n<size=24>23. September 1985</size>\nBody=Die Slava-SAG wurde im Südchinesischen Meer gesichtet und alliierte U-Boote haben den Befehl erhalten, sie zu versenken. Der Nachrichtendienst geht davon aus, dass die SAG ein amphibisches Schiff eskortiert, das Palawan verstärken soll und dass feindliche U-Boote den Verband wahrscheinlich begleiten. Seefernaufklärer, die von Cam Ranh aus operieren, befinden sich ebenfalls im Gebiet.\n\nSpüren Sie die Slava auf und versenken Sie sie. Die Zerstörung weiterer feindlicher Einheiten ist optional.\nButtonText=Mission starten\nPopupStyle=Intro
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR DEN RAUM SPRATLY-INSELN\nGÜLTIG: 230500-231200Z SEP 85\nDie stürmischen Wetterbedingungen über den Spratly-Inseln um 0500 Ortszeit werden nachlassen, wenn der Luftdruck weiter sinkt und die nordwestlichen Winde allmählich abnehmen. Der Seegang wird sich bis etwa 0600 von der Stufe 5 auf die Stufe 4 abschwächen, während zeitgleich auch die Regenschauer nachlassen. Restbewölkung und vereinzelte Nebelfelder können die Sicht jedoch weiterhin einschränken. Bis 1200 Ortszeit werden sich die Bedingungen verbessern, bleiben jedoch mäßig. Erneute stürmische Wetterbedingungen werden im Vorhersagezeitraum nicht erwartet.
Taskforce1OrionmustsurviveMessage=Title=MISSION FEHLGESCHLAGEN\nBody=Niederlage! Die HMAS Orion wurde zerstört!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1Slavasunk-playervictoryMessage=From=COMSUBPAC\nTo=HMAS ORION\nInfo=CTF 77\nCINCPACFLT PEARL HARBOR HI\nSubj=SUBMARINE REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=AustraliaRAN\nBody=1. (S) Eingang Ihrer Meldung bestätigt: Kreuzer der SLAVA-Klasse zerstört.\n\n2. (S) Der Verlust dieser Einheit beseitigt die wichtigste Flugkörperbedrohung des feindlichen Verstärkungsverbandes nach Palawan und schwächt die Führung des Sicherungsschirms erheblich.\n\n3. (S) Ausgezeichnete Arbeit, ORION. Falls die Lage es zulässt, setzen Sie den Angriff gegen verbleibende Transporte und Sicherungseinheiten fort. Andernfalls Datum räumen und Boot erhalten. COMSUBPAC Ende.\nButtonText=Return to mission\nPopupStyle=NavalMessage\nMessageRole=Outro
Objective_DestroySlava=Versenken Sie die Slava
Objective_OrionMustSurvive=Die HMAS Orion muss überleben
Objective_DestroySAG=OPTIONAL: Zerstören Sie alle feindlichen Einheiten

[Language_de]
Name=07A Jagd auf den Kreuzer
Description=Die Slava-SAG wurde irgendwo in der Sulusee gemeldet. Übernehmen Sie das Kommando über die HMAS Orion, um sie aufzuspüren und zu versenken.
Taskforce1StartMessage=<size=24>Pacific Strike - U-Boot-Herausforderung 2</size>\nJAGD AUF\nDEN KREUZER\n<size=24>23. September 1985</size>|Die Slava-SAG wurde im Südchinesischen Meer gesichtet und alliierte U-Boote haben den Befehl erhalten, sie zu versenken. Der Nachrichtendienst geht davon aus, dass die SAG ein amphibisches Schiff eskortiert, das Palawan verstärken soll und dass feindliche U-Boote den Verband wahrscheinlich begleiten. Seefernaufklärer, die von Cam Ranh aus operieren, befinden sich ebenfalls im Gebiet.\n\nSpüren Sie die Slava auf und versenken Sie sie. Die Zerstörung weiterer feindlicher Einheiten ist optional.\n\nDie HMAS Orion muss überleben.|Mission starten
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR DEN RAUM SPRATLY-INSELN\nGÜLTIG: 230500-231200Z SEP 85\nDie stürmischen Wetterbedingungen über den Spratly-Inseln um 0500 Ortszeit werden nachlassen, wenn der Luftdruck weiter sinkt und die nordwestlichen Winde allmählich abnehmen. Der Seegang wird sich bis etwa 0600 von der Stufe 5 auf die Stufe 4 abschwächen, während zeitgleich auch die Regenschauer nachlassen. Restbewölkung und vereinzelte Nebelfelder können die Sicht jedoch weiterhin einschränken. Bis 1200 Ortszeit werden sich die Bedingungen verbessern, bleiben jedoch mäßig. Erneute stürmische Wetterbedingungen werden im Vorhersagezeitraum nicht erwartet.
Taskforce1OrionmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! Die HMAS Orion wurde zerstört!|Mission beenden
Taskforce1Slavasunk-playervictoryMessage=MISSION ERFOLGREICH|Sieg! Die Slava wurde zerstört! Damit haben Sie ein äußerst gefährliches feindliches Lenkwaffenkampfschiff aus dem Gefechtsfeld entfernt. Ausgezeichnete Arbeit, Kommandant.\n\n---\n\n<size=15>Unser Primärziel wurde erfüllt. Sie können die Mission jetzt beenden oder den Kampf gegen feindliche Kräfte fortsetzen.\n\nEin U-Boot hat an Erfahrung gewonnen:\n\nUSS Drum (SSN-677): <color=Green>Veteran<color></size>|Mission beenden
Objective_DestroySlava=Versenken Sie die Slava
Objective_OrionMustSurvive=Die HMAS Orion muss überleben
Objective_DestroySAG=OPTIONAL: Zerstören Sie alle feindlichen Einheiten

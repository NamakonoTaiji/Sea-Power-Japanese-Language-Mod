[Language_ja]
Name=07A 巡洋艦捕捉
Description=スラヴァ水上戦闘群がスールー海のどこかに潜伏しているとの情報あり。HMASオリオンを指揮し、敵の位置を特定して撃沈せよ。
Taskforce1StartMessage=<size=24>パシフィック・ストライク――潜水艦チャレンジ2</size>\n巡洋艦捕捉\n<size=24>1985年9月23日</size>|南シナ海にてスラヴァ水上戦闘群が確認され、同盟軍の潜水艦部隊にこれを撃沈せよとの命令が下った。情報部によると、当該戦闘群はパラワン島の戦力補強へと向かう揚陸艦を護衛しており、敵潜水艦部隊がその掩護に当たっている可能性が高い。さらに、カムラン湾から出撃した長距離対潜哨戒機も同海域で活動中である。\n\nスラヴァの位置を特定して撃沈せよ。他の敵部隊の破壊は任意とする。\n\nHMASオリオンの生存が絶対条件である。|作戦開始
StartForecast=スプラトリー諸島海域艦隊気象予報\n予報期間：85年9月23日0500Z～23日1200Z\n現地時間0500時、スプラトリー諸島上空の嵐の状況は、気圧傾度の弱まりとともに間もなく緩和され始め、北西の風は徐々に減衰する見込み。波浪は0600時までに海象状態5（シーステート5）から海象状態4（シーステート4）へと収まり、降雨も衰えて停止する予想。ただし、残存する雲や断続的な霧により、引き続き視程が制限される可能性がある。現地時間1200時にかけて気象条件は改善に向かうものの限界状況が続く見込みで、予報期間中に嵐が再発する兆候はない。
Taskforce1OrionmustsurviveMessage=作戦失敗|敗北！HMASオリオンが撃沈された！|作戦終了
Taskforce1Slavasunk-playervictoryMessage=作戦完了|勝利だ！スラヴァは撃破され、極めて危険な敵ミサイル艦が戦場から排除された。見事な手際だ、指揮官。\n\n---\n\n<size=15>主目標は達成された。現時点でミッションを終了して離脱するか、このまま敵軍の掃討を続行してもよい。|ミッション終了
Objective_DestroySlava=スラヴァの撃沈
Objective_OrionMustSurvive=HMASオリオンの生存
Objective_DestroySAG=任意目標：すべての敵水上部隊の撃滅

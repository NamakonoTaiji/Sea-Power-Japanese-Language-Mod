
[Language_en]
Name=06 Raid on Lombok
Description=The Allied counteroffensive in the Pacific is underway. {TaskForceName} has been ordered to force the Lombok Strait and destroy all enemy forces operating in the area. Success will relieve pressure on Indonesia and open the way for further operations to the north.
Taskforce2Vessel8NameOverride=Vozbuzhdenny BPK-725
Taskforce2Vessel8ShortNameOverride=Vozbuzhdenny
Taskforce2Vessel9NameOverride=Skrytny BPK-707
Taskforce2Vessel9ShortNameOverride=Skrytny
Taskforce2LandUnit1NameOverride=Denpasar Airfield
Taskforce1StartmessageMessage=<size=24>Pacific Strike - Part 6</size>\nRAID ON LOMBOK\n<size=24>August 21st, 1985</size>|The Allied counteroffensive in the Pacific is underway. {TaskForceName} has been ordered to clear the Lombok Strait of enemy forces to relieve pressure on Indonesia.\n\nDestroy all hostile naval forces and eliminate all enemy shore guns, SAM sites, and missile batteries. \n\nNote: follow on operations are anticipated, and resupply of ordnance will not be available after this action. Expend weapons wisely.\n\n{FlagshipName} must survive.|Start mission
StartForecast=FLEET WEATHER FORECAST FOR BALI LOMBOK AREA\nVALID: 210000Z-210800Z AUG 85\nLombok Strait is under stable conditions with broken to heavy cloud cover, northerly winds, and moderate seas. No significant convective activity is present, with good visibility and no precipitation across the strait and adjacent waters. Conditions are expected to remain steady throughout the period with no significant changes anticipated for surface or air operations.
Taskforce1FlagshipmustsurviveMessage=DEFEAT|Defeat! {FlagshipName} has been sunk!|Exit mission
Taskforce1PlayervictoryMessage=MISSION ACCOMPLISHED|Victory! All enemy forces threatening Lombok Strait have been destroyed, clearing a path for the Marines to land and recapture the airfield.\n\n<size=15>No full resupply or repairs will be available before the next mission. Preserve remaining ordnance and avoid further damage where possible.</size>
Objective_DestroyNavalUnits=Destroy enemy naval forces in Lombok Strait
Objective_DestroyShoreFacilities=Destroy all enemy shore guns, SAM sites, & missile batteries
Objective_FlagshipMustSurvive={FlagshipName} must survive
[Language_cn]
Name=06 Raid on Lombok
[Language_ru]
Name=06 Raid on Lombok
[Language_de]
Name=06 Angriff auf Lombok
Description=Die alliierte Gegenoffensive im Pazifik hat begonnen. {TaskForceName} hat den Befehl erhalten, in die Lombokstraße zu verlegen und alle feindlichen Kräfte im Einsatzraum zu zerstören. Ein Erfolg wird den Druck auf Indonesien verringern und den Weg für weitere Operationen nach Norden bereiten.
Taskforce2Vessel8NameOverride=Vozbuzhdenny BPK-725
Taskforce2Vessel8ShortNameOverride=Vozbuzhdenny
Taskforce2Vessel9NameOverride=Skrytny BPK-707
Taskforce2Vessel9ShortNameOverride=Skrytny
Taskforce2LandUnit1NameOverride=Denpasar Airfield
Taskforce1StartmessageMessage=<size=24>Pacific Strike - Teil 6</size>\nANGRIFF AUF LOMBOK\n<size=24>21. August 1985</size>|Die alliierte Gegenoffensive im Pazifik hat begonnen. {TaskForceName} hat den Befehl erhalten, die Lombokstraße von feindlichen Kräften zu säubern, um den Druck auf Indonesien zu verringern.\n\nZerstören Sie alle feindlichen Seestreitkräfte und schalten Sie sämtliche feindlichen Küstengeschütze, SAM-Stellungen und Flugkörperbatterien aus. \n\nHinweis: Es werden Folgeoperationen werden erwartet, daher ist nach diesem Einsatz kein Aufrüsten bzw. Aufmunitionieren möglich. Setzen Sie Ihre Wirkmittel daher mit Bedacht ein.\n\n{FlagshipName} muss überleben.|Mission starten
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR DEN RAUM BALI-LOMBOK\nGÜLTIG: 210000Z-210800Z AUG 85\nIn der Lombokstraße herrschen stabile Bedingungen mit aufgelockerter bis starker Bewölkung, Wind aus Norden und mäßiger See. Es gibt keine nennenswerte konvektive Aktivität, in der Meerenge und den angrenzenden Gewässern herrschen gute Sichtverhältnisse ohne Niederschlag. Die Bedingungen bleiben voraussichtlich während des gesamten Zeitraums stabil, ohne wesentliche Änderungen für See- oder Luftoperationen.
Taskforce1FlagshipmustsurviveMessage=BESIEGT|Niederlage! {FlagshipName} wurde versenkt!|Mission beenden
Taskforce1PlayervictoryMessage=MISSION ERFOLGREICH|Sieg! Alle feindlichen Kräfte in der Lombokstraße wurden zerstört, wodurch der Weg für eine Landung der Marines und die Rückeroberung des Flugplatzes frei ist.\n\n<size=15>Vor der nächsten Mission steht keine vollständige Versorgung und keine Reparatur zur Verfügung. Achten Sie auf die verbleibenden Munitionsbestände und vermeiden Sie nach Möglichkeit weitere Schäden.</size>
Objective_DestroyNavalUnits=Zerstören Sie feindliche Seestreitkräfte in der Lombokstraße
Objective_DestroyShoreFacilities=Zerstören Sie alle feindlichen Küstengeschütze, SAM-Stellungen und Flugkörperbatterien
Objective_FlagshipMustSurvive={FlagshipName} muss überleben

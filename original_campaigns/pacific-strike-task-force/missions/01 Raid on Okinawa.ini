
[Language_en]
Name=01 Raid on Okinawa
Description=Hostilities commenced this morning in Europe and the Pacific, and Allied intelligence has discovered the Soviets are attempting a daring commando raid on Okinawa. Embarked aboard a Japanese-flagged car carrier, the commando unit is in sight of the islands. They are supported by a PLAN strike force of surface ships approaching from the northwest. Get underway and destroy the enemy attack before they reach Okinawa.
Taskforce1Aircraft1NameOverride=E-3A 961st AWCS 'Darkstar'
Taskforce1Aircraft1ShortNameOverride=Darkstar
Taskforce2LandUnit1NameOverride=Luqiao Air Base
Taskforce2LandUnit1ShortNameOverride=ZSLQ
Trigger3Condition_Condition1AreaLabel=Prevent landing!
Taskforce1StartMessage=<size=24>Pacific Strike - Part 1</size>\nRAID ON OKINAWA\n<size=24>June 26th, 1985</size>|Attempting to seize the initiative, a Soviet raid on Okinawa is underway. A commando force is embarked aboard a commandeered merchant supported by a surface action group to the north. Proceed west from Naha and destroy the incoming enemy forces before they reach the island.\n\nUSAF E-3A "Darkstar" is on station over Kadena AFB for air and surface picture, and JMSDF P-3 is on patrol SW of Okinawa.\n\n{FlagshipName} must survive.|Start mission
StartForecast=FLEET WEATHER FORECAST FOR OKINAWA AREA\nVALID: 262030Z-270230Z JUN 85\nA weak westerly flow over the central Ryukyus will maintain broken cloud cover across Okinawa and the waters west of Naha through the evening period. Seas are expected to remain moderate at Sea State 3, with no organized precipitation or fog forecast. Visibility should remain generally good for surface and air operations, though low cloud decks may intermittently obscure higher terrain and coastal approaches.
Taskforce1FlagshipmustsurviveMessage=MISSION FAILED|Defeat! {FlagshipName} has been sunk!|Exit mission
Taskforce1AssaultunitreachesKume-playerdefeatMessage=MISSION FAILED|Defeat! The enemy commando force has landed on Kumejima!|Exit mission
Taskforce1Enemyunitsdestroyed-playervictoryMessage=MISSION ACCOMPLISHED|FM CTF 77\nTO {TaskForceName}\n\n1. (S) Recon shows enemy raiding force sinking or burning and command assesses enemy push at Okinawa has been stopped in its tracks.\n\n2. (S) Intel believes this was an opportunistic raid and further action against Okinawa is unlikely in near term.\n\n3. (S) Excellent work, Commander. Return to Naha for expedited ammo load and refuel. Follow on operations are imminent. CTF 77 sends.\n\n<size=15>Before the next mission, your task force will be fully rearmed and repairs will be available.</size>|Exit mission
Objective_DestroyCommandos=Destroy commando force aboard M/V Ibishu Maru No.18
Objective_DestroyRaidGroup=Destroy warship strike group
Objective_FlagshipMustSurvive={FlagshipName} must survive
[Language_cn]
Name=01 Raid on Okinawa
[Language_ru]
Name=01 Рейд на Окинаву
Description=Сегодня утром в Европе и на Тихом океане начались боевые действия, и разведка союзников обнаружила, что Советский Союз предпринимает дерзкую попытку провести рейд на Окинаве. Подразделения спецназа на борту ролкера, идущего под японским флагом, уже находятся в пределах видимости островов. Их прикрывают надвигающиеся с северо-запада силы ВМФ НОАК. Выдвигайтесь на перехват и отразите атаку, прежде чем силы противника достигнут Окинавы.
Taskforce1Aircraft1NameOverride=E-3A 961st AWCS 'Даркстар'
Taskforce1Aircraft1ShortNameOverride=Даркстар
Taskforce2LandUnit1NameOverride=Аэропорт  Луцяо
Taskforce2LandUnit1ShortNameOverride=ZSLQ
Trigger3Condition_Condition1AreaLabel=Предотвратить высадку!

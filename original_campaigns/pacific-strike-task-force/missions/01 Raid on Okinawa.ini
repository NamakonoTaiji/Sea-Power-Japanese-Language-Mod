[Language_de]
Name=01 Angriff auf Okinawa
Description=Heute Morgen haben die Kampfhandlungen in Europa und im Pazifik begonnen und alliierte Nachrichtendienste haben festgestellt, dass die Sowjets einen waghalsigen Kommandoangriff auf Okinawa vorbereiten. Eine Kommandoeinheit befindet sich an Bord eines Autotransporters unter japanischer Flagge und ist bereits in Sichtweite der Inseln. Unterstützt wird sie von einem PLAN-Kampfverband, der sich aus Nordwesten nähert. Laufen Sie aus und zerstören Sie den feindlichen Angriff, bevor er Okinawa erreicht.
Taskforce1Aircraft1NameOverride=E-3A 961st AWCS 'Darkstar'
Taskforce1Aircraft1ShortNameOverride=Darkstar
Taskforce2LandUnit1NameOverride=Luqiao Air Base
Taskforce2LandUnit1ShortNameOverride=ZSLQ
Trigger3Condition_Condition1AreaLabel=Landung verhindern!
Taskforce1StartMessage=<size=24>Pacific Strike - Teil 1</size>\nANGRIFF AUF OKINAWA\n<size=24>26. Juni 1985</size>|Um die Initiative zu ergreifen, läuft ein sowjetischer Angriff auf Okinawa. Eine Kommandoeinheit befindet sich an Bord eines requirierten Handelsschiffs und wird von einer Kampfgruppe (SAG) aus Norden unterstützt. Verlegen Sie von Naha nach Westen und zerstören Sie die anrückenden feindlichen Kräfte, bevor sie die Insel erreichen.\n\nUSAF E-3A „Darkstar“ befindet sich über der Kadena AFB auf Station und liefert ein Luft- und Oberflächenlagebild. Eine JMSDF P-3 patrouilliert südwestlich von Okinawa.\n\n{FlagshipName} muss überleben.|Mission starten
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR DEN RAUM OKINAWA\nGÜLTIG: 262030Z-270230Z JUN 85\nEine schwache westliche Brise über den zentralen Ryūkyū-Inseln sorgt im Verlauf des Abends für aufgelockerte bis starke Bewölkung über Okinawa und den Gewässern westlich von Naha. Die See bleibt voraussichtlich mäßig bei einem Seegang der Stufe 3, Niederschlag oder Nebel werden nicht erwartet. Die Sicht sollte für See- und Luftoperationen ausreichend sein, auch wenn niedrige Wolkendecken zeitweise höheres Gelände und Küstenanflüge verdecken können.
Taskforce1FlagshipmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! {FlagshipName} wurde versenkt!|Mission beenden
Taskforce1AssaultunitreachesKume-playerdefeatMessage=MISSION FEHLGESCHLAGEN|Niederlage! Die feindliche Kommandoeinheit ist auf Kumejima gelandet!|Mission beenden
Taskforce1Enemyunitsdestroyed-playervictoryMessage=MISSION ERFOLGREICH|VON CTF 77\nAN {TaskForceName}\n\n1. (S) Aufklärung zeigt, dass der feindliche Angriffsverband sinkt oder brennt; die Führung bewertet den feindlichen Vorstoß auf Okinawa als gescheitert.\n\n2. (S) Der Nachrichtendienst geht davon aus, dass es sich um einen opportunistischen Angriff handelte und weitere Operationen gegen Okinawa kurzfristig unwahrscheinlich sind.\n\n3. (S) Ausgezeichnete Arbeit, Kommandant. Kehren Sie zum Tanken und Aufmunitionieren nach Naha zurück. Folgeoperationen stehen unmittelbar bevor. CTF 77 Ende.\n\n<size=15>Vor der nächsten Mission wird Ihre Task Force vollständig wiederbewaffnet. Außerdem sind Reparaturen verfügbar.</size>|Mission beenden
Objective_DestroyCommandos=Zerstören Sie die Kommandoeinheit an Bord der M/V Ibishu Maru No.18
Objective_DestroyRaidGroup=Zerstören Sie den gegnerischen Kampfverband
Objective_FlagshipMustSurvive={FlagshipName} muss überleben

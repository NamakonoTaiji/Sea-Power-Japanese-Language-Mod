
[Language_en]
Name=03 Running the Palawan Passage
Description=Detached from Okinawa, {TaskForceName} must head south to join the defense of Singapore. Run the Palawan Passage to reach Sandakan and join the Allied reinforcement group forming there. Heavy submarine opposition is expected.
Trigger3Condition_Condition1AreaLabel=Reach this area to escape!
Trigger4Condition_Condition1AreaLabel=Suspected minefield
Taskforce1StartmessageMessage=Title=<size=24>Pacific Strike - Part 3</size>\nRUNNING THE PALAWAN PASSAGE\n<size=24>July 7th, 1985</size>\nBody=Detached from Okinawa, {TaskForceName} must head south to join the defense of Singapore. Run the Palawan Passage to reach Sandakan. Heavy submarine opposition is expected.\n\nIntel believes 2-3 enemy submarines are in the strait, and Silkworm batteries have been sighted at Balambagan island in north Borneo.\n\nNote: due to hasty nature of this operation, no repair or rearmament facilities are available at Sandakan. Expend ordnance wisely.\nButtonText=Start mission\nPopupStyle=Intro
StartmessageForecast=FLEET WEATHER FORECAST FOR PALAWAN PASSAGE\nVALID: 070200Z-070800Z JUL 85\nMoist northerly flow over the Palawan Passage and adjacent Sulu Sea is producing overcast skies, intermittent rain, and areas of fog or low stratus along the north Borneo approaches. Seas remain slight to moderate at Sea State 2, but visibility will be locally poor in showers and fog banks. Conditions are expected to remain unsettled through the period, with no significant wind shift forecast.
Taskforce1FlagshipmustsurviveMessage=Title=MISSION FAILED\nBody=Defeat! {FlagshipName} has been sunk!\nButtonText=Return to mission\nPopupStyle=Outro
Taskforce1Bluereachesescapepoint-playerwinsMessage=From=CTF 77\nTo={TaskForceName}\nInfo=CINCPACFLT PEARL HARBOR HI\nSubj=TRANSIT REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) We confirm receipt of your message traffic reporting successful transit of the strait.\n\n2. (S) Note: no rearm is available at Sandakan due to hasty nature of this operation.\n\n3. (S) Excellent work, Commander. Report to local commander and maintain readiness for defense of Singapore mission. CTF 77 sends.\nButtonText=Continue playing\nPopupStyle=NavalMessage\nMessageRole=Outro
Objective_ReachObjectiveArea=Reach the marked area to escape
Objective_FlagshipMustSurvive={FlagshipName} must survive
[Language_cn]
Name=03 Running the Palawan Passage
[Language_ru]
Name=03 Палаванский пролив
Description=Detached from Okinawa, {TaskForceName} must head south to join the defense of Singapore. Run the Palawan Passage to reach Sandakan and join the Allied reinforcement group forming there. Heavy submarine opposition is expected.
Trigger3Condition_Condition1AreaLabel=Достигните этой зоны
Trigger4Condition_Condition1AreaLabel=Предполагаемое минное поле
Taskforce1StartmessageMessage=Title=<size=24>Pacific Strike - Part 3</size>\nБегущий по палаванскому пассажу\n<size=24> 7 июля 1985</size>\nBody=Отделенный от Окинава, {TaskForceName} должен отправиться на юг, чтобы присоединиться к защите Сингапур. Запустите Палаван Passage, чтобы достичь Сандакан. Ожидается мощная подводная оппозиция.\n\nIntel считает, что в проливе находятся 2-3 вражеские подводные лодки, а батареи Silkworm были замечены на острове Баламбаган на севере Борнео.\n\nПримечание: из-за поспешного характера этой операции в Сандакан нет ремонтных или перевооруженных объектов. Расходуйте боеприпасы разумно.\nButtonText=Начать миссию\nPopupStyle=Intro
StartmessageForecast=ПЛАВНАЯ МАШИНА ДЛЯ ПАЛАВСКОЙ ПАССАГИИ\nВалид: 070200Z-070800Z Июль 85\nВлажный северный поток над проходом Палаван и прилегающим море Сулу создает пасмурное небо, периодические дожди и области тумана или низкого слоя вдоль северных подходов Борнео. Моря остаются небольшими и умеренными в Sea State 2, но видимость будет локально плохой в душевых и туманных берегах. Ожидается, что условия останутся неурегулированными в течение этого периода, без значительного прогноза сдвига ветра.
Taskforce1FlagshipmustsurviveMessage=Title=МИССИЯ ПРОВАЛЕНА\nBody=Поражение! {FlagshipName} был потоплен!\nButtonText=Continue playing\nPopupStyle=Outro
Taskforce1Bluereachesescapepoint-playerwinsMessage=From=CTF 77\nTo={TaskForceName}\nInfo=CINCPACFLT PEARL HARBOR HI\nSubj=TRANSIT REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Мы подтверждаем получение Вашего сообщения о движении транспорта, сообщающего об успешном прохождении пролива.\n\n2. (S) Примечание: в Сандакан нет перевооружения из-за поспешного характера этой операции.\n\n3. (S) Отличная работа, командир. Доложить местному командиру и поддерживать готовность к обороне миссии Сингапур. Отправляется КГ 77.\nButtonText=Продолжить\nPopupStyle=NavalMessage\nMessageRole=Outro
Objective_ReachObjectiveArea=Достигните обозначенной зоны
Objective_FlagshipMustSurvive={FlagshipName} должен уцелеть
Annotation_Palawan={"Text":"о. Палаван"}
Annotation_Balambangan={"Text":"о. Баламбанган"}
[Language_de]
Name=03 Durchfahrt durch die Palawan-Passage
Description={TaskForceName} muss nach Süden verlegen, um sich der Verteidigung Singapurs anzuschließen. Durchfahren Sie die Palawan-Passage, erreichen Sie Sandakan und schließen Sie sich den sich dort sammelnden alliierten Verbänden an. Es ist mit starkem U-Boot-Widerstand zu rechnen.
Trigger3Condition_Condition1AreaLabel=Erreichen Sie dieses Gebiet, um zu entkommen!
Taskforce1StartmessageMessage=Title=<size=24>Pacific Strike - Teil 3</size>\nDURCHFAHRT DURCH DIE PALAWAN-PASSAGE\n<size=24>7. Juli 1985</size>\nBody={TaskForceName} muss von Okinawa nach Süden verlegen, um sich der Verteidigung Singapurs anzuschließen. Durchqueren Sie die Palawan-Passage, erreichen Sie Sandakan und schließen Sie sich dort den alliierten Verbänden an. Es ist mit starkem U-Boot-Widerstand zu rechnen.\n\nDer Nachrichtendienst geht davon aus, dass sich 2 bis 3 feindliche U-Boote in der Meerenge befinden. Außerdem wurden Silkworm-Batterien auf der Insel Balambangan vor Nordborneo gesichtet.\n\nHinweis: Aufgrund der kurzfristigen Durchführung dieser Operation stehen in Sandakan keine Kapazitäten für eventuelle Reparaturen oder eine Wiederbewaffnung zur Verfügung. Setzen Sie Ihre Munition mit Bedacht ein.\nButtonText=Mission starten\nPopupStyle=Intro
StartmessageForecast=FLOTTEN-WETTERVORHERSAGE FÜR DIE PALAWAN-PASSAGE\nGÜLTIG: 070200Z-070800Z JUL 85\nHohe Luftfeuchte und moderate Winde über der Palawan-Passage und der angrenzenden Sulusee sorgen für bedeckten Himmel, zeitweiligen Regen sowie Nebel entlang der Passage nach Nordborneo. Die See bleibt leicht bis mäßig bei einem Seegang der Stufe 2, jedoch ist die Sicht örtlich innerhalb von Schauern und Nebelbänken eingeschränkt. Die Bedingungen bleiben im Einsatzzeitraum voraussichtlich unbeständig. Eine deutliche Winddrehung wird nicht erwartet.
Taskforce1FlagshipmustsurviveMessage=Title=MISSION FEHLGESCHLAGEN\nBody=Niederlage! {FlagshipName} wurde versenkt!\nButtonText=Continue playing\nPopupStyle=Outro
Taskforce1Bluereachesescapepoint-playerwinsMessage=From=CTF 77\nTo={TaskForceName}\nInfo=CINCPACFLT PEARL HARBOR HI\nSubj=TRANSIT REPORT-MISSION ACCOMPLISHED\nPrecedence=Immediate\nClassification=Secret\nTemplate=USAUSNavy\nBody=1. (S) Wir bestätigen den Eingang Ihrer Meldungen über die erfolgreiche Passage der Meerenge.\n\n2. (S) Hinweis: Aufgrund der Spontanität dieser Operation steht in Sandakan keine Wiederbewaffnung zur Verfügung.\n\n3. (S) Ausgezeichnete Arbeit, Kommandant. Melden Sie sich beim Kommandeur vor Ort und halten Sie sich für die Verteidigung Singapurs einsatzbereit. CTF 77 Ende.\nButtonText=Continue playing\nPopupStyle=NavalMessage\nMessageRole=Outro
Objective_ReachObjectiveArea=Erreichen Sie das markierte Gebiet, um zu entkommen
Objective_FlagshipMustSurvive={FlagshipName} muss überleben

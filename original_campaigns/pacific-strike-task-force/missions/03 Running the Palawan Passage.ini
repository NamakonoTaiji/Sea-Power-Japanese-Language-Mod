[Language_ja]
Name=03 パラワン海峡突破
Description=沖縄の配備を解かれた{TaskForceName}は、シンガポール防衛に加わるため南下しなければならない。パラワン海峡を突破してサンダカンへと到達し、同地で編成中の同盟軍増援部隊に合流せよ。敵潜水艦による激しい抵抗が予想される。
Trigger3Condition_Condition1AreaLabel=脱出するためこの海域に到達せよ！
Trigger4Condition_Condition1AreaLabel=機雷原の疑い
Taskforce1StartmessageMessage=<size=24>パシフィック・ストライク――第3部</size>\nパラワン海峡突破\n<size=24>1985年7月7日</size>|沖縄の配備を解かれた{TaskForceName}は、シンガポール防衛に加わるため南下しなければならない。パラワン海峡を強行突破してサンダカンへ到達せよ。敵潜水艦による激しい抵抗が予想される。\n\n情報部によれば、海峡内には2～3隻の敵潜水艦が展開しているほか、ボルネオ島北部のバランバガン島にてシルクワーム地対艦ミサイル陣地が目撃されている。\n\n注記：急遽発動された作戦の性質上、サンダカンには修理および兵装再補給の設備が存在しない。弾薬の消費は計画的に行え。\n\n{FlagshipName}の生存が絶対条件である。|作戦開始
StartmessageForecast=パラワン海峡海域艦隊気象予報\n予報期間：85年7月7日0200Z～0800Z\nパラワン海峡および隣接するスールー海上空の湿った北風の影響により、ボルネオ北部接近経路にかけて全天が雲に覆われ、断続的な雨、ならびに局地的な霧や下層雲が発生する見込み。波浪は海象状態2（シーステート2）の穏やかな状態を維持するが、降雨や霧が発生している区域では視程が局地的に低下する予想。予報期間を通じて天候は不安定な状態が続く見込みで、顕著な風向の変化は予想されていない。
Taskforce1FlagshipmustsurviveMessage=作戦失敗|敗北！{FlagshipName}が撃沈された！|作戦終了
Taskforce1Bluereachesescapepoint-playerwinsMessage=作戦成功|発：第77任務部隊指揮官（CTF 77）\n宛：{TaskForceName}\n\n1. (S) 貴部隊からの、海峡通過成功を伝える電文を受領した。\n\n2. (S) 注記：急遽発動された作戦の性質上、サンダカンでの兵装の再補給は行えない。\n\n3. (S) 見事な手際だ、指揮官。現地の司令官に申告し、シンガポール防衛任務に備えて待機せよ。第77任務部隊指揮官より。\n\n<size=15>作戦地域が遠隔地であるため、次のミッションの前に兵装再補給および修理を行うことはできない！</size>|作戦終了
Objective_ReachObjectiveArea=指定海域へ到達し脱出せよ
Objective_FlagshipMustSurvive={FlagshipName}の生存

[AllowedVessels]
usn_dd_gearing=Các khu trục hạm được cải tiến thời chiến với vũ khí tốt và khả năng cơ bản của AW. Những con tàu này đã kết thúc cuộc sống phục vụ của họ, đã được tái kích hoạt từ hạm đội dự bị, và được sử dụng tốt nhất chống lại những tàu ngầm có khả năng thấp và các đơn vị bề mặt.
usn_ff_garcia=Tàu chiến cấp Garcia là tàu tuần tra AW cơ bản với trực thăng SH-2F. Chúng rất hữu dụng để mở rộng khu vực tìm kiếm của tàu ngầm, nhưng hầu như không có khả năng phòng thủ tên lửa và phải ở lại trong cây dù Sam của những đội hộ tống được bảo vệ tốt hơn.
usn_ffg_brooke=Tàu chiến hạng Brooke cung cấp một gói hộ tống nhỏ với tên lửa và khả năng ASW. Năng lực hơn tàu chiến cấp Garcia trước đó, súng phóng lựu Mark 22 của họ chỉ có thể mang 16 tên lửa SMR, hạn chế hiệu quả phòng không.
usn_ff_knox_84=Các chiến hạm của Knox là đội hộ tống ASW với các dãy phòng sóng siêu âm tốt và hỗ trợ cho một trực thăng SH-2F. Gần đây, việc cải tổ đã cung cấp cho tàu của những tên lửa Harpoon và Phalanx CIWS.
usn_ffg_oliver_hazard_perry=Tàu chiến hạng nặng Oliver Hazard Perry là đội hộ tống cân bằng với 2 trực thăng, Harpoons, và phòng không trung bình. Chúng là những tàu màn hình linh hoạt, nhất là khi được trộn với những chuyên gia AAW mạnh hơn.
usn_ddg_adams_early=Charles F. Adams đẳng cấp khu trục hạm là một đơn vị làm việc với khả năng phòng thủ không khí địa phương và hai khẩu súng 5 inch. Gần đây, các máy gia tốc đã thêm vào tên lửa Harpoon, nhưng những con tàu này thiếu một khoang chứa máy bay và một hàng rào bị chặn, hạn chế khả năng AW. Phiên bản đầu tiên này đại diện cho 13 tàu nguyên thủy của lớp, được trang bị với súng phóng lựu Mark 11.
usn_ddg_adams_late=Charles F. Adams đẳng cấp khu trục hạm là một đơn vị làm việc với khả năng phòng thủ không khí địa phương và hai khẩu súng 5 inch. Gần đây, các máy gia tốc đã thêm vào tên lửa Harpoon, nhưng những con tàu này thiếu một khoang chứa máy bay và một hàng rào bị chặn, hạn chế khả năng AW. Phiên bản cuối cùng này đại diện cho 10 con tàu cuối cùng của lớp, được trang bị với súng phóng tên lửa Mark 13 nhanh hơn, với thêm 2 khẩu Harpoons.
usn_ddg_coontz=Các khu trục hạm thuộc tầng lớp Coontz là những khu trục hạm có khả năng tự vệ. Họ có thể bảo vệ đội hình chống lại các mối đe dọa trên không, nhưng việc họ bắn 10 súng phóng tên lửa tương đối chậm đã giới hạn khả năng của họ trong một lúc, và họ thiếu hệ thống CNWS.
usn_ddg_mahan=USS Mahan đã được tái thiết thành tàu thử nghiệm cho chương trình NU vào năm 1980. Vừa với một khả năng tự vệ hiện đại bất thường hiện đại mạnh mẽ, các đặc trưng chiến tranh đã làm cho con tàu có sẵn như một đội hộ tống AW đầu tiên.
usn_dd_spruance=Các khu trục hạm hạng nặng là các nền tảng AW mạnh mẽ với hai máy bay trực thăng, một hệ thống kéo, và hệ thống định vị siêu âm. Chúng là những thợ săn tàu ngầm và những màn hình có khả năng cao, nhưng chúng dựa vào những tàu khác để phòng không. Trong thời chiến, những con tàu này đã được cập nhật để vận hành trực thăng SH-3H ngoài S.S.-2F, tăng cường khả năng của chúng.
usn_dd_spruance_abl=Vào đầu những năm 1980, một số khu trục hạm đẳng cấp được cải tiến với thiết bị kích hoạt hộp vũ trang Mark 143 (ABL) cho tên lửa du hành Tomahawk, thêm khả năng tấn công vào gói ASW và trực thăng mạnh mẽ của cả lớp. Họ là những hộ tống linh hoạt có thể góp phần vào các nhiệm vụ tấn công đất đai trong khi vẫn đang kiểm tra các tàu ngầm. Trong thời chiến, những con tàu này đã được cập nhật để vận hành trực thăng SH-3H ngoài S.S.-2F, tăng cường khả năng của chúng.
usn_ddg_kidd=Các khu trục hạm thuộc tầng lớp trẻ em là đội hộ tống đa nhiệm hiện đại với ắc quy tên lửa SMR mạnh, Harpoon, ASW, trực thăng, và CIWS. Họ là những chỉ huy màn hình có mục đích tuyệt vời nhưng không có một hệ thống kéo, vì vậy họ được điều hành tốt nhất với các tàu ASW khác.
usn_cg_belknap=Các tàu tuần tra lớp Belknap cung cấp khu vực phòng thủ bằng tên lửa SM-2ER. Chúng là những neo phòng không có giá trị có thể kích hoạt các mục tiêu trong phạm vi rất dài, nhưng súng phóng lựu Mark 10 của chúng thì chậm chạp để nạp đạn và chúng được kết hợp với một tàu bắn SMR nhanh hơn để phòng thủ lớp. Không giống như lớp Leahy, lớp Belknap có một nhà chứa máy bay và máy bay chở súng, cho họ sự linh hoạt.
usn_cg_leahy=Các tàu tuần tra đẳng cấp Leahy là những tàu chiến chống không quân mạnh gấp đôi với tên lửa SM-2ER, có khả năng bắn mục tiêu ở cự ly xa. Họ hoàn toàn chuyên về phòng không tầm xa, và nên được kết hợp với đội hộ tống SM-1MR nhanh hơn để phòng thủ lớp.
usn_clg_oklahoma_city=USS Oklahoma City là một tàu tuần dương ánh sáng thời chiến đã hoàn toàn được xây dựng lại thành một phi thuyền và tàu tuần dương dẫn đường vào năm 1960. Được kích hoạt lại từ hạm đội dự bị, hệ thống tên lửa của cô ta đã lỗi thời, nhưng khẩu súng phóng nhanh 6 inch của cô ta thì rất xuất sắc ở bãi biển.
usn_cgn_california=Chiến hạm hạt nhân đẳng cấp California là đội hộ tống đa mục đích với súng phóng lựu Mark 13 và tạp chí cho 80 tàu ngầm SMR. Họ thiếu máy bay trực thăng và chỉ có khả năng hạn chế, nhưng là những tàu phòng thủ đáng tin cậy với sức chịu đựng tuyệt vời.
usn_cgn_virginia=Chiến hạm hạt nhân cấp độ Virginia là đội hộ tống đa mục đích cao cấp với hai súng trường Mark 26 súng phóng tên lửa S1MR, Harpoon, và khả năng hạn chế AW. Như tầng lớp California, họ không mang trực thăng, nhưng đề nghị cải thiện khả năng chiến đấu và chịu đựng như những chiến hạm chống không khí hùng mạnh.
usn_cgn_long_beach_83=Long Beach là một chiến hạm chống không khí mạnh mẽ được trang bị những tên lửa tầm xa với những tạp chí sâu. Con tàu cũng mang theo tên lửa Tomahawk để tấn công đất liền, nhưng không có trực thăng và chỉ có khả năng AW giới hạn, nên phải được hộ tống.
usn_cg_ticonderoga=Các tàu tuần tra đẳng cấp Ticondoga là những tàu bảo vệ không quân hiện đại nhất, được trang bị hệ thống chiến đấu AEGIS và radar SPY-1. Chúng là những con tàu tự vệ hàng đầu có thể xử lý hầu hết các mối đe dọa không khí, và vượt trội khi được kết hợp với một chiếc tàu SM-2ER dài hơn như Belknap, Leahy, hay Long Beach.
usn_bb_iowa=Tàu chiến tầm cỡ Iowa được trang bị vũ khí hạng nặng và trang bị vũ khí với súng ống mạnh và pin chống tên lửa. Chúng xuất sắc trong việc ném bom và hiện diện trên mặt đất, nhưng không có khả năng phòng thủ không khí và phải được các đơn vị khác hộ tống.
usn_lha_tarawa=Tàu tấn công đổ bộ lớp Tarawa cung cấp nền tảng hàng không và đổ bộ lớn cho các hoạt động nặng về trực thăng. Chúng là tàu hỗ trợ giá trị, nhưng cần lực lượng hộ tống vì khả năng phòng thủ riêng không đủ trong các khu vực có mức đe dọa cao.
usn_cv_kitty_hawk=Kitty Hawk là một nền tảng máy bay chiến lược với năng lượng không khí trên đại dương. Họ có thể thay đổi tầm với của lực lượng đặc nhiệm, nhưng phải được bảo vệ bởi các nhóm hộ tống và tàu ngầm.
usn_avp_barnegat_mod=Các tàu chiến đẳng cấp Bonifacio được chuyển đổi thành tàu thủy, được cung cấp thêm cho chiến tranh miền Nam Việt Nam và sau đó được đưa vào dịch vụ Philipne. Chúng đã được trang bị bốn chiếc Harpoons trong các thùng chứa giữa các tàu vũ trụ và một chiếc trực thăng phản ứng tự động hỗ trợ một chiếc trực thăng tấn công nhẹ.
ran_ddg_perth=Các khu trục hạm thuộc đẳng cấp Perth là phiên bản Úc của Charles F. Adams đẳng cấp. Chúng có phần khác biệt với thiết kế của Mỹ, phối hợp vũ khí chống độc lập ở giữa các tàu vũ trụ ở vị trí của pháo đài ASROC. Nếu không thì chúng giống hệt nhau về vũ khí và khả năng đối với những con tàu hạng sau này của Adams.
ran_ffg_adelaide_shorthull=Các tàu chiến đẳng cấpAelaide là phiên bản Úc của tàu chiến đẳng cấp Perry. Họ là những đoàn hộ tống có giá trị với khả năng phòng không. Trong thời chiến, họ được trang bị máy bay trực thăng US SH-2F.
jmsdf_dd_yamagumo=Các khu trục hạm thuộc tầng lớp Yamagumo là những hộ tống cũ của JMSDF hoàn toàn tập trung vào ASW. Thiếu khả năng phòng không có nghĩa là họ nên sử dụng hệ thống bảo vệ Sam từ các tàu khác.
jmsdf_dd_takatsuki=Các khu trục hạm thuộc tầng lớp Takatsuki có khả năng sử dụng hệ thống AW với 2 khẩu súng 5 inch và hỗ trợ cho trực thăng máy bay không người lái QH-50 Dlash. Hệ thống phòng vệ không của họ rất hạn chế, vì vậy họ được sử dụng tốt nhất chống lại tàu ngầm hoặc đơn vị mặt đất thấp.
jmsdf_ddg_tachikaze=Những kẻ hủy diệt thuộc tầng lớp Tachikaze là những tàu vũ trụ hiện đại của Nhật Bản được trang bị súng phóng lựu Mark 13. Chúng có khả năng tương tự như Charles F. Adams đẳng cấp Mỹ, đóng vai trò chiến binh xuất sắc.
jmsdf_ddh_haruna=Máy bay trực thăng hạng nhất Harusna là đội hộ tống đặc biệt của đội trực thăng. Chúng là những tàu ngầm tuyệt vời, nhưng thiếu tên lửa để tự vệ và nên được hộ tống nếu có không quân tấn công.

[AllowedHelicopters]
usn_sh-2f=Trực thăng SH-2F mở rộng khu vực tìm kiếm AW của tàu và giúp truy tố các liên lạc tàu ngầm ngoài tầm sóng siêu âm. Rađa cũng cho phép họ trinh sát phía trước và thực hiện trinh sát mặt đất cho các tàu chiến và khu trục hạm.
usn_sh-3h=Trực thăng SH-3H là máy bay AW tầm xa với sóng âm, MAD, sonobuoys, và ngư lôi. Họ không mang theo radar tìm kiếm bề mặt như S.S.-2F, nên họ mạnh nhất trong việc truy tố tàu ngầm và tìm kiếm và giải cứu hơn là trinh sát trên không.
usn_qh-50d=Máy bay phản lực QH50 Dlash cung cấp đường truyền từ xa nhẹ nhàng từ AW cho các hộ tống cũ. Chúng mở rộng phạm vi phân phối ngư lôi, nhưng sự thiếu cảm biến và thủy thủ đoàn của chúng làm chúng bị giới hạn ở mỗi vai trò khác.
jmsdf_hss-2=Trực thăng HSS-2 là máy bay AW tầm xa với sóng siêu âm, MAD, sonobuy và ngư lôi. Họ không mang theo radar tìm kiếm bề mặt như S.S.-2F, nên họ mạnh nhất trong việc truy tố tàu ngầm và tìm kiếm và giải cứu hơn là trinh sát trên không.
usmc_ah-1t=Trực thăng tấn công AH-1T cung cấp sự hỗ trợ từ không lực, hỏa tiễn tấn công, và cú đấm chống vũ khí từ tàu có thể điều khiển chúng. Chúng nguy hiểm chống lại các mục tiêu trên mặt đất hay mặt đất, nhưng không mang theo hệ thống radar và không nên dùng để do thám.
fr_as-350=Trực thăng AS350 là máy bay tiện ích hạng nhẹ dùng cho vận tải và liên lạc. Chúng là phương tiện hỗ trợ chi phí thấp, nhưng không mang cảm biến chiến đấu hoặc vũ khí và nên tránh xa không phận đang tranh chấp. Trong biên chế Australia, chúng đã hoạt động từ các khinh hạm lớp Adelaide như máy bay huấn luyện, với vai trò phụ về trinh sát và CSAR.

[AllowedAircraft]
fr_mirage_iii=Tiêm kích Mirage IIIO cung cấp năng lực không đối không cơ bản, nhưng vũ khí tên lửa có tầm ngắn và kiểu máy bay này thua kém các máy bay đánh chặn hiện đại hơn.
raaf_f-111c=Máy bay cường kích F-111C có tầm bay xa, tải trọng lớn và tiềm năng tấn công chiều sâu xuất sắc. Trong biên chế Australia, chúng được trang bị cho nhiệm vụ tấn công chính xác và chống hạm, đồng thời có thể mang tên lửa AIM-9 để tự vệ, khiến chúng linh hoạt hơn các loại máy bay tấn công khác.
usn_ea-6b=Máy bay EA-6B cung cấp hỗ trợ tác chiến điện tử giúp tăng khả năng sống sót của đòn tấn công và gây nhiễu cảm biến đối phương. Chúng là yếu tố nhân sức mạnh chiến đấu: các pod gây nhiễu AN/ALQ-99 mạnh mẽ làm suy giảm hiệu năng cảm biến đối phương và giảm hiệu quả phòng thủ của họ.
usn_f-14a=Tiêm kích F-14A là máy bay phòng không hạm đội cao cấp với khả năng đánh chặn tầm xa. Radar mạnh và tên lửa AIM-54A khiến chúng trở thành tiêm kích chiếm ưu thế trên không chủ lực trên tàu sân bay của Hoa Kỳ.
usn_fa-18a=Tiêm kích tấn công F/A-18A là loại tiêm kích đa nhiệm mới nhất sẵn có cho NATO. Có khả năng cả không chiến và tấn công mặt đất, chúng là máy bay rất linh hoạt, hữu ích trong nhiều vai trò. Những máy bay Australia này đã được đưa vào phục vụ do tình trạng thời chiến dù về kỹ thuật vẫn đang trong giai đoạn thử nghiệm.
usn_p-3c=Máy bay P-3C là nền tảng tuần tra tầm xa để tìm kiếm và truy tố ASW. Chúng rất giỏi trong việc tìm kiếm các tàu ngầm và các liên lạc bề mặt trước khi chúng đe dọa lực lượng chính.
usmc_av-8a=AV-8C Harers cung cấp khả năng tấn công ngắn hạn từ các khoang hàng không và sân bay. Chúng xuất sắc khi nhanh chóng quay lại hỗ trợ gần, ánh sáng và các nhiệm vụ địa phương, nhưng cần được bảo vệ khỏi các chiến binh tân tiến và phòng vệ không khí dày đặc.
usn_a-7e=Máy bay A-7E là nền tảng tấn công ánh sáng đáng tin cậy để tấn công và hỗ trợ chặt chẽ. Họ cung cấp hiệu quả hàng loạt, nhưng cần hộ tống và hỗ trợ điện tử trong không phận phòng thủ.
usn_a-6e=Máy bay A-6E là nền tảng tấn công toàn lực với khả năng tấn công của hải quân. Họ hợp với những nhiệm vụ nguy hiểm khi kết hợp với vỏ bọc chiến đấu và chiến tranh điện tử.
usn_e-2c=Máy bay E-2C cung cấp thông tin sơ bộ về máy bay và chỉ huy các cuộc không kích của hải quân. Chúng mở rộng phạm vi phát hiện và cải thiện thời gian phản ứng, khiến chúng tăng cường năng lượng.
usn_s-3a=Máy bay S-3A là tàu chở AW với khả năng tuần tra hàng hải và hỗ trợ mạnh mẽ. Chúng được sử dụng tốt nhất để xây dựng một màn hình tàu ngầm bên ngoài xung quanh các mẫu hạm và các nhóm bề mặt chính.
usaf_f-15c=Những chiến binh F-15C là những phi cơ hàng không với khả năng bắn tên lửa. Dùng chúng để chiếm quyền điều khiển không quân và bảo vệ các gói tấn công từ các chiến binh địch.
usaf_f-4e=Máy bay F-4E là những máy bay chiến đấu linh hoạt có thể hỗ trợ không quân và nhiệm vụ tấn công. Chúng vẫn phù hợp với các gói hỗn hợp, mặc dù chúng được xếp hạng cao hơn bởi các nền tảng không khí mới.
usaf_e-3a=Máy bay E-3A AWACS cung cấp máy bay giám sát và hỗ trợ. Họ là những người gia tăng lực lượng chính cho các hoạt động không khí, cải thiện khả năng phát hiện và phối hợp trong một khu vực rộng lớn.
usaf_b-52g=Máy bay ném bom B-52G cung cấp khả năng tấn công tầm xa mạnh chống lại các mục tiêu lớn hoặc cố định. Họ cần sự chuẩn bị và bảo vệ cẩn thận, nhưng không máy bay chiến thuật nào có thể sánh được.

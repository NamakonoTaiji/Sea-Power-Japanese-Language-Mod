CitationText_es=Heroic achievement and conspicuous gallantry in combat action against hostile enemy forces on {Date} while serving as Commander {TaskForceName} in the South China Sea. Su valentía y su lealtad al deber frente a las abrumadoras probabilidades estaban en consonancia con las más altas tradiciones de la Armada y reflejaban gran crédito sobre sí mismo y el Servicio Naval de los Estados Unidos.
CitationTextJapan_es=Heroic achievement and conspicuous gallantry in combat action against hostile enemy forces on {Date} while serving as Commander {TaskForceName} in the South China Sea. Su valentía y lealtad al deber reflejaban un gran crédito en la Fuerza Marítima de Autodefensa de Japón y mantenían las más altas tradiciones del servicio naval.

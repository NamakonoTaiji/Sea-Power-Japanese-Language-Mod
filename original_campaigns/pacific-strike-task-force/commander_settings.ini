CitationSignatureName_ru=Джон Лехман
CitationSignatureTitle_ru=Министр ВМС
CitationText_ru=Героические достижения и заметная храбрость в боевых действиях против враждебных вражеских сил на {Date} во время службы в качестве командира {TaskForceName} в Южно-Китайское море. Его мужество и преданность долгу перед лицом непреодолимых трудностей соответствовали высочайшим традициям военно-морского флота и отражали большую заслугу перед ним и Военно-морской службой Соединенных Штатов.
CitationTextJapan_ru=Героические достижения и заметная храбрость в боевых действиях против враждебных вражеских сил на {Date} во время службы в качестве командира {TaskForceName} в Южно-Китайское море. Его мужество и преданность долгу отражали большую заслугу перед морскими силами самообороны Япония и поддерживали высочайшие традиции военно-морской службы.
CitationTextAustralia_ru=Героические достижения и заметная храбрость в боевых действиях против враждебных вражеских сил на {Date} во время службы в качестве командира {TaskForceName} в Южно-Китайское море. Его мужество и преданность долгу отражали большую честь Королевского австралийского флота и поддерживали самые высокие традиции военно-морской службы.

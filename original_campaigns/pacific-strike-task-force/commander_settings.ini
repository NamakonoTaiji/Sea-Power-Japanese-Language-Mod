CitationText_fr=Réalisations héroïques et galanterie manifeste dans les combats contre les forces ennemies hostiles sur {Date} tout en servant comme commandant {TaskForceName} dans la mer de Chine méridionale. Son courage et sa loyauté envers le devoir, face à des difficultés énormes, étaient conformes aux plus hautes traditions de la Marine et témoignaient d'un grand crédit pour lui-même et pour le Service naval des États-Unis.
CitationTextJapan_fr=Réalisations héroïques et galanterie manifeste dans les combats contre les forces ennemies hostiles sur {Date} tout en servant comme commandant {TaskForceName} dans la mer de Chine méridionale. Son courage et son dévouement fidèle au devoir reflétaient un grand mérite pour la Force d'autodéfense maritime du Japon et défendaient les plus hautes traditions du service naval.

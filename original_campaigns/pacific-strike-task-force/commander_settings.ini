CitationDate_en=26 June 1985
CitationSignatureName_en=John Lehman
CitationSignatureTitle_en=Secretary of the Navy
CitationText_en=For exceptionally meritorious service to the Government of the United States in a duty of great responsibility while serving as Commander, {TaskForceName}, during operations in the Western Pacific. {CommanderRank} {CommanderLastName}'s steady judgment, tactical skill, and devotion to duty reflected great credit upon {Self} and upheld the highest traditions of naval service.
CitationTextJapan_en=For exceptionally meritorious service as an allied commander attached to {TaskForceName} during operations in the Western Pacific. {CommanderRank} {CommanderLastName}'s steady judgment, tactical skill, and devotion to duty reflected great credit upon the Japan Maritime Self-Defense Force and upheld the highest traditions of naval service.
CitationTextAustralia_en=For exceptionally meritorious service as an allied commander attached to {TaskForceName} during operations in the Western Pacific. {CommanderRank} {CommanderLastName}'s steady judgment, tactical skill, and devotion to duty reflected great credit upon the Royal Australian Navy and upheld the highest traditions of allied naval service.

Name_ja=海軍殊勲章
CitationIssuingBody_ja=海軍省
CitationIssuance_ja=本状を目にするすべての者へ。海軍長官は、ここに以下を授与したことを証する
CitationAwardName_ja=海軍殊勲章
CitationAuthority_ja=授与対象
CitationDate_ja=1985年6月26日
CitationSignatureName_ja=ジョン・レーマン
CitationSignatureTitle_ja=海軍長官
CitationText_ja=西太平洋における作戦行動中、{TaskForceName}指揮官として極めて重大な責任を伴う任務において、アメリカ合衆国政府に対し格段に優れた功績を挙げた。{CommanderRank}{CommanderLastName}の沈着な判断力、優れた戦術的技量、および任務への献身は、{Self}に大いなる名誉をもたらし、海軍の最高たる伝統を維持するものである。
CitationTextJapan_ja=西太平洋における作戦行動中、{TaskForceName}に配属された同盟軍指揮官として、格段に優れた功績を挙げた。{CommanderRank}{CommanderLastName}の沈着な判断力、優れた戦術的技量、および任務への献身は、海上自衛隊に大いなる名誉をもたらし、海軍の最高たる伝統を維持するものである。
CitationTextAustralia_ja=西太平洋における作戦行動中、{TaskForceName}に配属された同盟軍指揮官として、格段に優れた功績を挙げた。{CommanderRank}{CommanderLastName}の沈着な判断力、優れた戦術的技量、および任務への献身は、オーストラリア王立海軍に大いなる名誉をもたらし、同盟海軍の最高たる伝統を維持するものである。

Name_cn=海军杰出服役勋章
CitationIssuingBody_cn=海军部
CitationIssuance_cn=向所有看到这些礼物的人致意,这是要证明海军部长已经授予这些礼物。
CitationAwardName_cn=海军杰出服役勋章
CitationAuthority_cn=改为
CitationDate_cn=1985年6月26日,纽约
CitationSignatureName_cn=约翰·雷曼
CitationSignatureTitle_cn=海军秘书
CitationText_cn=在西太平洋行动期间,在担任{TaskForceName}指挥官期间,为负有重大责任的美国政府提供特别出色的服务。 {CommanderRank} {CommanderLastName}的稳健判断力,战术技巧和执勤精神反映了{Self}的巨大功劳,维护了海军服役的最高传统.
CitationTextJapan_cn=在西太平洋作战期间,作为附属于{TaskForceName}的盟军指挥官特别出色。 {CommanderRank} {CommanderLastName}的稳健判断,战术技巧和执勤精神体现了对日本海上自卫队的高度评价,并坚持海军服役的最高传统.
CitationTextAustralia_cn=在西太平洋作战期间,作为附属于{TaskForceName}的盟军指挥官特别出色。 {CommanderRank} {CommanderLastName}的稳健判断,战术技巧和执勤精神反映了澳大利亚皇家海军的巨大功劳,维护了盟军海军的最高传统.
Name_ru=Медаль «За выдающуюся службу»
CitationIssuingBody_ru=Департамент военно-морского флота
CitationIssuance_ru=Для всех тех, кто видит эти подарки, приветствия, это удостоверение того, что министр военно-морского флота наградил его наградой.
CitationAwardName_ru=Медаль «За выдающуюся службу»
CitationAuthority_ru=To
CitationDate_ru=26 июня 1985
CitationSignatureName_ru=Джон Лехман
CitationSignatureTitle_ru=Министр ВМС
CitationText_ru=За исключительно достойную службу правительству Соединенных Штатов, которое несет большую ответственность во время службы в качестве командира {TaskForceName} во время операций в Западная часть Тихого океана. Устойчивое суждение {CommanderRank} {CommanderLastName}, тактическое мастерство и преданность долгу отражали большую честь {Self} и поддерживали высочайшие традиции военно-морской службы.
CitationTextJapan_ru=За исключительно достойную службу в качестве командира союзников при {TaskForceName} во время операций в Западная часть Тихого океана. Устойчивое суждение {CommanderRank} {CommanderLastName}, тактическое мастерство и преданность долгу отразили большую честь Морских Сил Самообороны Япония и поддержали самые высокие традиции военно-морской службы.
CitationTextAustralia_ru=За исключительно достойную службу в качестве командира союзников при {TaskForceName} во время операций в Западная часть Тихого океана. Устойчивое суждение {CommanderRank} {CommanderLastName}, тактическое мастерство и преданность долгу отражали большую честь Королевскому австралийскому флоту и поддерживали самые высокие традиции союзной военно-морской службы.
Name_de=Marine Distinguished Service Medal
CitationIssuingBody_de=Departement Marine
CitationIssuance_de=Allen, die diese Geschenke und Grüße sehen, soll dies bestätigen, dass der Marineminister die
CitationAwardName_de=Marine Distinguished Service Medal
CitationAuthority_de=bis
CitationDate_de=26. Juni 1985
CitationSignatureName_de=John Lehman
CitationSignatureTitle_de=Marineminister
CitationText_de=Für außergewöhnlich verdienstvollen Dienst an der Regierung der Vereinigten Staaten in einer Pflicht von großer Verantwortung, während er als Kommandant, {TaskForceName}, während Operationen im westlichen Pazifik dient. {CommanderRank} {CommanderLastName}'s stetiges Urteilsvermögen, taktisches Geschick und Hingabe an die Pflicht spiegelten {Self} große Anerkennung wider und hielten die höchsten Traditionen des Marinedienstes aufrecht.
CitationTextJapan_de=Für außergewöhnlich verdienstvollen Dienst als alliierter Kommandant, der {TaskForceName} während Operationen im Westpazifik zugewiesen wurde. {CommanderRank} {CommanderLastName}s stetiges Urteilsvermögen, taktisches Geschick und Hingabe an die Pflicht spiegelten große Anerkennung für die Japan Maritime Self-Defense Force wider und hielten die höchsten Traditionen des Marinedienstes aufrecht.
CitationTextAustralia_de=Für außergewöhnlich verdienstvollen Dienst als alliierter Kommandant, der {TaskForceName} während Operationen im Westpazifik zugewiesen wurde. {CommanderRank} {CommanderLastName}s stetiges Urteilsvermögen, taktisches Geschick und Hingabe an die Pflicht spiegelten große Anerkennung für die Royal Australian Navy wider und hielten die höchsten Traditionen des alliierten Marinedienstes aufrecht.
Name_es=Medalla de Servicio Distinguido de la Marina
CitationIssuingBody_es=Departamento de la Marina
CitationIssuance_es=A todos aquellos que ven estos regalos, saludos, esto es certificar que el Secretario de la Marina ha otorgado el
CitationAwardName_es=Medalla de Servicio Distinguido de la Marina
CitationAuthority_es=A
CitationDate_es=26 de junio de 1985
CitationSignatureName_es=John Lehman
CitationSignatureTitle_es=Secretario de la Marina
CitationText_es=Para un servicio excepcionalmente meritorio al Gobierno de los Estados Unidos en un deber de gran responsabilidad mientras presta servicios como Comandante, {TaskForceName}, durante las operaciones en el Pacífico occidental. {CommanderRank} El juicio constante de {CommanderLastName}, la habilidad táctica y la devoción al deber reflejaron gran crédito en {Self} y sostenían las tradiciones más altas del servicio naval.
CitationTextJapan_es=Para un servicio excepcionalmente meritorio como comandante aliado adscrito a {TaskForceName} durante las operaciones en el Pacífico occidental. {CommanderRank} El juicio constante de {CommanderLastName}, la habilidad táctica y la devoción al deber reflejaron gran crédito en la Fuerza de Autodefensa Marítima de Japón y retuvieron las tradiciones más altas del servicio naval.
CitationTextAustralia_es=Para un servicio excepcionalmente meritorio como comandante aliado adscrito a {TaskForceName} durante las operaciones en el Pacífico occidental. {CommanderRank} El juicio constante de {CommanderLastName}, la habilidad táctica y la devoción al deber reflejaron gran crédito en la Marina Real de Australia y retuvieron las más altas tradiciones del servicio naval aliado.
Name_fr=Médaille du service distingué de la Marine
CitationIssuingBody_fr=Département de la marine
CitationIssuance_fr=À tous ceux qui voient ces cadeaux, salutations, c'est pour certifier que le secrétaire de la Marine a décerné le
CitationAwardName_fr=Médaille du service distingué de la Marine
CitationAuthority_fr=Aux
CitationDate_fr=26 juin 1985
CitationSignatureName_fr=Le Président
CitationSignatureTitle_fr=Secrétaire de la Marine
CitationText_fr=Pour un service exceptionnellement méritoire au gouvernement des États-Unis dans un devoir de grande responsabilité tout en servant comme commandant, {TaskForceName}, pendant les opérations dans le Pacifique occidental. Le jugement constant, l'habileté tactique et le dévouement de {CommanderRank} {CommanderLastName} témoignent d'un grand mérite pour {Self} et confirment les plus hautes traditions du service naval.
CitationTextJapan_fr=Pour un service exceptionnellement méritoire en tant que commandant allié attaché à {TaskForceName} pendant les opérations dans le Pacifique occidental. Le jugement constant de {CommanderRank} {CommanderLastName}, sa compétence tactique et son dévouement au devoir témoignent d'un grand mérite pour la Force d'autodéfense maritime du Japon et confirment les plus hautes traditions du service naval.
CitationTextAustralia_fr=Pour un service exceptionnellement méritoire en tant que commandant allié attaché à {TaskForceName} pendant les opérations dans le Pacifique occidental. Le jugement constant de {CommanderRank} {CommanderLastName}, son habileté tactique et son dévouement au devoir témoignent d'un grand mérite pour la Marine royale australienne et confirment les plus hautes traditions du service naval allié.
Name_ko=해군 Distinguished 서비스 메달
CitationIssuingBody_ko=해군 부서
CitationIssuance_ko=이 선물, 인사를 보는 모든 사람들에게, 이것은 해군의 장관이 수여 한 것을 증명하는 것입니다
CitationAwardName_ko=해군 Distinguished 서비스 메달
CitationAuthority_ko=으로
CitationDate_ko=1985년6월26일
CitationSignatureName_ko=존 레만
CitationSignatureTitle_ko=해군 장관
CitationText_ko=미국 정부에 대한 탁월한 유쾌한 서비스를 위해 Commander, {TaskForceName}, Western Pacific의 운영 중에는 큰 책임이 있습니다. {CommanderRank} {CommanderLastName}의 꾸준한 판단, 전술적인 기술 및 {Self}에 중대한 신용을 반영하고 해군 서비스의 가장 높은 전통을 올렸습니다.
CitationTextJapan_ko=특별하게 저전한 서비스를 위해 {TaskForceName}에 부합한 사령관은 서태평양에서 운영 중입니다. {CommanderRank} {CommanderLastName}의 꾸준한 판단, 전술적인 기술, 그리고 일본 해상 각자 방어력에 중대한 신용을 반영하는 의무에 devotion 및 해군 서비스의 가장 높은 전통을 새롭게 한.
CitationTextAustralia_ko=특별하게 저전한 서비스를 위해 {TaskForceName}에 부합한 사령관은 서태평양에서 운영 중입니다. {CommanderRank} {CommanderLastName}의 꾸준한 판단, 전술적 기술, 그리고 로얄 오스트레일리아 해군에 큰 크레딧을 반영하고 앨리한 해군 서비스의 가장 높은 전통을 새롭게.
Name_vn=Huy chương phụng sự thất bại của Hải quân
CitationIssuingBody_vn=Bộ Hải quân
CitationIssuance_vn=Cho những ai thấy những món quà này, những lời chào mừng, đây là để chứng thực rằng Bộ trưởng Bộ Hải quân đã trao tặng

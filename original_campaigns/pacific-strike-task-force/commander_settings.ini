CitationText_ja=1985年6月25日から1986年3月15日までの期間、太平洋作戦地域における敵軍との度重なる戦闘において、一貫して極めて優秀な成果と顕著な功績を挙げた。本紛争におけるほぼすべての主要な戦闘に参加し、その果敢な闘志と優れた戦闘効率は、太平洋における敵の最終的な撃滅を勇猛果敢に成し遂げた士官および兵卒へのふさわしい賛辞となるものである。

CitationText_ko={Date}의 기성 적력에 대한 전투 액션에 대한 영웅 업적과 의식은 남중국 바다에서 Commander {TaskForceName}로 봉사하면서. 그의 용기와 충성도의 얼굴에 대한 헌신은 해군의 가장 높은 전통을 유지하고 자신과 미국 해군 서비스에 큰 신용을 반영했다.
CitationTextJapan_ko={Date}의 기성 적력에 대한 전투 액션에 대한 영웅 업적과 의식은 남중국 바다에서 Commander {TaskForceName}로 봉사하면서. 그의 용기와 충성도는 일본 해양 자기 방어력에 대한 훌륭한 신용을 반영하고 해군 서비스의 가장 높은 전통을 강화했습니다.

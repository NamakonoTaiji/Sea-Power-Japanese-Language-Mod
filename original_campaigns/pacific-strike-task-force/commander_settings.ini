CitationText_en=HEROIC ACHIEVEMENT IN ACTION AGAINST ENEMY FORCES IN THE WESTERN PACIFIC FROM 25 JUNE 1985 TO 20 JULY 1985. OPERATING IN THE OPENING PHASE OF HOSTILITIES UNDER CONSTANT THREAT FROM HOSTILE AIR, SURFACE, AND SUBMARINE FORCES, {TaskForceName} DISPLAYED OUTSTANDING COURAGE, SEAMANSHIP, AND COMBAT EFFICIENCY. BY THEIR AGGRESSIVE SPIRIT, STEADFAST DEVOTION TO DUTY, AND LOYAL SERVICE, ITS OFFICERS AND MEN UPHELD THE HIGHEST TRADITIONS OF THE UNITED STATES NAVAL SERVICE.
CitationTextJapan_en=HEROIC ACHIEVEMENT IN ACTION AGAINST ENEMY FORCES IN THE WESTERN PACIFIC FROM 25 JUNE 1985 TO 20 JULY 1985. OPERATING IN THE OPENING PHASE OF HOSTILITIES UNDER CONSTANT THREAT FROM HOSTILE AIR, SURFACE, AND SUBMARINE FORCES, {TaskForceName} DISPLAYED OUTSTANDING COURAGE, SEAMANSHIP, AND COMBAT EFFICIENCY. BY THEIR AGGRESSIVE SPIRIT, STEADFAST DEVOTION TO DUTY, AND LOYAL SERVICE, ITS OFFICERS AND MEN UPHELD THE HIGHEST TRADITIONS OF THE JAPAN MARITIME SELF-DEFENSE FORCE.

CitationText_ru=Героическое достижение в действии против враждебных сил в Западной Пацифике от 25 июня 1985 года до 20 июля 1985 года. Действуя в открывающейся фазе гостеприимства при постоянной угрозе, исходящей от воздушных, воздушных и субмариновых сил, {TaskForceName} нарушил постоянство, мореплавание и комбатную эффективность. Своим агрессивным духом, непродолжительным отношением к гостю и лояльному служению, его должностные лица и люди придерживаются самых высоких традиций навального служения Соединенных Штатов.

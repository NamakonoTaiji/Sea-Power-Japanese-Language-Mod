CitationText_cn=在参加针对菲律宾、菲律宾岛屿上的海军的非洲军事行动时取得的重大成就。 在辅助和辅助作业期间,{CommanderRank} {CommanderName} 分散了外围领导,声控,并严格规定在医院空气、空气和压力下必须服药。 这份业绩贡献材料,为全体官兵的陆续登陆,并获得全体官兵的极大信任.

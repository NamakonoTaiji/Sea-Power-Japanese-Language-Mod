CitationTextJapan_vn=Để phục vụ một cách đáng khâm phục như một chỉ huy liên minh được gắn vào {TaskForceName} trong chiến dịch ở Tây Thái Bình Dương. {CommanderRank} {CommanderLastName}, kĩ năng chiến thuật và sự tận tụy với nhiệm vụ phản ánh uy tín lớn lao của lực lượng phòng thủ Nhật Bản và ủng hộ truyền thống cao nhất của hải quân.
CitationTextAustralia_vn=Để phục vụ một cách đáng khâm phục như một chỉ huy liên minh được gắn vào {TaskForceName} trong chiến dịch ở Tây Thái Bình Dương. {CommanderRank} {CommanderLastName}, kỹ năng chiến thuật và tận tâm với nhiệm vụ phản ánh uy tín lớn lao của Hải quân Hoàng gia Úc và ủng hộ truyền thống cao nhất của hải quân liên minh.

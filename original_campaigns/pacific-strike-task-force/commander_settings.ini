CitationText_cn=在南海担任{TaskForceName}司令时,在{Date}对敌方敌对部队的战斗中取得了英雄的成绩和显赫的英勇表现. 他的勇气和在面对压倒性困难时忠于职守的献身精神符合海军的最高传统,体现了他本人和美国海军的高度功劳。
CitationTextJapan_cn=在南海担任{TaskForceName}司令时,在{Date}对敌方敌对部队的战斗中取得了英雄的成绩和显赫的英勇表现. 他的勇气和忠于职守的献身精神反映了对日本海上自卫队的高度赞扬,并维护了海军服役的最高传统。

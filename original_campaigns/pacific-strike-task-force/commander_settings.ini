CitationText_cn=1985年6月25日至1985年7月20日希腊在西太平洋对海军部队采取行动方面取得的成就。 开放来自医院、空军、空军和海军部队、{TaskForceName}排队、东南舰队和通信效率的热量。 以他们的高级精神, 严格的义务, 和本地服务, 其官员和男人更新 美国海军服务的最高传统。
CitationTextJapan_cn=1985年6月25日至1985年7月20日希腊在西太平洋对海军部队采取行动方面取得的成就。 开放来自医院、空军、空军和海军部队、{TaskForceName}排队、东南舰队和通信效率的热量。 由他们的高级精神, 坚定的DUTY, 和LOYAL服务, 其官员和男士提升 最高的传统 日本海事自卫队。

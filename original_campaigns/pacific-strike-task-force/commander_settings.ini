CitationText_vn=Thành tựu anh hùng và sự dũng cảm rõ rệt trong chiến đấu chống lại lực lượng địch trên {Date} trong khi phục vụ với tư cách là Tư lệnh {TaskForceName} ở biển Nam Trung Quốc. Sự can đảm và lòng trung thành của ông đối mặt với những khó khăn không thể vượt qua được đã giữ vững những truyền thống cao nhất của Hải quân và phản ánh uy tín lớn lao của ông và Dịch vụ Hải quân Hoa Kỳ.
CitationTextJapan_vn=Thành tựu anh hùng và sự dũng cảm rõ rệt trong chiến đấu chống lại lực lượng địch trên {Date} trong khi phục vụ với tư cách là Tư lệnh {TaskForceName} ở biển Nam Trung Quốc. Sự can đảm và lòng trung thành của ông với nhiệm vụ phản ánh sự công nhận vĩ đại của lực lượng phòng thủ Nhật Bản và ủng hộ truyền thống cao nhất của hải quân.
CitationTextAustralia_vn=Thành tựu anh hùng và sự dũng cảm rõ rệt trong chiến đấu chống lại lực lượng địch trên {Date} trong khi phục vụ với tư cách là Tư lệnh {TaskForceName} ở biển Nam Trung Quốc. Lòng can đảm và trung thành với nhiệm vụ của ông cho thấy ông rất coi trọng Hải quân Hoàng gia Úc và ủng hộ truyền thống cao nhất của hải quân.

CitationText_ja={Date}、南シナ海において{TaskForceName}指揮官として任務遂行中、敵対勢力に対する戦闘行動における英雄的行為および顕著な武勲を挙げた。圧倒的な劣勢に直面しながらも示されたその勇気と任務への忠実な献身は、海軍の最高たる伝統にたがわぬものであり、彼自身およびアメリカ海軍に大いなる名誉をもたらした。
CitationTextJapan_ja={Date}、南シナ海において{TaskForceName}に配属された同盟軍指揮官として任務遂行中、敵対勢力に対する戦闘行動における英雄的行為および顕著な武勲を挙げた。その勇気と任務への忠実な献身は、海上自衛隊に大いなる名誉をもたらし、海軍の最高たる伝統を維持するものである。
CitationTextAustralia_ja={Date}、南シナ海において{TaskForceName}に配属された同盟軍指揮官として任務遂行中、敵対勢力に対する戦闘行動における英雄的行為および顕著な武勲を挙げた。その勇気と任務への忠実な献身は、オーストラリア王立海軍に大いなる名誉をもたらし、海軍の最高たる伝統を維持するものである。


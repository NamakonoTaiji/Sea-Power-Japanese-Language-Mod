CitationText_ru=Героические достижения и заметная храбрость в боевых действиях против враждебных сил противника на {Date} во время службы в качестве командира {TaskForceName}. Его мужество и преданность долгу перед лицом непреодолимых трудностей соответствовали высочайшим традициям военно-морского флота и отражали большую заслугу перед ним и Военно-морской службой Соединенных Штатов.
CitationTextJapan_ru=Героические достижения и заметная храбрость в боевых действиях против враждебных сил противника на {Date} во время службы в качестве командира {TaskForceName}. Его мужество и преданность долгу отражали большую честь Морских Сил Самообороны Япония и поддерживали самые высокие традиции военно-морской службы.
CitationTextAustralia_ru=Героические достижения и заметная храбрость в боевых действиях против враждебных сил противника на {Date} во время службы в качестве командира {TaskForceName}. Его мужество и преданность долгу отражали большую честь Королевского австралийского флота и поддерживали самые высокие традиции военно-морской службы.

CitationText_de=Heldenhafte Leistung und auffällige Galanterie im Kampf gegen feindliche feindliche Kräfte auf {Date}, während er als Kommandant {TaskForceName} im Südchinesischen Meer diente. Sein Mut und seine loyale Pflichttreue angesichts überwältigender Widrigkeiten standen im Einklang mit den höchsten Traditionen der Marine und spiegelten große Anerkennung für sich selbst und den United States Naval Service wider.
CitationTextJapan_de=Heldenhafte Leistung und auffällige Galanterie im Kampf gegen feindliche feindliche Kräfte auf {Date}, während er als Kommandant {TaskForceName} im Südchinesischen Meer diente. Sein Mut und seine loyale Hingabe an die Pflicht spiegelten große Anerkennung für die Japan Maritime Self-Defense Force wider und hielten die höchsten Traditionen des Marinedienstes aufrecht.
CitationTextAustralia_de=Heldenhafte Leistung und auffällige Galanterie im Kampf gegen feindliche feindliche Kräfte auf {Date}, während er als Kommandant {TaskForceName} im Südchinesischen Meer diente. Sein Mut und seine loyale Hingabe an die Pflicht spiegelten große Anerkennung für die Royal Australian Navy wider und hielten die höchsten Traditionen des Marinedienstes aufrecht.

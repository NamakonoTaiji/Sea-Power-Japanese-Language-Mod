Taskforce1LandUnit1ShortNameOverride=VOCC
Taskforce1StartMessage=<size=20>Strike Group Molniya: Teil 5</size>\nDER SCHATTEN DER\nENTERPRISE|Wir müssen die indische Hoheitsgewässer erreichen, um zu überleben. Sämtliche alliierten Einheiten im Einsatzraum jagen uns, einschließlich der USS Enterprise und ihrer Trägerkampfgruppe. Laut der Wettervorhersage löst sich das Unwetter in einer Stunde auf. Anschließend ist mit Luftangriffen zu rechnen.\n\nErreichen Sie die indischen Gewässer mit allen verfügbaren Mitteln.\n\nDie Petropavlovsk muss überleben.|Mission starten
StartForecast=Wettervorhersage Raum Malediven: Gewitter und starke Regenschauer enden gegen 0400Z. Seegang abnehmend auf gering bis mäßig, später ruhig, bei leichtem Wind. Anschließend überwiegend bewölkt mit zunehmender Sicht.
Taskforce1PetropavlovskmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! Unser Flaggschiff Petropavlovsk wurde versenkt!|Mission beenden
Taskforce1ReachmarkedareaMessage=AUFTRAG ERFÜLLT|Sieg! Wir haben die indischen Gewässer erreicht und sind erfolgreich unseren Verfolgern entkommen. Die Amerikaner werden es nicht riskieren, dass Indien auf unserer Seite in den Krieg eintritt. Sie werden also die Souveränität Indiens nicht verletzen. Wir können nun Kurs auf Cochin setzen und am indischen Marinestützpunkt festmachen.\n\nUnsere Anwesenheit hier wird weiterhin zahlreiche NATO-Seestreitkräfte an diesen Kriegsschauplatz binden und damit den eigentlichen Zweck unserer Kampagne erfüllen. Der Auftrag der Einsatzgruppe Molniya ist abgeschlossen.\n\n<size=16>Vielen Dank fürs Spielen der Kampagne STRIKE GROUP MOLNIYA! Möchten Sie die Kampagne fortsetzen? Erstellen Sie eigene Missionen und Kampagnen mit dem Sea Power Missionseditor und den Kampagnenwerkzeugen. Wir freuen uns auf die Fortsetzung dieser Geschichte durch die Community!\n\n– Das Team von Triassic Games</size>|Mission beenden
Taskforce1CheckforLogisticsForcetoreduceCVWMessage=MARINEMELDUNG|VON ÜBERWACHUNGSSTATION SOCOTRA\nAN ALLE KRÄFTE, EINSATZGRUPPE MOLNIYA\n\nINFORMATIONSMELDUNG\n\n1. Die Funkaufklärung weist darauf hin, dass die Trägerkampfgruppe USS ENTERPRISE aufgrund des Verlustes von Munitionsversorgungsschiffen mit reduzierter Einsatzfähigkeit operiert.\n\n2. Wir vermuten, dass die Kampfgruppe nunmehr mit etwa 50 % ihrer Kapazität operiert und keine übermäßig großen Luftkampfoperationen mehr durchgeführt werden können.\n\n3. Wir überwachen weiterhin den Funkverkehr und werden warnen, falls ein Luftangriff unmittelbar bevorsteht.|Bestätigen & fortfahren
Taskforce11hrairwingattackwarningMessage=MARINEMELDUNG|VON ÜBERWACHUNGSSTATION SOCOTRA\nAN ALLE KRÄFTE, EINSATZGRUPPE MOLNIYA\n\nWARNMELDUNG\n\n1. Wir haben amerikanische Funkmeldungen abgefangen, die darauf hinweisen, dass die USS ENTERPRISE den Befehl erhalten hat, einen Alpha-Schlag gegen Sie auszuführen.\n\n2. Wir vermuten, dass das Trägerluftgeschwader bis 0415Z vollständig in der Luft ist und auf Ihre Position zuläuft.\n\n3. Die letzte bekannte Position der ENTERPRISE liegt laut dem Überflug von Kosmos-1932 etwa 400 sm westlich von Ihnen. Viel Glück, Genossen.|Bestätigen & fortfahren

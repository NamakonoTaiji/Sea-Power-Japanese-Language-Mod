Taskforce2Vessel12ShortNameOverride=Tariq
Taskforce2Vessel13NameOverride=PNS Tippu Sultan D168
Taskforce1LandUnit1NameOverride=INS Garuda Air Station
Taskforce1LandUnit1ShortNameOverride=VOCC
Taskforce1StartMessage=<size=20>Strike Group Molniya: Part 5</size>\nTHE SHADOW OF\nTHE ENTERPRISE|We must reach neutral Indian waters to survive. Every Allied unit in the area is hunting us, including the USS Enterprise and its airwing. Weather forecast shows this storm lifting in one hour, after which we should expect air attack.\n\nReach Indian territorial waters by any means necessary.\n\nPetropavlovsk must survive.|Start mission
StartForecast=Maldives area forecast: Thunderstorms and heavy rain showers ending by approximately 0400Z. Seas subsiding to slight–moderate becoming calm, with light winds. Skies becoming mostly cloudy thereafter with improving visibility.
Taskforce1PetropavlovskmustsurviveMessage=MISSION FAILED|Defeat! Our flagship Petropavlovsk has been sunk!|Exit mission
Taskforce1ReachmarkedareaMessage=MISSION ACCOMPLISHED|Victory! We have reached Indian territorial waters and successfully escaped. The Americans will not violate Indian neutrality and risk bringing them into the war on our side. We can now set course for Cochin and moor at the Indian Navy fleet base.\n\nOur presence here will continue to fix many NATO naval assets in this theater, achieving our campaign's strategic objective. Strike Group Molniya's mission is complete.\n\n<size=16>Thank you for playing the STRIKE GROUP MOLNIYA campaign! Want to continue expanding the storyline? Create your own missions and campaigns using the Sea Power Mission Editor and campaign tools. We look forward to the community extending this story!\n\n- The Triassic Games team</size>|Exit mission
Taskforce1CheckforLogisticsForcetoreduceCVWMessage=NAVAL MESSAGE|FM SOCOTRA MONITORING STATION\nTO ALL UNITS, STRIKE GROUP MOLNIYA\n\nINFORMATION MESSAGE\n\n1. Radio intercepts indicate USS Enterprise airwing is operating at reduced capacity due to loss of ammunition supply vessels.\n\n2. We estimate airwing is now operating at 50% capacity without light attack squadrons present.\n\n3. We are monitoring radio traffic and will alert if air attack is imminent.|Acknowledge & continue
Taskforce11hrairwingattackwarningMessage=NAVAL MESSAGE|FM SOCOTRA MONITORING STATION\nTO ALL UNITS, STRIKE GROUP MOLNIYA\n\nWARNING MESSAGE\n\n1. We are intercepting American radio communications indicating that USS Enterprise is ordered to launch alpha strike against you.\n\n2. Estimate airwing will be fully airborne inbound towards your position by 0415Z.\n\n3. Enterprise last known position from Kosmos-1932 overflight is approx 400nm west of you. Good luck, Comrades.|Acknowledge & continue
Trigger3Condition_Condition1AreaLabel=Reach Indian territorial waters
Objective_ReachMarkedArea=Reach the 100nm exclusion zone off Cochin
Objective_PetropavlovskMustSurvive=Petropavlovsk must survive
[Language_cn]
Name=Part 5 - The Shadow of the Enterprise
[Language_ru]
Name=Part 5 - The Shadow of the Enterprise
[Language_de]
Name=Teil 5 - Der Schatten der Enterprise
Description=Die USS Enterprise und ihre Trägerkampfgruppe wurden beauftragt, die Einsatzgruppe Molniya zu suchen und zu vernichten. Nach dem Verlust ihrer Logistikeinheiten westlich von Diego Garcia konzentriert die NATO nun alle verfügbaren Kräfte, um Sie abzufangen. Das Kommando hat von Indien die Zusage erhalten, die Einsatzgruppe Molniya in einem erklärten Sperrgebiet in Cochin aufnehmen zu wollen. Erreichen Sie Cochin mit allen erforderlichen Mitteln.

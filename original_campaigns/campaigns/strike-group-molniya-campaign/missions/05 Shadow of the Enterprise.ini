[Language_en]
Name=Part 5 - The Shadow of the Enterprise
Description=USS Enterprise and her carrier group have been assigned to locate and destroy Strike Group Molniya. Following the loss of their logistics vessels west of Diego Garcia, NATO is concentrating available forces to intercept you. Command has secured agreement from India to shelter the strike group at Cochin under a declared exclusion zone. Reach Cochin by any means necessary.

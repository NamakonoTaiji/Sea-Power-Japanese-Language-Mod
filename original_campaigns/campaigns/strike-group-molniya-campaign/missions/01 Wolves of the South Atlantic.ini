
[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=Part 1 - Wolves of the South Atlantic
Description=Hostilities are underway across Europe, and Strike Group Molniya has been ordered to begin interdiction operations against Allied shipping in the South Atlantic. Command the raider force to locate and destroy the NATO supply vessels in the South Atlantic destined for Cape Town.
Taskforce1StartMessage=<size=16>Strike Group Molniya: Part 1</size>\nWOLVES OF THE\nSOUTH ATLANTIC|A flash directive has just come in: the world is once again at war!\n\nStrike Group Molniya is now uniquely placed to disrupt NATO commerce and draw away critical resources from the fighting in Europe and the Pacific. Your orders are to find and destroy four American supply ships sailing to Cape Town.\n\nThese ships are U.S.-flagged and carrying war materiel destined for their base at Diego Garcia. Use the assets at your disposal to locate and sink them. Some American escorts are expected to be present!\n\nPetropavlovsk must survive.|Start mission
Taskforce1PetropavlovskmustsurviveMessage=MISSION FAILED|Defeat! Our flagship Petropavlovsk has been sunk!|Exit mission
Taskforce1DestroymerchantsMessage=MISSION ACCOMPLISHED|Victory! The NATO merchants have been sunk, denying critical resources to their bases in the Indian Ocean. We have now opened another front in the war against NATO and they will be forced to spend resources in a previously uncontested region.\n\nExcellent work, Commander!\n\n<size=16>All crews have gained a proficiency level: <color=DarkOrange>Seasoned</color></size>|Exit mission
Taskforce1PersistencewarningMessage=MISSION UPDATE|Commander, please note that this campaign uses persistence mechanics. Unit losses, damage, and ammunition expenditure will carry forward between missions until you reach a resupply point.\n\nYour orders involve long-duration commerce raiding far from home waters. Plan engagements carefully, conserve your missiles where possible, and protect your limited air wing assets.\n\nResupply will be available at a later point in the campaign. Good luck, Comrade!|Acknowledge & continue
Objective_DestroyMerchants=Locate and sink the four NATO merchant ships
Objective_PetropavlovskShipsSurvive=Petropavlovsk must survive
[Language_cn]
Name=Part 1 - Wolves of the South Atlantic
[Language_ru]
Name=Часть 1 - Волки Южной Атлантики
Taskforce1StartMessage=<size=16>Ударная группа «Молния»: Часть 1</size>\nВОЛКИ\nЮЖНОЙ АТЛАНТИКИ|Получено срочное сообщение: мир снова в состоянии войны!\n\nКУГ «Молния» занимает удобную позицию для нанесения удара по коммуникациям НАТО и может заставить противника отвлечь критически важные ресурсы от боевых действий в Европе и на Тихом океане. Ваш приказ — найти и потопить четыре американских судна снабжения, направляющихся в Кейптаун.\n\nЭти суда идут под флагом США и перевозят военную технику, предназначенную для их базы на Диего-Гарсии. Используйте имеющиеся в вашем распоряжении средства, чтобы найти и потопить их. Ожидается присутствие нескольких американских кораблей сопровождения!\n\nБПК «Петропавловск» должен выжить.|Начать миссию
Taskforce1PetropavlovskmustsurviveMessage=МИССИЯ ПРОВАЛЕНА|Поражение! Флагман БПК «Петропавловск» был потоплен!|Покинуть миссию
Taskforce1DestroymerchantsMessage=МИССИЯ ВЫПОЛНЕНА|Победа! Транспорты НАТО потоплены, что лишит их баз в Индийском океане жизненно важных ресурсов. Теперь мы открыли еще один фронт в войне против НАТО, и им придется тратить ресурсы в ранее неоспоримом регионе.\n\nОтличная работа, командир!\n\nВсе экипажи достигли уровня квалификации: <color=DarkOrange>Опытные</color></size>|Выход
Taskforce1PersistencewarningMessage=<color=DarkOrange>ВАЖНО:</color>| Обратите внимание, что в этой кампании используется механика сохранения данных. Потери подразделений, повреждения и расход боеприпасов будут переноситься между миссиями до тех пор, пока вы не достигнете точки пополнения запасов.\n\n Ваши приказы включают в себя длительные рейды на торговые суда вдали от родных вод. Тщательно планируйте бои, экономьте ракеты, где это возможно, и грамотно используйте ограниченные ресурсы вашего авиационного крыла.\n\nПополнение запасов будет доступно позже, в одной из миссий кампании. Удачи, товарищ!| Вас понял
Objective_DestroyMerchants=Найти и потопить 4 транспорта НАТО
Objective_PetropavlovskShipsSurvive=БПК «Петропавловск» должет выжить
[Language_de]
Name=Teil 1 - Wölfe des Südatlantik
Description=In ganz Europa laufen Kampfhandlungen und die Einsatzgruppe Molniya wurde angewiesen, Störaktionen gegen die alliierte Schifffahrt im Südatlantik aufzunehmen. Übernehmen Sie das Kommando über den Einsatzverband, suchen und zerstören Sie die NATO-Versorgungsschiffe im Südatlantik mit Zielhafen Kapstadt.
Taskforce1StartMessage=<size=16>Strike Group Molniya: Teil 1</size>\nWÖLFE DES\nSÜDATLANTIK|Soeben ist eine Blitznachricht eingegangen: Die Welt befindet sich erneut im Krieg!\n\nDie Einsatzgruppe Molniya ist nun in der vorteilhaften Lage, die NATO-Handelswege empfindlich zu stören und kritische Ressourcen von den Kämpfen in Europa und im Pazifik abzuhalten. Ihr Auftrag lautet, vier amerikanische Versorgungsschiffe auf dem Weg nach Kapstadt aufzuklären und zu vernichten.\n\nDiese Schiffe fahren unter US-Flagge und transportieren Kriegsmaterial für den Stützpunkt Diego Garcia. Nutzen Sie die Ihnen zur Verfügung stehenden Mittel, um sie aufzuspüren und zu versenken. Es ist mit amerikanischem Geleitschutz zu rechnen!\n\nDie Petropavlovsk muss überleben.|Mission starten
Taskforce1PetropavlovskmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! Unser Flaggschiff Petropavlovsk wurde versenkt!|Mission beenden
Taskforce1DestroymerchantsMessage=AUFTRAG ERFÜLLT|Sieg! Die NATO-Handelsschiffe wurden versenkt, wodurch ihren Stützpunkten im Indischen Ozean nun wichtige Ressourcen fehlen. Wir haben nun eine weitere Front im Krieg gegen die NATO eröffnet und der Gegner wird gezwungen sein, Kräfte in einer bislang nicht umkämpften Region zu binden.\n\nHervorragende Leistung, Kommandant!\n\n<size=16>Alle Besatzungen haben an Erfahrung gewonnen: <color=DarkOrange>Erfahren</color></size>|Mission beenden
Objective_DestroyMerchants=Die vier NATO-Handelsschiffe aufklären und versenken
Objective_PetropavlovskShipsSurvive=Die Petropavlovsk muss überleben

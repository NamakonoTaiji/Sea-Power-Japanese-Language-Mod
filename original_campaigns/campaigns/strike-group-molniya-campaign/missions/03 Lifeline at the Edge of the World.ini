
[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=Part 3 - Lifeline at the Edge of the World
Description=Following the Mauritius operation, Strike Group Molniya must rendezvous with its attached support group at the uninhabited Crozet Islands in the far south. Radio intercepts indicate NATO may be aware of our intentions. Reach the anchorage, and defend our resupply ships at all costs.
Taskforce1Vessel6NameOverride=M/V Chelyabinsk
Taskforce1Vessel6ShortNameOverride=M/V Chelyabinsk
Trigger4Condition_Condition1AreaLabel=American submarine search area
Taskforce1StartMessage=<size=20>Strike Group Molniya: Part 3</size>\nLIFELINE AT THE\nEDGE OF THE WORLD|After the Mauritius operation, Strike Group Molniya is critically low on fuel and ammunition. Our covert resupply force has reached the rendezvous at the remote Crozet Islands, but intercepts indicate NATO is aware of their presence and preparing an attack.\n\nSouth African diesel subs are assessed in the area. The American destroyer group encountered off Mauritius may also be nearby. Reconnaissance ship Ampermetr is under our control, and will relay any radio intercepts or sightings.\n\nReach the anchorage and defend the resupply force at all costs. Note: our resupply force is ready for steaming. We can order them to leave the anchorage if desired, or leave them in place.\n\nPetropavlovsk and at least two cargo vessels must survive.|Start mission
Taskforce1StartIntel=2 x South African DAPHNE class diesel submarines are assessed in the area. The American destroyer group encountered off Mauritius may also be nearby.
StartForecast=Crozet Islands area: increasing winds becoming force 6 by mid-afternoon, sea state rising to 5. Thunderstorm activity developing from 1430 local, with heavy showers, gusty winds, and reduced visibility.
Taskforce1PetropavlovskmustsurviveMessage=MISSION FAILED|Defeat! Our flagship Petropavlovsk has been sunk!|Exit mission
Taskforce1NEsubperiscopereportMessage=RADIO MESSAGE|Petropavlovsk, this is Ampermetr.\n\nWe have sighted a periscope! Sending the position to you now. Please assist.\n\nAmpermetr out.|Acknowledge & continue
Taskforce1SkipjackintelreportMessage=RADIO MESSAGE|Petropavlovsk, this is Ampermetr.\n\nOur monitoring station at Socotra has passed warning of American fast attack submarine approaching our anchorage from the southeast. We have passed you the approximate searching area.\n\nAmpermetr out.|Acknowledge & continue
Taskforce1SkipjackintelreportIntel=WARNING: American submarine approaching from the southeast. The search area is marked on the map.
Taskforce1TG74.4detectIntel=Radio intercepts indicate American surface action group is operating to the east of the Crozet Islands
Taskforce1TG74.4intelreportMessage=RADIO MESSAGE|Petropavlovsk, this is Ampermetr.\n\nWe have intercepted ship-to-helicopter VHF radio calls from from the east. This may be the American task group we encountered off Mauritius. Enemy composition is not known. We will pass all further contacts to you immediately.\n\nAmpermetr out.|Acknowledge & continue
Taskforce1TG74.4intelreportIntel=WARNING: American Surface Action Group approaching from the east.
Taskforce1NoredshipsorsubsremainingplayervictoryMessage=MISSION ACCOMPLISHED|Victory! All enemy opposition in the area has been eliminated, allowing our force to prep for resupply before continuing further offensive operations in the north.\n\nGood work, Commander!\n\n<size=16>All ships will be refuelled, resupplied, and rearmed. All airwing units have been restored to full capacity with spare parts and new aircraft.\n\nAll crews have gained a proficiency level: <color=Green>Veterans</color></size>
Taskforce1CargoshipssunkMessage=MISSION FAILED|Defeat! You have lost the majority of your resupply ships, and we are now forced to surrender due to lack of fuel and ammunition.|Exit mission
Objective_DefendSupplyShips=Defend the resupply unit
Objective_DestroySSKs=Destroy the two South African diesel submarines
Objective_PetropavlovskMustSurvive=Petropavlovsk must survive
Objective_DestroyUSSAG=Destroy the American Surface Action Group
Objective_DestroyUSSSN=Destroy the American attack submarine
[Language_cn]
Name=Part 3 - Lifeline at the Edge of the World
[Language_ru]
Name=Часть 3 - Нить жизни на краю света
Description=После операции на Маврикии ударная группа «Молния» должна встретиться с группой поддержки возле необитаемых островов Крозе, далеко на юге. Перехваты сообщений противника указывают на то, что НАТО, скорее всего, осведомлено о наших намерениях. Достигните якорной стоянки и любой ценой защищайте наши суда снабжения.
Taskforce1Vessel6NameOverride=Челябинск
Taskforce1Vessel6ShortNameOverride=Челябинск
Trigger4Condition_Condition1AreaLabel=Зона поиска американской АПЛ
Taskforce1StartMessage=<size=20>Ударная группа «Молния»: Часть 3</size>\nНИТЬ ЖИЗНИ\nНА КРАЮ СВЕТА|После операции на Маврикии ударной группе «Молния» необходимо пополнить запасы топлива и боекомплект. Наши силы снабжения достигли места встречи на отдаленных островах Крозе, но перехваты радиосообщений указывают на то, что НАТО осведомлено об их присутствии и готовится к атаке.\n\nВ районе находятся 2 дизельные подводные лодки ЮАР. Американская корабельная группа, обнаруженная у берегов Маврикия, также может находиться поблизости. Разведывательный корабль «Амперметр» находится под нашим контролем и будет передавать любые радиоперехваты или сообщения о наблюдениях.\n\nДостигните якорной стоянки и любой ценой защитите силы снабжения. Примечание: транспорты снабжения готовы к выходу в море. При желании мы можем приказать им покинуть якорную стоянку или оставить их на месте.\n\n«Петропавловск» и как минимум 2 грузовых судна должны выжить.|Начало миссии
Taskforce1StartIntel=В районе находятся 2 дизельные подводные лодки ЮАР. Американская корабельная группа, обнаруженная у берегов Маврикия, также может находиться поблизости.
StartForecast=В районе островов Крозе: усиление ветра, к середине дня достигнет 6 баллов по шкале Бофорта, волнение моря — 5 баллов. С 14:30 по местному времени ожидается гроза с сильными ливнями, порывистым ветром и плохой видимостью.
Taskforce1PetropavlovskmustsurviveMessage=МИССИЯ ПРОВАЛЕНА|Поражение! Флагман БПК «Петропавловск» был потоплен!|Покинуть миссию
Taskforce1NEsubperiscopereportMessage=РАДИОСООБЩЕНИЕ|«Петропавловск», это «Амперметр».\n\nНами замечен перископ! Передаю вам координаты. Просим оказать помощь.\n\n«Амперметр», конец связи.|Вас понял
Taskforce1SkipjackintelreportMessage=РАДИОСООБЩЕНИЕ|«Петропавловск», это «Амперметр».\n\nНаша станция наблюдения на Сокотре передала предупреждение о приближении американской АПЛ к нашей якорной стоянке с юго-востока. Мы обозначили приблизительный район поиска.\n\n«Амперметр», конец связи.|Вас понял
Taskforce1SkipjackintelreportIntel=ВНИМАНИЕ: Американская АПЛ приближается с юго-востока. Зона поиска обозначена на карте.
Taskforce1TG74.4detectIntel=Радиоперехваты указывают на то, что американская корабельная группа действует к востоку от островов Крозе.
Taskforce1TG74.4intelreportMessage=РАДИОСООБЩЕНИЕ|«Петропавловск», это «Амперметр».\n\nМы перехватили радиопереговоры между кораблем и вертолетом по УКВ-диапазону с востока. Возможно, это американская оперативная группа, с которой мы столкнулись у берегов Маврикия. Состав противника неизвестен. Мы немедленно передадим вам всю дальнейшую информацию.\n\n«Амперметр», конец связи.|Вас понял
Taskforce1TG74.4intelreportIntel=ВНИМАНИЕ: Американская корабельная группа приближается с востока.
Taskforce1NoredshipsorsubsremainingplayervictoryMessage=МИССИЯ ВЫПОЛНЕНА|Победа! Все вражеские силы в этом районе ликвидированы, что позволяет нашим силам приступить к пополнению запасов перед продолжением дальнейших операций на севере.\n\nОтличная работа, командир!\n\nВсе корабли заправлены топливом, боекомплект и припасы пополнены. Численность авиагруппы восстановлена.\n\nВсе экипажи достигли уровня квалификации: <color=Green>Ветераны</color></size>
Taskforce1CargoshipssunkMessage=МИССИЯ ПРОВАЛЕНА|Поражение! Вы потеряли большую часть кораблей снабжения. Без пополнения топлива и боеприпасов дальнейшие действия КУГ «Молния» невозможны.|Выход из миссии
Objective_DefendSupplyShips=Защитить суда снабжения
Objective_DestroySSKs=Уничтожить 2 ДПЛ ЮАР
Objective_PetropavlovskMustSurvive=«Петропавловск» должен выжить
Objective_DestroyUSSAG=Уничтожить американскую корабельную группу
Objective_DestroyUSSSN=Уничтожить американскую АПЛ
[Language_de]
Name=Teil 3 - Lebensader am Rande der Welt
Description=Nach der Operation bei Mauritius muss sich die Einsatzgruppe Molniya mit einer Versorgungsgruppe bei den unbewohnten Crozetinseln im Süden treffen. Die Funkaufklärung deutet darauf hin, dass die NATO Ihre Absichten erkannt haben könnte. Erreichen Sie den Ankerplatz und verteidigen Sie unsere Versorgungsschiffe um jeden Preis.
Taskforce1Vessel6NameOverride=M/V Chelyabinsk
Taskforce1Vessel6ShortNameOverride=M/V Chelyabinsk
Taskforce1StartMessage=<size=20>Strike Group Molniya: Teil 3</size>\nLEBENSADER AM\nRANDE DER WELT|Nach der Operation bei Mauritius hat die Einsatzgruppe Molniya kaum noch Treibstoff und Munition. Eine unserer Versorgungsgruppen hat den Treffpunkt bei den abgelegenen Crozetinseln erreicht, jedoch deuten abgefangene Funkmeldungen darauf hin, dass die NATO von deren Anwesenheit weiß und einen Angriff vorbereitet.\n\nSüdafrikanische Diesel-U-Boote werden im Einsatzraum vermutet. Die vor Mauritius angetroffene amerikanische Zerstörergruppe könnte sich ebenfalls in der Nähe befinden. Das Aufklärungsschiff Ampermetr steht unter unserer Kontrolle und wird sämtliche Funk- oder Sichtmeldungen weiterleiten.\n\nErreichen Sie den Ankerplatz und verteidigen Sie die Versorgungsgruppe um jeden Preis.\n\nDie Petropavlovsk muss überleben.|Mission starten
Taskforce1StartIntel=2 × südafrikanische Diesel-U-Boote der DAPHNE-Klasse werden im Einsatzraum vermutet. Die vor Mauritius angetroffene amerikanische Zerstörergruppe könnte sich ebenfalls in der Nähe befinden.
StartForecast=Gebiet Crozetinseln: Zunehmender Wind, Nachmittags mit Stärke 6, Seegang ansteigend auf Stufe 5. Gewittertätigkeit entwickelt sich ab 1430 Ortszeit mit starken Schauern, böigem Wind und eingeschränkter Sicht.
Taskforce1PetropavlovskmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! Unser Flaggschiff Petropavlovsk wurde versenkt!|Mission beenden
Taskforce1NEsubperiscopereportMessage=FUNKMELDUNG|Petropavlovsk, hier Ampermetr.\n\nWir haben ein Periskop gesichtet! Übermitteln Ihnen die Position jetzt. Bitte unterstützen.\n\nAmpermetr Ende.|Bestätigen & fortfahren
Taskforce1SkipjackintelreportMessage=FUNKMELDUNG|Petropavlovsk, hier Ampermetr.\n\nUnsere Überwachungsstation auf Socotra hat eine Warnung vor einem amerikanischen Jagd-U-Boot mit hoher Fahrt übermittelt, das sich unserem Ankerplatz aus südöstlicher Richtung nähert. Wir haben Ihnen den ungefähren Suchraum weitergegeben.\n\nAmpermetr Ende.|Bestätigen & fortfahren
Taskforce1SkipjackintelreportIntel=WARNUNG: Amerikanisches U-Boot nähert sich aus südöstlicher Richtung. Der Suchraum ist auf der Karte markiert.
Taskforce1TG74.4detectIntel=Die Funkaufklärung weist darauf hin, dass eine amerikanische Einsatzgruppe östlich der Crozetinseln operiert.
Taskforce1TG74.4intelreportMessage=FUNKMELDUNG|Petropavlovsk, hier Ampermetr.\n\nWir haben VHF-Funksprüche von Hubschrauber zu Schiff aus östlicher Richtung aufgefasst. Dies könnte die amerikanische Einsatzgruppe sein, der wir vor Mauritius begegnet sind. Feindzusammensetzung ist unbekannt. Weitere Kontakte werden umgehend gemeldet.\n\nAmpermetr Ende.|Bestätigen & fortfahren
Taskforce1TG74.4intelreportIntel=WARNUNG: Amerikanische Einsatzgruppe nähert sich aus östlicher Richtung.
Taskforce1NoredshipsorsubsremainingplayervictoryMessage=AUFTRAG ERFÜLLT|Sieg! Sämtlicher feindlicher Widerstand im Einsatzraum wurde ausgeschaltet, somit können unsere Kräfte die Versorgung vorbereiten, bevor weitere Offensivoperationen im Norden durchgeführt werden.\n\nGute Arbeit, Kommandant!\n\n<size=16>Alle Schiffe werden betankt, nachversorgt und wiederbewaffnet. Ersatzteile für 2 × Yak-38 sowie 1 × Ka-25PL wurden ebenfalls geliefert.\n\nAlle Besatzungen haben an Erfahrung gewonnen: <color=Green>Veteran</color></size>
Taskforce1CargoshipssunkMessage=MISSION FEHLGESCHLAGEN|Niederlage! Sie haben den Großteil Ihrer Versorgungsschiffe verloren. Nun sind wir nun aufgrund fehlenden Treibstoffs und Munitionsmangels zur Kapitulation gezwungen.|Mission beenden
Trigger4Condition_Condition1AreaLabel=Suchraum amerikanisches U-Boot

[Language_ja]
Name=第4部：チャゴス・ギャンビット
Description=艦隊諜報によれば、高速戦闘支援艦USSカムデンは補給のため一時的に空母エンタープライズ戦闘群から離脱し、戦闘兵站部隊のシャトル船と合流する。打撃群「モルニヤ」に対し、この好機を捉えて兵站艦を撃破せよとの命令が下った。
Taskforce2LandUnit1NameOverride=ディエゴガルシア海軍支援施設（NSF）
Taskforce2LandUnit1ShortNameOverride=FJDG
Taskforce1StartMessage=<size=20>打撃群「モルニヤ」：第4部</size>\nチャゴス・\nギャンビット|諜報によれば、アメリカ軍は補給のため高速戦闘支援艦USSカムデンを空母エンタープライズ戦闘群から分離させた。これは当該海域の空母打撃力を削ぐための、またとない好機である。\n\nUSSカムデンを捜索・識別し、あらゆる手段を講じてこれを撃破せよ。\n\nディエゴガルシアからの米軍機が脅威となる可能性があり、またUSSカムデンには水上部隊の護衛が随伴していると思われる。\n\nペトロパブロフスクの生存が絶対条件である。|作戦開始
StartForecast=ディエゴガルシア周辺：概ね曇りまたは本曇り。断続的な弱雨と靄。南東の風10–15ノット、所により突風を伴う。
Taskforce1PetropavlovskmustsurviveMessage=作戦失敗|敗北！ 我が旗艦ペトロパブロフスクが撃沈された！|作戦終了
Taskforce1CamdendestroyedobjectiveMessage=海軍通信|発：第8運用艦隊司令官\n宛：打撃群「モルニヤ」指揮官\n\n1. 無線傍受によれば、USSカムデンは炎上・沈没中である。敵勢力は総員退艦を開始し、ディエゴガルシアに救助を要請している。\n\n2. ディエゴガルシアの米軍部隊は、空母エンタープライズ戦闘群へ合流すべく北西へ移動中と推定される。\n\n3. 引き続き敵の通信を傍受し、情報を伝達する。\n\n---\n\n<size=16>主目的が達成された。直ちにミッションを終了して離脱するか、あるいは敵勢力への攻撃を継続せよ。本ミッション終了後、我が部隊への補給は不可能である！</size>\n|了解して継続
Taskforce1DestroysupplyshipsobjectiveMessage=海軍通信|発：第8運用艦隊司令官\n宛：打撃群「モルニヤ」指揮官\n\n1. 無線傍受によれば、アメリカ軍の兵站シャトル部隊は全滅した。\n\n2. USSカムデンは現在、空母エンタープライズ戦闘群と合流すべく最大速力で北上中である。\n\n3. 引き続き敵の通信を傍受し、情報を伝達する。|了解して継続
Taskforce1DestroyCamdenandsupplyshipsMessage=作戦完了|勝利！ アメリカ軍の兵站ユニットはすべて撃滅された。これにより、インドへ北上する我々に対する空母エンタープライズ航空団の作戦遂行能力は著しく低下するだろう。見事な手際だ、指揮官！\n\n<size=16>全艦の習熟度が向上：<color=Magenta>究極（Ultra）</color></size>|作戦終了
Taskforce11hrRORSATintelMessage=海軍通信|発：第8運用艦隊司令官\n宛：打撃群「モルニヤ」指揮官\n\n1. 偵察衛星コスモス1932が、0359Zに貴官の作戦海域上空を通過した。\n\n2. 画像および電磁波解析により、USSカムデンを捕捉・識別した。\n\n3. 統合された目標データを貴部隊へ転送した。同志諸君、健闘を祈る。|了解して継続
Objective_DestroyCamden=USSカムデンを撃破せよ
Objective_DestroySupplyShips=任意：アメリカ軍の兵站シャトル船を撃破せよ

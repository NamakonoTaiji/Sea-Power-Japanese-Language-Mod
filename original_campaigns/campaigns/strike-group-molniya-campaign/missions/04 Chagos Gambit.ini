
[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=Part 4 - The Chagos Gambit
Description=Fleet intelligence reports that the fast combat support ship USS Camden will temporarily detach from the Enterprise CVBG to rendezvous with Combat Logistics Force shuttle ships for replenishment. Strike Group Molniya has been ordered to destroy the logistics vessel during this window of opportunity.
Taskforce2LandUnit1NameOverride=NSF Diego Garcia
Taskforce2LandUnit1ShortNameOverride=FJDG
Taskforce1StartMessage=<size=20>Strike Group Molniya: Part 4</size>\nTHE CHAGOS GAMBIT|Intelligence reports that the Americans have detached their fast combat support ship USS Camden from the Enterprise carrier group for resupply. This is a rare window of opportunity for us to strike a blow against their carrier forces in the area.\n\nLocate and identify USS Camden, then destroy it by any means necessary.\n\nU.S. air out of Diego Garcia may be a factor, and USS Camden is likely escorted by surface units.\n\nPetropavlovsk must survive.|Start mission
StartForecast=Diego Garcia area: Mostly cloudy to overcast with intermittent light rain and haze. Southeast winds 10–15 knots with occasional higher gusts
Taskforce1PetropavlovskmustsurviveMessage=MISSION FAILED|Defeat! Our flagship Petropavlovsk has been sunk!|Exit mission
Taskforce1CamdendestroyedobjectiveMessage=NAVAL MESSAGE|FM CMDR, 8TH OPERATIONAL SQUADRON\nTO CMDR, STRIKE GROUP MOLNIYA\n\n1. Radio intercepts show USS CAMDEN is burning and sinking. Enemy forces are abandoning ship and requesting rescue from Diego Garcia.\n\n2. We assess that American forces from Diego Garcia are routing northwest to directly join Enterprise group.\n\n3. We will continue to monitor enemy communications and report all intercepts.\n\n---\n\n<size=16>Our primary objective has been completed. You may choose to disengage at this time by exiting the mission, or continue to attack enemy forces. Resupply is not available to our forces after this mission!</size>\n|Acknowledge & continue
Taskforce1DestroysupplyshipsobjectiveMessage=NAVAL MESSAGE|FM CMDR, 8TH OPERATIONAL SQUADRON\nTO CMDR, STRIKE GROUP MOLNIYA\n\n1. Radio intercepts indicate the American logistics shuttle force has been destroyed.\n\n2. USS Camden is now rerouting north at high speed to rejoin the Enterprise carrier group.\n\n3. We will continue to monitor enemy communications and report all intercepts.|Acknowledge & continue
Taskforce1DestroyCamdenandsupplyshipsMessage=MISSION ACCOMPLISHED|Victory! All of the American logistics units have now been destroyed. This will significantly affect the capability of the Enterprise airwing to conduct operations against us as we move north towards India. Excellent work, Commander!\n\n<size=16>All ships have gained a proficiency level: <color=Magenta>Ultra</color></size>|Exit mission
Taskforce11hrRORSATintelMessage=NAVAL MESSAGE|FM CMDR, 8TH OPERATIONAL SQUADRON\nTO CMDR, STRIKE GROUP MOLNIYA\n\n1. Reconnaissance satellite Kosmos-1932 has overflown your operational area at 0359Z.\n\n2. USS CAMDEN has been positively identified via imaging and emissions.\n\n3. Synthesized targeting data has been passed to your force. Good luck, Comrades.|Acknowledge & continue
Objective_DestroyCamden=Destroy the USS Camden
Objective_DestroySupplyShips=OPTIONAL: Destroy the American logistics shuttle ships
Objective_PetropavlovskMustSurvive=Petropavlovsk must survive
[Language_cn]
Name=04查戈斯群岛的博弈
Description=舰队情报显示卡姆登号快速战斗支援舰号将暂时脱离企业号航母战斗群，与战斗后勤部队的运载船会合以进行补给。闪电打击群已收到命令抓住机会摧毁此后勤舰。
Taskforce2LandUnit1NameOverride=迪戈加西亚岛海军支援设施
Taskforce2LandUnit1ShortNameOverride=迪戈加西亚岛机场
Taskforce1StartMessage=<size=20>闪电打击群：第4部分</size>\n查戈斯群岛的博弈|情报显示美军已经让卡姆登号脱离企业号航母战斗群以进行补给。这是我们打击此区域内美军航母舰队的难得机会。\n\n找到并识别卡姆登号，使用一切必要手段将其摧毁。\n\n注意来自迪戈加西亚岛的美国飞机，此外，卡姆登号很可能有水面单位护航。\n\n彼得罗巴甫洛夫斯克号不能被击沉。|开始任务
StartForecast=迪戈加西亚岛区域：多云到阴，间歇性小雨和薄雾。东南风10-15节，偶尔有更强阵风。
Taskforce1PetropavlovskmustsurviveMessage=任务失败！|任务失败！我方旗舰彼得罗巴甫洛夫斯克号已被击沉！|退出任务
Taskforce1CamdendestroyedobjectiveMessage=海军消息|发件：第8作战分舰队司令\n收件：闪电打击群指挥官\n\n1.截获无线电显示卡姆登号正在燃烧下沉。敌军正在弃舰并请求迪戈加西亚岛救援。\n\n2.我们评估认为来自迪戈加西亚岛的美军正向西北方航行，直接加入企业号战斗群。\n\n3.我们将继续监测敌方通信并报告所有截获信息。\n\n---\n\n<size=16>我方主要目标已完成。你可以选择此时退出任务，或继续攻击敌军。此任务结束后我方部队将无法获得补给！</size>\n|收到并继续
Taskforce1DestroysupplyshipsobjectiveMessage=海军消息|发件：第8作战分舰队司令\n收件：闪电打击群指挥官\n\n1.截获无线电显示美国后勤运载船已被摧毁。\n\n2.卡姆登号正在高速北上，重新加入企业号航母战斗群。\n\n3.我们将继续监测敌方通信并报告所有截获信息。|收到并继续
Taskforce1DestroyCamdenandsupplyshipsMessage=任务完成！|任务完成！所有美军后勤单位已被摧毁。这将严重影响企业号的航空联队在我们北上印度途中对我们发动攻击的能力。干得好，指挥官！\n\n<size=16>所有船员达到了新的专业水准：<color=Magenta>顶尖</color></size>|退出任务
Taskforce11hrRORSATintelMessage=海军消息|发件：第8作战分舰队司令\n收件：闪电打击群指挥官\n\n1.宇宙1932号侦察卫星已于0359Z时飞越你的行动区域。\n\n2.我们已通过图像和辐射识别卡姆登号。\n\n3.综合瞄准数据已传递给你的部队。祝你们好运，同志们。|收到并继续
Objective_DestroyCamden=摧毁卡姆登号
Objective_DestroySupplyShips=可选：摧毁美国后勤运载船
Objective_PetropavlovskMustSurvive=彼得罗巴甫洛夫斯克号不能被击沉
[Language_ru]
Name=Часть 4 - Гамбит Чагоса
Description=Разведка флота сообщает, что быстроходный корабль боевого обеспечения USS «Кэмден» временно отделится от авианосной ударной группы «Энтерпрайз» для встречи с челночными кораблями СБС (Сил Боевого Снабжения ВМС США) с целью пополнения запасов. Ударной группе «Молния» приказано уничтожить судно снабжения в течение этого благоприятного периода.
Taskforce2LandUnit1NameOverride=NSF Диего Гарсия
Taskforce2LandUnit1ShortNameOverride=FJDG
Taskforce1StartMessage=<size=20>Ударная группа «Молния»: Часть 4</size>\nГАМБИТ ЧАГОСА|Разведка флота сообщает, что американцы отделили корабль боевого обеспечения USS «Кэмден» от авианосной группы «Энтерпрайз» для пополнения запасов. Это создаёт благоприятную возможность для нанесения существенного урона данной АУГ, не вступая с ней в бой. \n\nВам приказано обнаружить и идентифицировать USS «Кэмден», а затем потопить его.\n\nUSS «Кэмден» наверняка будут сопровождать корабли охранения. Также возможно присутствие самолётов с базы Диего-Гарсия.\n\nБПК «Петропавловск» должен выжить.|Начать миссию
StartForecast=Район Диего-Гарсия: Преимущественно облачно, местами пасмурно, ожидается небольшой дождь и туман. Юго-восточный ветер 10–15 узлов с редкими более сильными порывами.
Taskforce1PetropavlovskmustsurviveMessage=МИССИЯ ПРОВАЛЕНА|Поражение! Флагман БПК «Петропавловск» был потоплен!|Покинуть миссию
Taskforce1CamdendestroyedobjectiveMessage=ВХОДЯЩЕЕ СООБЩЕНИЕ|ОТ: КОМ. 8Й ОПЕРАТИВНОЙ ЭСКАДРОЙ\nКОМУ: КОМАНДИРУ УДАРНОЙ ГРУППЫ «МОЛНИЯ»\n\n1. Радиоперехват сообщения с «Кэмдена» указывает что он горит и тонет. Экипаж покидают корабль и запрашивает помощь с Диего-Гарсии.\n\n2. Мы предполагаем, что американские силы с Диего-Гарсии движутся на северо-запад, на соединение с группой «Энтерпрайз».\n\n3. Мы продолжим отслеживать вражеские переговоры и сообщать обо всех перехваченных сообщениях.\n\n---\n\n<size=16>Наша основная задача выполнена. Вы можете выйти из миссии или продолжить атаку вражеских сил. Имейте ввиду что вы больше не сможете пополнить боекомплект!</size>\n|Вас понял
Taskforce1DestroysupplyshipsobjectiveMessage=ВХОДЯЩЕЕ СООБЩЕНИЕ|ОТ: КОМ. 8Й ОПЕРАТИВНОЙ ЭСКАДРОЙ\nКОМУ: КОМАНДИРУ УДАРНОЙ ГРУППЫ «МОЛНИЯ»\n\n1. Перехваченные радиоданные указывают на уничтожение американских челночных кораблей.\n\n2. USS «Кэмден» на высокой скорости отходит на север, чтобы присоединиться к авианосной группе «Энтерпрайз».\n\n3. Мы продолжим отслеживать сообщения противника и сообщать обо всех перехваченных данных.|Вас понял
Taskforce1DestroyCamdenandsupplyshipsMessage=МИССИЯ ВЫПОЛНЕНА|Победа! Вы нанесли серьёзный удар по логистике противника. Это существенно повлияет на возможности авиагруппы «Энтерпрайз» по проведению операций против нас по мере нашего продвижения на север, в сторону Индии. Отличная работа, командир!\n\n<size=16>Все экипажи достигли квалификации: <color=Magenta>Элита</color></size>|Завершить миссию
Taskforce11hrRORSATintelMessage=ВХОДЯЩЕЕ СООБЩЕНИЕ|ОТ: КОМ. 8Й ОПЕРАТИВНОЙ ЭСКАДРОЙ\nКОМУ: КОМАНДИРУ УДАРНОЙ ГРУППЫ «МОЛНИЯ»\n\nСпутник космической разведки пролетел над вашей оперативной зоной в 03:59 по Гринвичу.\n\n2. USS «Кэмден» был успешно идентифицирован.\n\n3. Данные о его местонахождении переданы вашим силам. Удачи, товарищи!|Вас понял
Objective_DestroyCamden=Уничтожить «Кэмден»
Objective_DestroySupplyShips=Дополнительно: Уничтожить американские суда снабжения
Objective_PetropavlovskMustSurvive=«Петропавловск» должен выжить
[Language_de]
Name=Teil 4 - Das Chagos-Gambit
Description=Die Aufklärung meldet, dass sich das Versorgungsschiff USS Camden vorübergehend von der Trägerkampfgruppe Enterprise lösen wird, um sich mit Shuttle-Einheiten der Combat Logistics Force zur Nachversorgung zu treffen. Der Einsatzgruppe Molniya wurde befohlen, diese Gelegenheit zu nutzen und das Versorgungsschiff in dem Zeitfenster zu suchen und zu zerstören.
Taskforce2LandUnit1NameOverride=NSF Diego Garcia
Taskforce2LandUnit1ShortNameOverride=FJDG
Taskforce1StartMessage=<size=20>Strike Group Molniya: TEIL 4</size>\nDAS CHAGOS GAMBIT|Die Aufklärung meldet, dass die Amerikaner ihr Versorgungsschiff USS Camden zur Durchführung eines Versorgungsauftrags aus der Trägerkampfgruppe Enterprise herausgelöst haben. Das ist für uns eine seltene Gelegenheit für einen schweren Schlag gegen die US-Trägerverbände.\n\nDie USS Camden aufklären und identifizieren, anschließend mit allen verfügbaren Mitteln vernichten.\n\nEs ist damit zu rechnen, dass die USS Camden durch weitere Einheiten gesichert wird und auf US-Luftunterstützung aus Diego Garcia zurückgreifen kann.\n\nDie Petropavlovsk muss überleben.|Mission starten
StartForecast=Raum Diego Garcia: Meist bewölkt bis bedeckt mit zeitweilig leichtem Regen und Nebel. Wind aus Südosten mit 10–15 Knoten und gelegentlich stärkeren Böen.
Taskforce1PetropavlovskmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! Unser Flaggschiff Petropavlovsk wurde versenkt!|Mission beenden
Taskforce1CamdendestroyedobjectiveMessage=MARINEMELDUNG|VON KDT, 8. OPERATIVE STAFFEL\nAN KDT, EINSATZGRUPPE MOLNIYA\n\n1. Die Funkaufklärung zeigt, dass USS CAMDEN brennt und sinkt. Feindkräfte verlassen das Schiff und fordern Rettung aus Diego Garcia an.\n\n2. Es wird vermutet, dass amerikanische Kräfte aus Diego Garcia nordwestwärts verlegen, um sich direkt der Trägerkampfgruppe Enterprise anzuschließen.\n\n3. Wir überwachen weiterhin den feindlichen Funkverkehr und melden sämtliche abgefangene Meldungen.\n\n---\n\n<size=16>Unser Primärziel wurde erfüllt. Sie können sich jederzeit aus dem Gefecht lösen, indem Sie die Mission beenden, oder weitere feindliche Kräfte nach eigenem Ermessen angreifen. Unsere Kräfte können nach dieser Mission nicht mehr versorgt werden!</size>\n|Bestätigen & fortfahren
Taskforce1DestroysupplyshipsobjectiveMessage=MARINEMELDUNG|VON KDT, 8. OPERATIVE STAFFEL\nAN KDT, EINSATZGRUPPE MOLNIYA\n\n1. Abgefangene Funkmeldungen weisen darauf hin, dass die amerikanische Logistik-Gruppe vernichtet wurde.\n\n2. Die USS Camden verlegt nun mit hoher Fahrt nordwärts, um sich erneut der Trägerkampfgruppe Enterprise anzuschließen.\n\n3. Wir überwachen weiterhin den feindlichen Funkverkehr und melden sämtliche abgefangene Meldungen.|Bestätigen & fortfahren
Taskforce1DestroyCamdenandsupplyshipsMessage=AUFTRAG ERFÜLLT|Sieg! Alle Logistikeinheiten der Amerikaner wurden vernichtet. Dies wird die Einsatzfähigkeit der Trägerkampfgruppe Enterprise bei Operationen gegen uns erheblich beeinträchtigen, während wir nordwärts in Richtung Indien verlegen. Hervorragende Leistung, Kommandant!\n\n<size=16>Alle Schiffe haben an Erfahrung gewonnen: <color=Magenta>Ultra</color></size>|Mission beenden
Taskforce11hrRORSATintelMessage=MARINEMELDUNG|VON KDT, 8. OPERATIVE STAFFEL\nAN KDT, EINSATZGRUPPE MOLNIYA\n\n1. Der Aufklärungssatellit Kosmos-1932 hat Ihren Einsatzraum um 0359Z überflogen.\n\n2. USS CAMDEN wurde mittels Bildaufklärung und Emissionsanalyse eindeutig identifiziert.\n\n3. Synthetisierte Zieldaten wurden an Ihren Verband übermittelt. Viel Glück, Genossen.|Bestätigen & fortfahren
Objective_DestroyCamden=Die USS Camden zerstören
Objective_DestroySupplyShips=OPTIONAL: Logistikeinheiten der Amerikaner zerstören
Objective_PetropavlovskMustSurvive=Die Petropavlovsk muss überleben

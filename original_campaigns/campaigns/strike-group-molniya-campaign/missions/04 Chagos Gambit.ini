
[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=Part 4 - The Chagos Gambit
Description=Fleet intelligence reports that the fast combat support ship USS Camden will temporarily detach from the Enterprise CVBG to rendezvous with Combat Logistics Force shuttle ships for replenishment. Strike Group Molniya has been ordered to destroy the logistics vessel during this window of opportunity.
Taskforce2LandUnit1NameOverride=NSF Diego Garcia
Taskforce2LandUnit1ShortNameOverride=FJDG
Taskforce1StartMessage=<size=20>Strike Group Molniya: Part 4</size>\nTHE CHAGOS GAMBIT|Intelligence reports that the Americans have detached their fast combat support ship USS Camden from the Enterprise carrier group for resupply. This is a rare window of opportunity for us to strike a blow against their carrier forces in the area.\n\nLocate and identify USS Camden, then destroy it by any means necessary.\n\nU.S. air out of Diego Garcia may be a factor, and USS Camden is likely escorted by surface units.\n\nPetropavlovsk must survive.|Start mission
StartForecast=Diego Garcia area: Mostly cloudy to overcast with intermittent light rain and haze. Southeast winds 10–15 knots with occasional higher gusts
Taskforce1PetropavlovskmustsurviveMessage=MISSION FAILED|Defeat! Our flagship Petropavlovsk has been sunk!|Exit mission
Taskforce1CamdendestroyedobjectiveMessage=NAVAL MESSAGE|FM CMDR, 8TH OPERATIONAL SQUADRON\nTO CMDR, STRIKE GROUP MOLNIYA\n\n1. Radio intercepts show USS CAMDEN is burning and sinking. Enemy forces are abandoning ship and requesting rescue from Diego Garcia.\n\n2. We assess that American forces from Diego Garcia are routing northwest to directly join Enterprise group.\n\n3. We will continue to monitor enemy communications and report all intercepts.\n\n---\n\n<size=16>Our primary objective has been completed. You may choose to disengage at this time by exiting the mission, or continue to attack enemy forces. Resupply is not available to our forces after this mission!</size>\n|Acknowledge & continue
Taskforce1DestroysupplyshipsobjectiveMessage=NAVAL MESSAGE|FM CMDR, 8TH OPERATIONAL SQUADRON\nTO CMDR, STRIKE GROUP MOLNIYA\n\n1. Radio intercepts indicate the American logistics shuttle force has been destroyed.\n\n2. USS Camden is now rerouting north at high speed to rejoin the Enterprise carrier group.\n\n3. We will continue to monitor enemy communications and report all intercepts.|Acknowledge & continue
Taskforce1DestroyCamdenandsupplyshipsMessage=MISSION ACCOMPLISHED|Victory! All of the American logistics units have now been destroyed. This will significantly affect the capability of the Enterprise airwing to conduct operations against us as we move north towards India. Excellent work, Commander!\n\n<size=16>All ships have gained a proficiency level: <color=Magenta>Ultra</color></size>|Exit mission
Taskforce11hrRORSATintelMessage=NAVAL MESSAGE|FM CMDR, 8TH OPERATIONAL SQUADRON\nTO CMDR, STRIKE GROUP MOLNIYA\n\n1. Reconnaissance satellite Kosmos-1932 has overflown your operational area at 0359Z.\n\n2. USS CAMDEN has been positively identified via imaging and emissions.\n\n3. Synthesized targeting data has been passed to your force. Good luck, Comrades.|Acknowledge & continue
Objective_DestroyCamden=Destroy the USS Camden
Objective_DestroySupplyShips=OPTIONAL: Destroy the American logistics shuttle ships
Objective_PetropavlovskMustSurvive=Petropavlovsk must survive

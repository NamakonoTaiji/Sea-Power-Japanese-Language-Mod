
[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=Part 2 - The Guns of Port Louis
Description=Strike Group Molniya rounded South Africa yesterday, and has received orders to raid the anchorage at Port Louis on Mauritius. Three NATO merchants are sheltering there while awaiting escort to Diego Garcia. Approach the island under cover of darkness and destroy them.
Taskforce2Vessel9NameOverride=SAS Hendrik Mentz P1567
Taskforce2Vessel9ShortNameOverride=Mentz
Taskforce2LandUnit13NameOverride=FMEE
Taskforce2LandUnit13ShortNameOverride=FMEE
Taskforce1StartMessage=<size=16>Strike Group Molniya: Part 2</size>\nTHE GUNS OF PORT LOUIS|After rounding South Africa, Strike Group Molniya has received orders to conduct a night surface raid of Mauritius. Three NATO supply ships are anchored there prior to moving north to Diego Garcia.\n\nWe have approached undetected. Port Louis is protected by shore batteries and at least one Hawk SAM site. Intel believes one NATO frigate of unknown type is likely nearby.\n\nPetropavlovsk must survive.|Start mission
Taskforce1PetropavlovskmustsurviveMessage=MISSION FAILED|Defeat! Our flagship Petropavlovsk has been sunk!|Exit mission
Taskforce1DestroycargoshipsMessage=MISSION UPDATE|Commander, we have successfully destroyed the three target vessels. We must now get clear of Mauritius to the northwest. We have accomplished our main objective and further engagement of any enemy forces is at your discretion!|Acknowledge & continue
Taskforce1EscapenorthMessage=MISSION ACCOMPLISHED|Victory! We have struck a blow against NATO in the Indian Ocean, sending three of their precious merchants to the bottom and preventing their reinforcement of Diego Garcia.\n\nWe must now get clear of the area and run south to meet the resupply force...\n\nExcellent work, Comrade.|Exit mission
Taskforce15minairwarningMessage=NAVAL MESSAGE|FM RECONNAISSANCE SHIP AMPERMETR\nTO CMDR, STRIKE GROUP MOLNIYA\n\nWARNING MESSAGE\n\n1. We have intercepted South African Air Force radio communications from their fighter detachment based at Reunion.\n\n2. Mirage fighters are preparing to launch from Reunion airfield to attack your force.\n\n3. Advise air warning with raid direction from your southwest. Estimate eight aircraft in total based on our contact ashore. Good luck, Comrades.|Acknowledge & continue
Taskforce1TG74.4detectMessage=NAVAL MESSAGE|FM RECONNAISSANCE SHIP AMPERMETR\nTO ALL UNITS STRIKE GROUP MOLNIYA\n\nWARNING MESSAGE\n\n1. We have detected enemy transmissions suggesting American surface unit is operating northeast of Mauritius.\n\n2. Composition is not known but Socotra monitoring station passed warning of American destroyers detached yesterday from Enterprise carrier group. We assess this group as Farragut and Perry class escorts.\n\n3. We will report all further contacts. Good luck, Comrades.|Acknowledge & continue
Taskforce1TG74.4detectIntel=American surface group detected to the east of Mauritius. Engaging them is not required but if we do not deal with them now, they may appear later on in our campaign!
Taskforce1CiviliankilledwarningMessage=WARNING MESSAGE|FM RECONNAISSANCE SHIP AMPERMETR\nTO CMDR, STRIKE GROUP MOLNIYA\n\n1. Commander 8th Operational Squadron passes warning to Strike Group Molniya that one civilian vessel has been sunk by our action.\n\n2. HQ reminds that civilian casualties are not to be tolerated.\n\n3. Further, HQ warns that any more civilian casualties will result in mission failure and you will be relieved of command and court-martialed.|Acknowledge & continue
Taskforce1CivilianskilledfailureMessage=MISSION FAILED|FM GHQ RED BANNER NORTHERN FLEET\nTO CMDR, STRIKE GROUP MOLNIYA\n\n1. You have sunk another civilian vessel in action, contrary to your standing orders.\n\n2.Command of strike group Moliya is now transferred to commander of BPK Petropavlovsk.\n\n3.To commander of BPK Petropavlovsk: Break off attack at once and proceed north at best speed to Cochin, India. Former commander is to be detained immediately and transferred to court-martial upon arrival.|Exit mission

[Language_cn]
Name=Part 2 - The Guns of Port Louis
[Language_ru]
Name=Часть 2 - Орудия Порт-Луи
Description=Ударная группа «Молния» обогнула Южную Африку и получила приказ совершить налет на якорную стоянку в Порт-Луи на Маврикии. Там укрываются три торговых судна НАТО, ожидая сопровождения к Диего-Гарсии. Ваша задача - приблизиться к острову под покровом темноты и потопить их.
Taskforce2Vessel9NameOverride=SAS Хендрик Менц P1567
Taskforce2Vessel9ShortNameOverride=Менц
Taskforce2LandUnit13NameOverride=FMEE
Taskforce2LandUnit13ShortNameOverride=FMEE
Taskforce1StartMessage=<size=16>Ударная группа «Молния»: Часть 2</size>\nОрудия Порт-Луи|После обхода Южной Африки ударная группа «Молния» получила приказ совершить ночной налет на Маврикий. Там находятся три судна снабжения НАТО готовые двинуться на север к Диего-Гарсии. Нам удалось приблизиться незамеченными и на нашей стороне эффект неожиданности.\n\nПорт-Луи защищен береговыми батареями и как минимум одной батареей ЗРК «Хок». Разведданные указывают, что поблизости, находится как минимум один фрегат НАТО неизвестного типа.\n\n«Петропавловск» должен выжить.|Начать миссию
Taskforce1PetropavlovskmustsurviveMessage=МИССИЯ ПРОВАЛЕНА|Поражение! Флагман БПК «Петропавловск» был потоплен!|Покинуть миссию
Taskforce1DestroycargoshipsMessage=ЗАДАЧА ОБНОВЛЕНА|Командир, все целевые суда уничтожены!. Можно уходить от Маврикия курсом на северо-запад. Основная задача выполнена, и дальнейшее ведение боевых действий остается на ваше усмотрение.|Вас понял
Taskforce1EscapenorthMessage=МИССИЯ ВЫПОЛНЕНА| Победа! Мы нанесли удар по НАТО в Индийском океане, отправив на дно три ценных транспортных судна и предотвратив прибытие подкрепления на Диего-Гарсия. Теперь мы должны покинуть этот район и двинуться на юг, чтобы встретиться с силами снабжения...  Отличная работа, товарищ!|Завершение миссии
Taskforce15minairwarningMessage=ВХОДЯЩЕЕ СООБЩЕНИЕ |ОТ: РАЗВЕДЫВАТЕЛЬНОГО КОРАБЛЯ «АМПЕРМЕТР»\nКОМУ: КОМАНДИРУ УДАРНОЙ ГРУППЫ «МОЛНИЯ»\n\nПРЕДУПРЕЖДАЮЩЕЕ СООБЩЕНИЕ\n\n1. Мы перехватили радиопереговоры ВВС ЮАР с авиабазой на о. Реюньон.\n\n2. Истребители «Мираж» готовятся к взлету, для атаки ваших сил.\n\n3. По нашим данным, ударная группа насчитывает около 8 самолетов а наиболее вероятное направление атаки - с юго-запада. Удачи, товарищи!|Вас понял
Taskforce1TG74.4detectMessage=ВХОДЯЩЕЕ СООБЩЕНИЕ |ОТ: РАЗВЕДЫВАТЕЛЬНОГО КОРАБЛЯ «АМПЕРМЕТР»\nКОМУ: КОМАНДИРУ УДАРНОЙ ГРУППЫ «МОЛНИЯ»\n\nПРЕДУПРЕЖДАЮЩЕЕ СООБЩЕНИЕ\n\n1. Нами засечены радиопереговоры указывающие на то, что к северо-востоку от острова Маврикий, находится американская корабельная группа.\n2. Состав группы неизвестен, но основываясь на донесениях станции наблюдения на Сокотре, мы полагаем что в неё входят эскортные корабли классов «Фаррагут» и «Перри», отделившиеся вчера от авианосной группы «Энтерпрайз».\n\n3. Продолжаем вести наблюдение. Удачи, товарищи!|Вас понял
Taskforce1TG74.4detectIntel=Американская корабельная группа обнаружена к востоку от Маврикия. Вступать с ними в бой не обязательно, однако если не разобраться с ними сейчас, они появятся позже в ходе кампании!
Taskforce1CiviliankilledwarningMessage=ВХОДЯЩЕЕ СООБЩЕНИЕ |ОТ: РАЗВЕДЫВАТЕЛЬНОГО КОРАБЛЯ «АМПЕРМЕТР»\nКОМУ: КОМАНДИРУ УДАРНОЙ ГРУППЫ «МОЛНИЯ»\n\nПРЕДУПРЕЖДАЮЩЕЕ СООБЩЕНИЕ\n\n1. Командующий восьмой оперативной эскадрой передает предупреждение ударной группе «Молния» о том, что в результате наших действий было потоплено одно гражданское судно.\n\n2. Штаб напоминает, что жертвы среди гражданского населения недопустимы.\n\n3. Кроме того, штаб предупреждает, что любые дальнейшие жертвы среди гражданского населения приведут к провалу всей операции, а вы предстанете перед трибуналом.|Вас понял
Taskforce1CivilianskilledfailureMessage=МИССИЯ ПРОВАЛЕНА|ОТ: ШТАБ ВМС КЗСФ\nКОМУ: КОМАНДИРУ УДАРНОЙ ГРУППЫ «МОЛНИЯ»\n\n1. Вы потопили еще одно гражданское судно в ходе боевых действий, вопреки вашим приказам. \n\n2. Настоящим вы освобождаетесь от командования КУГ «Молния». Управление группой переходит к командиру БПК «Петропавловск». \n\n3. Командиру БПК «Петропавловск» немедленно прекратить операцию и двигаться на север на максимальной скорости к Кочину, Индия. Бывшего командующего содержать под стражей и передать по прибытии сотрудникам военной прокуратуры\nВыход из миссии

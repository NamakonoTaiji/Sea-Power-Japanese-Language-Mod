[Language_de]
Name=Teil 2 - Die Geschütze von Port Louis
Description=Die Einsatzgruppe Molniya hat gestern Südafrika umrundet und den Befehl erhalten, den Ankerplatz bei Port Louis auf Mauritius anzugreifen. Drei NATO-Handelsschiffe suchen dort Schutz, während sie auf Geleitschutz nach Diego Garcia warten. Nähern Sie sich der Insel im Schutz der Dunkelheit und vernichten Sie diese Schiffe.
Taskforce2Vessel9NameOverride=SAS Hendrik Mentz P1567
Taskforce2Vessel9ShortNameOverride=Mentz
Taskforce2LandUnit13NameOverride=FMEE
Taskforce2LandUnit13ShortNameOverride=FMEE
Taskforce1StartMessage=<size=16>Strike Group Molniya: TEIL 2</size>\nDIE GESCHÜTZE VON PORT LOUIS|Nach der Umrundung Südafrikas hat die Einsatzgruppe Molniya den Befehl erhalten, einen nächtlichen Angriff auf Mauritius durchzuführen. Drei NATO-Versorgungsschiffe liegen dort vor Anker, die nordwärts nach Diego Garcia verlegen sollen.\n\nWir haben uns unentdeckt angenähert. Port Louis wird durch Küstenartillerie sowie mindestens eine HAWK-Flugabwehrraketenstellung gesichert. Die Aufklärung geht davon aus, dass sich mindestens eine NATO-Fregatte unbekannten Typs in der Nähe befindet.\n\nDie Petropavlovsk muss überleben.|Mission starten
Taskforce1PetropavlovskmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! Unser Flaggschiff Petropavlovsk wurde versenkt!|Mission beenden
Taskforce1DestroycargoshipsMessage=MISSIONS UPDATE|Kommandant, Wir haben die drei Versorgungsschiffe erfolgreich vernichtet. Wir müssen nun nordwestwärts von Mauritius verlegen. Das Primärziel ist erreicht. Die Aufnahme weiterer Gefechte gegen feindliche Kräfte liegt in Ihrem Ermessen!|Bestätigen & fortfahren
Taskforce1EscapenorthMessage=AUFTRAG ERFÜLLT|Sieg! Wir haben der NATO im Indischen Ozean einen schweren Schlag versetzt, drei ihrer wertvollen Handelsschiffe auf den Grund geschickt und die Verstärkung von Diego Garcia verhindert.\n\nWir müssen das Gebiet nun freimachen und südwärts laufen, um mit der Versorgungsgruppe zusammenzutreffen...\n\nHervorragende Leistung, Genosse.|Mission beenden
Taskforce15minairwarningMessage=MARINEMELDUNG|VON AUFKLÄRUNGSSCHIFF AMPERMETR\nAN KDT, EINSATZGRUPPE MOLNIYA\n\nWARNMELDUNG\n\n1. Wir haben den Funkverkehr der südafrikanischen Luftwaffe auf Réunion abgefangen.\n\n2. Mirage-Jagdflugzeuge bereiten den Start vom Flugplatz Réunion vor, um Ihren Verband anzugreifen.\n\n3. Luftwarnung aus südwestlicher Richtung erteilen und Anflugrichtung entsprechend melden. Basierend auf unseren Kontakten an Land, befinden sich schätzungsweise acht Flugzeuge auf dem Weg zu Ihnen. Viel Glück, Genossen.|Bestätigen & fortfahren
Taskforce1TG74.4detectMessage=MARINEMELDUNG|VON AUFKLÄRUNGSSCHIFF AMPERMETR\nAN ALLE EINHEITEN EINSATZGRUPPE MOLNIYA\n\nWARNMELDUNG\n\n1. Wir haben feindliche Funkübertragungen aufgefasst, die darauf hindeuten, dass ein amerikanisches Kriegsschiff nordöstlich von Mauritius operiert.\n\n2. Der genaue Typ ist unbekannt, jedoch hat die Überwachungsstation Socotra eine Warnung über amerikanische Zerstörer weitergegeben, die sich gestern aus der Trägerkampfgruppe Enterprise gelöst haben. Wir bewerten diese Gruppe als Sicherungseinheiten der FARRAGUT- und PERRY-Klasse.\n\n3. Weitere Kontakte werden unverzüglich gemeldet. Viel Glück, Genossen.|Bestätigen & fortfahren
Taskforce1TG74.4detectIntel=Amerikanische Einsatzgruppe östlich von Mauritius aufgeklärt. Ein Gefecht ist nicht zwingend erforderlich, jedoch könnten diese Kräfte später im Verlauf der Kampagne zum Problem werden, falls wir sie jetzt nicht ausschalten!

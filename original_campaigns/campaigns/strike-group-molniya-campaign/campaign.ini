Name_en=MISSION 1: WOLVES OF THE SOUTH ATLANTIC
Description_en=26 June 1985: East of Ascension Island
MissionImage_en=campaigns/strike-group-molniya-campaign/art/m01_wolves_of_the_south_atlantic_title.png
MissionIntro_en=Hostilities have commenced in Europe. In accordance with your standing orders, Strike Group Molniya will begin unrestricted commerce raiding operations against NATO shipping in the South Atlantic.

Name_ru=МИССИЯ 1: ВОЛКИ ЮЖНОЙ АТЛАНТИКИ
Description_ru=26 Июня 1985: К востоку от острова Вознесения
MissionImage_ru=campaigns/strike-group-molniya-campaign/art/m01_wolves_of_the_south_atlantic_title_ru.png
MissionIntro_ru=В Европе начались боевые действия. В соответствии с приказом, ударная группа «Молния» приступает к выполнению боевой задачи по нарушению коммуникаций НАТО в Южной Атлантике.

Name_de=MISSION 1: WÖLFE DES SÜDATLANTIK
Description_de=26. Juni 1985: Östlich der Insel Ascension
MissionImage_de=campaigns/strike-group-molniya-campaign/art/m01_wolves_of_the_south_atlantic_title.png
MissionIntro_de=Die Kampfhandlungen in Europa haben begonnen. In Übereinstimmung mit Ihren Einsatzbefehlen nimmt die Einsatzgruppe Molniya nun den uneingeschränkten Handelskrieg gegen die NATO-Schifffahrt im Südatlantik auf.


Name_en=MISSION 2: THE GUNS OF PORT LOUIS
Description_en=3 July 1985 - Off Mauritius
MissionImage_en=campaigns/strike-group-molniya-campaign/art/m02_guns_of_port_louis_title.png
MissionIntro_en=Strike Group Molniya rounded South Africa yesterday, and has received orders to raid the anchorage at Port Louis on Mauritius. Three NATO merchants are sheltering there while awaiting escort to Diego Garcia. Approach the island under cover of darkness and destroy them.

Name_ru=МИССИЯ 2: ОРУДИЯ ПОРТ-ЛУИ
Description_ru=3 июля 1985 - В районе о. Маврикия
MissionImage_ru=campaigns/strike-group-molniya-campaign/art/m02_guns_of_port_louis_title_ru.png
MissionIntro_ru=Ударная группа «Молния» обогнула Южную Африку и получила приказ совершить налет на якорную стоянку в Порт-Луи на Маврикии. Там укрываются три торговых судна НАТО, ожидая сопровождения к Диего-Гарсии. Ваша задача - приблизиться к острову под покровом темноты и потопить их.

Name_de=MISSION 2: DIE GESCHÜTZE VON PORT LOUIS
Description_de=3. Juli 1985 - Vor Mauritius
MissionImage_de=campaigns/strike-group-molniya-campaign/art/m02_guns_of_port_louis_title_de.png
MissionIntro_de=Die Einsatzgruppe Molniya hat gestern Südafrika umrundet und den Befehl erhalten, den Ankerplatz bei Port Louis auf Mauritius anzugreifen. Drei NATO-Handelsschiffe suchen dort Schutz, während sie auf Geleitschutz nach Diego Garcia warten. Nähern Sie sich der Insel im Schutz der Dunkelheit und vernichten Sie diese Schiffe.

Name_cn=任务2：路易港的炮火
Description_cn=1985年7月3日：毛里求斯海岸
MissionImage_cn=campaigns/strike-group-molniya-campaign/art/m02_guns_of_port_louis_title.png
MissionIntro_cn=闪电打击群昨日绕过南非，并已收到命令突袭毛里求斯路易港的锚地。三艘计划前往迪戈加西亚岛的北约商船正停泊在那里，等待着护航船只。趁夜色靠近岛屿并摧毁商船。

Name_ja=ミッション2：ポートルイスの砲声
Description_ja=1985年7月3日：モーリシャス沖
MissionImage_ja=campaigns/strike-group-molniya-campaign/art/m02_guns_of_port_louis_title.png
MissionIntro_ja=打撃群「モルニヤ」は昨日南アフリカを回航した。モーリシャスのポートルイス泊地への強襲命令が下っている。ディエゴガルシアへの護衛を待つ3隻のNATO商船が同地に避難中である。夜陰に乗じて島へ接近し、これらを撃破せよ。


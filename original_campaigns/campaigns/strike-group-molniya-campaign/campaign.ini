Name_en=MISSION 3: LIFELINE AT THE EDGE OF THE WORLD
Description_en=9 July 1985 - North of the Crozet Islands
MissionImage_en=campaigns/strike-group-molniya-campaign/art/m03_lifeline_at_the_edge_of_the_world_title.png
MissionIntro_en=Following the Mauritius operation, Strike Group Molniya must rendezvous with its attached support group at the uninhabited Crozet Islands in the far south. Radio intercepts indicate NATO may be aware of our intentions. Reach the anchorage, and defend our resupply ships at all costs.

Name_ru=МИССИЯ 3: НИТЬ ЖИЗНИ НА КРАЮ СВЕТА
Description_ru=9 июля 1985 г. - к северу от островов Крозе.
MissionImage_ru=campaigns/strike-group-molniya-campaign/art/m03_lifeline_at_the_edge_of_the_world_title_ru.png
MissionIntro_ru=После операции на Маврикии ударная группа «Молния» должна встретиться с группой поддержки возле необитаемых островов Крозе, далеко на юге. Перехваты сообщений противника указывают на то, что НАТО, скорее всего, осведомлено о наших намерениях. Достигните якорной стоянки и любой ценой защищайте наши суда снабжения.

Name_de=MISSION 3: LEBENSADER AM RANDE DER WELT
Description_de=9. Juli 1985 – Nördlich der Crozetinseln
MissionImage_de=campaigns/strike-group-molniya-campaign/art/m03_lifeline_at_the_edge_of_the_world_title_de.png
MissionIntro_de=Nach der Operation bei Mauritius muss sich die Einsatzgruppe Molniya mit einer Versorgungsgruppe bei den unbewohnten Crozetinseln im Süden treffen. Die Funkaufklärung deutet darauf hin, dass die NATO Ihre Absichten erkannt haben könnte. Erreichen Sie den Ankerplatz und verteidigen Sie unsere Versorgungsschiffe um jeden Preis.

Name_cn=任务3：世界边缘的生命线
Description_cn=1985年7月9日：克罗泽群岛以北
MissionImage_cn=campaigns/strike-group-molniya-campaign/art/m03_lifeline_at_the_edge_of_the_world_title.png
MissionIntro_cn=毛里求斯的行动结束后，闪电打击群必须与其附属支援群在南方极远处无人居住的克罗泽群岛会合。截获的无线电表明北约可能已经知晓我们的意图。抵达锚地，不惜一切代价保护我方补给船。

Name_ja=ミッション3：世界の果ての生命線
Description_ja=1985年7月9日：クローゼー諸島北方
MissionImage_ja=campaigns/strike-group-molniya-campaign/art/m03_lifeline_at_the_edge_of_the_world_title.png
MissionIntro_ja=モーリシャスでの作戦を終えた打撃群「モルニヤ」は、遥か南方の無人島、クローゼー諸島で配属支援部隊と合流しなければならない。無線傍受によれば、NATOは我々の意図を察知している可能性がある。投錨地に到達し、いかなる犠牲を払っても補給艦を死守せよ。


Name_en=MISSION 5: SHADOW OF THE ENTERPRISE
Description_en=17 July 1985 - East of the Maldives
MissionImage_en=campaigns/strike-group-molniya-campaign/art/m05_shadow_of_the_enterprise_title.png
MissionIntro_en=USS Enterprise and her carrier group have been assigned to locate and destroy Strike Group Molniya. Following the loss of their logistics vessels west of Diego Garcia, NATO is concentrating available forces to intercept you. Command has secured agreement from India to shelter the strike group at Cochin under a declared exclusion zone. Reach Cochin by any means necessary.

Name_ru=МИССИЯ 5: ТЕНЬ ЭНТЕРПРАЙЗА
Description_ru=17 июля 1985 г. - к востоку от Мальдив.
MissionImage_ru=campaigns/strike-group-molniya-campaign/art/m05_shadow_of_the_enterprise_title_ru.png
MissionIntro_ru=АУГ во главе с USS «Энтерпрайз» получила задание обнаружить и уничтожить КУГ «Молния». После потери судов снабжения к западу от Диего-Гарсии, НАТО концентрирует имеющиеся силы для перехвата ваших кораблей. Командование получило от Индии согласие на размещение ударной группы в Кочине под объявленной зоной отчуждения. Прорвитесь в Кочин любым доступным способом.

Name_de=MISSION 5: DER SCHATTEN DER ENTERPRISE
Description_de=17. Juli 1985 - Östlich der Malediven
MissionImage_de=campaigns/strike-group-molniya-campaign/art/m05_shadow_of_the_enterprise_title_de.png
MissionIntro_de=Die USS ENTERPRISE und ihre Trägerkampfgruppe wurde beauftragt, die Einsatzgruppe Molniya zu suchen und zu vernichten. Nach dem Verlust ihrer Logistikeinheiten westlich von Diego Garcia konzentriert die NATO ihre verfügbaren Kräfte, um Sie abzufangen. Das Kommando hat von Indien die Zusage erhalten, die Einsatzgruppe Molniya in einem erklärten Sperrgebiet in Cochin aufnehmen zu wollen. Erreichen Sie Cochin mit allen erforderlichen Mitteln.

Name_cn=任务5：企业号的阴影
Description_cn=1985年7月17日：马尔代夫群岛以东
MissionImage_cn=campaigns/strike-group-molniya-campaign/art/m05_shadow_of_the_enterprise_title.png
MissionIntro_cn=企业号航空母舰及其战斗群已收到命令找到并摧毁闪电打击群。北约在迪戈加西亚岛以西海域损失了后勤船只，目前正在集中可用兵力拦截你。指挥部已与印度达成协议，在科钦的指定禁区内为打击群提供庇护。采取一切必要手段抵达科钦。

Name_ja=ミッション5：エンタープライズの影
Description_ja=1985年7月17日：モルディブ諸島東方
MissionImage_ja=campaigns/strike-group-molniya-campaign/art/m05_shadow_of_the_enterprise_title.png
MissionIntro_ja=USSエンタープライズとその空母戦闘群が、打撃群「モルニヤ」を捕捉・撃滅すべく派遣された。ディエゴガルシア西方で兵站艦を失ったNATOは、利用可能な全戦力を結集して我々の阻止を図っている。司令部は、設定された排除区域の下で打撃群を保護する合意をインド政府と取り付けた。いかなる手段を講じてでも、コーチンへ到達せよ。


[PersistentData]
CommanderName=Sergei Alexandrovich Markov

[Language_en]
Name=Strike Group Molniya (USSR)
Description=Command a Soviet raiding force sent deep into the South Atlantic at the outbreak of global war. Isolated from home waters and hunted across multiple theaters, you must disrupt NATO logistics, sustain your own operations using very limited resources, and decide when survival outweighs continuing to fight.<LineBreak/><LineBreak/><Span Foreground="SandyBrown">NOTE</Span>: This is a persistent campaign. Ship/aircraft losses and weapon expenditures are tracked, and will carry forward across each mission. Resupply is available at certain points in the campaign, but avoid unnecessary losses and use your weapons wisely!

[Language_ru]
Name=Ударная группа «Молния» (СССР)
Description=Командуйте советской рейдовой группой, отправленной вглубь Южной Атлантики в начале глобальной войны. Изолированные от родных вод и преследуемые на нескольких театрах военных действий, вы должны нарушать логистику НАТО, поддерживать собственную боеспособность, используя крайне ограниченные ресурсы, и решать, когда выживание важнее продолжения боевых действий.<LineBreak/><LineBreak/> <Span Foreground="SandyBrown">ВАЖНО</Span>: Состояние ваших юнитов переносится из каждой миссии в следующую, поэтому старайтесь разумно расходовать вооружение и избегать ненужных потерь.

[Language_de]
Name=Strike Group Molniya (UdSSR)
Description=Sie befehligen eine sowjetische Einsatzgruppe, die zu Beginn des Krieges tief in den Südatlantik entsandt wurde. Abgeschnitten von der Heimat und über mehrere Kriegsschauplätze hinweg gejagt, müssen Sie die NATO empfindlich stören, den eigenen Einsatz mit äußerst begrenzten Ressourcen aufrechterhalten und entscheiden, wann das eigene Überleben wichtiger wird als die bloße Aufrechterhalutng des Kampfes.

[Language_ko]
Name=Strike Group Molniya (USSR)
Description=Command a Soviet raiding force sent deep into the South Atlantic at the outbreak of global war. Isolated from home waters and hunted across multiple theaters, you must disrupt NATO logistics, sustain your own operations using very limited resources, and decide when survival outweighs continuing to fight.


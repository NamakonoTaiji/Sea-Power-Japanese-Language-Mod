Name_en=MISSION 4: THE CHAGOS GAMBIT
Description_en=15 July 1985 - Southwest of Diego Garcia
MissionImage_en=campaigns/strike-group-molniya-campaign/art/m04_chagos_gambit_title.png
MissionIntro_en=Fleet intelligence reports that the fast combat support ship USS Camden will temporarily detach from the Enterprise CVBG to rendezvous with Combat Logistics Force shuttle ships for replenishment. Strike Group Molniya has been ordered to destroy the logistics vessel during this window of opportunity.

Name_ru=МИССИЯ 4: ГАМБИТ ЧАГОСА
Description_ru=15 июля 1985 г. - к юго-западу от Диего-Гарсия.
MissionImage_ru=campaigns/strike-group-molniya-campaign/art/m04_chagos_gambit_title_ru.png
MissionIntro_ru=Разведка флота сообщает, что быстроходный корабль боевого обеспечения USS «Кэмден» временно отделится от авианосной ударной группы «Энтерпрайз» для встречи с челночными кораблями СБС (Сил Боевого Снабжения ВМС США) с целью пополнения запасов. Ударной группе «Молния» приказано уничтожить судно снабжения в течение этого благоприятного периода.

Name_de=MISSION 4: DAS CHAGOS-GAMBIT
Description_de=15. Juli 1985 - Südwestlich von Diego Garcia
MissionImage_de=campaigns/strike-group-molniya-campaign/art/m04_chagos_gambit_title_de.png
MissionIntro_de=Die Flottenaufklärung meldet, dass sich das Versorgungsschiff USS CAMDEN vorübergehend von der Trägerkampfgruppe ENTERPRISE lösen wird, um sich mit Shuttle-Einheiten der Combat Logistics Force zur Nachversorgung zu treffen. Der Einsatzgruppe Molniya wurde befohlen, die Gelegenheit zu nutzen und das Logistikschiff während dieses Zeitfensters aufzuspüren und zu vernichten.

Name_cn=任务4：查戈斯群岛的博弈
Description_cn=1985年7月15日：迪戈加西亚岛西南
MissionImage_cn=campaigns/strike-group-molniya-campaign/art/m04_chagos_gambit_title.png
MissionIntro_cn=舰队情报显示卡姆登号快速战斗支援舰号将暂时脱离企业号航母战斗群，与战斗后勤部队的运载船会合以进行补给。闪电打击群已收到命令抓住机会摧毁此后勤舰。

Name_ja=ミッション4：チャゴス・ギャンビット
Description_ja=1985年7月15日：ディエゴガルシア南西
MissionImage_ja=campaigns/strike-group-molniya-campaign/art/m04_chagos_gambit_title.png
MissionIntro_ja=艦隊諜報によれば、高速戦闘支援艦USSカムデンは補給のため一時的に空母エンタープライズ戦闘群から離脱し、戦闘兵站部隊のシャトル船と合流する。打撃群「モルニヤ」に対し、この好機を捉えて兵站艦を撃破せよとの命令が下った。


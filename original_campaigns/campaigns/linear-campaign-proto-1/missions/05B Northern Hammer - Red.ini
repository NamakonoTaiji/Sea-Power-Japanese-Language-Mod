[Language_ko]
Name=05B 노스턴 해머 (소련)
Description=애투 섬에서의 우리의 성공은 지휘권을 강화시켰고, 북대서양 함대는 나토 보급선을 위협하기 위해 우리의 가장 강력한 부대를 북대서양으로 출격시키라는 명령을 받았습니다. 키로프 타격 전단을 지휘하여 노르웨이해를 위협하는 미국 항공모함을 파괴하십시오.
Taskforce1StartmessageMessage=<size=20>분쟁의 미적분학: 파트 5 (소련)</size>\\n노스턴 해머|우리의 강력한 지상 부대가 대서양으로 진입하려고 시도하고 있습니다. 정보는 미국 항공모함 그룹이 아이슬란드 동쪽에 위치해 우리를 요격할 것으로 보고 있습니다.\\n\\nTu-16K 지원을 받는 Tu-22M 연대는 콜라에서 갑판을 벗어나 공격을 위해 진입할 예정입니다. 위성 코스모스 1932는 0028Z 상공을 비행할 예정이지만, 본부는 미국인들이 자신들의 위치를 밝히기 전에 이를 무력화하려고 시도할 수 있다고 경고합니다.\\n\\n키로프는 반드시 생존시킬것.|미션 시작
Taskforce1PlayerVictoryMessage=승리|발신: 키로프 타격전단 사령관\n수신: 적기북부함대 사령부\n\n1. 동지 여러분, 우리는 우리의 노력에 성공하여 미국 항공모함을 파괴했습니다.\n\n2. 우리는 그들의 잔해를 치우고 대서양으로 진입하기 위해 남서쪽으로 나아가고 있습니다. 승리는 우리의 것입니다!|임무 종료
Taskforce1RORSATmessageMessage=해군 메세지|발신: 적기북부함대 사령부\n수신: 키로프 타격전단 사령관\n\n1. 우리 동지들은 미국의 1932년 코스모스 위성 격추 시도가 실패했다고 보고합니다.\n\n2. 코스모스 1932는 0028Z까지 노르웨이해 상공을 비행할 것입니다.\n\n3. 본사는 0100Z까지 합성된 타겟팅 데이터를 귀하의 부대에 전달할 것입니다.\n\n4. 접수 즉시 미국인들에 대한 공격을 조율하고 그들을 파괴하세요. 행운을 빕니다.|확인됨 & 계속
Taskforce1RORSATrevealEisenhowertoBlueMessage=해군 메세지|발신: 적기북부함대 사령부\n수신: 키로프 타격전단 사령관\n\n1. 코스모스 1932 정찰 데이터가 수신되어 귀하의 부대로 전달되었습니다.\n\n2. 미국 항공모함 그룹이 페로 제도 서쪽에서 운영되고 있는 것으로 확인되었습니다.\n\n3. 최선의 속도로 미사일 사거리로 진격한 후 미군을 격파하시오. 행운을 빕니다.|확인됨 & 계속
Taskforce1KirovmustsurviveMessage=패배|발신: 적기북부함대\n수신: GENERAL STAFF, MOSCOW\n\n1. 키로프와 연락이 끊겼습니다. 그들의 마지막 교신은 미사일과 항공기를 인바운드로 보냈으며, 우리는 우리의 군대가 파괴되었다고 평가합니다.\n\n2. 우리는 이 지역에 잠수함을 파견하여 미국인들의 위치를 파악하고 파괴하려 하지만, 우리가 결정적으로 패배한 것을 두려워하고 있습니다.|임무 종료

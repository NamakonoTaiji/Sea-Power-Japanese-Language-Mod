Taskforce1MadFoxCheckInMessage=항공기 체크인|75.3, 여기는 매드 폭스.\n\n동쪽에서 체크인, 8명의 영혼 탑승, 4+30 플레이 타임, 4명의 브루저.\n\n작업 준비 완료, 이상.|확인됨!
Taskforce1REDFORVictoryMessage=패배|발신: 애투 공군 기지 사령관\n수신: 7함대 사령부\n\n1. 바르사바 조약기구 병력이 몇시간 내 현장에 도달할 것임. 현재 모든 긴급 파기 절차를 시행 중. 우군 수상전력이 전멸하였거나 작전 효율성 없음.|임무 종료
Taskforce2REDFORVictoryMessage=승리|발신:보스토크 기동부대 사령관\n수신:태평양함대사령부\n\n1. 모든 NATO 병력이 괴멸되었다고 평가됨. 상륙전력이 해안으로 이동할 준비를 하는 중.\n\n2. 승리는 우리의 것입니다, 장군 동지.|임무 종료
Taskforce1BLUFORVictoryActualMessage=승리|발신: 애투섬 공군기지 사령관\n수신: 미합중국 7함대 사령부\n\n1. 우리는 모든 바르샤바 조약기구 병력이 제거되었다고 평가함. 잔여 병력 탐색을 위해 모든 해상초계기를 긴급발진 중.\n\n2. 승리는 우리의 것입니다, 장군님. 전체 보고서는 12시간 이내 보고 예정.|임무 종료
Taskforce2BLUFORVictoryActualMessage=패배|발신: 태평양함대사령부T\n수신: 모스크바 사령부\n\n1. 보스토크 기동부대와 침공 전력과의 연락 두절됨. 미국이 우리의 진격을 저지할 수 있을 만큼 충분한 병력을 배치하였다고 평가됨.\n\n2. 괌 공격에 대한 새로운 옵션이 개발 중이며 12시간 내에 준비될 예정임. 우리 군의 손실은 헛되지 않을 것.|임무 종료
Trigger8Condition_Condition3AreaLabel=침공군 출격지역
Taskforce1StartmessageMessage=<size=20>분쟁의 미적분학: 파트 4 (NATO)</size>\\n협상 카드|소련은 알류샨족의 애투 섬을 침공하려고 시도하고 있습니다.\\n\\nTF 75.3은 하와이에서 북쪽으로 급부상했으며, 캐리어 에어 윙 11(CVW-11) 항공기는 애투의 카스코 코브 비행장에서 출격하고 있습니다. P-3C 호출 부호 \"매드 폭스\"가 갑판에서 내려졌으며 곧 체크인할 예정입니다.\\n\\n섬을 침공하려는 모든 적군을 격파하시오|미션 시작
Objective_PreventLanding=소련의 애투섬 상륙 저지

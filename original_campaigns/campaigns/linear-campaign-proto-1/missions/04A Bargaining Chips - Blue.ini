Taskforce1MadFoxCheckInMessage=飞机入场|75.3，这里是疯狐。\n\n正在从东方入场，机上有8人，剩余巡逻时间4小时30分，携带4枚反舰导弹。\n\n准备执行任务，完毕。|收到！
Taskforce1REDFORVictoryMessage=任务失败！|发件：阿图岛航空基地指挥官\n收件：第七舰队司令\n\n1.我们评估华约部队将在数小时内抵达。我们此时正在执行所有紧急破坏程序。友方水面部队已被消灭或失去战斗力。|退出任务
Taskforce2REDFORVictoryMessage=任务完成！|发件：东方特遣舰队司令\n收件：太平洋舰队司令\n\n1.根据评估，所有北约部队已被消灭。两栖部队正在准备登陆。\n\n2.上将同志，胜利属于我们。|退出任务
Taskforce1BLUFORVictoryActualMessage=任务完成！|发件：阿图岛航空基地指挥官\n收件：第七舰队司令\n\n1.根据评估，所有华约部队已被消灭。所有海上巡逻侦察机正在紧急起飞以搜索此区域内的剩余单位。\n\n2.我们胜利了，将军。完整报告将在未来12小时内发送。|退出任务
Taskforce2BLUFORVictoryActualMessage=任务失败！|发件：太平洋舰队司令\n收件：莫斯科总部\n\n1.我们失去了与东方特遣舰队和登陆部队的联系。我们评估美国人有能力部署足够的兵力以反制我们的推进。\n\n2.攻击关岛的新方案正在筹备中，预计将于12小时后完成。我们部队的损失不会没有意义。|退出任务
Trigger8Condition_Condition3AreaLabel=登陆部队出发区域
Taskforce1StartmessageMessage=<size=20>冲突演算：第4部分（北约）</size>\n谈判筹码|苏联正试图占领阿留申群岛的阿图岛。指挥此区域内的美军抵挡此次进攻。\n\n第75.3特遣舰队已从夏威夷北上增援，第11舰载机联队（CVW-11）正在从阿图岛的卡斯科湾机场起飞。呼号“疯狐”的P-3C已经起飞，很快就会入场。\n\n消灭所有试图登陆阿图岛的敌军。|开始任务
Objective_PreventLanding=阻止苏联登陆阿图岛
Objective_DestroyUSSRForces=消灭遭遇的所有苏联军队
[Language_ru]
Name=04A Bargaining Chips (NATO)
[Language_de]
Name=04A Verhandlungsmasse (NATO)
Description=Die militärischen Aktionen auf See zwischen dem Warschauer Pakt und der NATO sind nahezu zum Erliegen gekommen, seit mehrere sowjetische U-Boote in der Nähe der GIUK-Lücke beschädigt oder versenkt wurden. Auch am Boden hat sich der Krieg in Europa zu einem angespannten Patt erstarrt – beide Seiten überdenken derzeit ihre jeweiligen Vorteile und Kriegsziele. Zwar laufen Verhandlungen, doch ohne Druck und ohne entscheidende Vorteile ist bislang keine Seite bereit, einem Kompromiss zuzustimmen.

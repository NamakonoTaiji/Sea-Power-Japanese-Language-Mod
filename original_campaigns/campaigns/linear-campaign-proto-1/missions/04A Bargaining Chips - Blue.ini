Taskforce1MadFoxCheckInMessage=航空機チェックイン|75.3任務部隊、こちらマッドフォックス。\n\n東方より戦域に到達。乗員8名、残りステーションタイム4時間30分。ハープーン4基を装備。\n\n指示を待つ。オーバー。|了解
Taskforce1REDFORVictoryMessage=敗北|発：アッツ空軍基地指揮官\n宛：第7艦隊司令官\n\n1. 数時間以内にワルシャワ条約機構軍が到達すると推定。これを受け、現在すべての緊急破壊プロトコルを実施中である。友軍水上戦力は全滅、あるいは無力化された。|作戦終了
Taskforce2REDFORVictoryMessage=勝利|発：任務部隊「ヴォストーク」指揮官\n宛：太平洋艦隊司令官\n\n1. すべてのNATO戦力を排除したと判断する。揚陸部隊は現在、上陸準備に入っている。\n\n2. 将軍同志、勝利は我々のものだ。|作戦終了
Taskforce1BLUFORVictoryActualMessage=勝利|発：アッツ空軍基地指揮官\n宛：第7艦隊司令官\n\n1. すべてのワルシャワ条約機構軍を排除したと判断する。現在、残存部隊を捜索するため、すべての海洋哨戒機（MPRA）をスクランブルさせている。\n\n2. 提督、勝利は我々のものです。12時間以内に詳細な報告を送付する。|作戦終了
Taskforce2BLUFORVictoryActualMessage=敗北|発：太平洋艦隊司令官\n宛：モスクワ司令部\n\n1. 任務部隊「ヴォストーク」および侵攻部隊との連絡が途絶した。アメリカ軍が我が軍の前進を阻止するのに十分な戦力を展開したと判断する。\n\n2. グアム攻撃のための新たな選択肢を策定中であり、12時間以内に準備が整う予定だ。我が軍の犠牲を無駄にしてはならない。|作戦終了
Trigger8Condition_Condition3AreaLabel=侵攻部隊発進海域
Taskforce1StartmessageMessage=<size=20>衝突の数理：パート4 (NATO)</size>\n交渉の切り札|ソ連軍がアリューシャン列島のアッツ島への侵攻を試みている。当該海域の米軍を指揮し、敵の攻撃を退けよ。\n\nハワイから北上した第75.3任務部隊、およびアッツ島のキャスコ・コーブ飛行場に展開する第11空母航空団（CVW-11）が作戦にあたる。コールサイン「マッドフォックス」のP-3Cが既に離陸しており、まもなく無線連絡が入るはずだ。\n\n島への侵攻を企てるすべての敵軍を撃滅せよ。|作戦開始
Objective_PreventLanding=アッツ島へのソ連軍上陸を阻止
Objective_DestroyUSSRForces=遭遇したすべてのソ連軍の撃滅

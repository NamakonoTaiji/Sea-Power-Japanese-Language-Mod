[Language_en]
Name=05A Operation Blockbuster (NATO)
Description=A powerful USSR surface action group has been detected approaching the GIUK Gap. Take charge of the Eisenhower battle group to locate and destroy it.
NeutralVessel12NameOverride=UK SURTASS
NeutralVessel12ShortNameOverride=UK SURTASS
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Part 5 (NATO)</size>\nOPERATION BLOCKBUSTER|A Soviet surface action group centered on Kirov has departed Murmansk and is attempting to enter the Atlantic. Take charge of TF 65.7 and the USS Dwight D. Eisenhower carrier battle group to locate and destroy it.\n\nUsing heavy weather for cover, the Eisenhower has so far evaded Soviet recon flights and satellites. However, Fleet Weather reports improving conditions in the next hours, and RORSAT pass is expected at time 0028Z. The US Air Force is attempting to shoot this satellite down over the Pacific, but should they fail, intel confirms we should expect Regiment-level Backfire raids.\n\nUSS Dwight D. Eisenhower must survive.|Start mission
Taskforce1BLUFORVictoryMessage=VICTORY|04JUL1988\nFLASH\nFM CTF 65.7\nTO NATO HQ\n\n1. We assess that all WP forces have been eliminated. We are scrambling all MPRA assets to search the area for remaining vessels.\n\n2. Full report to come within 12 hours, but assess that victory is ours.|Exit mission
Taskforce1RORSATwarningmessageMessage=FLASH MESSAGE|04JUL1988\nFLASH\nFM CINCLANTFLT\nTO CTF 65.7\n\n1. (S) WARNING: at time 2358Z, US Air Force mission to shoot down Kosmos 1932 recon satellite off Vandenberg AFB failed and RORSAT remains operational.\n\n2. (S) Evaluate RORSAT will pass over TF 65.7 position at time 0028Z.\n\n3. (S) We estimate that targeting data on EISENHOWER and battle group will be passed to REDFOR units in the oparea by 0100Z.\n\n4. (S) Compartmented source RED DREAM sends warning Backfire raid takeoff 2230Z from Kola heading west, likely awaiting targeting data. Set Air Warning RED. Good luck and good hunting.|Acknowledge & continue
Taskforce1EisenhowermustsurviveMessage=DEFEAT|04JUL1988\nFLASH\nFM CINCLANTFLT\nTO NATO HQ\n\n1. (S) We have lost contact with CTF 65.7. Last communication reported inbound missiles and we assess TF 65.7 has been destroyed.\n\n2. (S) We are dispatching MPRA and other vessels to the area to look for survivors.|Exit mission
Taskforce1VictorIIIwarningmessageDatumA01Message=FLASH MESSAGE|04JUL1988\nFLASH\nFM CINCLANTFLT\nTO CTF 65.7\n\n1. (S) WARNING: Royal Navy towed array patrol reports intermittent sonar contact possibly correlating to VICTOR or ALFA class submarine NW of Faroe Islands.\n\n2. (S) Datum A01 has been established at position 62.4N, 9.98W at time 0032Z.\n\n3. (S) Assess this submarine supporting KIROV SAG. Prosecute this datum if tactical situation permits and report location of any sinkings. Good luck and good hunting.|Acknowledge & continue
Taskforce1SURTASSdestroyednosubdatumMessage=FLASH MESSAGE|04JUL1988\nFLASH\nFM CINCLANTFLT\nTO CTF 65.7\nINFO MODUK\nINFO UK TOWED ARRAY COMMAND\n\n1. (TS) Royal Navy reports their UK-flagged towed array sonar platform with sensitive acoustic equipment came under attack by NATO forces and has been destroyed.\n\n2. (TS) Before sinking, UK towed sonar detected enemy submarine signature west of Faroes.\n\n3. (TS) Assess up to 2 enemy submarines active near TF 65.7, but no detailed datum passed before trawler sank. \n\n5. (S) On completion of operation, CTF 65.7 directed to board earliest available military flight to London and report to Admiralty GHQ for debriefing.|Acknowledge & continue
Trigger8Condition_Condition1AreaLabel=Datum A01
Objective_DestroyKirovSAG=Destroy the Kirov SAG
Objective_EisenhowerMustSurvive=USS Dwight D. Eisenhower must survive
[Language_cn]
Name=05A重磅炸弹行动（北约）
Description=我们发现一个强大的苏联水面行动群正在靠近GIUK缺口。指挥艾森豪威尔号战斗群找到并摧毁它。
NeutralVessel12NameOverride=英国监视拖曳阵列传感器系统
NeutralVessel12ShortNameOverride=英国监视拖曳阵列传感器系统
Taskforce1StartmessageMessage=<size=20>冲突演算：第5部分（北约）</size>\n重磅炸弹行动|一个以基洛夫号巡洋舰为核心的苏联水面行动群已经离开摩尔曼斯克，正在尝试进入大西洋。指挥第65.7特遣舰队和德怀特·D·艾森豪威尔号航母战斗群找到并摧毁它。\n\n艾森豪威尔号隐藏在恶劣天气之下，目前尚未被苏联飞机和卫星发现，但舰队气象报告指出天气会在未来数小时内好转，且苏联的雷达型海洋监视卫星预计会在0028Z时飞越。美国空军正在尝试将此卫星击落在太平洋上空，但如果他们失败，情报已确认我们会遭遇航空团级规模的图-22M轰炸机突袭。\n\n德怀特·D·艾森豪威尔号不能被击沉。|开始任务
Taskforce1BLUFORVictoryMessage=任务完成！|1988年7月4日\n紧急\n发件：第65.7特遣舰队司令\n收件：北约总部\n\n1. 根据评估，所有华约部队已被消灭。所有海上巡逻侦察机正在紧急起飞以搜索此区域内的剩余船只。\n\n2.完整报告将在未来12小时内发送，但根据评估，我方已经胜利。|开始任务
Taskforce1RORSATwarningmessageMessage=紧急消息|1988年7月4日\n紧急\n发件：大西洋舰队总司令\n收件：第65.7特遣舰队司令\n\n1.（机密）警告：从范登堡起飞的美国空军于2358Z时尝试击落宇宙1932号卫星，但任务失败，敌方雷达型海洋监视卫星仍在运行。\n\n2.（机密）预计敌方雷达型海洋监视卫星将于0028Z时飞越第65.7特遣舰队上空。\n\n3.（机密）预计关于艾森豪威尔号及其战斗群的瞄准信息将于0100Z时被发送至红方单位。\n\n4.（机密）分隔情报来源“红色梦想”已发出警告称图-22M突袭队已于2230Z时从科拉半岛起飞并向西航行，很可能在等待瞄准数据。设置红色防空警报。祝你好运，猎杀愉快。|收到并继续
Taskforce1EisenhowermustsurviveMessage=任务失败！|1988年7月4日\n紧急\n发件：大西洋舰队总司令\n收件：北约总部\n\n1.（机密）我们失去了与第65.7特遣舰队指挥官的联系，最后的通信报告了来袭的导弹，我们评估第65.7特遣舰队已被消灭。\n\n2.（机密）我们正在向此区域派出海上巡逻侦察机和其他船只以搜寻幸存者。|退出任务
Taskforce1VictorIIIwarningmessageDatumA01Message=紧急消息|1988年7月4日\n紧急\n发件：大西洋舰队总司令\n收件：第65.7特遣舰队司令\n\n1.（机密）警告：英国皇家海军拖曳阵列巡逻队报告了法罗群岛西北方的间歇性声呐接触，可能是671型或705型潜艇。\n\n2.（机密）基准点A01已于0032Z时建立在位置62.4N，9.98W。\n\n3.（机密）根据评估，此潜艇会支援基洛夫号水面行动群。如果战术态势允许，攻击此基准点并报告击沉的位置。祝你好运，猎杀愉快。|收到并继续
Taskforce1SURTASSdestroyednosubdatumMessage=紧急消息|1988年7月4日\n紧急\n发件：大西洋舰队总司令\n收件：第65.7特遣舰队司令\n抄送：英国国防部\n抄送：英国拖曳阵列司令部\n\n1.（绝密）英国皇家海军报告称他们悬挂英国国旗的拖曳阵列声呐平台遭到了北约部队攻击且已被摧毁。\n\n2.（绝密）在沉没之前，英国的拖曳声呐在法罗群岛以西探测到了敌方潜艇特征。\n\n3.（绝密）根据评估，至多有2艘潜艇在第65.7特遣舰队附近活动，但拖网渔船沉没前未发送详细数据。\n\n5.（机密）行动完成后，第65.7特遣舰队司令乘坐第一班可用的军机前往伦敦向英国海军部进行汇报。|收到并继续

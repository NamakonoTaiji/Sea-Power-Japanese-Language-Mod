[Language_de]
Name=05A Operation Blockbuster (NATO)
Description=Eine starker sowjetische Kampfverband wurde auf dem Weg zur GIUK-Lücke entdeckt. Übernehmen Sie das Kommando über die Eisenhower-Kampfgruppe, um sie aufzuspüren und zu vernichten.
NeutralVessel12NameOverride=UK SURTASS
NeutralVessel12ShortNameOverride=UK SURTASS
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Teil 5 (NATO)</size>\nOPERATION BLOCKBUSTER|Ein sowjetischer Kampfverband unter Führung des Kreuzers Kirow hat Murmansk verlassen und versucht, in den Atlantik vorzudringen. Übernehmen Sie das Kommando über Task Force 65.7 und die Carrier Battle Group um die USS Dwight D. Eisenhower, um den feindlichen Verband zu lokalisieren und zu vernichten.\n\nDie Eisenhower konnte sich bislang durch das Ausnutzen des schlechten Wetters der Aufklärung durch sowjetische Satelliten und Flugzeuge entziehen. Allerdings meldet der Fleet Weather Service eine Wetterbesserung in den nächsten Stunden. Ein Überflug des RORSAT-Aufklärungssatelliten wird für 0028Z erwartet. Die US Air Force versucht derzeit, diesen Satelliten über dem Pazifik abzuschießen. Sollte dies scheitern, ist laut Geheimdienst mit Backfire-Bomberangriffen in Regimentsstärke zu rechnen.\n\nDie USS Dwight D. Eisenhower muss überleben.|Mission Starten
Taskforce1BLUFORVictoryMessage=SIEG|04.JULI 1988\nBLITZ\nVON CTF 65.7\nAN NATO HQ\n\n1. Wir gehen davon aus, dass alle Streitkräfte des Warschauer Pakts ausgeschaltet wurden. Alle verfügbaren Seefernaufklärer (MPRA) werden gestartet, um das Gebiet nach verbliebenen Einheiten abzusuchen.\n\n2. Ein vollständiger Bericht folgt innerhalb der nächsten 12 Stunden – doch wir gehen davon aus, dass der Sieg unser ist.|Mission Beenden
Taskforce1RORSATwarningmessageMessage=BLITZ-MELDUNG|04.JULI 1988\nBLITZ\nVON CINCLANTFLT\nAN CTF 65.7\n\n1. (S) WARNUNG: Um 2358Z ist die Mission der US Air Force zur Zerstörung des Aufklärungssatelliten Kosmos 1932 nahe der Vandenberg AFB fehlgeschlagen. RORSAT bleibt einsatzfähig.\n\n2. (S) Es wird vermutet, dass RORSAT die Position von TF 65.7 um 0028Z überfliegen wird.\n\n3. (S) Wir schätzen, dass Zieldaten zur EISENHOWER und der Kampfgruppe bis spätestens 0100Z an feindliche Einheiten im Operationsgebiet übermittelt werden.\n\n4. (S) Eine interne Quelle (RED DREAM) meldet Start eines Backfire-Bomberangriffs um 2230Z von der Kola-Halbinsel Richtung Westen. Angriff wahrscheinlich nach Zielzuweisung. Luftalarmstufe ROT ausrufen. Viel Glück – und gute Jagd.|Bestätigen & Fortfahren
Taskforce1EisenhowermustsurviveMessage=NIEDERLAGE|04.JULI 1988\nBLITZ\nVON CINCLANTFLT\nAN NATO HQ\n\n1. (S) Wir haben den Kontakt zu CTF 65.7 verloren. Die letzte Übertragung berichtete von anfliegenden Raketen. Wir gehen davon aus, dass TF 65.7 vollständig zerstört wurde.\n\n2. (S) Seefernaufklärer (MPRA) sowie weitere Schiffe werden in das Gebiet entsandt, um nach Überlebenden zu suchen.|Mission Beenden
Taskforce1VictorIIIwarningmessageDatumA01Message=BLITZ-MELDUNG|04.JULI 1988\nBLITZ\nVON CINCLANTFLT\nAN CTF 65.7\n\n1. (S) WARNUNG: Ein Patrouillenverband der Royal Navy mit Schleppsonar meldet intermittierenden Sonarkontakt, möglicherweise zuzuordnen einer VICTOR- oder ALFA-Klasse nordwestlich der Färöer-Inseln.\n\n2. (S) Position A01 wurde um 0032Z bei 62.4N, 9.98W festgelegt.\n\n3. (S) Es wird angenommen, dass dieses U-Boot zur Unterstützung der KIROV-Kampfgruppe operiert. Führen Sie eine Bekämpfung durch, sofern es die taktische Lage zulässt, und melden Sie die Position möglicher Versenkungen. Viel Glück – und gute Jagd.|Bestätigen & Fortfahren
Taskforce1SURTASSdestroyednosubdatumMessage=BLITZ-MELDUNG|04.JULI 1988\nBLITZ\nVON CINCLANTFLT\nAN CTF 65.7\nINFO MODUK\nINFO UK TOWED ARRAY COMMAND\n\n1. (VS) Die Royal Navy meldet, dass der unter britischer Flagge operierende Patrouillenverband durch NATO-Streitkräfte angegriffen und zerstört wurde.\n\n2. (VS) Vor dem Untergang hat die britische Patrouille eine feindliche U-Boot-Signatur westlich der Färöer-Inseln erfasst.\n\n3. (VS) Es wird davon ausgegangen, dass bis zu zwei feindliche U-Boote in der Nähe von TF 65.7 aktiv sind, jedoch konnten keine präzisen Positionsdaten mehr übermittelt werden, bevor das Schiff sank. \n\n5. (S) Nach Abschluss der Operation wird CTF 65.7 befohlen, den frühestmöglichen Militärflug nach London zu besteigen und sich beim Admiralty GHQ zur Nachbesprechung zu melden.|Bestätigen & Fortfahren

DisableEnemyAIPlayer=True
[Language_en]
Name=02 Operation Revenge (Soviet)
Description=Yesterday, an overly aggressive USSR Commander attacked and seized the USNS Cape Girardeau in the Barents Sea, killing U.S. crewmen in the process. NATO responded immediately with force, targeting and sinking the USSR warships using two Norwegian submarines operating in the area. While concerns grow over rising hostilities and the threat of nuclear war, USSR men and ships lay at the bottom of the ocean and their death cannot go unanswered. The Kremlin has ordered you to locate a U.S. Task Force en route from Attu Island to Japan and sink it.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingText_en.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingMap_en.xml
Taskforce2StartmessageMessage=<size=20>Calculus of Conflict: Part 2</size>\nOPERATION REVENGE|Yesterday, NATO forces attacked our warships in our territorial seas. Command has ordered Task Force Vostok to get underway from Petropavlovsk immediately to seek out and destroy a known American surface group transiting from Attu to Japan.\n\nFriendly air from Kamchatka Air Base is scrambling to get airborne now, with Tu-95RT recon aircraft overhead shortly and a flight of Tu-22M bombers behind them. The U.S. Task Force is superior in strength. Utilize TF Vostok and the air assets to neutralize the enemy threat.\n\nAt least one of your ships must survive.|Start mission
StartmessageAreaLabel=Estimated Position of U.S. Task Force
Taskforce2USSRReconChopMessage=AIRCRAFT CHECK IN|Commander,\n\nRecon flight on station, ready for search pattern, over.|Acknowledged!
Taskforce2RedVictoryMessage=VICTORY|Commander,\n\n1. HQ assesses that all U.S. vessels are destroyed, excellent work.\n\n2. Fall back to friendly waters and await further instructions, we are planning follow on operations on Attu Island.|Exit mission
Taskforce2BLUFORVictoryMessage=DEFEAT|TO KREMLIN HQ\nFM PACIFIC FLEET (TOF)\n\nWe have lost all contact with Task Force Vostok. We assess that the Americans have destroyed them. Air assets are being scrambled to locate and destroy the U.S. Task Force.|Exit mission
Taskforce2USSRBomberChopMessage=AIRCRAFT CHECK IN|Commander,\n\nBombers on station, requesting strike coordinates, over.|Acknowledged!
Objective_OnePlayerShipMustSurvive=At least one player ship must survive
Objective_DestroyUSNSAG=Destroy the USN SAG
[Language_cn]
Name=02复仇行动（苏联）
Description=昨天，一名过于激进的苏联指挥官攻击并扣押了美军部署在巴伦支海的吉拉多角号，在此过程中杀死了美国船员。北约立即以武力回应，使用两艘在此区域行动的挪威潜艇瞄准并击沉了苏联军舰。人们越来越担心敌对行动的加剧与核战争的威胁，但苏联的战士和军舰已沉入海底，我们不能无视死难者。克里姆林宫已命令你找到一支从阿图岛前往日本的美国特遣舰队并将其击沉。
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingText_cn.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingMap_cn.xml
Taskforce2StartmessageMessage=<size=20>冲突演算：第2部分</size>\n复仇行动|昨天，北约部队在我们的领海攻击了我们的军舰。指挥部已命令东方特遣舰队立即从彼得罗巴甫洛夫斯克出发，找到并摧毁一个从阿图岛前往日本的美国水面编队。\n\n来自勘察加航空基地的友方飞机正在紧急起飞，图-95RT侦察机不久将抵达目标空域，图-22M轰炸机将紧随其后。美国特遣舰队的战斗力更胜一筹。利用东方特遣舰队和空中资产消灭敌方威胁。\n\n你至少有一艘船只不被击沉。|开始任务
StartmessageAreaLabel=美国特遣舰队预计位置
Taskforce2USSRReconChopMessage=飞机入场|指挥官，\n\n侦察机就位，已准备搜索模式，完毕。|收到！
Taskforce2RedVictoryMessage=任务完成！|指挥官，\n\n1.总部评估所有美国船只已被摧毁，干得好。\n\n2.撤退至友方水域并等待进一步指示，我们正在计划针对阿图岛的后续行动。|退出任务
Taskforce2BLUFORVictoryMessage=任务失败！|发件：太平洋舰队\n收件：克里姆林宫总部\n\n我们已失去与东方特遣舰队的所有联系，我们评估美国人已将其摧毁。空中资产正在紧急起飞以找到并摧毁美国的特遣舰队。|退出任务
Taskforce2USSRBomberChopMessage=飞机入场|指挥官，\n\n轰炸机已就位，请求打击坐标，完毕。|收到！
Objective_OnePlayerShipMustSurvive=你至少有一艘船只不被击沉
Objective_DestroyUSNSAG=摧毁美国水面行动群
[Language_ru]
Name=02 Операция «Месть» (CCCP)
[Language_de]
Name=02 Operation Revenge (Sowjet)
Description=Gestern griff ein übermotivierter sowjetischer Kommandeur die USNS Cape Girardeau in der Barentssee an und brachte das Schiff unter seine Kontrolle, wobei Mitglieder der US-Besatzung getötet wurden. Die NATO reagierte umgehend mit Waffengewalt und versenkte die sowjetischen Kriegsschiffe durch den Einsatz zweier norwegischer U-Boote in der Region. Während die Sorge vor einer weiteren Eskalation und der Bedrohung durch einen Nuklearkrieg wächst, liegen sowjetische Schiffe und Seeleute auf dem Grund des Ozeans – und ihr Tod darf nicht unbeantwortet bleiben. Der Kreml hat Ihnen den Befehl erteilt, eine US-amerikanische Einsatzgruppe, die von der Insel Attu nach Japan verlegt, zu lokalisieren und zu versenken.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingText_de.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingMap_de.xml
Taskforce2StartmessageMessage=<size=20>Calculus of Conflict: Teil 2</size>\nOPERATION REVENGE|Gestern haben Streitkräfte der NATO unsere Kriegsschiffe in unseren Hoheitsgewässern angegriffen. Das Oberkommando hat den Befehl erteilt, dass Task Force Wostok sofort von Petropawlowsk aus in Marsch gesetzt wird, um eine amerikanische Überwasser-Kampfgruppe, die von Attu nach Japan verlegt, aufzuspüren und zu vernichten.\n\nUnterstützung vom vom verbündeten Luftwaffenstützpunkt Kamtschatka steigt bereits auf: Aufklärungsflugzeuge vom Typ Tu-95RT werden in Kürze das Einsatzgebiet überfliegen, gefolgt von einer Staffel Tu-22M-Bomber. Die US-Kampfgruppe ist uns in puncto Stärke überlegen – setzen Sie TF Wostok sowie die verfügbare Luftünterstützung gezielt ein, um die Bedrohung zu neutralisieren.\n\nMindestens eines Ihrer Schiffe muss überleben.|Mission Starten
StartmessageAreaLabel=Vermutete Position der US-Kampfgruppe
Taskforce2USSRReconChopMessage=LUFTUNTERSTÜTZUNG MELDET|Kommandant,\n\nDie Luftaufklärung hat die Zielposition erreicht und ist bereit zur Suche. Ende.|Bestätige!
Taskforce2RedVictoryMessage=SIEG|Kommandant,\n\n1. Das Hauptquartier bestätigt, dass alle US-Schiffe zerstört wurden – ausgezeichnete Arbeit.\n\n2. Ziehen Sie sich zurück und warten Sie auf weitere Anweisungen. Folgeoperationen auf der Insel Attu befinden sich in Planung.|Mission Beenden
Taskforce2BLUFORVictoryMessage=NIEDERLAGE|AN DEN KREML\nVON PAZIFIKFLOTTE (TOF)\n\nWir haben jeglichen Kontakt zur Task Force Wostok verloren. Es wird davon ausgegangen, dass sie von amerikanischen Kräften vollständig vernichtet wurde. Luftstreitkräfte werden derzeit mobilisiert, um die US-Einsatzgruppe aufzuspüren und zu vernichten.|Mission Beenden
Taskforce2USSRBomberChopMessage=LUFTUNTERSTÜTZUNG MELDET|Kommandant,\n\nBomber haben die Zielposition erreicht und fordern Zielkoordinaten an. Ende.|Bestätige!
Objective_OnePlayerShipMustSurvive=Mindestens eines der Spielerschiffe muss den Einsatz überleben.
Objective_DestroyUSNSAG=Vernichten Sie die Kampfgruppe der US Navy

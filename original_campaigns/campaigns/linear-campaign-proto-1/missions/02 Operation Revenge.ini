[Language_ko]
Name=02 리벤지 작전 (소련)
Description=어제 극도로 호전적인 소련군 지휘관이 USNS 케이프 지라도함을 바렌츠해에서 나포하였으며 그 과정에서 미국인 선원들이 살해되었습니다. NATO군은 이에 즉각적으로 대응하여 소련군 수상함대를 격침시켰으며 이 과정에서 핵전쟁으로 확전될 가능성이 우려되는 가운데 격침된 소련 해군의 복수를 위해서 크렘린은 당신에게 애투 섬에서 일본으로 향하는 미 해군 수상전단을 격침시키라 명령했습니다.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingText_ko.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingMap_ko.xml
Taskforce2StartmessageMessage=<size=20>분쟁의 미적분학: 파트 2</size>\\n리벤지 작전|어제 나토군이 우리 영해에서 우리 군함을 공격했습니다. 사령부는 페트로파블롭스크에서 태스크포스 보스토크를 즉시 출발시켜 애투에서 일본으로 이동하는 알려진 미국 지상군을 찾아내 파괴하라고 명령했습니다.\\n\\n캄차카 공군 기지의 아군기가 곧 머리 위로 날아가고 Tu-95RT 정찰기가 뒤를 따라 Tu-22M 폭격기가 비행하는 등 지금 항공기를 띄우기 위해 분주히 움직이고 있습니다. 미국 태스크 포스는 전력 면에서 우수합니다. TF 보스토크와 공군 자산을 활용하여 적의 위협을 무력화하세요.\\n\\n적어도 한 척의 배는 살아남아야 합니다.|미션 시작
StartmessageAreaLabel=미국 태스크 포스의 예상 위치
Taskforce2USSRReconChopMessage=항공기 점검중|사령관님,\n\n정찰기가 대기 중이며, 정찰 명령을 요청합니다, 이상.|확인됨!
Taskforce2RedVictoryMessage=승리|사령관님,\n\n1. 본부는 모든 미국 선박이 파괴되었고, 작업이 훌륭하다고 평가합니다.\n\n2. 우호 해역으로 돌아가서 추가 지시를 기다리시면, 저희는 애투 섬에서의 작전을 추적할 계획입니다.|임무 종료
Taskforce2BLUFORVictoryMessage=패배|수신: 크렘린 사령부\n발신: 태평양함대(TOF)\n\n태스크 포스 보스토크와 모든 연락이 끊겼습니다. 우리는 미국인들이 그들을 파괴했다고 평가합니다. 공군 자산이 미국 태스크포스를 찾아 파괴하기 위해 분주히 움직이고 있습니다.|임무 종료
Taskforce2USSRBomberChopMessage=항공기 점검중|사령관님,\n\n폭격기가 대기 중이며, 공격 좌표를 요청합니다, 이상.|확인됨!
Objective_OnePlayerShipMustSurvive=적어도 한 척의 플레이어 함선은 반드시 살아남아야 함
Objective_DestroyUSNSAG=미해군 수상전단 격파
[Language_ja]
Name=02 リベンジ作戦 (ソビエト)
Description=昨日、バレンツ海にて独断に走ったソ連軍指揮官がUSNSケープ・ジラルドーを強襲・拿捕し、その過程で米乗組員を殺害した。これに対しNATOは即座に武力行使に踏み切り、同海域で活動中だった2隻のノルウェー潜水艦によって我が方の軍艦が撃沈された。紛争の激化と核戦争の脅威に懸念が高まる中、海底に沈んだソ連水兵たちの死を看過することは断じて許されない。クレムリンは貴官に対し、アッツ島から日本へ向かう米任務部隊を捕捉・撃沈することを命じた。
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingText_ja.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\02 Operation Revenge_Briefing\BriefingMap_ja.xml
Taskforce2StartmessageMessage=<size=20>衝突の数理：第2部</size>\nリベンジ作戦|昨日、NATO軍が我が国の領海内において我が方の軍艦を攻撃した。司令部はヴォストーク任務部隊に対し、アッツ島から日本へ転進中である米水上部隊を捕捉・撃滅すべく、ペトロパブロフスクより直ちに出撃することを命じた。\n\n現在、カムチャツカ空軍基地より友軍機が緊急発進中である。間もなくTu-95RT偵察機が上空に到着し、その後方にTu-22M爆撃隊が続く。敵任務部隊の戦力は強大である。ヴォストーク任務部隊と航空戦力を結集し、敵の脅威を排除せよ。\n\n少なくとも1隻の自軍艦艇が生存しなければならない。|作戦開始
StartmessageAreaLabel=米任務部隊推定位置
Taskforce2USSRReconChopMessage=航空部隊入電|指揮官、偵察機が配置に就いた。捜索パターン準備完了、送れ。|了解！
Taskforce2RedVictoryMessage=勝利|指揮官、\n\n1. 司令部は米艦艇の全滅を確認した。実に見事な手際だ。\n\n2. 友軍海域まで後退し、次命を待て。現在、アッツ島への継続作戦を立案中である。|作戦終了
Taskforce2BLUFORVictoryMessage=敗北|発：太平洋艦隊（TOF）\n宛：クレムリン総司令部\n\nヴォストーク任務部隊との通信が途絶した。米軍によって殲滅されたものと判断される。現在、米任務部隊を捕捉・撃破すべく航空戦力を緊急発進させている。|作戦終了
Taskforce2USSRBomberChopMessage=航空部隊入電|指揮官、爆撃隊が配置に就いた。攻撃座標を要請する、送れ。|了解！
Objective_OnePlayerShipMustSurvive=少なくとも1隻の自軍艦艇の生存
Objective_DestroyUSNSAG=米海軍水上戦闘群（SAG）の撃滅

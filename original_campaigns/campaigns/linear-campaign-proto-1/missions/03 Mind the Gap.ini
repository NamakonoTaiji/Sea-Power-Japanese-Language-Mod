
[Debug]
DisableEnemyAIPlayer=True
[Language_en]
Name=03 Mind the Gap (NATO)
Description=After the events of 09-10MAY, both NATO and the Warsaw Pact are rapidly mobilizing their forces into a wartime posture. The USSR is deploying its submarine fleet and is attempting to break out its submarines into the North Atlantic. Task Group Greyhound, from U.S. 2nd Fleet, has been directed to cover the approaches of the GIUK Gap and to stop all USSR submarines from entering the Atlantic.
NeutralAircraft1ShortNameOverride=Mad Fox
Trigger4Condition_Condition1AreaLabel=Datum A01
Trigger5Condition_Condition1AreaLabel=Datum B01
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Part 3</size>\nMIND THE GAP|USSR submarines are attempting to break through the GIUK Gap into the Atlantic. The US forces in the area have been tasked to locate and sink them.\n\nThree submarines are missing from latest imagery out of Polyarny and expected in the area. P-3C callsign "Mad Fox" is inbound from RAF Stornoway to assist search.\n\nNAVFAC Keflavik is attempting rough fix on each submarine and will pass datums to your force when available. Locate and destroy all USSR submarines.\n\nAt least one of your ships must survive.|Start mission
Taskforce1P-3CcheckinMessage=AIRCRAFT CHECK IN|"Greyhound, this is Mad Fox, checking in from the West, nine souls on board, 4+30 playtime, eight bloodhounds, mixed bag of sonobuoys.\n\nReady for tasking, over."|Acknowledged!
Taskforce1Tangosunkortime-activateDatumA01Message=FLASH MESSAGE|FM CINCLANTFLT\nTO CTG GREYHOUND\n\n1. WARNING: NAVFAC Keflavik reports sonar contact. Datum A01 has been established N of TG Greyhound current position at time 1358Z.\n\n2. Acoustic signature matches USSR VICTOR class SSN.\n\n3. NAVFAC Keflavik will continue to pass SOSUS data. Good luck.|Acknowledge & continue
Taskforce1K-503CharlieIIIwarningmessageMessage=FLASH MESSAGE|FM CINCLANTFLT\nTO CTG GREYHOUND\n\n1. WARNING: NAVFAC Keflavik reports intermittent sonar contact east of Iceland. Datum B01 has been established at 1410Z.\n\n2. SOSUS reports twin-screw tonals. Assess this contact as CHARLIE II class SSGN.\n\n3. CHARLIE II SSGN carries 8 x SS-N-9 missiles with approx 80nm range.|Acknowledge & continue
Taskforce1PlayervictoryMessage=MISSION ACCOMPLISHED|FM CINCLANTFLT\nTO CTG GREYHOUND\n\n1. NAVFAC Keflavik is reporting three independent implosions. Assess all submarines operating in the area have been neutralized.\n\n2. TG Greyhound directed to Reykjavik for rest and refit. Excellent performance by all hands. CINCLANT sends.|Exit mission
Taskforce1Playerdefeat-subescapeMessage=MISSION FAILED|FM CINCLANTFLT\nTO CTG GREYHOUND\n\n1. NAVFAC Keflavik reports enemy sonar contacts have broken through GIUK Gap.\n\n2. Greyhound is directed to fall back to the North Atlantic Ridge and prepare to regain contact.\n\n3. Additional air assets have been redirected from critical theaters to reinforce.|Exit mission
Taskforce1OneshipmustsurviveMessage=MISSION FAILED|FM CINCLANTFLT\nTO JCS WASHINGTON DC\n\n1. WARNING: Contact has been lost with TG Greyhound.\n\n2. Greyhound was tasked with intercepting USSR submarines attempting to breach the GIUK Gap and enter the North Atlantic.\n\n3. We assess that these ships are lost to enemy action. Critical air assets will be redirected from other theaters to locate the USSR submarines. We are requesting support from RAF to search for survivors.|Exit mission
Taskforce11minrevealTangoMessage=VHF RADIO CALL|"Greyhound, Greyhound, this is USS Hart. We have an intermittent sonar contact off our bow. We are prosecuting, requesting support, over."\n\n<size=16>USS Thomas C. Hart's contact is now shown on the map!</size>|Acknowledge & continue
Objective_OnePlayerShipMustSurvive=At least one player ship must survive
Objective_DestroyUSSRSubs=Destroy all USSR submarines encountered
[Language_cn]
Name=03注意缺口（北约）
Description=在5月9日至10日的事件之后，北约和华约都在迅速动员部队，进入战时状态。苏联正在部署潜艇舰队，尝试派潜艇突破封锁进入北大西洋。美国第二舰队下属的灰猎犬特遣大队收到命令封锁GIUK缺口的航道，阻止任何苏联潜艇进入大西洋。
NeutralAircraft1ShortNameOverride=疯狐
Trigger4Condition_Condition1AreaLabel=基准点A01
Trigger5Condition_Condition1AreaLabel=基准点B01
Taskforce1StartmessageMessage=<size=20>冲突演算：第3部分</size>\n注意缺口|苏联潜艇正在尝试从GIUK缺口突破封锁进入大西洋。此区域内的美军收到命令搜寻并击沉它们。\n\n3艘潜艇已从波利亚尔内基地的最新图像上消失，预计会出现在此区域。呼号“疯狐”的P-3C已从英国皇家空军斯托诺韦基地起飞以协助搜索。\n\n海军设施工程系统司令部驻凯夫拉维克单位正在尝试确定每艘潜艇的大致方位，会在完成后向你的部队发送基准点。找到并摧毁所有苏联潜艇。\n\n你至少有一艘船只不被击沉。|开始任务
Taskforce1P-3CcheckinMessage=飞机入场|灰猎犬，这里是疯狐，正在从西方入场，机上有9人，剩余巡逻时间4小时30分，携带主被动声呐浮标和8枚鱼雷。\n\n准备执行任务，完毕。|收到！
Taskforce1Tangosunkortime-activateDatumA01Message=紧急消息|发件：大西洋舰队总司令\n收件：灰猎犬特遣大队指挥官\n\n1.提示：海军设施工程系统司令部驻凯夫拉维克单位报告了声呐接触。基准点A01已于1358Z时在灰猎犬特遣大队当前位置以北建立。\n\n2.其声学特征与苏联的671RTM型核潜艇相符。\n\n3.海军设施工程系统司令部驻凯夫拉维克单位将继续传输声波监听系统数据。祝你好运。|收到并继续
Taskforce1K-503CharlieIIIwarningmessageMessage=紧急消息|发件：大西洋舰队总司令\n收件：灰猎犬特遣大队指挥官\n\n1.提示：海军设施工程系统司令部驻凯夫拉维克单位在冰岛以东报告了间歇性声呐接触。基准点B01已于1410Z时建立。\n\n2.声波监听系统报告了双螺旋桨声呐信号。评估此接触为670M型巡航导弹核潜艇。\n\n3.670M型巡航导弹核潜艇携带8枚射程约为80海里的P-120导弹。|收到并继续
Taskforce1PlayervictoryMessage=任务完成！|发件：大西洋舰队总司令\n收件：灰猎犬特遣大队指挥官\n\n1.海军设施工程系统司令部驻凯夫拉维克单位报告了三次独立的爆炸。我们评估在此区域内活动的所有潜艇已被摧毁。\n\n2.灰猎犬特遣大队返回雷克雅未克休整。全体官兵表现出色。|退出任务
Taskforce1Playerdefeat-subescapeMessage=任务失败！|发件：大西洋舰队总司令\n收件：灰猎犬特遣大队指挥官\n\n1.海军设施工程系统司令部驻凯夫拉维克单位报告敌方声呐接触已突破GIUK缺口。\n\n2.灰猎犬特遣大队撤回北大西洋海岭并准备重新接敌。\n\n3.我们已从关键战区调集更多空中资产以进行增援。|退出任务
Taskforce1OneshipmustsurviveMessage=任务失败！|发件：大西洋舰队总司令\n收件：华盛顿特区参谋长联席会议\n\n1.提示：我们失去了与灰猎犬特遣大队的联系。\n\n2.灰猎犬特遣大队曾收到命令拦截尝试突破GIUK缺口进入北大西洋的苏联潜艇。\n\n3.我们评估这些船只已被敌方击沉。我们将从其他战区调集关键空中资产以搜寻苏联潜艇。我们正在请求英国皇家空军支援以搜寻幸存者。|退出任务
Taskforce11minrevealTangoMessage=甚高频无线电呼叫|灰猎犬，灰猎犬，这里是哈特号护卫舰。我们前方有间歇性声呐接触。我们正在进行侦察，请求支援，完毕。\n\n<size=16>托马斯·C·哈特号的接触已在地图上显示！</size>|收到并继续
Objective_OnePlayerShipMustSurvive=你至少有一艘船只不被击沉
Objective_DestroyUSSRSubs=摧毁遭遇的所有苏联潜艇
[Language_ru]
Name=03 Mind the Gap (NATO)
[Language_de]
Name=03 Achtung, Lücke (NATO)
Description=Nach den Ereignissen vom 09. und 10. Mai mobilisieren sowohl die NATO als auch die UdSSR ihre Streitkräfte, um Kriegsbereitschaft herzustellen. Die UdSSR setzt ihre U-Boot-Flotte in Bewegung und versucht, strategische Raketen-U-Boote (SSBNs) in den Nordatlantik zu verlegen, um das NATO-Gebiet zu bedrohen. Die Task Group Greyhound der US-amerikanischen 2. Flotte wurde beauftragt, die östlichen Zugänge zur GIUK-Lücke zu sichern und sowjetische U-Boote um jeden Preis zu stoppen. Die Einsatzregeln (ROE) erlauben das Angreifen aller unbekannten U-Boot-Kontakte.
NeutralAircraft1ShortNameOverride=Mad Fox
Trigger4Condition_Condition1AreaLabel=Datum A01
Trigger5Condition_Condition1AreaLabel=Datum B01
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Teil 3</size>\nACHTUNG, LÜCKE|Sowjetische U-Boote versuchen die GIUK-Lücke zu durchbrechen und in den Atlantik vorzustoßen. Die in der Region eingesetzten US-Streitkräfte haben den Auftrag, diese aufzuspüren und zu versenken.\n\nVier U-Boote fehlen auf den neuesten Satellitenbildern und werden in Ihrem Einsatzgebiet vermutet.Eine P-3C mit dem Rufzeichen „Mad Fox“ ist von der Luftwaffenbasis Thule im Anflug, um die Suche zu unterstützen.\n\nMindestens eines Ihrer Schiffe muss überleben.|Mission Starten
Taskforce1P-3CcheckinMessage=FLUGZEUG MELDET SICH|Greyhound, hier Mad Fox. Melde mich aus westlicher Richtung. Neun Personen an Bord, Einsatzdauer 4 Stunden und 30 Minuten, acht „Bloodhounds“ verfügbar, gemischte Sonobojen an Bord.\n\nBereit zur Einsatzaufnahme, Ende.|Bestätige!
Taskforce1Tangosunkortime-activateDatumA01Message=MISSIONSUPDATE|Kommandant, SOSUS meldet unbekannte U-Boot-Kontakte nördlich von Task Group Greyhound bei Datum B01.\n\nDas Hauptquartier geht davon aus, dass sich mindestens zwei U-Boote in dem Gebiet befinden, Kurs Süd-Südwest. Die Positionen A01 und B01 wurden als Bezugsdaten festgelegt.|Bestätige!
Taskforce1K-503CharlieIIIwarningmessageMessage=MISSIONSUPDATE|Kommandant, J2 hat die nachrichtendienstliche Lage aktualisiert.\n\nEin sowjetisches U-Boot der Charlie-II-Klasse wird derzeit in der Umgebung von Datum C01 vermutet.\n\nCharlie-II ist mit SS-N-9 mit einer Reichweite von 59nm bestückt.|Bestätige!
Taskforce1PlayervictoryMessage=SIEG|VON COMLANTFLT\nAN TG GREYHOUND\n\n1. Gute Arbeit, Kommandant. SOSUS meldet vier unabhängige Implosionen. Es wird angenommen, dass alle in der Region operierenden U-Boote neutralisiert wurden.\n\n2. Die Task Group Greyhound wird zur Erholung und Wiederauffüllung nach Reykjavík verlegt.|Mission Beenden
Taskforce1Playerdefeat-subescapeMessage=NIEDERLAGE|VON COMLANTFLT\nAN TG GREYHOUND\n\n1. SOSUS hat den Durchbruch sowjetischer strategischer Raketen-U-Boote in den Nordatlantik festgestellt.\n\n2. Die Task Group Greyhound wird angewiesen, sich zum nordatlantischen Rücken zurückzuziehen und sich auf die Wiederaufnahme des Kontakts vorzubereiten.|Mission Beenden
Taskforce1OneshipmustsurviveMessage=NIEDERLAGE|VON CINCLANTFLT\nAN JCS WASHINGTON DC\n\n1. WARNUNG: Der Kontakt zur TG Greyhound ist verloren gegangen.\n\n2. Greyhound hatte den Auftrag, sowjetische U-Boote abzufangen, die versuchen, die GIUK-Lücke zu durchbrechen und in den Nordatlantik einzudringen.\n\n3. Wir gehen davon aus, dass diese Schiffe durch Feindeinwirkung verloren gegangen sind. Luftstreitkräfte werden aus anderen Einsatzräumen umgeleitet, um die sowjetischen U-Boote aufzuspüren. Wir ersuchen die RAF um Unterstützung bei der Suche nach Überlebenden.|Mission beenden
Taskforce11minrevealTangoMessage=VHF FUNKMELDUNG|"Greyhound, Greyhound, hier USS Hart. Wir haben einen zeitweiligen Sonarkontakt voraus. Wir verfolgen das Ziel und bitten um Unterstützung, kommen."\n\n<size=16>Der Kontakt der USS Thomas C. Hart wird nun auf der Karte angezeigt!</size>|Bestätigen und fortfahren
Objective_OnePlayerShipMustSurvive=Mindestens eines der Spielerschiffe muss den Einsatz überleben.
Objective_DestroyUSSRSubs=Vernichten Sie alle sowjetischen U-Boote, auf die Sie stoßen.
[Language_es]
Name=03 Mind the Gap (NATO)
[Language_fr]
Name=03 Mind the Gap (NATO)
[Language_ko]
Name=03 발 밑 조심(NATO)
Description=5월 9~10일간의 사건들로 NATO와 소련은 매우 급작스럽게 전투태세를 갖추고 있으며 소련은 잠수함대를 파견하여 북대서양으로 전략원잠들을 침투시켜 NATO 국가들에 대한 위협을 가하려고 합니다. 미 2함대의 그레이하운드 전투단이 GIUK 갭 동쪽에 자리잡아 해당 잠수함들을 처리하려고 합니다. 교전수칙은 발견된 모든 미확인 잠수항적들을 격침시키는것입니다.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingText_ko.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingMap_ko.xml
NeutralAircraft1ShortNameOverride=매드 폭스
Trigger4Condition_Condition1AreaLabel=다툼 A01
Trigger5Condition_Condition1AreaLabel=다툼 B01
Taskforce1StartmessageMessage=<size=20>분쟁의 미적분학: 파트 3</size>\\n발 밑 조심|소련 잠수함들이 GIUK 갭을 뚫고 대서양으로 진입하려고 시도하고 있습니다. 그 지역에 주둔한 미군은 그들을 찾아 침몰시키는 임무를 맡았습니다.\\n\\n폴리아르니에서 최신 이미지에서 잠수함 4척이 실종된 것으로 예상됩니다. P-3C 호출 부호 \"매드 폭스\"가 툴레 AFB에서 검색을 지원하기 위해 도착했습니다.\\n\\n적어도 한 척의 배는 반드시 살아남아야 합니다.|미션 시작
Taskforce1P-3CcheckinMessage=항공기 체크인|그레이하운드, 여기는 매드 폭스. 서쪽에서 체크인, 아홉 명의 영혼이 탑승하고, 4+30 플레이타임, 여덟 명의 블러드하운드, 소노보이 혼합 봉지.\n\n작업 준비 완료, 이상.|확인됨!
Taskforce1Tangosunkortime-activateDatumA01Message=미션 업데이트|사령관님, SOSUS는 다툼 B01에서 TG 그레이하운드 북쪽의 알려지지 않은 잠수함 접촉을 보고했습니다.\n\n본부는 남남서쪽으로 진행 중인 최소 두 척의 잠수함을 평가합니다. 다툼 A01과 B01이 설정되었습니다.|확인됨!
Taskforce1K-503CharlieIIIwarningmessageMessage=미션 업데이트|사령관님, J2의 정보를 업데이트했습니다.\n\n소련의 찰리-II는 다툼 C01의 위치에서 운영되고 있는 것으로 평가됩니다.\n\n찰리-II는 59NM 범위의 SS-N-9를 탑재하고 있습니다.|확인됨!
Taskforce1PlayervictoryMessage=승리|발신: 미국 대서양함대\n수신: TG 그레이하운드\n\n1. 잘했다 사령관, SOSUS 네 군데의 독립이 보고됨. 해당 지역에서 작전 중인 모든 잠수함이 무력화되었음을 평가됨.\n\n2. TGG는 휴식과 수리를 위해 레이캬비크로 향할것.|임무 종료
Taskforce1Playerdefeat-subescapeMessage=패배|발신: 미국 대서양함대\n수신: TG 그레이하운드\n\n1. SOSUS는 소련 탄도 미사일 잠수함이 북대서양으로 침투했음을 감지합니다.\n\n2. TGG는 북대서양 능선으로 후퇴하여 다시 연락을 취할 준비를 해야 합니다.|임무 종료
Objective_OnePlayerShipMustSurvive=적어도 한 척의 플레이어 함선은 반드시 살아남아야 함
Objective_DestroyUSSRSubs=조우한 모든 소련 잠수함을 침몰시키기
[Language_ja]
Name=03 マインド・ザ・ギャップ (NATO)
Description=5月9日から10日の事件を受け、NATOとソ連の双方は戦時体制を整えるべく急速に戦力を動員している。ソ連は潜水艦艦隊を展開し、NATO領土を核の脅威に晒すべく、弾道ミサイル原子力潜水艦（SSBN）を北大西洋へと進出させようとしている。アメリカ第2艦隊所属の任務部隊「グレイハウンド」は、GIUKギャップの東側接近路を封鎖し、いかなる犠牲を払ってもソ連潜水艦を阻止せよとの命を受けた。交戦規定（ROE）に基づき、未確認の潜水艦接触に対する攻撃を許可する。
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingText_ja.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingMap_ja.xml
NeutralAircraft1ShortNameOverride=マッドフォックス
Trigger4Condition_Condition1AreaLabel=デタム A01
Trigger5Condition_Condition1AreaLabel=デタム B01
Taskforce1StartmessageMessage=<size=20>衝突の数理：パート3</size>\nマインド・ザ・ギャップ|ソ連潜水艦がGIUKギャップを突破し、大西洋への侵入を試みている。当該海域の米軍部隊には、これらを捕捉・撃沈する任務が与えられた。\n\nポリャヌイ基地の最新の画像偵察によれば、4隻の潜水艦が所在不明となっており、本海域への進出が予想される。チューレ空軍基地より、コールサイン「マッドフォックス」のP-3Cが捜索支援のため接近中である。\n\n少なくとも自軍艦艇の1隻が生存しなければならない。|作戦開始
Taskforce1P-3CcheckinMessage=航空機チェックイン|グレイハウンド、こちらマッドフォックス。西方より戦域に到達した。搭乗員9名。残りステーションタイム4時間30分。魚雷8本、各種ソノブイを搭載。指示を待つ。オーバー。|了解
Taskforce1Tangosunkortime-activateDatumA01Message=任務更新|指揮官、SOSUSが任務部隊「グレイハウンド」北方の推定位置（デタム）B01にて未確認の潜水艦接触を報告。\n\n司令部は少なくとも2隻の潜水艦を捕捉したと判断。目標は南南西へ進行中である。デタムA01およびB01を設定した。|了解
Taskforce1K-503CharlieIIIwarningmessageMessage=任務更新|指揮官、情報部（J2）がインテリジェンス評価を更新した。\n\nデタムC01付近にてソ連のチャーリーII型潜水艦が活動中と推定される。\n\nチャーリーII型は射程59海里のSS-N-9ミサイルを装備している。注意せよ。|了解
Taskforce1PlayervictoryMessage=勝利|発：大西洋艦隊司令官\n宛：任務部隊「グレイハウンド」\n\n1. 見事だ、指揮官。SOSUSが4つの独立した圧壊音を確認した。当該海域で作戦中の敵潜水艦はすべて無力化したと判断する。\n\n2. 任務部隊は休養と補給のため、レイキャビクへ向かえ。|作戦終了
Taskforce1Playerdefeat-subescapeMessage=敗北|発：大西洋艦隊司令官\n宛：任務部隊「グレイハウンド」\n\n1. SOSUSがソ連弾道ミサイル潜水艦の北大西洋突破を確認した。\n\n2. 任務部隊は北大西洋海嶺まで後退し、再接触の準備を整えよ。|作戦終了
Objective_OnePlayerShipMustSurvive=少なくとも1隻の自軍艦艇の生存
Objective_DestroyUSSRSubs=遭遇したすべてのソ連潜水艦の撃滅

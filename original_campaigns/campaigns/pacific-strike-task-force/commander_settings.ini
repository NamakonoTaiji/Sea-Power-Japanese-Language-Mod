CitationText_en=DISTINGUISHED SERVICE IN OPERATIONS TO DEFEND OKINAWA AND SAFEGUARD THE WATERS OF JAPAN WHILE SERVING WITH {TaskForceName}. THROUGH EXEMPLARY DISCIPLINE, SINCERE COOPERATION WITH THE MARITIME SELF-DEFENSE FORCE, AND STEADFAST DEVOTION TO DUTY, {CommanderRank} {CommanderLastName} DISPLAYED EXEMPLARY PROFESSIONAL SKILL AND OPERATIONAL DISCIPLINE, THEREBY MAKING AN IMPORTANT CONTRIBUTION TO THE PROTECTION OF JAPAN AND THE SUCCESSFUL CONDUCT OF ALLIED MARITIME OPERATIONS.
CitationTextJapan_en=DISTINGUISHED SERVICE IN OPERATIONS TO DEFEND OKINAWA AND SAFEGUARD THE WATERS OF JAPAN WHILE SERVING WITH {TaskForceName}. THROUGH EXEMPLARY DISCIPLINE, SOUND JUDGMENT, AND STEADFAST DEVOTION TO DUTY, {CommanderRank} {CommanderLastName} RENDERED IMPORTANT CONTRIBUTIONS TO THE DEFENSE OF JAPAN AND TO THE SUCCESS OF MARITIME SELF-DEFENSE FORCE OPERATIONS.

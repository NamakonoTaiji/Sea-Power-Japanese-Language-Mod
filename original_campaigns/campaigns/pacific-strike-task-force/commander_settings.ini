CitationSignatureTitle_en=Secretary of the Navy
CitationText_en=MERITORIOUS ACHIEVEMENT WHILE PARTICIPATING IN AMPHIBIOUS OPERATIONS AGAINST ENEMY FORCES ON PALAWAN, PHILIPPINE ISLANDS. DURING THE ASSAULT AND SUBSEQUENT OPERATIONS ASHORE, {CommanderRank} {CommanderName} DISPLAYED EXCEPTIONAL LEADERSHIP, SOUND JUDGMENT, AND STEADFAST DEVOTION TO DUTY UNDER THREAT OF HOSTILE AIR, SURFACE, AND SHORE-BASED ATTACK. THIS PERFORMANCE CONTRIBUTED MATERIALLY TO THE SUCCESSFUL LANDING OF ALLIED FORCES AND REFLECTED GREAT CREDIT UPON THE COMMANDER AND THE ALLIED NAVAL FORCES OF THE PACIFIC.
CitationTextJapan_en=MERITORIOUS ACHIEVEMENT WHILE PARTICIPATING IN AMPHIBIOUS OPERATIONS AGAINST ENEMY FORCES ON PALAWAN, PHILIPPINE ISLANDS. DURING THE ASSAULT AND SUBSEQUENT OPERATIONS ASHORE, {CommanderRank} {CommanderName} DISPLAYED EXCEPTIONAL LEADERSHIP, SOUND JUDGMENT, AND STEADFAST DEVOTION TO DUTY UNDER THREAT OF HOSTILE AIR, SURFACE, AND SHORE-BASED ATTACK. THIS PERFORMANCE CONTRIBUTED MATERIALLY TO THE SUCCESSFUL LANDING OF ALLIED FORCES AND REFLECTED GREAT CREDIT UPON THE COMMANDER AND THE ALLIED NAVAL FORCES OF THE PACIFIC.
CitationTextAustralia_en=MERITORIOUS ACHIEVEMENT WHILE PARTICIPATING IN AMPHIBIOUS OPERATIONS AGAINST ENEMY FORCES ON PALAWAN, PHILIPPINE ISLANDS. DURING THE ASSAULT AND SUBSEQUENT OPERATIONS ASHORE, {CommanderRank} {CommanderName} DISPLAYED EXCEPTIONAL LEADERSHIP, SOUND JUDGMENT, AND STEADFAST DEVOTION TO DUTY UNDER THREAT OF HOSTILE AIR, SURFACE, AND SHORE-BASED ATTACK. THIS PERFORMANCE CONTRIBUTED MATERIALLY TO THE SUCCESSFUL LANDING OF ALLIED FORCES AND REFLECTED GREAT CREDIT UPON THE COMMANDER AND THE ALLIED NAVAL FORCES OF THE PACIFIC.


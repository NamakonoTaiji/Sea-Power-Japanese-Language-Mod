CitationText_en=CONSISTENTLY OUTSTANDING PERFORMANCE AND DISTINGUISHED ACHIEVEMENT DURING REPEATED ACTION AGAINST ENEMY FORCES IN THE PACIFIC WAR AREA, 25 JUNE 1985 TO 15 MARCH 1986. PARTICIPATING IN NEARLY EVERY MAJOR ENGAGEMENT IN THE CONFLICT, THEIR AGGRESSIVE SPIRIT AND SUPERB COMBAT EFFICIENCY ARE FITTING TRIBUTE TO THE OFFICERS AND MEN WHO SO GALLANTLY ACHIEVED ULTIMATE DEFEAT OF THE ENEMY IN THE PACIFIC.

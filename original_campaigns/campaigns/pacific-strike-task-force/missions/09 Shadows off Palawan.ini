Taskforce1StartMessage=<size=24>Pacific Strike - Part 9</size>\nSHADOWS OFF\nPALAWAN\n<size=24>September 30th, 1985</size>|After repulsing the enemy attack against Sandakan, the Allies have mobilized for an amphibious assault against Palawan. Conduct an anti-surface sweep of the area, then land 17 MAU at Puerto Princesa.\n\nNote: follow-on operations are anticipated in the area, and resupply will not be available after this mission. Expend ordnance carefully.\n\n{FlagshipName} and the Allied amphibious ships must survive.|Start mission

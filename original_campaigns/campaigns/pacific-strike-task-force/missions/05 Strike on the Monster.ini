
[Language_en]
Name=05 Strike on the Monster
Description=With Allied forces pushed back to Australia, the enemy is attempting to capitalize on their advantage by sending a heavy raiding force centered on the battlecruiser Kirov into the Indian Ocean. This force was detected transiting Lombok Strait last night, and is likely moving east to threaten Australia. Make use of every Allied naval asset in theater to find and sink the Kirov and her escorts.
Taskforce1LandUnit1NameOverride=Broome Field
Taskforce1LandUnit1ShortNameOverride=YBRM
Taskforce1StartmessageMessage=<size=24>Pacific Strike - Part 5</size>\nSTRIKE ON\nTHE MONSTER\n<size=24>August 10th, 1985</size>|The Kirov surface group is moving east from the Indian Ocean towards Australia. Make use of every Allied naval asset in theater to find and sink the Kirov and her escorts.\n\nLimited Allied air assets are stationed at Broome Field in Western Australia.\n\n{FlagshipName} must survive.|Start mission
StartForecast=FLEET WEATHER FORECAST FOR BROOME OFFSHORE AREA\nVALID: 102100Z-110300Z AUG 85\nThunderstorm activity is present over the offshore approaches north of Broome and the eastern Indian Ocean operating area, with overcast skies and northerly winds feeding unstable tropical air southward. Seas are moderate at Sea State 3, but visibility will be sharply reduced in convective cells with gusty winds and heavy rain near storms. Thunderstorms are expected to weaken after 0100Z as the cell line moves east, leaving overcast conditions and improving visibility.
Taskforce1DestroyKirovgroup-playerwinMessage=MISSION ACCOMPLISHED|FM CTF 77\n\nTO {TaskForceName}\n\n1. (S) Recon confirms the KIROV group burning or dead in the water.\n\n2. (S) Your succesful strike on this enemy force removes the principal Soviet surface threat in the region. Allied intel assesses this as a major defeat for the enemy.\n\n3. (S) Outstanding work, Commander. Recover survivors where practicable and return to Darwin for replenishment. CTF 77 sends.\n\n<size=15>Upon return to Darwin, your task force will be fully rearmed and repairs will be available.</size>|Exit mission
Taskforce1FlagshipmustsurviveMessage=MISSION FAILED|Defeat! {FlagshipName} has been sunk!|Exit mission
Objective_DestroyKirovSAG=Destroy the Kirov SAG
Objective_FlagshipMustSurvive={FlagshipName} must survive
[Language_cn]
Name=05 Strike on the Monster
[Language_ru]
Name=05 Охота на монстра
Description=После отступления союзных войск к Австралии противник пытается воспользоваться своим преимуществом, отправив в Индийский океан мощную эскадру, центром которой является тяжёлый крейсер «Киров». Этот отряд был обнаружен прошлой ночью в Ломбокском проливе и, вероятно, движется на восток, чтобы атаковать Австралию. Используйте все военно-морские силы союзников, находящиеся в этом театре военных действий, чтобы найти и потопить «Киров» и его эскорт.
Taskforce1LandUnit1NameOverride=Аэродром Брум
Taskforce1LandUnit1ShortNameOverride=YBRM
Taskforce1StartmessageMessage=<size=24>Тихоокеанский Удар - Часть 5</size>\nОхота на монстра\n<size=24>Август 10-е, 1985</size>|Надводная группа «Киров» движется на восток из Индийского океана в сторону Австралии. Используйте все военно-морские силы союзников, расположенные в этом театре военных действий, чтобы найти и потопить «Киров» и его эскорт.\n\nОграниченные силы авиации союзников размещены на аэродроме Брум в Западной Австралии.\n\n{FlagshipName} должен уцелеть.|Начать миссию
Taskforce1DestroyKirovgroup-playerwinMessage=МИССИЯ ВЫПОЛНЕНА|Победа! Уничтожение группы «Киров» остановило продвижение противника на юг и теперь Австралия в безопасности. Теперь союзники могут объединить силы и подготовиться к контрнаступлению.\n\n<size=15>Экипажи ваших боевых единиц достигли уровня проффесионализма:\n\n{FlagshipName}: <color=Magenta>Элита</color>\n\nАвиационные экипажи: <color=DarkOrange>Опытные</color>\n\nBefore the next mission, your task force will be fully resupplied and repairs will be available in Task Force Status.</size>|Завершение миссии
Taskforce1FlagshipmustsurviveMessage=МИССИЯ ПРОВАЛЕНА|Поражение! {FlagshipName} был потоплен!|Покинуть миссию
Taskforce1KirovretreatoncehalfforcedestroyedMessage=СРОЧНОЕ СООБЩЕНИЕ|От: Ком КГ 77\nКому: Ком ОГ 77.3\n\n1. Разведка сообщает, что группа «Киров», понеся потери, отступает на запад.\n\n2. Крайне важно использовать эту возможность, чтобы уничтожить оставшиеся корабли.\n\n3. Используйте все доступные средства, чтобы догнать и уничтожить надводную группу противника, прежде чем она сможет скрыться. Удачи в бою.|Вас понял
Objective_DestroyKirovSAG=Уничтожить «Киров» и его группу
Objective_FlagshipMustSurvive={FlagshipName} должен уцелеть
[Language_de]
Name=05 Angriff auf das Monster
Description=Nachdem die alliierten Kräfte bis nach Australien zurückgedrängt wurden, versucht der Feind, seinen Vorteil auszunutzen, indem er einen schweren Kampfverband um den Schlachtkreuzer Kirov in den Indischen Ozean verlegt. Dieser Verband wurde vergangene Nacht beim Durchqueren der Lombokstraße aufgeklärt und bewegt sich vermutlich nach Osten, um Australien zu bedrohen. Nutzen Sie sämtliche verfügbaren alliierten Marinekräfte im Einsatzraum, um die Kirov und ihre Begleitschiffe aufzuklären und zu vernichten.
Taskforce1LandUnit1NameOverride=Broome Field
Taskforce1LandUnit1ShortNameOverride=YBRM
Taskforce1StartmessageMessage=<size=24>Pacific Strike - Teil 5</size>\nANGRIFF AUF\nDAS MONSTER\n<size=24>10. August 1985</size>|Der Kirov-Kampfverband bewegt sich aus dem Indischen Ozean nach Osten in Richtung Australien. Nutzen Sie sämtliche verfügbaren alliierten Marinekräfte im Einsatzraum, um die Kirov und ihre Begleitschiffe aufzuklären und zu vernichten.\n\nEinige wenige alliierte Luftstreitkräfte sind auf Broome Field in Westaustralien stationiert.\n\n{FlagshipName} muss überleben.|Mission starten
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR DEN SEE- UND KÜSTENRAUM VOR BROOME\nGÜLTIG: 102100Z-110300Z AUG 85\nÜber dem seewärtigen Bereich nördlich von Broome und im Einsatzraum des östlichen Indischen Ozeans kommt es zu Gewittertätigkeit. Bedeckter Himmel und Winde aus Norden bringen instabile tropische Luft nach Süden. Die See ist mäßig bei einem Seegang der Stufe 3, doch in konvektiven Zellen ist mit stark eingeschränkter Sicht, böigen Winden und heftigem Regen in Gewitternähe zu rechnen. Die Gewitter werden voraussichtlich nach 0100Z nachlassen, während die Gewitterlinie ostwärts zieht. Zurück bleibt ein bedeckter Himmel mit zunehmend besserer Sicht.
Taskforce1DestroyKirovgroup-playerwinMessage=MISSION ERFOLGREICH|VON CTF 77\n\nAN {TaskForceName}\n\n1. (S) Aufklärung bestätigt, dass der Verband um die KIROV brennt oder manövrierunfähig im Wasser liegt.\n\n2. (S) Ihr erfolgreicher Schlag gegen diesen feindlichen Verband beseitigt die wichtigste sowjetische Bedrohung in der Region. Die alliierte Aufklärung bewertet dies als schwere Niederlage für den Feind.\n\n3. (S) Hervorragende Arbeit, Kommandant. Bergen Sie, soweit möglich, Überlebende und kehren Sie zur Versorgung nach Darwin zurück. CTF 77 Ende.\n\n<size=15>Nach Rückkehr nach Darwin wird Ihre Task Force vollständig wiederbewaffnet und Ihnen stehen Reparaturteams zur Verfügung.</size>|Mission beenden
Taskforce1FlagshipmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! {FlagshipName} wurde versenkt!|Mission beenden
Objective_DestroyKirovSAG=Zerstören Sie die Kirov-SAG
Objective_FlagshipMustSurvive={FlagshipName} muss überleben

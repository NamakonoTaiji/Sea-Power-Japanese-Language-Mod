
[Language_en]
Name=08 Defense of North Borneo
Description=With Indonesia secured, Allied planning in the Pacific has shifted north towards the Philippines. Sandakan in north Borneo is operating as a forward staging base for the eventual assault on Palawan. Enemy forces are now attempting a spoling raid against Sandakan to destroy the Allied forces staging there. Take charge of the Allied units in the area to repel the enemy attack.
NeutralVessel1NameOverride=Isabela LP-41
NeutralVessel1ShortNameOverride=Isabela
NeutralVessel2NameOverride=Batanes LP-65
NeutralVessel2ShortNameOverride=Batanes
Taskforce1LandUnit7NameOverride=Sandakan Airfield (WBKS)
Taskforce1LandUnit7ShortNameOverride=Sandakan Airfield
Taskforce2LandUnit1NameOverride=Antonio Bautista Air Base (RPVP)
Taskforce2LandUnit1ShortNameOverride=Antonio Bautista Air Base
Taskforce2LandUnit2NameOverride=Cam Ranh Air Base
Taskforce2LandUnit2ShortNameOverride=Cam Ranh Air Base
Taskforce1StartMessage=<size=24>Pacific Strike - Part 8</size>\nDEFENSE OF\nNORTH BORNEO\n<size=24>September 20th, 1985</size>|A large-scale enemy attack on Sandakan is underway. Recon shows multiple surface groups approaching and intel suspects at least one submarine in the vicinity. Destroy both of the large surface groups to secure the area, and defend our amphibious ships at anchor in the harbor.\n\nNote: {FlagshipName}'s main switchboard has tripped while getting underway from the harbor. Her engineering department estimates this will take 20 minutes to repair.\n\n{FlagshipName} and the Allied amphibious ships must survive.|Start mission
StartForecast=FLEET WEATHER FORECAST FOR SANDAKAN\nVALID: 200300Z-200900Z AUG 85\nA developing low-pressure trough east of Sandakan is driving increasing winds and building seas, with conditions expected to deteriorate rapidly over the next several hours. Broken cloud cover at 0300Z will give way to overcast skies by 0500Z as moist tropical air moves into the region. Rain showers and reduced visibility will develop after 0500Z, with seas building from Sea State 4 toward rough conditions.
Taskforce1FlagshipmustsurviveMessage=DEFEAT|Defeat! {FlagshipName} has been sunk!|Exit mission
Taskforce1Destroymajorenemyunits-playervictoryMessage=VICTORY|Victory! The enemy counterattack now lies at the bottom of the Sulu Sea and Sandakan is secured. Intel believes this was the final assault on our position in north Borneo, and we can now continue to push north in the campaign to liberate the Philippines.|Exit mission
Taskforce12minairattackwarningMessage=FLASH MESSAGE|FM CINCPACFLT\nTO {TaskForceName}\nINFO SANDAKAN AIRBASE\n\n1. (S) WARNING: Radio intercepts indicate major strike package is assembling at Antonio Bautista AB at Puerto Princesa.\n\n2. (S) Coastwatcher reports fighter CAP accompanying multiple attack and bomber elements. Estimate 16-20 aircraft total.\n\n3. (S) ETA to Sandakan area 0400Z. Raid direction NORTH. Set air warning red and scramble all fighters. Good luck. CINCPAC sends.|Acknowledge & continue
Taskforce12minairattackwarningIntel=Major strike package assembling at Antonio Bautista AB on Palawan Island at Puerto Princesa City, approx 190nm north of Sandakan. Raid direction will be bearing 010. Coastwatcher estimates 16-20 aircraft total, attack flights escorted by fighters. ETA to Sandakan by 0400Z (1 hour).
Taskforce1Losecargoship-noresupplyMessage=FLASH MESSAGE|FM CTF 77\nTO {TaskForceName}\n\n1. (S) WARNING: SS AUSTRALIAN ENDEAVOUR has been lost to enemy action.\n\n2. (S) AUSTRALIAN ENDEAVOUR was carrying full load of munitions for combatant forces at Sandakan.\n\n3. (S) Resupply of {TaskForceName} for follow-on operations is now impossible. Conserve ordnance where appropriate.\n\n4. (S) If tactical situation permits, conduct CSAR operations for crew of AUSTRALIAN ENDEAVOUR.|Acknowledge & continue
Taskforce1+5mincargoshipwarningMessage=FLASH MESSAGE|FM CTF 77\nTO {TaskForceName}\n\n1. (S) WARNING: Allied container ship SS AUSTRALIAN ENDEAVOUR is reporting in from the east, heading for Sandakan harbor.\n\n2. (S) This ship is carrying ordnance for our forces at Sandakan including full reloads of Harpoon and Standard missiles for {TaskForceName}\n\n3. (S) AUSTRALIAN ENDEAVOUR is now under your tactical command. Ensure this ship is not destroyed by enemy action.|Acknowledge & continue
Objective_DestroyEnemyForces=Destroy all attacking enemy forces
Objective_FlagshipMustSurvive={FlagshipName} must survive
Objective_USAmphibsMustSurvive=All Allied amphibious ships must survive
Objective_ProtectCargoUnit=OPTIONAL: Protect SS Australian Endeavour from enemy action
[Language_cn]
Name=08 Defense of North Borneo
[Language_ru]
Name=08 Defense of North Borneo
[Language_de]
Name=08 Verteidigung Nordborneos
Description=Nachdem Indonesien gesichert ist, richtet sich der Fokus der alliierten Operationsplanung im Pazifik nach Norden in Richtung der Philippinen. Sandakan in Nordborneo dient als vorgeschobener Bereitstellungsraum für den späteren Angriff auf Palawan. Feindkräfte versuchen nun einen Störangriff gegen Sandakan durchzuführen, um die dort bereitstehenden alliierten Kräfte zu vernichten. Übernehmen Sie das Kommando über die alliierten Einheiten im Einsatzraum und schlagen Sie den feindlichen Angriff zurück.
NeutralVessel1NameOverride=Isabela LP-41
NeutralVessel1ShortNameOverride=Isabela
NeutralVessel2NameOverride=Batanes LP-65
NeutralVessel2ShortNameOverride=Batanes
Taskforce1LandUnit7NameOverride=Sandakan Airfield (WBKS)
Taskforce1LandUnit7ShortNameOverride=Sandakan Airfield
Taskforce2LandUnit1NameOverride=Antonio Bautista Air Base (RPVP)
Taskforce2LandUnit1ShortNameOverride=Antonio Bautista Air Base
Taskforce1StartMessage=<size=24>Pacific Strike - Teil 8</size>\nVERTEIDIGUNG\nNORDBORNEOS\n<size=24>20. September 1985</size>|Ein großangelegter feindlicher Angriff auf Sandakan ist im Gange. Die Aufklärung zeigt mehrere anrückende Kampfverbände und der Nachrichtendienst vermutet mindestens ein U-Boot in der Nähe. Zerstören Sie beide Kampfverbände, um den Einsatzraum zu sichern und verteidigen Sie unsere amphibischen Schiffe, die im Hafen vor Anker liegen.\n\nHinweis: Beim Auslaufen aus dem Hafen ist die Hauptschalttafel von {FlagshipName} ausgefallen. Der Maschinenraum schätzt, dass die Reparatur 20 Minuten dauern wird.\n\n{FlagshipName} und die alliierten amphibischen Schiffe müssen überleben.|Mission starten
StartForecast=FLOTTEN-WETTERVORHERSAGE FÜR SANDAKAN\nGÜLTIG: 200300Z-200900Z AUG 85\nEin sich entwickelndes Tiefdruckgebiet östlich von Sandakan sorgt für zunehmende Winde und einen zunehmenden Seegang. Die Bedingungen werden sich in den nächsten Stunden voraussichtlich rasch verschlechtern. Die aufgelockerte Bewölkung um 0300Z wird bis 0500Z in bedeckten Himmel übergehen, während feuchte tropische Luft in die Region einströmt. Nach 0500Z setzen Regenschauer und eingeschränkte Sicht ein, während der Seegang die Stufe 4 überschreiten wird.
Taskforce1FlagshipmustsurviveMessage=NIEDERLAGE|Niederlage! {FlagshipName} wurde versenkt!|Mission beenden
Taskforce1Destroymajorenemyunits-playervictoryMessage=SIEG|Sieg! Die Einheiten des feindlichen Gegenangriffs liegen nun auf dem Grund der Sulusee, und Sandakan ist gesichert. Der Nachrichtendienst geht davon aus, dass dies der letzte Angriff auf unsere Stellung in Nordborneo war und wir den Vorstoß nach Norden zur Befreiung der Philippinen nun fortsetzen können.|Mission beenden
Taskforce12minairattackwarningMessage=BLITZNACHRICHT|VON CINCPACFLT\nAN {TaskForceName}\nINFO SANDAKAN AIRBASE\n\n1. (S) WARNUNG: Funkaufklärung deutet darauf hin, dass sich ein größerer Angriffsverband auf der Antonio Bautista Air Base bei Puerto Princesa formiert.\n\n2. (S) Ein Beobachter in Küstennähe berichtet, dass mehrere Angriffs- und Bomberverbände von Jagdflugzeugen eskortiert werden. Geschätzte Gesamtstärke: 16 bis 20 Luftfahrzeuge.\n\n3. (S) ETA im Raum Sandakan 0400Z. Angriffsrichtung NORD. Rufen Sie Luftwarnstufe Rot aus und befehlen Sie allen Abfängjägern den Alarmstart. Viel Glück. CINCPAC Ende.|Bestätigen und fortfahren
Taskforce12minairattackwarningIntel=Größerer Angriffsverband formiert sich auf der Antonio Bautista Air Base auf der Insel Palawan bei Puerto Princesa City, ca. 190 sm nördlich von Sandakan. Angriffsrichtung wird Peilung 010 sein. Beobachter schätzt insgesamt 16 bis 20 Luftfahrzeuge, Angriffs- und Bomberverbände mit Jagdflugzeugen. ETA Sandakan bis 0400Z (1 Stunde).
Taskforce1Losecargoship-noresupplyMessage=BLITZNACHRICHT|VON CTF 77\nAN {TaskForceName}\n\n1. (S) WARNUNG: SS AUSTRALIAN ENDEAVOUR ist durch Feindeinwirkung versenkt worden.\n\n2. (S) AUSTRALIAN ENDEAVOUR war voll beladen mit Munition für die Kräfte in Sandakan.\n\n3. (S) Eine Versorgung von {TaskForceName} für Folgeoperationen ist nun unmöglich. Sparen Sie, sofern möglich, Munition.\n\n4. (S) Falls die Lage es zulässt, führen Sie CSAR-Operationen für die Besatzung der AUSTRALIAN ENDEAVOUR durch.|Bestätigen und fortfahren
Taskforce1+5mincargoshipwarningMessage=BLITZNACHRICHT|VON CTF 77\nAN {TaskForceName}\n\n1. (S) WARNUNG: Das alliierte Containerschiff SS AUSTRALIAN ENDEAVOUR meldet sich aus Osten und läuft den Hafen von Sandakan an.\n\n2. (S) Dieses Schiff transportiert Munition für unsere Kräfte in Sandakan, einschließlich Harpoon- und Standard-Missiles für {TaskForceName}.\n\n3. (S) AUSTRALIAN ENDEAVOUR steht ab sofort unter Ihrem Kommando. Stellen Sie sicher, dass dieses Schiff nicht durch Feindeinwirkung zerstört wird.|Bestätigen und fortfahren

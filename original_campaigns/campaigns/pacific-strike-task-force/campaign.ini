MissionIntro_en=With Indonesia secured, Allied planning in the Pacific has shifted north towards the Philippines. Sandakan in north Borneo is operating as a forward staging base for the eventual assault on Palawan. Enemy forces are now attempting a spoling raid against Sandakan to destroy the Allied forces staging there. Take charge of the Allied units in the area to repel the enemy attack.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.

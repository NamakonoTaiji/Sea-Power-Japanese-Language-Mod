[File] # Location of this file - required for all systems to work properly
Base=campaigns/pacific-strike-task-force/campaign.ini

[Campaign] # Overall campaign details
Type=Linear
Difficulty=3
Length=21
BackgroundImage=campaigns/pacific-strike-task-force/art/00_campaign_background.png
DisplayFormat=MapView

[TaskForceMode] # Rules for setup of Task Force Mode
Enabled=True

; FLAGSHIP REQUIREMENT - with flagship required, player loses the mission if the flagship is destroyed
TaskForceRequireFlagship=False

; TASK FORCE NAMES
; name options will allow a preset list to be randomized
DefaultTaskForceName=Task Group 77.3
TaskForceNameOptions=Task Group 77.3|TG 77.3|Cruiser Striking Force|SAG Alpha

; COMMANDER SETTINGS - commander names, ranks, navy display data, and discounts
CommanderSettingsFile=commander_settings.ini

; ROSTER OF WHITELISTED UNITS - missions can further restrict what is allowed to be purchased
RosterFile=player_task_force_roster.ini

; DIFFICULTY SETTINGS
TaskForceDifficultyPresets=Easy|Moderate|Difficult
DefaultTaskForceDifficultyPreset=Moderate

; AIRWING PURCHASE RULES - if TRUE, ships come with their airwing for free - replacements must be bought - if FALSE, legacy behavior where ships come empty and airwing must be purchased
ShipIncludesAirwing=True

; POINTS
StartingPoints=50
PointCap=50

; CSAR RULES = 100 survivors rescued reward 1 pt to available points
CSARPointModifier=100

; LOADOUT RULES
; PurchaseLoadouts: if True, ship loadouts must be bought for each unit from TF Builder after they are unlocked. If not set or false, loadouts are available for all units after unlock.
PurchaseLoadouts=True

; Ship loadouts - basic are unlocked immediately; locked must be unlocked via completing a mission
BasicShipLoadoutVariants=Default
LockedShipLoadoutVariants=Late|LandAttack|AntiShip

; CREW SKILL RULES
CrewSkillInitial=Trained
CrewSkillThresholds=Trained:1|Seasoned:2|Veterans:5|Ultra:9

; SHIP LOSS POINT RETURN RULES
UnitDecommissionPointReturnModifier=0.25
UnitDismissPointReturnModifier=0.5

; REPAIR RULES
DamageToAllowRepair=Light,Moderate
DamageToDisallowRepair=Heavy
RepairPointsCost=Light,0.1|Moderate,0.25

[TaskForceModeDifficulty_Easy]
Name=Easy
StartingPoints=65
PointCap=65
ShipIncludesAirwing=True
PurchaseLoadouts=False
InitialUnlockedLoadouts=Default|Late|LandAttack|AntiShip
RepairCostModifier=0.75
UnitDecommissionPointReturnModifier=0.35
UnitDismissPointReturnModifier=0.65
CrewSkillInitial=Trained

[TaskForceModeDifficulty_Moderate]
Name=Moderate
StartingPoints=50
PointCap=50
ShipIncludesAirwing=True
PurchaseLoadouts=True
InitialUnlockedLoadouts=Default|LandAttack|AntiShip
RepairCostModifier=1
UnitDecommissionPointReturnModifier=0.25
UnitDismissPointReturnModifier=0.5
CrewSkillInitial=Trained

[TaskForceModeDifficulty_Difficult]
Name=Difficult
StartingPoints=40
PointCap=40
ShipIncludesAirwing=False
PurchaseLoadouts=True
InitialUnlockedLoadouts=Default
RepairCostModifier=1.25
UnitDecommissionPointReturnModifier=0.15
UnitDismissPointReturnModifier=0.35
CrewSkillInitial=Green

[Language_en] # Campaign title and details, localized
Name=Pacific Strike '85 (NATO - Task Force Mode)
Description=Pacific Strike is a linear campaign depicting war in the Western Pacific in 1985. Command your Task Force in various operations during the conflict.<LineBreak/><LineBreak/><Span Foreground="SandyBrown">NOTE</Span>: This is a Task Force Mode campaign. Build and customize a persistent task force, then deploy it across campaign missions. Your force composition and task force state carry forward, so plan your deployments and losses carefully.

[Language_ru] # Campaign title and details, localized
Name=Тихоокеанский Удар '85 (НАТО)
Description=Тихоокеанский Удар — это линейная кампания, описывающая войну в западной части Тихого океана в 1985 году. Командуйте эсминцем USS Scott (DDG-995), оперативной группой 77.3 и другими силами союзников в различных операциях во время конфликта. <LineBreak/><LineBreak/> <Span Foreground="SandyBrown">ВАЖНО</Span>: Состояние ваших юнитов переносится из каждой миссии в следующую, поэтому старайтесь разумно расходовать вооружение и избегать ненужных потерь.

[Language_de] # Campaign title and details, localized
Name=Pacific Strike '85 (NATO - Task-Force-Modus)
Description=Pacific Strike ist eine lineare Kampagne, die einen Krieg im Westpazifik im Jahr 1985 darstellt. Führen Sie Ihre Task Force in verschiedenen Operationen während des Konflikts.<LineBreak/><LineBreak/><Span Foreground="SandyBrown">HINWEIS</Span>: Dies ist eine Kampagne im Task-Force-Modus. Stellen Sie eine über die gesamte Kampagne bestehende Task Force zusammen, passen Sie sie an und setzen Sie sie anschließend in den Missionen ein. Zusammensetzung und Zustand Ihrer Task Force werden von Mission zu Mission übernommen, planen Sie Ihre Einsätze und mögliche Verluste daher sorgfältig.


Name_en=MISSION 5: STRIKE ON THE MONSTER
MapName_en=05 STRIKE ON THE MONSTER
MapShortName_en=05
Description_en=Off Broome, Australia
MissionImage_en=campaigns/pacific-strike-task-force/art/pacific_strike_05_sheet.png
MissionIntro_en=With Allied forces pushed back to Australia, the enemy is attempting to capitalize on their advantage by sending a heavy raiding force centered on the battlecruiser Kirov into the Indian Ocean. This force was detected transiting Lombok Strait last night, and is likely moving east to threaten Australia. Make use of every Allied naval asset in theater to find and sink the Kirov and her escorts.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.

Name_ru=МИССИЯ 5: ОХОТА НА МОНСТРА
Description_ru=Дарвин, Австралия
#MissionImage_ru=campaigns/pacific-strike-task-force/art/pacific_strike_05_sheet.png
MissionIntro_ru=После отступления союзных войск к Австралии противник пытается воспользоваться своим преимуществом, отправив в Индийский океан мощную рейдовый эскадру, центром которой является тяжёлый крейсер «Киров». Этот отряд был обнаружен прошлой ночью в Ломбокском проливе и, вероятно, движется на восток, чтобы напасть на Австралию. Используйте все военно-морские силы союзников, находящиеся в этом театре военных действий, чтобы найти и потопить «Киров» и его эскорт.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.

Name_de=MISSION 5: ANGRIFF AUF DAS MONSTER
MapName_de=05 ANGRIFF AUF DAS MONSTER
MapShortName_de=05
Description_de=Vor Broome, Australien
MissionImage_de=campaigns/pacific-strike-task-force/art/pacific_strike_05_sheet.png
MissionIntro_de=Nachdem die alliierten Kräfte bis nach Australien zurückgedrängt wurden, versucht der Feind, seinen Vorteil auszunutzen, indem er einen schweren Kampfverband um den Schlachtkreuzer Kirov in den Indischen Ozean verlegt. Dieser Verband wurde vergangene Nacht beim Durchqueren der Lombokstraße aufgeklärt und bewegt sich vermutlich nach Osten, um Australien zu bedrohen. Nutzen Sie sämtliche verfügbaren alliierten Marinekräfte im Einsatzraum, um die Kirov und ihre Begleitschiffe aufzuklären und zu vernichten.
MissionResupplyRules_en=After this mission, your Task Force will be fully rearmed, with repair facilities and reinforcements available.


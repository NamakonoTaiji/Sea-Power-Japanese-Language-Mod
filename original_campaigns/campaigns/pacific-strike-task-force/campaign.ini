Description_en=Bali, Indonesia (Optional)
MissionImage_en=campaigns/pacific-strike-task-force/art/pacific_strike_03b_sheet.png
MissionIntro_en=OPTIONAL: Heavy enemy attacks against Indonesia and Malaysia have left the Allies in disarray, and US forces are attempting to reconsolidate at Darwin in northern Australia. Detach one of your task force units to hold the Lombok Strait long enough for critical Allied transport units to escape south.
MissionResupplyRules_en=Your Task Force will be operating away from resupply, reinforcements, and repair facilities during this mission. Expend weapons wisely.
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_en=Note: this is an optional challenge mission. Select one ship from your task force to undertake this high-risk, high-reward mission. No other units will deploy. Completing this mission will unlock more advanced ordnance for the remainder of the campaign.

Name_ru=ДОП. МИССИЯ: ОБОРОНА ЛОМБОКСКОГО ПРОЛИВА
Description_ru=Бали, Индонезия
#MissionImage_ru=campaigns/pacific-strike-task-force/art/pacific_strike_03b_sheet.png
MissionIntro_ru=Интенсивные атаки противника на Индонезию и Малайзию привели к дезорганизации союзников, и американские войска пытаются перегруппироваться в Дарвине на севере Австралии. USS Пребл получил приказ удерживать Ломбокский пролив достаточно долго, чтобы критически важные транспортные корабли союзников смогли эвакуироваться на юг. Примечание: выполнение этой миссии разблокирует дополнительные боеприпасы и пополнение запасов в последующих миссиях кампании, а также повлияет на общее количество вражеских сил, доступных в будущих миссиях.

MissionImage_de=campaigns/pacific-strike-task-force/art/pacific_strike_03a_sheet.png
MissionIntro_de=OPTIONAL: Die alliierte Aufklärung hat in den Spratly-Inseln ein Versorgungsschiff der Don-Klasse lokalisiert, das eine Gruppe sowjetischer Diesel-U-Boote versorgt, die derzeit im Südchinesischen Meer operieren. Dringen Sie in die Gewässer der Spratlys ein, zerstören Sie dieses Schiff und entkommen Sie anschließend in die Palawan-Passage.. Hinweis: Der Abschluss dieser Mission wirkt sich auf die in künftigen Missionen verfügbaren feindlichen Kräfte aus.
MissionSpecialNoteHighlightColor=Color.SeaPowerBlue
MissionSpecialNote_de=Hinweis: Dies ist eine separate U-Boot-Operation. Sie führen nur für diese Mission ein zugewiesenes U-Boot. Ihre Task Force wird nicht eingesetzt.


MissionIntro_en=OPTIONAL: Allied intelligence has located a Don class submarine tender in the Spratly Islands which is resupplying a group of Soviet diesel submarines operating in the South China Sea. Infiltrate into the Spratlys, destroy this vessel, and then escape into the Palawan Passage.

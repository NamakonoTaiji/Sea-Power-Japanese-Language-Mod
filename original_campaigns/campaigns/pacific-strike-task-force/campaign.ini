Name_ru=ДОП. МИССИЯ: ГЛУБОКО И ТИХО
Description_ru=О-ва Спратли, Южно-Китайское море
#MissionImage_ru=campaigns/pacific-strike-task-force/art/pacific_strike_03a_sheet.png
MissionIntro_ru=Разведка союзников обнаружила в архипелаге Спратли плавбазу подводных лодок типа «Дон», поддерживающую группу советских дизельных подводных лодок, действующих в Южно-Китайском море. Достигните архипелага Спратли, найдите и уничтожьте плавбазу, а затем отходите Палаванским проливом. Примечание: выполнение этой миссии не обязательно, однако оно повлияет на присутствие вражеских сил в будущих миссиях.
MissionSpecialNote_ru=Note: This is a detached submarine operation. You will command an assigned submarine for this mission only, and your task force will not deploy.


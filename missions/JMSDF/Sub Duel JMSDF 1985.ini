[Language_ja]
Name=潜水艦決闘 - 北海道 1985
Description=北海道沖にて、2隻のソ連潜水艦を自衛隊が探知。最寄りの海上自衛隊部隊として、潜水艦「もちしお」を指揮し、両艦を発見・撃沈せよ。
Taskforce1StartMessage=<size=24>サブデュエルシリーズ</size>\n北海道沖\n(1985)|自衛隊のソナー網が北海道西方にて2隻のソ連潜水艦を探知。潜水艦「もちしお」は、両潜水艦が宗谷海峡を抜けオホーツク海に到達する前に、これらを発見・撃破するよう命令を受けた。\n\n接触目標のうち1隻の音響シグネチャはヴィクターIII級SSNと断定されたが、他方は不明（キロ級またはタンゴ級SSKのいずれか）。おおよその捜索エリアはマップにマークされている。\n\n潜水艦「もちしお」は必ず生還せよ。|作戦開始
Taskforce1BothsubsdestroyedplayervictoryMessage=勝利|1985年6月26日\n発信: 潜水艦隊司令官\n宛先: 海上自衛隊潜水艦もちしお SS-574\n\n1. 自衛隊ソナー網が北海道西方での複数回の水中爆発を報告。\n\n2. 司令部はこれらの爆発を、敵潜水艦が圧壊深度で分解したものと評価。\n\n3. 見事な戦果だ、艦長。哨戒ステーションに戻り、追っての命令を待て。\n\n<size=15>潜水艦の練度が向上した:\n\n潜水艦もちしお (SS-574): <color=Green>ベテラン</color></size>|作戦終了
Taskforce1MochishiomustsurviveMessage=敗北|1985年6月26日\n発信: 潜水艦隊司令官\n宛先: 海上自衛隊 幕僚監部\n\n1. 自衛隊ソナー網が、「もちしお」SS-574の最終確認位置付近で圧壊音を探知。\n\n2. 「もちしお」は同海域の2つのソナー反応を調査・撃破するよう命令されていた。\n\n3. 「もちしお」は現在、定時連絡に応答せず。潜水艦隊司令部は、「もちしお」が撃沈されたものと判断。|作戦終了
Taskforce1SubmarinesescapeplayerdefeatMessage=敗北|1985年6月26日\n発信: 潜水艦隊司令官\n宛先: 海上自衛隊潜水艦もちしお SS-574\n\n1. 自衛隊ソナー網が、宗谷海峡を通過する敵潜水艦に相関する音響シグネチャを報告。\n\n2. 追跡を中止し、直ちに哨戒ステーションへ帰投せよ。この目標の撃破には、海上自衛隊または米軍の航空機が重要任務から転換され、差し向けられる。\n\n3. 帰港後、直ちに利用可能な軍用機で東京に向かい、事情聴取と任務解除に備えよ。|作戦終了
Trigger5Condition_Condition1AreaLabel=データム A01
Objective_DestroyBothEnemySubs=ソ連潜水艦2隻を撃沈
Objective_MochishioMustSurvive=潜水艦「もちしお」の生還
[Language_en]
Name=Sub Duel - Hokkaido 1985
Description=Two USSR submarines have been detected by the JSDF off Hokkaido. As the nearest JMSDF unit, command JDS Mochishio to locate and sink them.
Taskforce1StartMessage=<size=24>Sub Duel Series</size>\nACTION OFF\nHOKKAIDO (1985)|JSDF sonar arrays have located two USSR submarines west of Hokkaido. JDS Mochishio has just received orders to locate and destroy both submarines before they can transit La Perouse Strait into the Sea of Okhotsk.\n\nAcoustic signature for one of the contacts was positively identified as VICTOR III class SSN, but the other is unknown (either KILO or TANGO class SSK). Rough search area is marked on your map.\n\nJDS Mochishio must survive.|Start mission
Taskforce1BothsubsdestroyedplayervictoryMessage=VICTORY|26JUN1985\nFM COMFLTSUBFOR\nTO JDS MOCHISHIO SS-574\n\n1. JSDF sonar array reports multiple subsurface detonations west of Hokkaido.\n\n2. HQ assesses these explosions as enemy submarine contacts breaking up at crush depth.\n\n3. Excellent work, Commander. Return to patrol station and await further orders.\n\n<size=15>A submarine has gained a proficiency level:\n\nJDS Mochishio (SS-574): <color=Green>Veterans</color></size>|Exit mission
Taskforce1MochishiomustsurviveMessage=DEFEAT|26JUN1985\nFM COMFLTSUBFOR\nTO GHQ JMSDF\n\n1. JSDF sonar array reports implosion near last known position of MOCHISHIO SS-574.\n\n2. MOCHISHIO was ordered to investigate and destroy two sonar contacts in this area.\n\n3. MOCHISHIO has now missed scheduled check-in. Fleet Submarine Force assesses MOCHISHIO has been destroyed.|Exit mission
Taskforce1SubmarinesescapeplayerdefeatMessage=DEFEAT|26JUN1985\nFM COMFLTSUBFOR\nTO JDS MOCHISHIO SS-574\n\n1. JSDF sonar array reports acoustic signature correlating to enemy submarine transiting La Perouse Strait.\n\n2. Break off prosecution and return to your patrol station immediately. JMSDF or US air will be rerouted from critical positions to destroy this contact.\n\n3. On your return to port, board first available military flight to Tokyo for debriefing and relief.|Exit mission
Trigger5Condition_Condition1AreaLabel=Datum A01
Objective_DestroyBothEnemySubs=Destroy both USSR submarines
Objective_MochishioMustSurvive=JDS Mochishio must survive

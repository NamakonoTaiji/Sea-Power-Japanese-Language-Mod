Taskforce1AtleastoneLSTmustsurviveMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT ThÃ©Ã¢tre d'opÃ©rations sud\n\n1. La Force d'attaque des mers du Sud signale que notre groupe de renforts se dirigeant vers les Ã®les Xisha a Ã©tÃ© dÃ©truit par les forces vietnamiennes et soviÃ©tiques.\n\n 2. Nous avons ordonnÃ© Ã  toutes les forces prÃ©sentes dans la zone de se replier sur Hainan pour se regrouper. De nouvelles actions contre les Vietnamiens sont prÃ©vues.\n\n 3. Le commandant de la Force d'attaque des mers du Sud, en charge des opÃ©rations, arrivera par le premier vol militaire pour se prÃ©senter aux autoritÃ©s et Ãªtre entendu.|Quitter la mission
Taskforce1Time+30minweatherchangeMessage=MESSAGE NAVAL|DE CMDT Flotte des mers du sud\nA CMDT Forces d'attaque des mers du sud\n\n1. Les observations mÃ©tÃ©orologiques Ã  10h30, heure locale, indiquent un fort changement de temps. Les opÃ©rations aÃ©riennes sont dÃ©sormais possibles depuis la base aÃ©rienne de Sanya.\n\n2. Les avions de la 8e Division aÃ©rienne et de la 5e Division aÃ©rienne de la PLANAF sont dÃ©sormais disponibles pour des missions.\n\n3. En raison des pertes au combat et de l'utilisation intensive de missiles, seules quelques sorties seront possibles. Bonne chance.|Bien reÃ§u
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=VICTOIRE|DE CMDT Forces d'attaque des mers du sud\nA CMDT ThÃ©Ã¢tre d'opÃ©rations sud\n\n1. C'est avec grand plaisir que la Force d'attaque des mers du Sud annonce que le convoi de renforts a atteint notre garnison de l'Ã®le Robert.\n\n2. De plus, l'attaque vietnamienne a Ã©tÃ© repoussÃ©e. Leurs forces commandos, appuyÃ©es par le croiseur lÃ©ger soviÃ©tique Amiral Senyavine, ont Ã©tÃ© dÃ©truites.\n\n3. Nous avons subi des pertes, mais remportÃ© une grande victoire sur l'ennemi.|Quitter la mission

[Language_ja]
Name=PLAN 02 - 南シナ海の戦い (1979)
Description=中越戦争が進行中であり、ベトナム軍は再び人民解放軍（PLA）をパラセル諸島から駆逐しようと試みている。ソ連の支援を受け、彼らはロバート島にある我が軍の孤立した前哨基地への攻撃を開始した。海南島の南海艦隊を指揮し、パラセル諸島の友軍部隊に補給と増援を行い、ベトナム軍のいかなる反撃も撃破せよ。
Taskforce1Vessel3NameOverride=333
Taskforce1Vessel3ShortNameOverride=333
Taskforce1Vessel7NameOverride=287
Taskforce1Vessel7ShortNameOverride=287
Taskforce1Vessel8NameOverride=321
Taskforce1Vessel8ShortNameOverride=321
Taskforce1Vessel9NameOverride=322
Taskforce1Vessel9ShortNameOverride=322
NeutralLandUnit1NameOverride=Sanya Airbase
NeutralLandUnit1ShortNameOverride=Sanya Airbase
Taskforce1StartMessage=<size=20>中越戦争 1979</size>\n南シナ海の戦い|中国とベトナム間の陸上での戦闘が進行する中、パラセル諸島にある我が軍の孤立した前哨基地がベトナム軍とソ連軍の攻撃を受けている。増援の輸送船団が楡林海軍基地から派遣された。船団をパラセル諸島まで護衛し、遭遇した全ての敵部隊を撃破せよ。\n\n報告によれば、ベトナム軍の軽部隊がハイフォンから東へ移動中であり、また、スヴェルドロフ級巡洋艦「アドミラル・セニャーヴィン」を中心とする小規模なソ連軍部隊が昨夜カムラン湾を出港した。\n\n船団の上陸用舟艇のうち、少なくとも1隻は生還しなければならない。|作戦開始
StartForecast=現地時間1030：雨は止み、風力3
Taskforce1AtleastoneLSTmustsurviveMessage=敗北|発：南海艦隊司令官\n宛：南部戦区司令官\n\n1. 南海攻撃部隊からの報告によれば、西沙諸島へ向かっていた我が増援部隊は、ベトナム軍及びソ連軍によって壊滅させられた。\n\n2. 当該区域の全部隊に対し、再編成のため海南島へ撤退するよう命令した。対ベトナム作戦は継続して計画される。\n\n3. 現場指揮官である南海攻撃部隊司令官は、事情聴取のため、至急の軍用機で帰還する予定である。|ミッション終了
Taskforce1Time+30minweatherchangeMessage=海軍通達|発：南海艦隊司令官\n宛：南海攻撃部隊司令官\n\n1. 現地時間1030の気象観測により、悪天候の回復を確認。三亜航空基地からの航空作戦が可能となった。\n\n2. 第8航空師団および中国人民解放軍空軍第5航空師団の航空機が任務に利用可能となった。\n\n3. 戦闘による損失とミサイルの大量消費により、出撃可能なソーティは少数に限られる。健闘を祈る。|了解、作戦継続
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=勝利|発：南海攻撃部隊司令官\n宛：南部戦区司令官\n\n1. 甚大なる喜びとともに報告する。南海攻撃部隊の増援船団は、ロバート島の我が守備隊へ無事到達した。\n\n2. さらに、ベトナム軍による攻撃は撃退された。ソ連の軽巡洋艦「アドミラル・セニャーヴィン」に支援された彼らの襲撃部隊は壊滅した。\n\n3. 我が方にも損害は出たものの、敵に対し偉大な勝利を収めた。|ミッション終了
Taskforce1Noplayershipsremaining-defeatMessage=敗北|発：南海艦隊司令官\n宛：南部戦区司令官\n\n1. 西沙諸島作戦に投入された全艦艇との通信が途絶した。我が艦隊は敵との交戦により全滅したと判断される。\n\n2. 当該区域の全部隊に対し、再編成のため海南島へ撤退するよう命令した。対ベトナム作戦は継続して計画される。\n\n3. 現場指揮官である南海攻撃部隊司令官は、戦闘中行方不明となり、死亡と推定される。|ミッション終了

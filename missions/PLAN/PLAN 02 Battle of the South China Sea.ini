Taskforce1StartMessage=<size=20>Guerre sino-vietnamienne de 1979</size>\nBATAILLE DE LA MER\nDE CHINE MERIDIONALE|Alors que les hostilitĂŠs font rage sur terre entre la Chine et le Vietnam, notre avant-poste isolĂŠ des Paracels a ĂŠtĂŠ attaquĂŠ par les Vietnamiens et les SoviĂŠtiques. Un convoi de renforts a ĂŠtĂŠ envoyĂŠ depuis la base navale de Yulin. Escortez-le jusqu'aux Paracels et dĂŠtruisez toutes les forces ennemies rencontrĂŠes.\n\nDes forces lĂŠgĂ¨res vietnamiennes se dĂŠplaceraient vers l'est depuis HaĂŻphong, et une petite force soviĂŠtique a quittĂŠ Cam Ranh la nuit derniĂ¨re, centrĂŠe sur le croiseur de classe Sverdlov Amiral Senyavin.\n\nAu moins un navire de dĂŠbarquement du convoi doit survivre.|DĂŠmarrer la mission
StartForecast=1030 Local: La pluie a cessĂŠ, Vent Force 3
Taskforce1AtleastoneLSTmustsurviveMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT ThĂŠĂ˘tre d'opĂŠrations sud\n\n1. La Force d'attaque des mers du Sud signale que notre groupe de renforts se dirigeant vers les ĂŽles Xisha a ĂŠtĂŠ dĂŠtruit par les forces vietnamiennes et soviĂŠtiques.\n\n 2. Nous avons ordonnĂŠ Ă  toutes les forces prĂŠsentes dans la zone de se replier sur Hainan pour se regrouper. De nouvelles actions contre les Vietnamiens sont prĂŠvues.\n\n 3. Le commandant de la Force d'attaque des mers du Sud, en charge des opĂŠrations, arrivera par le premier vol militaire pour se prĂŠsenter aux autoritĂŠs et ĂŞtre entendu.|Quitter la mission
Taskforce1Time+30minweatherchangeMessage=MESSAGE NAVAL|DE CMDT Flotte des mers du sud\nA CMDT Forces d'attaque des mers du sud\n\n1. Les observations mĂŠtĂŠorologiques Ă  10h30, heure locale, indiquent un fort changement de temps. Les opĂŠrations aĂŠriennes sont dĂŠsormais possibles depuis la base aĂŠrienne de Sanya.\n\n2. Les avions de la 8e Division aĂŠrienne et de la 5e Division aĂŠrienne de la PLANAF sont dĂŠsormais disponibles pour des missions.\n\n3. En raison des pertes au combat et de l'utilisation intensive de missiles, seules quelques sorties seront possibles. Bonne chance.|Bien reĂ§u
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=VICTOIRE|DE CMDT Forces d'attaque des mers du sud\nA CMDT ThĂŠĂ˘tre d'opĂŠrations sud\n\n1. C'est avec grand plaisir que la Force d'attaque des mers du Sud annonce que le convoi de renforts a atteint notre garnison de l'ĂŽle Robert.\n\n2. De plus, l'attaque vietnamienne a ĂŠtĂŠ repoussĂŠe. Leurs forces commandos, appuyĂŠes par le croiseur lĂŠger soviĂŠtique Amiral Senyavine, ont ĂŠtĂŠ dĂŠtruites.\n\n3. Nous avons subi des pertes, mais remportĂŠ une grande victoire sur l'ennemi.|Quitter la mission
Taskforce1Noplayershipsremaining-defeatMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT Forces d'attaque des mers du sud\n\n1. Nous avons perdu tout contact avec tous les navires affectĂŠs Ă  l'opĂŠration des ĂŽles Xisha. Nous estimons que tous nos navires ont ĂŠtĂŠ perdus au combat contre l'ennemi.\n\n2. Nous avons ordonnĂŠ Ă  toutes les forces prĂŠsentes dans la zone de se replier sur Hainan pour se regrouper. De nouvelles actions contre les Vietnamiens sont prĂŠvues.\n\n3. Le commandant de la Force d'attaque des mers du Sud, sur place, est portĂŠ disparu et prĂŠsumĂŠ mort.|Quitter la mission

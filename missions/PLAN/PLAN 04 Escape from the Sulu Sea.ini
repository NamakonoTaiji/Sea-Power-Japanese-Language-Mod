Taskforce1StartmessageMessage=CLASH IN THE \nPARACELS (1974)|Vietnamese forces are imposing on our territorial waters in the Paracels, attempting to intimidate our fishermen. Command a surface force from the South Seas Fleet to locate and drive them away.\n\nThe enemy forces are operating two ex-USN destroyers and a converted minesweeper. Destroy all enemy forces encountered and then await further orders. 2 x PLANAF Q-5 are off the deck from Lingshui airbase inbound for support, reporting on top by 2135Z.\n\nAt least one of your ships must survive.|Start mission

[Language_ja]
Name=PLAN 04 - スールー海からの脱出 (1988)
Description=南海艦隊は航行の自由作戦のため、水上戦闘群（SAG）をスールー海へ派遣した。不運にも、SAGはフィリピン軍の攻撃を受けた。バラバク海峡を突破し、パラワン水道に到達して北方へ脱出せよ。
Taskforce2Vessel1NameOverride=Francisco Dagohoy PF-10
Taskforce2Vessel1ShortNameOverride=Francisco Dagohoy PF-10
Taskforce2Vessel2NameOverride=Diego Silang PF-9

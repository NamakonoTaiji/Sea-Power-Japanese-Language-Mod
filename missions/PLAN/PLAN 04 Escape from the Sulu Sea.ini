Taskforce1StartMessage=スールー海からの脱出|スールー海で航行の自由作戦を実施中の我が部隊が、フィリピン軍の攻撃を受けた。バラバク海峡を突破し、パラワン水道に到達して北方へ脱出せよ。\n\nフィリピンの水上部隊が海峡を封鎖しようと試みている。彼らは軽攻撃ヘリコプターの支援を受けており、攻撃機も支援のために出撃する可能性がある。我が南海艦隊が支援のため緊急発進しているが、海峡を通過するまでは独力で戦うことになるだろう。\n\n友軍艦艇のうち、少なくとも1隻は生還せねばならない。|作戦開始
Taskforce1Reachareatoescape-playervictoryMessage=勝利|発：南海艦隊司令官\n宛：南部戦区司令官\n\n1. スールー海偵察部隊はバラバク海峡の通過に成功し、我が領海への脱出を完了した。\n\n2. 報告によれば、部隊はベトナム軍機の支援を受けたフィリピン軍による激しい攻撃を受けた。これは我々に対する敵対行為の重大なエスカレーションである。\n\n3. スールー海偵察部隊司令官は、楡林への帰還後、その武勇を称えられ叙勲されるであろう。我々は偉大な勝利を収めた！|ミッション終了
Taskforce1SuluSeaForcedestroyed-playerdefeatMessage=敗北|発：南海艦隊司令官\n宛：南部戦区司令官\n\n1. スールー海偵察部隊との通信が途絶した。\n\n2. スールー海偵察部隊司令官からの最後の通信によれば、部隊はフィリピン軍による持続的な爆弾、ロケット弾、ミサイル攻撃を受けていた。\n\n3. スールー海偵察部隊は壊滅したと判断される。|ミッション終了
Taskforce1USSAGattacked-sidechangeMessage=海軍通達|発：南海艦隊司令官\n宛：スールー海偵察部隊司令官\n\n1. 警告：パラワン沖の米機動部隊が、我が軍の対艦ミサイルによる攻撃を受け、被弾したとの報告あり。\n\n2. 米国は外交ルートを通じて抗議しているが、当該区域の米軍が警告なしに貴官らを攻撃する可能性があるため警戒せよ。\n\n3. 作戦を継続し、可能であれば脱出せよ。健闘を祈る。|了解、作戦継続
Taskforce145minSSGsidechangeMessage=海軍通達|発：南海艦隊司令官\n宛：スールー海偵察部隊司令官\n\n1. スプラトリー諸島付近で訓練航海中の実験潜水艦「遠征351号」が応答し、貴官らを支援する準備が整った。\n\n2. 「遠征351号」はバラバク海峡の南西で待機しており、YJ-8ミサイルを6発装備している。\n\n3. 注：この潜水艦は極めて重要な防衛資産であり、その生還が必須である。|了解、作戦継続
Taskforce1351mustsurviveMessage=敗北|発：南海艦隊司令官\n宛：南部戦区司令官\n\n1. 潜水艦351号が予定された定期連絡を怠った。\n\n2. 351号からの最後の通信は、国籍不明の部隊から攻撃を受けているというものであった。潜水艦351号は失われたと判断される。\n\n3. スールー海偵察部隊司令官の無謀な行動がこの重要な戦略資産の喪失につながったと考えられるため、同司令官は至急総司令部へ出頭し、事情聴取を受けることとなる。|ミッション終了
Trigger2Condition_Condition1AreaLabel=このエリアに到達して脱出せよ！
Objective_ReachMarkedArea=マークされたエリアに到達し脱出
Objective_OneShipMustSurvive=友軍艦艇の最低1隻生還
Objective_351MustSurvive=「遠征351号」の生還

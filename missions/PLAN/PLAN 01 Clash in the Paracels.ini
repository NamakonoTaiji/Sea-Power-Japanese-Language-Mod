Taskforce1Vessel6ShortNameOverride=274
Taskforce1StartmessageMessage=CLASH IN THE \nPARACELS (1974)|Vietnamese forces are imposing on our territorial waters in the Paracels, attempting to intimidate our fishermen. Command a surface force from the South Seas Fleet to locate and drive them away.\n\nThe enemy forces are operating two ex-USN destroyers and a converted minesweeper. Destroy all enemy forces encountered and then await further orders. 2 x PLANAF Q-5 are off the deck from Lingshui airbase inbound for support, reporting on top by 2135Z.\n\nAt least one of your ships must survive.|Start mission
Taskforce1OneplayershipmustsurviveMessage=DEFEAT|Defeat! All of your ships have been destroyed!|Exit mission
Taskforce1Allenemyshipsdestroyed-playervictoryMessage=VICTORY|Victory! All enemy units have been destroyed and our territorial waters are secure!|Exit mission
Objective_DestroyEnemyForces=Destroy all enemy forces encountered
Objective_OnePlayerShipMustSurvive=At least one of your ships must survive
[Language_fr]
Name=PLAN 01 - Clash dans les Paracels (1974)
Description=Les forces vietnamiennes tentent d'établir un avant-poste dans les Paracels, menaçant les pêcheurs chinois et portant atteinte à nos droits territoriaux. Commandez une petite force opérationnelle de surface de la PLAN pour explorer la zone et repousser toute force ennemie rencontrée.

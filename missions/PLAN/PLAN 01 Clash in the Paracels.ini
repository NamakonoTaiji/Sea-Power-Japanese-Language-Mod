[Language_ja]
Name=PLAN 01 - パラセル諸島での衝突 (1974)
Description=ベトナム軍はパラセル諸島に前線基地を設置しようと試み、中国の漁民を脅かし、我々の領有権を侵害している。中国人民解放軍海軍（PLAN）の小規模な水上部隊を指揮し、当該区域を調査、遭遇した敵部隊をすべて駆逐せよ。

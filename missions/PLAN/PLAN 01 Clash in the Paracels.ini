Taskforce1StartmessageMessage=パラセル諸島での衝突 (1974)|ベトナム軍がパラセル諸島の我が領海を侵犯し、漁民を威嚇している。南海艦隊の水上部隊を指揮し、敵を発見、これを駆逐せよ。\n\n敵部隊は旧米海軍の駆逐艦2隻と改造掃海艇1隻で構成されている。遭遇した全ての敵部隊を撃破し、その後の命令を待て。中国人民解放軍空軍（PLANAF）のQ-5攻撃機2機が陵水飛行場から支援のため接近中、2135Z（ズールー時）に現場上空へ到着予定。\n\n友軍艦艇のうち、少なくとも1隻は生還せねばならない。|作戦開始
Taskforce1OneplayershipmustsurviveMessage=敗北|敗北！友軍艦艇は全て撃沈された！|ミッション終了
Taskforce1Allenemyshipsdestroyed-playervictoryMessage=勝利|勝利！全ての敵部隊を撃破し、我が領海の安全を確保した！|ミッション終了
Objective_DestroyEnemyForces=遭遇した全ての敵部隊を撃破
Objective_OnePlayerShipMustSurvive=友軍艦艇の最低1隻生還
[Language_en]
Name=PLAN 01 - Clash in the Paracels (1974)
Description=Vietnamese forces are attempting to establish a forward outpost in the Paracels, threatening Chinese fishermen and interfering with our territorial rights. Command a small PLAN surface task force to investigate the area and drive away any enemy forces encountered.

Taskforce1StartmessageMessage=KONFLIKT BEI DEN \nPARACEL-INSELN (1974)|Vietnamesische Kräfte dringen in unsere Hoheitsgewässer bei den Paracel-Inseln ein und versuchen, unsere Fischer einzuschüchtern. Übernehmen Sie einen Kampfverband der Südmeeresflotte, um sie aufzuspüren und zu vertreiben.\n\nDie feindlichen Kräfte operieren mit zwei ehem. USN-Zerstörern und einem umgerüsteten Minensucher. Vernichten Sie alle angetroffenen feindlichen Kräfte und erwarten Sie anschließend weitere Befehle. 2 × Q-5 der PLAN-Luftstreitkräfte sind vom Luftwaffenstützpunkt Lingshui gestartet und auf Anflug zur Unterstützung, sie melden Überflug um 2135Z.\n\nAt least one of your ships must survive.|Mission Starten
Taskforce1OneplayershipmustsurviveMessage=NIEDERLAGE|Niederlage! Unsere gesamte Flotte wurde vernichtet!|Mission Beenden
Taskforce1Allenemyshipsdestroyed-playervictoryMessage=SIEG|Sieg! Die feindlichen Kräfte wurden vernichtet und unsere Territorialgewässer sind wieder sicher!|Mission Beenden
Objective_DestroyEnemyForces=Zerstören Sie alle feindlichen Kräfte
Objective_OnePlayerShipMustSurvive=Mindestens eines Ihrer Schiffe muss überleben

[Language_de]
Name=PLAN 01 - Konflikt bei den Paracel-Inseln (1974)
Description=Vietnamesische Kräfte versuchen einen vorgeschobenen Stützpunkt auf den Paracel-Inseln zu errichten, bedrohen dabei chinesische Fischer und verletzen unsere Hoheitsrechte. Übernehmen Sie einen kleinen Verband der PLAN, um das Gebiet aufzuklären und sämtliche angetroffenen Feindkräfte zu vertreiben.
